# ============================================================
# Compatibility Rules
# ============================================================

# Byte-level tokenizer excluded from high-throughput apps
[[rule]]
type = "exclude"
if_level = 0
if_id = "Byte-256"
then_level = 4
then_ids = ["Chat-Assistant", "Agent"]

# Encoder-decoder requires bidirectional encoder
[[rule]]
type = "require"
if_level = 3
if_id = "Encoder-Decoder"
then_level = 1
then_ids = ["Transformer-12L", "MoE-Encoder"]

# Linear attention excluded from agent (needs full attention)
[[rule]]
type = "exclude"
if_level = 2
if_id = "Linear-Attention"
then_level = 4
then_ids = ["Agent", "RAG"]

# MoE decoder requires MoE-compatible encoder or hybrid
[[rule]]
type = "require"
if_level = 3
if_id = "MoE-Decoder"
then_level = 1
then_ids = ["MoE-Encoder", "Hybrid-Attn-SSM"]
