# ============================================================
# Compatibility Rules
# ============================================================

# Chisel generators best with formal equivalence verification
[[rule]]
type = "prefer"
if_level = 0
if_id = "Chisel-Scala"
then_level = 3
then_ids = "Formal-equivalence"

# AI-generated RTL needs extra verification rigor
[[rule]]
type = "prefer"
if_level = 0
if_id = "AI-generated"
then_level = 3
then_ids = "Formal-equivalence,Gate-sim-4corner"

# Schematic analog requires transistor-level verification
[[rule]]
type = "prefer"
if_level = 0
if_id = "Schematic-analog"
then_level = 3
then_ids = "DRC-LVS,Power-integrity"

# Schematic analog does not use logic synthesis
[[rule]]
type = "exclude"
if_level = 0
if_id = "Schematic-analog"
then_level = 1
then_ids = "Logic-opt-6pass,Retiming"

# 6-block floorplan aligns with 6-metal routing
[[rule]]
type = "prefer"
if_level = 2
if_id = "Floorplan-6block"
then_level = 2
then_ids = "Route-6metal"

# Clock gating 12-domain needs STA 12-mode verification
[[rule]]
type = "prefer"
if_level = 1
if_id = "Clock-gating-12domain"
then_level = 3
then_ids = "STA-12mode"

# TSMC 6nm is the n=6-optimal manufacturing for mid-range ASIC
[[rule]]
type = "prefer"
if_level = 4
if_id = "TSMC-6nm"
then_level = 2
then_ids = "Route-6metal,Floorplan-6block"

# Intel 18A cutting-edge requires full multi-corner sign-off
[[rule]]
type = "prefer"
if_level = 4
if_id = "Intel-18A"
then_level = 1
then_ids = "Multi-corner"

# MPW prototyping pairs with mature nodes for cost savings
[[rule]]
type = "prefer"
if_level = 4
if_id = "Multi-project-wafer"
then_level = 1
then_ids = "Logic-opt-6pass,Power-opt"

# SystemC HLS pairs well with retiming for pipeline optimization
[[rule]]
type = "prefer"
if_level = 0
if_id = "SystemC-HLS"
then_level = 1
then_ids = "Retiming,Logic-opt-6pass"
