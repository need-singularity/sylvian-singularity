# ============================================================
# Compatibility Rules
# ============================================================

# Biochar soil amendment pairs with biochar sequestration
[[rule]]
type = "bonus"
if_level = 0
if_id = "Biochar-Amend"
then_level = 4
then_ids = ["Biochar-Sequest"]
bonus = 0.15

# No-till excludes relay cropping with tillage needs
[[rule]]
type = "bonus"
if_level = 0
if_id = "No-Till"
then_level = 1
then_ids = ["Crimson-Roller", "Living-Mulch"]
bonus = 0.10

# Mob grazing requires multi-species cover for recovery
[[rule]]
type = "exclude"
if_level = 3
if_id = "Mob-Grazing"
then_level = 2
then_ids = ["Perennial-Grain"]
