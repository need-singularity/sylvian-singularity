# ============================================================
# Compatibility Rules
# ============================================================

# Broadband sensor needs low-noise preamp
[[rule]]
type = "prefer"
if_level = 0
if_id = "Broadband"
then_level = 1
then_ids = "LowNoisePreamp,CryoLNA"

# Fiber optic sensor uses FPGA digitizer
[[rule]]
type = "prefer"
if_level = 0
if_id = "FiberOpticSensor"
then_level = 2
then_ids = "FPGA_Digitizer,HighRate"

# EEW real-time needs edge computing recorder
[[rule]]
type = "prefer"
if_level = 4
if_id = "EEW_Realtime"
then_level = 3
then_ids = "EdgeCompute,CloudStream"

# Autonomous OBS pairs with satellite telemetry
[[rule]]
type = "prefer"
if_level = 3
if_id = "AutonomousOBS"
then_level = 4
then_ids = "SatelliteTelemetry,MeshWireless"
