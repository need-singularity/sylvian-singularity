# N6 Seismograph DSE — Seismic instruments
# 6 Sensor x 6 Amplifier x 6 Digitizer x 6 Recorder x 6 Network = 7,776 combos
# n=6: 6 DOF (3 translation + 3 rotation), sigma=12 channels, J2=24-bit ADC

[meta]
name = "seismograph"
desc = "Seismograph DSE (6 DOF, sigma=12 channels, J2=24-bit ADC)"

[scoring]
n6 = 0.35
perf = 0.25
power = 0.20
cost = 0.20

