# =============================================================
# Compatibility Rules
# =============================================================

# CellAgri only with Vertical or Greenhouse process
[[rule]]
type       = "require"
if_level   = 0
if_id      = "CellAgri"
then_level = 1
then_ids   = "Vertical,Greenhouse"

# SpaceFarm excludes Precision and Organic (no open field in space)
[[rule]]
type       = "exclude"
if_level   = 4
if_id      = "SpaceFarm"
then_level = 1
then_ids   = "Precision,Organic"

# Algae only with Hydroponics or Vertical (water-based)
[[rule]]
type       = "require"
if_level   = 0
if_id      = "Algae"
then_level = 1
then_ids   = "Hydroponics,Vertical"
