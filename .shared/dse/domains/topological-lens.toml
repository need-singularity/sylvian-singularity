# =============================================================
# Compatibility Rules
# =============================================================

# Diamond requires E-Beam or Two-Photon (hard material, precision fab needed)
[[rule]]
type       = "require"
if_level   = 0
if_id      = "Diamond_C6"
then_level = 1
then_ids   = "EBeam_Litho,TwoPhoton_3D"

# BIC requires Topology_Opt or ML_InverseDesign (symmetry-protected design needed)
[[rule]]
type       = "require"
if_level   = 2
if_id      = "BIC_BoundState"
then_level = 3
then_ids   = "Topology_Opt,ML_InverseDesign,FEM_Solver"

# Graphene incompatible with Two-Photon (2D material, not polymer)
[[rule]]
type       = "exclude"
if_level   = 0
if_id      = "Graphene_Hex"
then_level = 1
then_ids   = "TwoPhoton_3D"

# Telescope_48m requires E-Beam or Holographic process (large precision segments)
[[rule]]
type       = "require"
if_level   = 4
if_id      = "Telescope_48m"
then_level = 1
then_ids   = "EBeam_Litho,Holographic,SelfAssembly"
