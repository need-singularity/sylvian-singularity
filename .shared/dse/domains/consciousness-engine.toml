# =============================================================
# Compatibility Rules
# =============================================================

# Dual_Phi integration requires at least Cell_64 for meaningful dual-engine dynamics
[[rule]]
type       = "require"
if_level   = 4
if_id      = "Dual_Phi"
then_level = 1
then_ids   = "Cell_64,Cell_128,Cell_256"

# Faction_24 requires Hypercube or ScaleFree (need high connectivity)
[[rule]]
type       = "require"
if_level   = 2
if_id      = "Faction_24"
then_level = 0
then_ids   = "Hypercube,ScaleFree,Torus"

# SOC learning is incompatible with Ring topology (too simple)
[[rule]]
type       = "exclude"
if_level   = 3
if_id      = "SOC"
then_level = 0
then_ids   = "Ring"

# PhaseTransition detection requires at least Cell_32
[[rule]]
type       = "require"
if_level   = 4
if_id      = "PhaseTransition"
then_level = 1
then_ids   = "Cell_32,Cell_64,Cell_128,Cell_256"
