# =============================================================
# Compatibility Rules
# =============================================================

# StringM_Theory requires E6_GUT or SO10_Spinor (needs GUT gauge group)
[[rule]]
type       = "require"
if_level   = 0
if_id      = "StringM_Theory"
then_level = 1
then_ids   = "E6_GUT,SO10_Spinor"

# ThermoDyn incompatible with StringM_Theory (scale mismatch)
[[rule]]
type       = "exclude"
if_level   = 0
if_id      = "ThermoDyn"
then_level = 0
then_ids   = "StringM_Theory"

# Gravity_GR requires GeneralRel (needs GR framework)
[[rule]]
type       = "require"
if_level   = 2
if_id      = "Gravity_GR"
then_level = 0
then_ids   = "GeneralRel"

# DarkSector requires CosmicParam (needs cosmological observables)
[[rule]]
type       = "require"
if_level   = 2
if_id      = "DarkSector"
then_level = 3
then_ids   = "CosmicParam"

# Unification requires E6_GUT or SO10_Spinor (needs GUT symmetry)
[[rule]]
type       = "require"
if_level   = 2
if_id      = "Unification"
then_level = 1
then_ids   = "E6_GUT,SO10_Spinor"

# ColliderLHC incompatible with DarkSector alone (colliders don't detect dark matter directly)
[[rule]]
type       = "exclude"
if_level   = 4
if_id      = "DarkMatterDet"
then_level = 2
then_ids   = "StrongQCD"
