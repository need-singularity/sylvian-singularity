# =============================================================
# Compatibility Rules
# =============================================================

# Z-Pinch only works with Ohmic or Alfven heating
[[rule]]
type     = "require"
if_level = 0
if_id    = "Z_Pinch"
then_level = 2
then_ids = "Ohmic,Alfven"

# FRC/Spheromak exclude ITER-class (incompatible scale)
[[rule]]
type     = "exclude"
if_level = 0
if_id    = "FRC"
then_level = 4
then_ids = "ITER_Burn"

[[rule]]
type     = "exclude"
if_level = 0
if_id    = "Spheromak"
then_level = 4
then_ids = "ITER_Burn,DEMO_Steady"

# Space propulsion excludes Tokamak (too massive)
[[rule]]
type     = "exclude"
if_level = 4
if_id    = "Space_Prop"
then_level = 0
then_ids = "Tokamak,RFP"

# QH-mode requires Tokamak or Stellarator
[[rule]]
type     = "require"
if_level = 1
if_id    = "QH_mode"
then_level = 0
then_ids = "Tokamak,Stellarator"

# Disruption prediction mainly for Tokamak/RFP
[[rule]]
type     = "prefer"
if_level = 3
if_id    = "Disruption_ML"
then_level = 0
then_ids = "Tokamak,RFP"

# Stellarator prefers ECRH (steady-state compatible)
[[rule]]
type     = "prefer"
if_level = 0
if_id    = "Stellarator"
then_level = 2
then_ids = "ECRH,NBI"

# Tokamak + NBI/ECRH best combination
[[rule]]
type     = "prefer"
if_level = 0
if_id    = "Tokamak"
then_level = 2
then_ids = "NBI,ECRH,LHCD,ICRH"

# RMP is the premier ELM control -- prefers H-mode
[[rule]]
type     = "prefer"
if_level = 3
if_id    = "RMP_ELM"
then_level = 1
then_ids = "H_mode,Hybrid"

# Advanced Tokamak needs active MHD/RWM control
[[rule]]
type     = "prefer"
if_level = 1
if_id    = "AT"
then_level = 3
then_ids = "MHD_Feedback,RWM_Active"

# ITER scenario prefers NBI + MHD feedback
[[rule]]
type     = "prefer"
if_level = 4
if_id    = "ITER_Burn"
then_level = 2
then_ids = "NBI,ECRH,ICRH"

# FRC pairs with NBI (TAE approach)
[[rule]]
type     = "prefer"
if_level = 0
if_id    = "FRC"
then_level = 2
then_ids = "NBI,Alfven"
