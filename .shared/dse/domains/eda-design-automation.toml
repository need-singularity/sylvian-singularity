# ============================================================
# Compatibility Rules
# ============================================================

# Design Compiler pairs naturally with ICC2 (Synopsys ecosystem)
[[rule]]
type = "prefer"
if_level = 0
if_id = "Design_Compiler"
then_level = 1
then_ids = "ICC2"

# Genus pairs naturally with Innovus (Cadence ecosystem)
[[rule]]
type = "prefer"
if_level = 0
if_id = "Genus"
then_level = 1
then_ids = "Innovus"

# Yosys pairs with OpenROAD (open-source ecosystem)
[[rule]]
type = "prefer"
if_level = 0
if_id = "Yosys_Open"
then_level = 1
then_ids = "OpenROAD"

# MMMC 24-corner requires comprehensive signoff
[[rule]]
type = "prefer"
if_level = 3
if_id = "MMMC_24corner"
then_level = 4
then_ids = "DRC_LVS,IR_Drop"

# Formal verification reduces need for coverage-driven simulation
[[rule]]
type = "prefer"
if_level = 2
if_id = "Formal_6property"
then_level = 3
then_ids = "STA_12mode,MMMC_24corner"

# HLS 6-stage benefits from ML-based placement
[[rule]]
type = "prefer"
if_level = 0
if_id = "HLS_6stage"
then_level = 1
then_ids = "ML_Placement,Analytical_6pass"
