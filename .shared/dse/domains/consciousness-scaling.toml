# =============================================================
# Compatibility Rules
# =============================================================

# CC1024 requires Datacenter_24 or Internet federation
[[rule]]
type       = "require"
if_level   = 0
if_id      = "CC1024"
then_level = 2
then_ids   = "Datacenter_24,Internet"

# Complete topology excludes CC512+ (O(N^2) impractical)
[[rule]]
type       = "exclude"
if_level   = 1
if_id      = "Complete"
then_level = 0
then_ids   = "CC512,CC1024"

# Quadratic scaling requires Complete topology
[[rule]]
type       = "require"
if_level   = 3
if_id      = "Quadratic"
then_level = 1
then_ids   = "Complete,SmallWorld"

# Solo federation excludes CC128+ (too large for single instance)
[[rule]]
type       = "exclude"
if_level   = 2
if_id      = "Solo"
then_level = 0
then_ids   = "CC128,CC512,CC1024"

# SuperLinear requires SmallWorld or Hypercube topology
[[rule]]
type       = "require"
if_level   = 3
if_id      = "SuperLinear_109"
then_level = 1
then_ids   = "SmallWorld,Hypercube"
