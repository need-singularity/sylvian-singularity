# =============================================================
# N6 Electron Microscopy DSE — Nanoscale imaging system
# n=6: 6 lens elements per condenser (n=6), sigma=12 apertures,
#   tau=4 imaging modes (BF/DF/HAADF/diffraction), phi=2 TEM/SEM
#   dual, J2=24 detector segments, 6-fold aberration correction
#   (C3/C5/chromatic/coma/astigmatism/trefoil)
# Total raw combos: 6x6x6x6x6 = 7,776 (pre-filter)
# =============================================================

[meta]
name = "electron-microscopy"
desc = "Electron Microscopy Architecture DSE (source/optics/detector/stage/application)"

[scoring]
n6 = 0.35
perf = 0.25
power = 0.20
cost = 0.20

