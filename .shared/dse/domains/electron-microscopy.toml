# ============================================================
# Compatibility Rules
# ============================================================

# Cryo-EM application requires cryo holder or autoloader
[[rule]]
type = "require"
if_level = 4
if_id = "Cryo-EM"
then_level = 3
then_ids = ["Cryo-Holder", "Autoloader"]

# Direct electron detector is essential for cryo-EM
[[rule]]
type = "require"
if_level = 4
if_id = "Cryo-EM"
then_level = 2
then_ids = ["Direct-Electron", "Pixelated-4D"]

# W hairpin source insufficient for aberration-corrected modes
[[rule]]
type = "exclude"
if_level = 0
if_id = "W-Hairpin"
then_level = 1
then_ids = ["Cs-Corrected", "Cc-Corrected", "Dual-Corrected"]

# Spin-polarized source requires Lorentz lens for magnetic imaging
[[rule]]
type = "require"
if_level = 0
if_id = "Spin-Polarized"
then_level = 1
then_ids = ["Lorentz-Lens"]

# Liquid cell excludes cryo holder (temperature conflict)
[[rule]]
type = "exclude"
if_level = 3
if_id = "Liquid-Cell"
then_level = 3
then_ids = ["Cryo-Holder"]

# 4D-STEM detector requires cold FEG or Schottky for coherence
[[rule]]
type = "require"
if_level = 2
if_id = "Pixelated-4D"
then_level = 0
then_ids = ["Cold-FEG", "Schottky-FEG", "Photocathode"]
