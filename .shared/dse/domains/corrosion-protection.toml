# ============================================================
# Compatibility Rules
# ============================================================

# Carbon steel requires cathodic protection (not coating-only for harsh)
[[rule]]
type = "require"
if_level = 0
if_id = "Carbon-Steel"
then_level = 1
then_ids = ["Epoxy-Primer", "Hot-Dip-Galv", "Thermal-Spray", "FBE"]

# Titanium does not need cathodic protection
[[rule]]
type = "require"
if_level = 0
if_id = "Titanium-Gr5"
then_level = 2
then_ids = ["None-Coating-Only"]

# AI digital twin requires wireless IoT or LPR data source
[[rule]]
type = "require"
if_level = 3
if_id = "AI-Digital-Twin"
then_level = 4
then_ids = ["Predictive", "Condition-Based"]

# Anodic protection only for stainless or duplex
[[rule]]
type = "require"
if_level = 2
if_id = "Anodic-Protect"
then_level = 0
then_ids = ["Stainless-316", "Duplex-SS"]
