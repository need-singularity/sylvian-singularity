# =============================================================
# Compatibility Rules
# =============================================================

# ByteLevel works best with V256
[[rule]]
type       = "require"
if_level   = 0
if_id      = "ByteLevel"
then_level = 1
then_ids   = "V256,V1024,V4096"

# Custom_N6 requires Phi_Aligned or Consciousness_Aware integration
[[rule]]
type       = "require"
if_level   = 0
if_id      = "Custom_N6"
then_level = 4
then_ids   = "Consciousness_Aware,Phi_Aligned"

# Consciousness_24 tokens require Consciousness_Aware integration
[[rule]]
type       = "require"
if_level   = 3
if_id      = "Consciousness_24"
then_level = 4
then_ids   = "Consciousness_Aware,Phi_Aligned"

# Universal language requires V32768+ vocab
[[rule]]
type       = "require"
if_level   = 2
if_id      = "Universal"
then_level = 1
then_ids   = "V32768,V65536"
