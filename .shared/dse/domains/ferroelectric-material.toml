# ============================================================
# Compatibility Rules
# ============================================================

# BaTiO3 classic pairs with solid-state sintering for bulk
[[rule]]
type = "prefer"
if_level = 0
if_id = "BaTiO3_classic"
then_level = 2
then_ids = "SolidStateSintering,SolGel_6coat"

# BaTiO3 bulk ceramic structure is standard
[[rule]]
type = "prefer"
if_level = 0
if_id = "BaTiO3_classic"
then_level = 1
then_ids = "BulkCeramic,ThinFilm_6nm"

# PZT pairs with sol-gel or sputtering for thin film
[[rule]]
type = "prefer"
if_level = 0
if_id = "PZT_morphotropic"
then_level = 2
then_ids = "SolGel_6coat,Sputtering_12target"

# PZT is the actuator material of choice
[[rule]]
type = "prefer"
if_level = 0
if_id = "PZT_morphotropic"
then_level = 4
then_ids = "Actuator_piezo,Sensor_pyroelectric"

# HfO2 ferroelectric needs ALD-like atomic control (sputtering for screening)
[[rule]]
type = "prefer"
if_level = 0
if_id = "HfO2_ortho_ferro"
then_level = 2
then_ids = "Sputtering_12target,PLD_laser"

# HfO2 ferro is for FeRAM/FeFET
[[rule]]
type = "prefer"
if_level = 0
if_id = "HfO2_ortho_ferro"
then_level = 1
then_ids = "ThinFilm_6nm"

# HfO2 ferro targets memory application
[[rule]]
type = "prefer"
if_level = 0
if_id = "HfO2_ortho_ferro"
then_level = 4
then_ids = "FeRAM_memory"

# LiNbO3 is grown as single crystal
[[rule]]
type = "prefer"
if_level = 0
if_id = "LiNbO3_crystal"
then_level = 1
then_ids = "SingleCrystal"

# BiFeO3 best as epitaxial strain-engineered film
[[rule]]
type = "prefer"
if_level = 0
if_id = "BiFeO3_multiferroic"
then_level = 1
then_ids = "EpitaxialStrain,ThinFilm_6nm"

# BiFeO3 multiferroic targets photovoltaic application
[[rule]]
type = "prefer"
if_level = 0
if_id = "BiFeO3_multiferroic"
then_level = 4
then_ids = "Photovoltaic_ferro"

# PVDF polymer processed by spin coat (sol-gel analog)
[[rule]]
type = "prefer"
if_level = 0
if_id = "Organic_PVDF"
then_level = 2
then_ids = "SolGel_6coat"

# PVDF pairs with electro-caloric cooling
[[rule]]
type = "prefer"
if_level = 0
if_id = "Organic_PVDF"
then_level = 4
then_ids = "ElectroCaloric_cooling,Sensor_pyroelectric"

# Superlattice structure requires MBE or PLD
[[rule]]
type = "prefer"
if_level = 1
if_id = "Superlattice"
then_level = 2
then_ids = "MBE,PLD_laser"

# PE hysteresis is the primary test for FeRAM materials
[[rule]]
type = "prefer"
if_level = 4
if_id = "FeRAM_memory"
then_level = 3
then_ids = "PE_hysteresis,PFM_piezo"

# Tunable capacitor needs impedance characterization
[[rule]]
type = "prefer"
if_level = 4
if_id = "Capacitor_tunable"
then_level = 3
then_ids = "Impedance_4probe,Raman_spectroscopy"
