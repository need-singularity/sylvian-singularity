# ============================================================
# Compatibility Rules
# ============================================================

# Sub-6GHz pairs well with massive MIMO and O-RAN
[[rule]]
type = "prefer"
if_level = 0
if_id = "Sub6GHz"
then_level = 1
then_ids = "MassiveMIMO64,Beamforming12"

# mmWave needs phased array or holographic MIMO
[[rule]]
type = "prefer"
if_level = 0
if_id = "mmWave28"
then_level = 1
then_ids = "PhasedArray,HolographicMIMO"

# THz requires line-of-sight mesh or edge computing
[[rule]]
type = "prefer"
if_level = 0
if_id = "THz300"
then_level = 3
then_ids = "MECEdge,Mesh6Hop"

# URLLC needs MEC edge for low latency
[[rule]]
type = "prefer"
if_level = 4
if_id = "URLLC"
then_level = 3
then_ids = "MECEdge,CRAN"

# Satellite NTN pairs with mMTC and shared CBRS
[[rule]]
type = "prefer"
if_level = 3
if_id = "SatelliteNTN"
then_level = 0
then_ids = "SatelliteKa,SharedCBRS"

# OTFS modulation optimal for high-mobility V2X
[[rule]]
type = "prefer"
if_level = 4
if_id = "V2X"
then_level = 2
then_ids = "OTFS,NOMA"
