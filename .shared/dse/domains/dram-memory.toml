# =============================================================
# N6 DRAM Memory DSE — Dynamic random-access memory
# n=6: sigma=12 bank groups (HBM3), tau=4 burst phases (activate/read/precharge/refresh),
#       phi=2 dual-channel, sigma*tau=48 nm half-pitch (DDR5), J2=24 Gb die capacity
# BT-28 (Computing ladder), BT-55 (GPU HBM capacity), BT-75 (HBM interface)
# Total raw combos: 6x6x6x6x6 = 7,776
# =============================================================

[meta]
name = "dram-memory"
desc = "DRAM Memory DSE (BT-28/55/75, sigma=12 banks, tau=4 burst, phi=2 dual-ch)"
levels = ["CellType", "Interface", "Architecture", "Stack", "Controller"]
vision = "Ultimate DRAM — sigma=12 bank groups, tau=4 burst phases, J2=24 Gb die, all n=6 aligned"

[scoring]
n6   = 0.35
perf = 0.25
power = 0.20
cost  = 0.20

