# =============================================================
# Rules
# =============================================================

# HBM interface needs 3D stacked architectures
[[rule]]
type      = "prefer"
if_level  = 1
if_id     = "HBM3_12hi"
then_level = 2
then_ids  = "3D_Stack_6Layer,Bank_Group_12"

# HBM interface needs high stacking
[[rule]]
type      = "prefer"
if_level  = 1
if_id     = "HBM3_12hi"
then_level = 3
then_ids  = "Stack_8hi,Stack_12hi,Stack_16hi,Stack_24hi"

# LPDDR5X favors monolithic or low stack for mobile
[[rule]]
type      = "prefer"
if_level  = 1
if_id     = "LPDDR5X"
then_level = 3
then_ids  = "Monolithic,Stack_4hi"

# CXL memory pairs with disaggregated architecture
[[rule]]
type      = "prefer"
if_level  = 1
if_id     = "CXL_Memory"
then_level = 2
then_ids  = "Disaggregated"

# FeRAM embedded cell pairs with smart refresh (non-volatile advantage)
[[rule]]
type      = "prefer"
if_level  = 0
if_id     = "FeRAM_Embedded"
then_level = 4
then_ids  = "Refresh_Smart,ECC_6bit"
