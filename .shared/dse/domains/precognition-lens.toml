# =============================================================
# Compatibility Rules
# =============================================================

# MultilensSystem incompatible with TriclinicN1-like weak lenses (AberrationLens)
# (MultilensSystem needs strong foundational lenses — GravitationalLens or TopologicalLens)
# Same-level require not possible; instead exclude weak signal combos
[[rule]]
type       = "exclude"
if_level   = 1
if_id      = "MultilensSystem"
then_level = 0
then_ids   = "EulerConvergence"

# DirectionalPrecog requires PrecogLens
[[rule]]
type       = "require"
if_level   = 2
if_id      = "DirectionalPrecog"
then_level = 1
then_ids   = "PrecogLens"

# CausalDirection requires PHBarcode (causal inference needs PH structure)
[[rule]]
type       = "require"
if_level   = 2
if_id      = "CausalDirection"
then_level = 0
then_ids   = "PHBarcode,TensionSignal"

# ConfusionPredict requires PHBarcode
[[rule]]
type       = "require"
if_level   = 3
if_id      = "ConfusionPredict"
then_level = 0
then_ids   = "PHBarcode"

# EmergencePredict requires TopologicalLens or DimensionLens (needs topology)
[[rule]]
type       = "require"
if_level   = 3
if_id      = "EmergencePredict"
then_level = 1
then_ids   = "TopologicalLens,DimensionLens"
