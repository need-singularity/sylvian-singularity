# =============================================================
# Compatibility Rules
# =============================================================

# NIST_Full requires AES_CTR or SHA256 post-processing

[[candidate]]
level  = 4
id     = "TargetN6"
label  = "n=6 센서 어레이 임베디드 타겟 (n=6 노드)"
n6     = 1.00
perf   = 0.85
power  = 0.55
cost   = 0.45
notes  = "nodes=n=6 EXACT, embedded sensor array, distributed RNG"
[[rule]]
type       = "require"
if_level   = 2
if_id      = "NIST_Full"
then_level = 1
then_ids   = "AES_CTR,SHA256,Adaptive"

# BR_100M requires FPGA or ASIC
[[rule]]
type       = "require"
if_level   = 3
if_id      = "BR_100M"
then_level = 4
then_ids   = "FPGA,ASIC"

# None post-processing excludes NIST_Full
[[rule]]
type       = "exclude"
if_level   = 1
if_id      = "None"
then_level = 2
then_ids   = "NIST_Full,TestU01"

