# ============================================================
# Compatibility Rules
# ============================================================

# Optical lattice interrogation requires optical species (Sr/Yb)
[[rule]]
type = "require"
if_level = 2
if_id = "Optical-Lattice"
then_level = 0
then_ids = ["Sr-87", "Yb-171"]

# Ion trap interrogation requires Al+ or Yb
[[rule]]
type = "require"
if_level = 2
if_id = "Ion-Trap"
then_level = 0
then_ids = ["Al-Plus", "Yb-171"]

# CPT interrogation is for compact Cs/Rb only
[[rule]]
type = "require"
if_level = 2
if_id = "CPT"
then_level = 0
then_ids = ["Cs-133", "Rb-87"]

# Hydrogen maser uses Rabi or Ramsey only
[[rule]]
type = "require"
if_level = 0
if_id = "H-Maser"
then_level = 2
then_ids = ["Ramsey", "Rabi"]

# Buffer gas cooling is for compact Cs/Rb chip-scale
[[rule]]
type = "require"
if_level = 1
if_id = "Buffer-Gas"
then_level = 0
then_ids = ["Cs-133", "Rb-87"]

# Cryo Si cavity pairs with optical lattice/ion trap for best stability
[[rule]]
type = "require"
if_level = 3
if_id = "Cryo-Si-Cavity"
then_level = 2
then_ids = ["Optical-Lattice", "Ion-Trap", "Hyper-Ramsey"]
