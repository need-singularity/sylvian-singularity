# =============================================================
# PKG-MANAGER DSE Domain Definition
# 궁극의 패키지 매니저 아키텍처 — n=6 기반 의존성 관리 + 보안 + 배포
# BT-53 (Crypto), BT-58 (sigma-tau=8), BT-74 (95/5 resonance)
# Total raw combos: 6x6x6x6x5 = 6,480 (pre-filter)
# =============================================================

[meta]
name = "pkg-manager"
desc = "Ultimate Package Manager DSE (Registry/Resolver/Builder/Security/Distribution)"
levels = ["Registry", "Resolver", "Builder", "Security", "Distribution"]
vision = "Say 'add feature X' and it auto-resolves, builds, audits, deploys -- n=6 supply chain"

[scoring]
n6   = 0.30
perf = 0.25
power = 0.20
cost  = 0.25

