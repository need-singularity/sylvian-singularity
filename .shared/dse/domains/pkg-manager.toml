# =============================================================
# Compatibility Rules
# =============================================================

# BlockchainReg is too slow for MonoRepo (monorepo needs fast resolution)
[[rule]]
type       = "exclude"
if_level   = 0
if_id      = "BlockchainReg"
then_level = 1
then_ids   = "MonoRepo"

# P2P_DHT requires DistributedBuild or StreamBuild (needs distributed infra)
[[rule]]
type       = "require"
if_level   = 0
if_id      = "P2P_DHT"
then_level = 2
then_ids   = "DistributedBuild,StreamBuild"

# EgyptianSplit requires IncrementalN6 or StreamBuild (fraction-aware stages)
[[rule]]
type       = "require"
if_level   = 1
if_id      = "EgyptianSplit"
then_level = 2
then_ids   = "IncrementalN6,StreamBuild"

# AuditChain requires CDN_Global or Mirror_N6 (needs persistent distribution)
[[rule]]
type       = "require"
if_level   = 3
if_id      = "AuditChain"
then_level = 4
then_ids   = "CDN_Global,Mirror_N6"

# FuzzTest incompatible with LazyBuild (lazy eval defeats fuzzing)
[[rule]]
type       = "exclude"
if_level   = 3
if_id      = "FuzzTest"
then_level = 2
then_ids   = "LazyBuild"

# WASM_Dist incompatible with DistributedBuild (WASM is lightweight, distributed build is overkill)
[[rule]]
type       = "exclude"
if_level   = 4
if_id      = "WASM_Dist"
then_level = 2
then_ids   = "DistributedBuild"
