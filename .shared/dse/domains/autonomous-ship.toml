# =============================================================
# Rules
# =============================================================

# USV hull too small for diesel-electric
[[rule]]
type      = "exclude"
if_level  = 0
if_id     = "USV_Patrol"
then_level = 2
then_ids  = "Diesel_Elec,LNG_Dual,Ammonia"

# Full battery only for short-range ferry
[[rule]]
type      = "prefer"
if_level  = 2
if_id     = "Battery_Full"
then_level = 0
then_ids  = "Ferry,USV_Patrol"

# Full sensor fusion for large vessel autonomy
[[rule]]
type      = "prefer"
if_level  = 1
if_id     = "Sensor_Fusion"
then_level = 4
then_ids  = "Convoy_6,Port_Auto"

# LEO satellite for deep-sea operations
[[rule]]
type      = "prefer"
if_level  = 3
if_id     = "LEO_Sat"
then_level = 4
then_ids  = "Convoy_6,Green_Route"
