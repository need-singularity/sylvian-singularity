# HEXA-SHIP DSE Domain Definition
# Maritime Autonomous Systems
# n=6: 6 collision avoidance zones, sigma=12 radar channels
# BT-59 (8-layer AI stack), BT-74 (95/5 cross-domain)
# Total raw combos: 6x6x6x6x6 = 7,776
