[meta]
name = "autonomous-ship"
desc = "Maritime Autonomous System DSE (6 COLREG zones, sigma=12 radar)"
levels = ["Hull", "Navigation", "Propulsion", "Communication", "Fleet"]
vision = "Autonomous maritime — 6-zone collision avoidance, 12-channel awareness"

[scoring]
n6   = 0.35
perf = 0.25
power = 0.20
cost  = 0.20

