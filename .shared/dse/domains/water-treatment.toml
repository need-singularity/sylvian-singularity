# ============================================================
# Compatibility Rules
# ============================================================

# RO filtration requires desalination or recycled wastewater intake
[[rule]]
type = "prefer"
if_level = 1
if_id = "RO_System"
then_level = 0
then_ids = "Desal_Intake,RecycledWW"

# Ozonation chemical pairs with ozone disinfection for synergy
[[rule]]
type = "prefer"
if_level = 2
if_id = "Ozonation"
then_level = 3
then_ids = "OzoneDisinfect,UV_Disinfect"

# Gravity-fed distribution requires reservoir intake for head
[[rule]]
type = "prefer"
if_level = 4
if_id = "GravityFed"
then_level = 0
then_ids = "Reservoir,Rainwater"

# Advanced oxidation best paired with membrane filtration
[[rule]]
type = "prefer"
if_level = 2
if_id = "AdvOxide"
then_level = 1
then_ids = "MembraneUF,RO_System"

# Smart pipeline distribution requires pumped network capability
[[rule]]
type = "prefer"
if_level = 4
if_id = "SmartPipe"
then_level = 0
then_ids = "RiverIntake,Groundwell,Reservoir"
