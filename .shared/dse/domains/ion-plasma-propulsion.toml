# ============================================================
# Compatibility Rules
# ============================================================

# Gridded ion pairs with 6-grid or 4-grid optics
[[rule]]
type = "prefer"
if_level = 0
if_id = "GriddedIon"
then_level = 3
then_ids = "SixGridOptics,FourGrid"

# Hall-effect pairs with annular beam
[[rule]]
type = "prefer"
if_level = 0
if_id = "HallEffect"
then_level = 3
then_ids = "Annular12ch,DivergentLens"

# VASIMR pairs with magnetic nozzle
[[rule]]
type = "prefer"
if_level = 0
if_id = "VASIMR"
then_level = 3
then_ids = "MagneticNozzle"

# FEEP pairs with cesium propellant
[[rule]]
type = "prefer"
if_level = 0
if_id = "FEEP"
then_level = 1
then_ids = "Cesium,Mercury"

# Xenon is standard for gridded ion and Hall
[[rule]]
type = "prefer"
if_level = 1
if_id = "Xenon"
then_level = 0
then_ids = "GriddedIon,HallEffect"

# Nuclear fission enables high-power thrusters
[[rule]]
type = "prefer"
if_level = 2
if_id = "NuclearFission"
then_level = 0
then_ids = "VASIMR,HallEffect"

# Fusion pellet for interstellar missions
[[rule]]
type = "prefer"
if_level = 2
if_id = "FusionPellet"
then_level = 4
then_ids = "InterstellarPrecursor,JupiterMission"

# RTG for deep space (low power, long duration)
[[rule]]
type = "prefer"
if_level = 2
if_id = "NuclearRTG"
then_level = 0
then_ids = "PulsedPlasma,Electrospray"

# Interstellar needs nuclear or fusion power
[[rule]]
type = "prefer"
if_level = 4
if_id = "InterstellarPrecursor"
then_level = 2
then_ids = "NuclearFission,FusionPellet"

# LEO-GEO commercial uses solar + krypton for cost
[[rule]]
type = "prefer"
if_level = 4
if_id = "LEO_GEO"
then_level = 1
then_ids = "Krypton,Xenon"
