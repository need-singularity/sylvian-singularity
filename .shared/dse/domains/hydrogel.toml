# ============================================================
# Compatibility Rules
# ============================================================

# PEG pairs best with click chemistry or photo crosslink
[[rule]]
type = "prefer"
if_level = 0
if_id = "PEG"
then_level = 1
then_ids = "Click_Chemistry,Photo_Crosslink"

# Alginate requires ionic Ca2+ crosslink
[[rule]]
type = "prefer"
if_level = 0
if_id = "Alginate"
then_level = 1
then_ids = "Ionic_Ca2p,Physical_Entangle"

# Collagen pairs with chemical crosslink for stability
[[rule]]
type = "prefer"
if_level = 0
if_id = "Collagen"
then_level = 1
then_ids = "Chemical_Covalent,Click_Chemistry"

# PNIPAm is inherently thermoresponsive
[[rule]]
type = "prefer"
if_level = 0
if_id = "PNIPAm"
then_level = 2
then_ids = "Thermo_Responsive,Multi_Stimuli_6trigger"

# Hyaluronic acid pairs with enzyme-degradable and tissue applications
[[rule]]
type = "prefer"
if_level = 0
if_id = "Hyaluronic_Acid"
then_level = 2
then_ids = "Enzyme_Degrade,pH_Sensitive"

# Double network pairs with tissue scaffold (cartilage-like toughness)
[[rule]]
type = "prefer"
if_level = 1
if_id = "Double_Network"
then_level = 4
then_ids = "Tissue_Scaffold,Wound_Dressing"

# Photo crosslink pairs with 3D bioprinting
[[rule]]
type = "prefer"
if_level = 1
if_id = "Photo_Crosslink"
then_level = 3
then_ids = "Bioprinting_6layer,Microfluidic"

# Freeze-thaw pairs with agriculture (bulk, low-cost)
[[rule]]
type = "prefer"
if_level = 3
if_id = "Freeze_Thaw_2cycle"
then_level = 4
then_ids = "Agriculture_Water_Retention,Wound_Dressing"

# Bioprinting pairs with tissue scaffold and drug delivery
[[rule]]
type = "prefer"
if_level = 3
if_id = "Bioprinting_6layer"
then_level = 4
then_ids = "Tissue_Scaffold,Drug_Delivery_12hr"

# PHEMA classic contact lens material
[[rule]]
type = "prefer"
if_level = 0
if_id = "PHEMA"
then_level = 4
then_ids = "Contact_Lens,Biosensor"
