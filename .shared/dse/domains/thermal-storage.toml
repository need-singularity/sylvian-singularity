# ============================================================
# Compatibility Rules
# ============================================================

# Molten salt requires ceramic shell or steel tank
[[rule]]
type = "prefer"
if_level = 0
if_id = "MoltenSalt"
then_level = 1
then_ids = "SteelTank,CeramicShell"

# Ice storage for building HVAC applications
[[rule]]
type = "prefer"
if_level = 0
if_id = "IceStorage"
then_level = 4
then_ids = "BuildingHVAC,DistrictHeat"

# Thermochemical needs microchannel HX for high transfer
[[rule]]
type = "prefer"
if_level = 0
if_id = "ThermochemTCES"
then_level = 2
then_ids = "MicroChannelHX,DirectContact"

# CSP storage best with molten salt medium
[[rule]]
type = "prefer"
if_level = 4
if_id = "CSP_Storage"
then_level = 0
then_ids = "MoltenSalt,ThermochemTCES"

# Carnot battery uses MPC predictive control
[[rule]]
type = "prefer"
if_level = 4
if_id = "CarnotBattery"
then_level = 3
then_ids = "MPC_Predictive,RLAgent"
