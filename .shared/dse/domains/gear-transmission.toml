# ============================================================
# Rules
# ============================================================

# Harmonic drive only for robot and aerospace (compact, precise)
[[rule]]
type = "require"
if_level = 0
if_id = "Harmonic-2wave"
then_level = 4
then_ids = ["Robot-6DOF", "Aerospace-4engine"]

# Worm gear not for aerospace (low efficiency)
[[rule]]
type = "exclude"
if_level = 0
if_id = "Worm-6thread"
then_level = 4
then_ids = ["Aerospace-4engine"]

# Nylon gears only for low-load applications
[[rule]]
type = "require"
if_level = 1
if_id = "Nylon-PA6"
then_level = 4
then_ids = ["Robot-6DOF", "Auto-6speed"]

# Profile grinding required for aerospace
[[rule]]
type = "require"
if_level = 2
if_id = "Grinding-12grit"
then_level = 4
then_ids = ["Aerospace-4engine", "WindTurbine-12MW", "Robot-6DOF", "Industrial-24hr", "Marine-6cyl", "Auto-6speed"]

# Dry film only for space/clean applications
[[rule]]
type = "require"
if_level = 3
if_id = "DryFilm-PTFE"
then_level = 4
then_ids = ["Aerospace-4engine", "Robot-6DOF"]

# Bronze worm wheels required for worm gears
[[rule]]
type = "require"
if_level = 0
if_id = "Worm-6thread"
then_level = 1
then_ids = ["Bronze-C90700", "Nylon-PA6"]
