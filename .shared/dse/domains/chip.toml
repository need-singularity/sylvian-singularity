# ============================================================
# Compatibility Rules
# ============================================================

# Diamond substrate currently incompatible with advanced EUV processes
[[rule]]
type = "exclude"
if_level = 0
if_id = "Diamond"
then_level = 1
then_ids = "TSMC_A16"

# x86-Zen5 has no GPU SMs, only meaningful with unified-memory chips
[[rule]]
type = "prefer"
if_level = 2
if_id = "x86-Zen5"
then_level = 3
then_ids = "M4Ultra_Style"

# Edge system only pairs with low-TDP chips
[[rule]]
type = "prefer"
if_level = 4
if_id = "Edge_Compact"
then_level = 3
then_ids = "HEXA-1_Half,M4Ultra_Style"

# HEXA-P core designed for HEXA-1 chip family
[[rule]]
type = "prefer"
if_level = 2
if_id = "HEXA-P"
then_level = 3
then_ids = "HEXA-1_Full,HEXA-1_Half"

# TSMC_N2 is the n6-optimal process for HEXA-1 Full
[[rule]]
type = "prefer"
if_level = 1
if_id = "TSMC_N2"
then_level = 3
then_ids = "HEXA-1_Full,B200_Style"

# Photonic Fab naturally pairs with Photonic cores and chips
[[rule]]
type = "prefer"
if_level = 1
if_id = "Photonic_Fab"
then_level = 2
then_ids = "Photonic_TPU"

[[rule]]
type = "prefer"
if_level = 1
if_id = "Photonic_Fab"
then_level = 3
then_ids = "Photonic_Chip,Hybrid_EP"

# SiPhotonic material best with Photonic Fab or Hybrid_EO process
[[rule]]
type = "prefer"
if_level = 0
if_id = "SiPhotonic"
then_level = 1
then_ids = "Photonic_Fab,Hybrid_EO"

# Photonic DC pairs with Photonic chips
[[rule]]
type = "prefer"
if_level = 4
if_id = "Photonic_DC"
then_level = 3
then_ids = "Photonic_Chip,Hybrid_EP"

# Diamond also excellent for photonic (NV centers)
[[rule]]
type = "prefer"
if_level = 0
if_id = "Diamond"
then_level = 2
then_ids = "HEXA-P,Photonic_TPU"

# === v3 NEW Rules (cross-domain mixing constraints) ===

# Topological insulator material pairs with Topological fab/core/chip
[[rule]]
type = "prefer"
if_level = 0
if_id = "Bi2Se3_TI"
then_level = 1
then_ids = "Topo_Fab"

[[rule]]
type = "prefer"
if_level = 0
if_id = "Bi2Se3_TI"
then_level = 2
then_ids = "Topo_Core,Majorana_QPU"

[[rule]]
type = "prefer"
if_level = 0
if_id = "Bi2Se3_TI"
then_level = 3
then_ids = "Topo_Chip,Consciousness_Chip"

# REBCO superconductor requires cryo process/core/chip/system
[[rule]]
type = "prefer"
if_level = 0
if_id = "REBCO_SC"
then_level = 1
then_ids = "Cryo_RSFQ"

[[rule]]
type = "prefer"
if_level = 0
