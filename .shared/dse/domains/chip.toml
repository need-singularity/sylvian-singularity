then_level = 2
then_ids = "RSFQ_Core"

[[rule]]
type = "prefer"
if_level = 0
if_id = "REBCO_SC"
then_level = 3
then_ids = "Cryo_Chip"

[[rule]]
type = "prefer"
if_level = 0
if_id = "REBCO_SC"
then_level = 4
then_ids = "Cryo_DC"

# Graphene best with CVD process and topological/photonic paths
[[rule]]
type = "prefer"
if_level = 0
if_id = "Graphene"
then_level = 1
then_ids = "Graphene_CVD,Topo_Fab"

# DiamondNV pairs with consciousness and topological chips
[[rule]]
type = "prefer"
if_level = 0
if_id = "DiamondNV"
then_level = 3
then_ids = "Consciousness_Chip,Topo_Chip"

# Topological DC pairs with topological chips
[[rule]]
type = "prefer"
if_level = 4
if_id = "Topo_DC"
then_level = 3
then_ids = "Topo_Chip,Consciousness_Chip"

# Cryo DC requires cryo chips
[[rule]]
type = "exclude"
if_level = 4
if_id = "Cryo_DC"
then_level = 3
then_ids = "HEXA-1_Full,HEXA-1_Half,H100_Style,B200_Style,M4Ultra_Style"

# Majorana QPU pairs with topological materials only
[[rule]]
type = "prefer"
if_level = 2
if_id = "Majorana_QPU"
then_level = 0
then_ids = "Bi2Se3_TI,REBCO_SC,DiamondNV"
