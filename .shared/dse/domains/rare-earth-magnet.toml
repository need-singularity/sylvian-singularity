# ============================================================
# Compatibility Rules
# ============================================================

# NdFeB sintered pairs with standard sintering process
[[rule]]
type = "prefer"
if_level = 0
if_id = "NdFeB_sintered"
then_level = 1
then_ids = "Sintering_6stage,Hot_deformation"

# NdFeB bonded pairs with injection molding and melt spinning
[[rule]]
type = "prefer"
if_level = 0
if_id = "NdFeB_bonded"
then_level = 1
then_ids = "Injection_molding,Melt_spinning"

# SmCo 2:17 pairs with sintering and hot deformation
[[rule]]
type = "prefer"
if_level = 0
if_id = "SmCo_2_17"
then_level = 1
then_ids = "Sintering_6stage,Hot_deformation"

# SmCo 1:5 hexagonal pairs with single-domain and textured microstructure
[[rule]]
type = "prefer"
if_level = 0
if_id = "SmCo_1_5"
then_level = 2
then_ids = "Single_domain,Textured_6fold"

# Ferrite hexagonal pairs with low-cost applications
[[rule]]
type = "prefer"
if_level = 0
if_id = "Ferrite_hexagonal"
then_level = 4
then_ids = "Speaker_driver,Magnetic_bearing"

# Exchange-coupled microstructure requires melt spinning or HDDR
[[rule]]
type = "prefer"
if_level = 2
if_id = "Exchange_coupled"
then_level = 1
then_ids = "Melt_spinning,HDDR"

# Grain boundary diffusion pairs with NdFeB sintered for Hc enhancement
[[rule]]
type = "prefer"
if_level = 2
if_id = "Grain_boundary_diffusion"
then_level = 0
then_ids = "NdFeB_sintered,SmCo_2_17"

# EV motor application pairs with high-performance compositions
[[rule]]
type = "prefer"
if_level = 4
if_id = "EV_motor_6pole"
then_level = 0
then_ids = "NdFeB_sintered,SmCo_2_17"

# Al CVD coating pairs with high-temp applications
[[rule]]
type = "prefer"
if_level = 3
if_id = "Al_CVD_12nm"
then_level = 4
then_ids = "EV_motor_6pole,MRI_magnet"

# Additive SLM pairs with complex application geometries
[[rule]]
type = "prefer"
if_level = 1
if_id = "Additive_SLM"
then_level = 4
then_ids = "Magnetic_bearing,Speaker_driver"
