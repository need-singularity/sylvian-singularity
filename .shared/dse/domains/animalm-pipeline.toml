# =============================================================
# Compatibility Rules
# =============================================================

# DualEngine_AG requires PureRepulsion or TensionSquared (dual engine needs tension mechanism)
[[rule]]
type       = "require"
if_level   = 2
if_id      = "DualEngine_AG"
then_level = 3
then_ids   = "PureRepulsion,TensionSquared"

# EgyptianRouter requires Egyptian_236 (Egyptian routing needs Egyptian expert split)
[[rule]]
type       = "require"
if_level   = 1
if_id      = "EgyptianRouter"
then_level = 2
then_ids   = "Egyptian_236"

# SwitchRouter incompatible with DualEngine_AG (single expert can't do dual engine)
[[rule]]
type       = "exclude"
if_level   = 1
if_id      = "SwitchRouter"
then_level = 2
then_ids   = "DualEngine_AG"

# HomeostaticTension requires ClosedLoop (homeostasis needs feedback)
[[rule]]
type       = "require"
if_level   = 3
if_id      = "HomeostaticTension"
then_level = 4
then_ids   = "ClosedLoop"
