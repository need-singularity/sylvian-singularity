# =============================================================
# HEXA-SRM DSE Domain Definition
# Soil Remediation: Survey, Excavation, Treatment, Verification,
# Revegetation
# n=6: 6 heavy metal targets, sigma-phi=10x cleanup efficiency,
#       pH=6 optimal remediation, sigma=12 treatment zones
# BT-43 (CN=6 universality), BT-86 (Crystal CN=6 law)
# Total raw combos: 6x6x6x6x6 = 7,776
# =============================================================

[meta]
name = "soil-remediation"
desc = "Soil Remediation DSE (6 metals, sigma-phi=10x efficiency, pH=6 optimal)"
levels = ["Survey", "Excavation", "Treatment", "Verification", "Revegetation"]
vision = "Complete soil restoration — 6-metal targeting with n=6 cleanup architecture"

[scoring]
n6   = 0.35
perf = 0.25
power = 0.20
cost  = 0.20

