# =============================================================
# Rules
# =============================================================

# XRF survey pairs with soil washing treatment
[[rule]]
type      = "prefer"
if_level  = 0
if_id     = "XRF_Portable"
then_level = 2
then_ids  = "SoilWash,ChemOxidation"

# In-situ containment excludes mechanical excavation
[[rule]]
type      = "exclude"
if_level  = 1
if_id     = "InSitu_Contain"
then_level = 2
then_ids  = "ThermalDesorp"

# Thermal desorption suits confirmation sampling verification
[[rule]]
type      = "prefer"
if_level  = 2
if_id     = "ThermalDesorp"
then_level = 3
then_ids  = "Confirm_Sample,TCLP_Verify"

# Biochar amendment pairs best with forest replanting
[[rule]]
type      = "prefer"
if_level  = 4
if_id     = "Biochar_Amend"
then_level = 0
then_ids  = "Core_Sampling,BioIndicator"
