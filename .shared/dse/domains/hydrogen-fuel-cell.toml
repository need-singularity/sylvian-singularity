# =============================================================
# Rules
# =============================================================

# AEM membrane doesn't need Pt catalyst
[[rule]]
type      = "prefer"
if_level  = 0
if_id     = "AEM"
then_level = 1
then_ids  = "PGM_Free"

# HT-PBI doesn't need humidifier
[[rule]]
type      = "prefer"
if_level  = 0
if_id     = "HT_PBI"
then_level = 3
then_ids  = "Passive_Air,Smart_BoP"

# Heavy-duty truck needs turbo compressor
[[rule]]
type      = "prefer"
if_level  = 4
if_id     = "HD_Truck"
then_level = 3
then_ids  = "Turbo_Comp"

# Portable flat-pack needs passive air cooling
[[rule]]
type      = "prefer"
if_level  = 2
if_id     = "Flat_Pack"
then_level = 3
then_ids  = "Passive_Air"

# PtNi octahedral pairs with reinforced membrane for durability
[[rule]]
type      = "prefer"
if_level  = 1
if_id     = "PtNi_Oct"
then_level = 0
then_ids  = "Nafion_HP,Composite"
