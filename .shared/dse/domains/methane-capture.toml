# =============================================================
# HEXA-MCH DSE Domain Definition
# Methane Capture: Source, Detection, Capture, Conversion,
# Utilization
# n=6: CH4 = C(Z=6) + 4H = Carbon(n) + tau(H atoms),
#       GWP20=84~sigma*sopfr+sigma+tau, 6 emission sectors
# BT-27 (Carbon-6 chain), BT-38 (Hydrogen quadruplet)
# Total raw combos: 6x6x6x6x6 = 7,776
# =============================================================

[meta]
name = "methane-capture"
desc = "Methane Capture DSE (CH4=C(n)+tau(H), GWP=84, 6 sectors)"
levels = ["Source", "Detection", "Capture", "Conversion", "Utilization"]
vision = "Near-zero methane leakage — CH4 Carbon Z=6 full-cycle capture architecture"

[scoring]
n6   = 0.35
perf = 0.25
power = 0.20
cost  = 0.20

