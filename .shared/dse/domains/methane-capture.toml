# =============================================================
# Rules
# =============================================================

# Landfill source pairs best with biocover or PSA capture
[[rule]]
type      = "prefer"
if_level  = 0
if_id     = "Landfill"
then_level = 2
then_ids  = "Biocover,PSA_Adsorb"

# Methane pyrolysis enables carbon nanomaterial utilization
[[rule]]
type      = "prefer"
if_level  = 3
if_id     = "Pyrolysis_H2"
then_level = 4
then_ids  = "CarbonNano,GreenH2"

# Satellite detection too coarse for livestock point sources
[[rule]]
type      = "exclude"
if_level  = 1
if_id     = "Satellite_GHG"
then_level = 0
then_ids  = "Livestock"

# Dry reforming captures both CH4 and CO2 — prefer for carbon credit
[[rule]]
type      = "prefer"
if_level  = 3
if_id     = "DryReform"
then_level = 4
then_ids  = "Carbon_Credit,Methanol_Syn"
