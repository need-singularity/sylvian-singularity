# ============================================================
# Compatibility Rules
# ============================================================

# Carbon steel is baseline for structural and pipeline
[[rule]]
type = "prefer"
if_level = 0
if_id = "Carbon_Steel"
then_level = 4
then_ids = "Structural_Beam,Pipeline,Rail_Track"

# Stainless 304 pairs with austenite and surgical/nuclear
[[rule]]
type = "prefer"
if_level = 0
if_id = "Stainless_304"
then_level = 2
then_ids = "Austenite_FCC,DualPhase"

[[rule]]
type = "prefer"
if_level = 0
if_id = "Stainless_304"
then_level = 4
then_ids = "Surgical_Implant,Nuclear_Vessel"

# Tool steel D6 pairs with quench-temper and powder metallurgy
[[rule]]
type = "prefer"
if_level = 0
if_id = "ToolSteel_D6"
then_level = 3
then_ids = "Quench_Temper,Cryogenic_Treatment"

[[rule]]
type = "prefer"
if_level = 0
if_id = "ToolSteel_D6"
then_level = 1
then_ids = "Powder_Metallurgy,EAF_Electric"

# TRIP 6-phase pairs with automotive body
[[rule]]
type = "prefer"
if_level = 0
if_id = "TRIP_6phase"
then_level = 4
then_ids = "Automotive_Body,Structural_Beam"

# Maraging pairs with additive manufacturing
[[rule]]
type = "prefer"
if_level = 0
if_id = "Maraging"
then_level = 1
then_ids = "Additive_6layer,Powder_Metallurgy"

# Austenite FCC needs annealing or normalizing
[[rule]]
type = "prefer"
if_level = 2
if_id = "Austenite_FCC"
then_level = 3
then_ids = "Annealing,Normalizing"

# Martensite requires quench-temper
[[rule]]
type = "prefer"
if_level = 2
if_id = "Martensite"
then_level = 3
then_ids = "Quench_Temper,Cryogenic_Treatment"

# Dual-phase for automotive
[[rule]]
type = "prefer"
if_level = 2
if_id = "DualPhase"
then_level = 4
then_ids = "Automotive_Body,Structural_Beam"

# Continuous casting is primary for bulk applications
[[rule]]
type = "prefer"
if_level = 1
if_id = "Continuous_Casting"
then_level = 4
then_ids = "Structural_Beam,Pipeline,Rail_Track"
