# =============================================================
# Compatibility Rules
# =============================================================

# OwnershipMem excludes RefCounting (ownership = no GC overhead)
[[rule]]
type       = "exclude"
if_level   = 0
if_id      = "OwnershipMem"
then_level = 1
then_ids   = "RefCounting,GenerationalGC,ConcurrentGC,RegionalGC"

# EgyptianAlloc requires RegionalGC or GenerationalGC (structured memory needs structured GC)
[[rule]]
type       = "require"
if_level   = 0
if_id      = "EgyptianAlloc"
then_level = 1
then_ids   = "RegionalGC,GenerationalGC"

# STM_Atomic requires ManagedRT or FullStackRT (needs runtime support)
[[rule]]
type       = "require"
if_level   = 2
if_id      = "STM_Atomic"
then_level = 4
then_ids   = "ManagedRT,FullStackRT"

# AOTCompile excludes CloudRT (AOT = no dynamic loading)
[[rule]]
type       = "exclude"
if_level   = 3
if_id      = "AOTCompile"
then_level = 4
then_ids   = "CloudRT"

# MinimalRT excludes ConcurrentGC (minimal = no heavy GC)
[[rule]]
type       = "exclude"
if_level   = 4
if_id      = "MinimalRT"
then_level = 1
then_ids   = "ConcurrentGC,RegionalGC"

# EmbeddedRT excludes TieredJIT (embedded = no JIT overhead)
[[rule]]
type       = "exclude"
if_level   = 4
if_id      = "EmbeddedRT"
then_level = 3
then_ids   = "TieredJIT,TracingJIT"
