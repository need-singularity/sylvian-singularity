# =============================================================
# Compatibility Rules
# =============================================================

# DynamicInject too heavy for FlameGraph tau=4 aggregation (needs richer viz)
[[rule]]
type       = "exclude"
if_level   = 0
if_id      = "DynamicInject"
then_level = 2
then_ids   = "HeatMap"

# HWCounter requires Performance or Statistical or DataFlow analysis (hw counters need analysis)
[[rule]]
type       = "require"
if_level   = 0
if_id      = "HWCounter"
then_level = 1
then_ids   = "Performance,Statistical,DataFlow"

# MemoryLeak requires TreeMap or DAGView (memory needs spatial viz)
[[rule]]
type       = "require"
if_level   = 1
if_id      = "MemoryLeak"
then_level = 2
then_ids   = "TreeMap,DAGView"

# TimeTravelN6 requires LSP_Debug or EditorEmbed or SixLayerDebugStack (needs interactive integration)
[[rule]]
type       = "require"
if_level   = 3
if_id      = "TimeTravelN6"
then_level = 4
then_ids   = "LSP_Debug,EditorEmbed,SixLayerDebugStack"

# AIGuided requires RootCause or PredictBug (AI instrumentation needs AI analysis)
[[rule]]
type       = "require"
if_level   = 0
if_id      = "AIGuided"
then_level = 3
then_ids   = "RootCause,AutoBreak,PredictBug"

# CloudDebug incompatible with HWCounter (can't access remote HW counters easily)
[[rule]]
type       = "exclude"
if_level   = 4
if_id      = "CloudDebug"
then_level = 0
then_ids   = "HWCounter"
