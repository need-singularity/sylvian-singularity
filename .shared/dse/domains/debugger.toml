# =============================================================
# DEBUGGER DSE Domain Definition
# 궁극의 디버거/프로파일러 아키텍처 — n=6 기반 계측 + 분석 + 시각화
# BT-58 (sigma-tau=8 universal), BT-56 (Complete LLM), BT-59 (8-layer stack)
# Total raw combos: 7x6x6x6x5 = 7,560 (pre-filter)
# =============================================================

[meta]
name = "debugger"
desc = "Ultimate Debugger/Profiler DSE (Instrumentation/Analysis/Visualization/Automation/Integration)"
levels = ["Instrumentation", "Analysis", "Visualization", "Automation", "Integration"]
vision = "Say 'why is this slow' and it auto-instruments, analyzes, visualizes, fixes -- n=6 debug intelligence"

[scoring]
n6   = 0.30
perf = 0.30
power = 0.20
cost  = 0.20

