# ============================================================
# Compatibility Rules
# ============================================================

# EUV source pairs with 6-mirror optics and EUV-specific resist
[[rule]]
type = "prefer"
if_level = 0
if_id = "EUV_13_5nm"
then_level = 1
then_ids = "SixMirror,Immersion"

[[rule]]
type = "prefer"
if_level = 0
if_id = "EUV_13_5nm"
then_level = 2
then_ids = "EUV_Specific,MetalOxide"

# High-NA EUV enables direct print patterning
[[rule]]
type = "prefer"
if_level = 0
if_id = "HighNA_EUV"
then_level = 3
then_ids = "EUV_Direct,SingleExposure"

# DUV requires multi-patterning for sub-20nm
[[rule]]
type = "prefer"
if_level = 0
if_id = "DUV_ArF"
then_level = 3
then_ids = "SADP,SAQP,LELE"

# 3D stacking benefits from backside power
[[rule]]
type = "prefer"
if_level = 4
if_id = "ThreeDStack"
then_level = 4
then_ids = "BacksidePower,Chiplet6"

# Self-assembled resist pairs with nanoimprint
[[rule]]
type = "prefer"
if_level = 2
if_id = "SelfAssembled"
then_level = 0
then_ids = "Nanoimprint,EBeam"
