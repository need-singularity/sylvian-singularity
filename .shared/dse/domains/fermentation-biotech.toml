# =============================================================
# Rules
# =============================================================

# CHO cells need complex rich medium
[[rule]]
type      = "prefer"
if_level  = 0
if_id     = "CHO_Cell"
then_level = 1
then_ids  = "Complex_Rich"

# S. cerevisiae best with glucose fed-batch
[[rule]]
type      = "prefer"
if_level  = 0
if_id     = "Scerevisiae"
then_level = 1
then_ids  = "FedBatch_Glc,Molasses"

# mAb production needs CHO + chromatography
[[rule]]
type      = "prefer"
if_level  = 4
if_id     = "mAb"
then_level = 0
then_ids  = "CHO_Cell"

# Solid-state fermentation not suitable for mAb/insulin
[[rule]]
type      = "exclude"
if_level  = 2
if_id     = "SolidState"
then_level = 4
then_ids  = "mAb,Insulin"

# Syngas medium needs airlift for gas transfer
[[rule]]
type      = "prefer"
if_level  = 1
if_id     = "Syngas_CO"
then_level = 2
then_ids  = "Airlift,STR_6Blade"
