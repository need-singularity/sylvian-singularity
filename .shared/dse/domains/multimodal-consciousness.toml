# =============================================================
# Compatibility Rules
# =============================================================

# EEG modality requires BrainFlow encoder
[[rule]]
type       = "require"
if_level   = 0
if_id      = "EEG"
then_level = 1
then_ids   = "BrainFlow,Custom_N6"

# PH_Persistence mapping requires Consciousness_Binding or Phi_Fusion
[[rule]]
type       = "require"
if_level   = 3
if_id      = "PH_Persistence"
then_level = 2
then_ids   = "Consciousness_Binding,Phi_Fusion,Tensor"

# Consciousness_State output requires Consciousness_Binding or Phi_Fusion
[[rule]]
type       = "require"
if_level   = 4
if_id      = "Consciousness_State"
then_level = 2
then_ids   = "Consciousness_Binding,Phi_Fusion"

# LiDAR modality excludes Early fusion (too high dimensional)
[[rule]]
type       = "exclude"
if_level   = 0
if_id      = "LiDAR"
then_level = 2
then_ids   = "Early"
