# ============================================================
# Compatibility Rules
# ============================================================

# Air bearing only works with partial vacuum (needs air)
[[rule]]
type = "require"
if_level = 2
if_id = "Air-Bearing"
then_level = 3
then_ids = ["Partial-Vacuum"]

# Plasma drive requires near or ultra-high vacuum
[[rule]]
type = "exclude"
if_level = 1
if_id = "Plasma-Drive"
then_level = 3
then_ids = ["Partial-Vacuum", "Scroll-Redundant"]

# Superconducting levitation excluded from air bearing station (thermal conflict)
[[rule]]
type = "exclude"
if_level = 2
if_id = "EDS-SC"
then_level = 3
then_ids = ["Partial-Vacuum"]

# Continuous flow station excluded from underground compact (space constraint)
[[rule]]
type = "exclude"
if_level = 4
if_id = "Continuous-Flow"
then_level = 0
then_ids = ["Underground-Tunnel"]
