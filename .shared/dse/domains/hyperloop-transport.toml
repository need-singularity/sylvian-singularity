#       tau=4 vacuum grades (atmospheric/partial/near/ultra),
#       phi=2 bidirectional tube, J2=24 passengers per pod,
#       6DOF pod stability
# Total raw combos: 6x6x6x6x6 = 7,776 (pre-filter)
# =============================================================

[meta]
name = "hyperloop-transport"
desc = "Hyperloop Transport Architecture DSE (tube/propulsion/levitation/vacuum/station)"

[scoring]
n6 = 0.35
perf = 0.25
power = 0.20
cost = 0.20

