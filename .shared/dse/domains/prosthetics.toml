# ============================================================
# Compatibility Rules
# ============================================================

# Neural interface requires neural decode control
[[rule]]
type = "require"
if_level = 2
if_id = "Neural-Interface"
then_level = 3
then_ids = ["Neural-Decode"]

# Osseointegrated socket needed for implanted EMG
[[rule]]
type = "require"
if_level = 2
if_id = "Implanted-EMG"
then_level = 0
then_ids = ["Osseointegrated"]

# Threshold switch only with simple actuators
[[rule]]
type = "require"
if_level = 3
if_id = "Threshold-Switch"
then_level = 1
then_ids = ["DC-Servo", "Pneumatic-Muscle"]

# Wireless power for implant-based systems
[[rule]]
type = "require"
if_level = 4
if_id = "Wireless-Power"
then_level = 0
then_ids = ["Osseointegrated"]
