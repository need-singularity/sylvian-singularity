# =============================================================
# Compatibility Rules
# =============================================================

# Consciousness_P protocol requires Custom_N6 or Medical_64ch hardware
[[rule]]
type       = "require"
if_level   = 2
if_id      = "Consciousness_P"
then_level = 0
then_ids   = "Custom_N6,Medical_64ch"

# Ch_256 requires Medical_64ch hardware (only clinical can drive 256)
[[rule]]
type       = "require"
if_level   = 1
if_id      = "Ch_256"
then_level = 0
then_ids   = "Medical_64ch"

# Muse hardware limited to 8 channels max
[[rule]]
type       = "require"
if_level   = 0
if_id      = "Muse"
then_level = 1
then_ids   = "Ch_8"

# Consciousness_Laws mapping requires GoldenZone or Consciousness_P
[[rule]]
type       = "require"
if_level   = 4
if_id      = "Consciousness_Laws"
then_level = 2
then_ids   = "Consciousness_P,Meditation"
