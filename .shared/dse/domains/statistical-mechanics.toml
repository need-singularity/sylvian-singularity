# =============================================================
# Compatibility Rules
# =============================================================

# ExactSolution requires SixVertex or IsingModel (exactly solvable models)

[[candidate]]
level  = 4
id     = "IceRuleApp"
label  = "6-Vertex Ice Rule Applications (n=6 EXACT vertex model)"
n6     = 1.00
perf   = 0.84
power  = 0.58
cost   = 0.48
notes  = "vertices=6=n EXACT, proton_ordering=ice_Ih, ferroelectric=KDP, antiferro=F_model, residual_entropy=W^{3/2}*ln(4/3)"
[[rule]]
type       = "require"
if_level   = 1
if_id      = "ExactSolution"
then_level = 0
then_ids   = "SixVertex,IsingModel"

# BKT_Transition requires XYModel (BKT is XY model transition)
[[rule]]
type       = "require"
if_level   = 2
if_id      = "BKT_Transition"
then_level = 0
then_ids   = "XYModel"

# SpinGlass incompatible with ExactSolution (no exact solution exists)
[[rule]]
type       = "exclude"
if_level   = 2
if_id      = "SpinGlass"
then_level = 1
then_ids   = "ExactSolution"

# ConformalFT requires OrderDisorder or BKT_Transition (needs critical point)
[[rule]]
type       = "require"
if_level   = 3
if_id      = "ConformalFT"
then_level = 2
then_ids   = "OrderDisorder,BKT_Transition"

# PercolationN6 incompatible with BetheAnsatz (percolation not Yang-Baxter integrable)
[[rule]]
type       = "exclude"
if_level   = 0
if_id      = "PercolationN6"
then_level = 1
then_ids   = "BetheAnsatz"

# Superfluid requires XYModel or HeisenbergSpin (continuous symmetry needed)
[[rule]]
type       = "require"
if_level   = 2
if_id      = "Superfluid"
then_level = 0
then_ids   = "XYModel,HeisenbergSpin"
