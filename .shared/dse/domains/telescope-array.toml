# =============================================================
# Telescope Array DSE Domain Definition
# Radio/optical telescope arrays — antenna to science pipeline
# n=6: 6 antenna stations minimum, σ=12 baselines, J₂=24 channels
# Total raw combos: 6x6x6x6x6 = 7,776 (pre-filter)
# =============================================================

[meta]
name = "telescope-array"
desc = "Telescope Array Architecture DSE (antenna/correlator/backend/pipeline/science)"

[scoring]
n6 = 0.35
perf = 0.25
power = 0.20
cost = 0.20

