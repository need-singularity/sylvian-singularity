# ============================================================
# Compatibility Rules
# ============================================================

# Optical beam combiner requires segmented mirror antennas
[[rule]]
type = "require"
if_level = 1
if_id = "Optical-Combiner"
then_level = 0
then_ids = ["Segmented-Mirror"]

# VLBI recorder requires sparse aperture or parabolic dish
[[rule]]
type = "require"
if_level = 2
if_id = "VLBI-Recorder"
then_level = 0
then_ids = ["Sparse-Aperture", "Parabolic-Dish"]

# Pulsar timing backend for pulsar science
[[rule]]
type = "require"
if_level = 2
if_id = "Pulsar-Timer"
then_level = 4
then_ids = ["Pulsar-Timing", "Transient-Survey"]

# Citizen science only with batch/cloud pipeline
[[rule]]
type = "require"
if_level = 3
if_id = "Citizen-Science"
then_level = 4
then_ids = ["Pulsar-Timing", "Transient-Survey", "Cosmology-21cm"]
