# =============================================================
# Compatibility Rules
# =============================================================

# iCE40 cannot support Hypercube_6D (too few resources)
[[rule]]
type       = "exclude"
if_level   = 0
if_id      = "iCE40"
then_level = 2
then_ids   = "Hypercube_6D,Custom_N6"

# ASIC_7nm requires high-performance bus
[[rule]]
type       = "require"
if_level   = 0
if_id      = "ASIC_7nm"
then_level = 3
then_ids   = "NoC_Mesh,Crossbar,Photonic_Bus"

# Quantum_Bus only with ASIC_7nm or RISCV_SoC
[[rule]]
type       = "require"
if_level   = 3
if_id      = "Quantum_Bus"
then_level = 0
then_ids   = "ASIC_7nm,RISCV_SoC"

# GHz_1 clock only for ASIC targets
[[rule]]
type       = "require"
if_level   = 4
if_id      = "GHz_1"
then_level = 0
then_ids   = "ASIC_28nm,ASIC_7nm"
