# =============================================================
# Bridge Engineering DSE Domain Definition
# Bridge structural design architecture
# n=6: 6 bridge types (n=6 EXACT: beam/arch/truss/suspension/
#       cable-stayed/cantilever), sigma=12 span ratio L/D,
#       tau=4 load cases (dead/live/wind/seismic),
#       phi=2 dual-deck, J2=24 m standard span module
# Total raw combos: 6x6x6x6x6 = 7,776 (pre-filter)
# =============================================================

[meta]
name = "bridge-engineering"
desc = "Bridge Structural Design DSE (structure-type/material/foundation/load-design/construction)"

[scoring]
n6 = 0.35
perf = 0.25
power = 0.20
cost = 0.20

