# ============================================================
# Compatibility Rules
# ============================================================

# Suspension bridge requires cable spinning construction
[[rule]]
type = "require"
if_level = 0
if_id = "Suspension-Main"
then_level = 4
then_ids = ["CableSpin"]

# Beam bridge excluded from cable spinning (no cables)
[[rule]]
type = "exclude"
if_level = 0
if_id = "Beam-24m"
then_level = 4
then_ids = ["CableSpin"]

# Truss bridge excluded from cable spinning
[[rule]]
type = "exclude"
if_level = 0
if_id = "Truss-12Panel"
then_level = 4
then_ids = ["CableSpin"]

# Spread footing excluded from deep water/suspension foundations
[[rule]]
type = "exclude"
if_level = 2
if_id = "SpreadFooting"
then_level = 0
then_ids = ["Suspension-Main"]

# FRP composite excluded from heavy rail fatigue design
[[rule]]
type = "exclude"
if_level = 1
if_id = "FRP-Composite"
then_level = 3
then_ids = ["FatigueDesign", "MovableLoad-24t"]

# Micropile excluded from large suspension/cable-stayed piers
[[rule]]
type = "exclude"
if_level = 2
if_id = "Micropile-6Group"
then_level = 0
then_ids = ["Suspension-Main"]
