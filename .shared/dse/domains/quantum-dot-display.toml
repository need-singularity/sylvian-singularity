# ============================================================
# Compatibility Rules
# ============================================================

# CdSe-6nm is the highest-QY QD, best for QD-OLED and EL-QLED
[[rule]]
type = "prefer"
if_level = 0
if_id = "CdSe-6nm"
then_level = 1
then_ids = "QD-OLED-hybrid,EL-QLED"

# InP-green is Cd-free, pairs with enhancement film for mass market
[[rule]]
type = "prefer"
if_level = 0
if_id = "InP-green"
then_level = 1
then_ids = "QD-enhancement-film,QD-color-filter"

# Carbon dots are low-performance, only suitable for low-cost panels
[[rule]]
type = "prefer"
if_level = 0
if_id = "Carbon-dot"
then_level = 4
then_ids = "LCD-VA,LCD-IPS"

# EL-QLED is self-emissive, no backlight needed
[[rule]]
type = "exclude"
if_level = 1
if_id = "EL-QLED"
then_level = 2
then_ids = "Blue-LED,Mini-LED-12zone,Edge-lit-6source,Laser-backlight"

# QD-OLED hybrid also self-emissive for the QD layer
[[rule]]
type = "prefer"
if_level = 1
if_id = "QD-OLED-hybrid"
then_level = 4
then_ids = "OLED-flexible,Foldable-6inch"

# QD-microLED pairs with Micro-LED backlight and Micro-IC transfer
[[rule]]
type = "prefer"
if_level = 1
if_id = "QD-microLED"
then_level = 2
then_ids = "Micro-LED"

[[rule]]
type = "prefer"
if_level = 1
if_id = "QD-microLED"
then_level = 3
then_ids = "Micro-IC-transfer,CMOS-backplane"

# MicroLED-direct panel requires micro-IC or CMOS backplane
[[rule]]
type = "prefer"
if_level = 4
if_id = "MicroLED-direct"
then_level = 3
then_ids = "Micro-IC-transfer,CMOS-backplane"

# OLED-flexible pairs with LTPS or Hybrid-4T drive circuit
[[rule]]
type = "prefer"
if_level = 4
if_id = "OLED-flexible"
then_level = 3
then_ids = "LTPS,Hybrid-4T"

# a-Si-TFT only for LCD panels (cannot drive OLED/self-emissive)
[[rule]]
type = "prefer"
if_level = 3
if_id = "a-Si-TFT"
then_level = 4
then_ids = "LCD-VA,LCD-IPS"

# Perovskite QDs pair well with UV excitation for full conversion
[[rule]]
type = "prefer"
if_level = 0
if_id = "Perovskite-CsPbBr3"
then_level = 2
then_ids = "UV-excitation,Blue-LED"

# Foldable 6-inch needs flexible OLED with LTPS/Hybrid drive
[[rule]]
type = "prefer"
if_level = 4
if_id = "Foldable-6inch"
then_level = 3
then_ids = "LTPS,Hybrid-4T"
