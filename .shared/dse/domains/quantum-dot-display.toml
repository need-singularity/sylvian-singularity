# N6 Quantum Dot Display DSE — QD-enhanced display technology
# 6×6×6×6×6 = 7,776 combos
# n=6: 6nm QD core diameter (n=6 EXACT for red CdSe), σ=12 nm shell thickness,
#       J₂=24 bit color depth, τ=4 color channels (R/G/B/W),
#       φ=2 excitation modes (photo/electro), σ·τ=48 cd/m² per QD layer

[meta]
name = "quantum-dot-display"
desc = "Quantum Dot Display DSE (BT-48/66/76)"

[scoring]
n6 = 0.35
perf = 0.25
power = 0.20
cost = 0.20

