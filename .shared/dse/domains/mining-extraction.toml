# ============================================================
# Rules
# ============================================================

# Dredge mining only for gravity separation
[[rule]]
type = "require"
if_level = 1
if_id = "Dredge-6bucket"
then_level = 3
then_ids = ["Gravity-6stage"]

# ISR requires leaching, not physical separation
[[rule]]
type = "require"
if_level = 1
if_id = "ISR-6well"
then_level = 3
then_ids = ["Leach-6tank"]

# Block caving needs SAG/ball mill (large throughput)
[[rule]]
type = "require"
if_level = 1
if_id = "BlockCave-12draw"
then_level = 2
then_ids = ["SAG-12m", "Ball-6m"]

# Bioheap only for low-grade open pit or ISR
[[rule]]
type = "require"
if_level = 4
if_id = "Bioheap-6pad"
then_level = 1
then_ids = ["OpenPit-6bench", "ISR-6well"]
