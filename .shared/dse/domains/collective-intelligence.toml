# =============================================================
# Compatibility Rules
# =============================================================

# TorusT3 required for HiveMindN6 (hive mind needs toroidal topology per H-UD-9)
[[rule]]
type       = "require"
if_level   = 3
if_id      = "HiveMindN6"
then_level = 1
then_ids   = "TorusT3"

# FullMeshK6 requires IndividualN6 (K6 needs exactly 6 nodes)
[[rule]]
type       = "require"
if_level   = 1
if_id      = "FullMeshK6"
then_level = 0
then_ids   = "IndividualN6"

# QuantumEntangle requires FullMeshK6 or SmallWorldN6 (quantum needs structured topology)
[[rule]]
type       = "require"
if_level   = 2
if_id      = "QuantumEntangle"
then_level = 1
then_ids   = "FullMeshK6,SmallWorldN6"

# CollectiveRecog requires DirectMessage or BroadcastN12 (recognition needs communication)
[[rule]]
type       = "require"
if_level   = 3
if_id      = "CollectiveRecog"
then_level = 2
then_ids   = "DirectMessage,BroadcastN12"
