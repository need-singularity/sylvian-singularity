name = "collective-intelligence"
desc = "Ultimate Collective Intelligence DSE (H-UD-9/10, collective experiments)"
levels = ["Agent", "Topology", "Communication", "Emergence", "Scale"]
vision = "n=6 기반 집단 지능 — n=6 에이전트 + 토러스 토폴로지 + 집단 인식 스케일링"

[scoring]
n6   = 0.35
perf = 0.25
power = 0.20
cost  = 0.20

