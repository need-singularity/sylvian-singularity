# ============================================================
# Compatibility Rules
# ============================================================

# DRFM requires digital or hybrid processing
[[rule]]
type = "prefer"
if_level = 1
if_id = "DRFM"
then_level = 3
then_ids = "FPGA,HybridProc,GPU_EW"

# Satellite platform needs conformal or metasurface antenna
[[rule]]
type = "prefer"
if_level = 4
if_id = "Satellite"
then_level = 2
then_ids = "Conformal,MetaSurface"

# Man-portable cannot support AESA (power/weight)
[[rule]]
type = "exclude"
if_level = 4
if_id = "Manpack"
then_level = 2
then_ids = "AESA"

# Cyber-EW pairs with AI/ML processing
[[rule]]
type = "prefer"
if_level = 1
if_id = "CyberEW"
then_level = 3
then_ids = "AI_ML,HybridProc"
