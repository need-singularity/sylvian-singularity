# N6 DSP Processor DSE — Digital signal processing architecture
# 6×6×6×6×6 = 7,776 combos
# n=6: σ-τ=8 butterfly stages in 256-point FFT, τ=4 MAC units per cycle,
#       φ=2 dual-MAC, σ=12 pipeline stages, n=6 execution slots (VLIW),
#       J₂=24 DMA channels

[meta]
name = "dsp-processor"
desc = "DSP Processor Architecture DSE (BT-48/58/72)"

[scoring]
n6 = 0.35
perf = 0.25
power = 0.20
cost = 0.20

# ============================================================
# Level 0: Architecture (아키텍처)
#   n6 checks: exec_slots==6, issue_width==phi(2), PE_count==6
# ============================================================

