# ============================================================
# Compatibility Rules
# ============================================================

# VLIW-6slot pairs naturally with 6-bank memory for conflict-free access
[[rule]]
type = "prefer"
if_level = 0
if_id = "VLIW-6slot"
then_level = 2
then_ids = "L1-6bank"

# VLIW-6slot works best with Predicated-6way instructions
[[rule]]
type = "prefer"
if_level = 0
if_id = "VLIW-6slot"
then_level = 3
then_ids = "Predicated-6way"

# Vector-DSP requires SIMD instructions
[[rule]]
type = "prefer"
if_level = 0
if_id = "Vector-DSP"
then_level = 3
then_ids = "SIMD-4lane"

# Audio codec best with 24-bit MAC and DMA streaming
[[rule]]
type = "prefer"
if_level = 4
if_id = "Audio-codec-48kHz"
then_level = 1
then_ids = "MAC-24bit"

[[rule]]
type = "prefer"
if_level = 4
if_id = "Audio-codec-48kHz"
then_level = 2
then_ids = "DMA-24ch,Circular-buffer"

# Radar processing needs complex multiply and bit-reverse
[[rule]]
type = "prefer"
if_level = 4
if_id = "Radar-processing"
then_level = 1
then_ids = "Complex-multiply,Floating-32"

[[rule]]
type = "prefer"
if_level = 4
if_id = "Radar-processing"
then_level = 2
then_ids = "Bit-reverse"

# Streaming architecture pairs with stream buffer memory
[[rule]]
type = "prefer"
if_level = 0
if_id = "Streaming"
then_level = 2
then_ids = "Stream-buffer,DMA-24ch"

# Biomedical ECG is low-power, pairs with simple fixed-point
[[rule]]
type = "prefer"
if_level = 4
if_id = "Biomedical-ECG"
then_level = 1
then_ids = "Fixed-Q15,MAC-16bit"

# Dataflow 6-PE benefits from DMA-24ch (4 channels per PE)
[[rule]]
type = "prefer"
if_level = 0
if_id = "Dataflow-6PE"
then_level = 2
then_ids = "DMA-24ch"
