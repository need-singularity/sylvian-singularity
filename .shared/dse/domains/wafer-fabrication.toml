# ============================================================
# Compatibility Rules
# ============================================================

# SiC-6H substrate pairs best with CVD and MBE deposition
[[rule]]
type = "prefer"
if_level = 0
if_id = "SiC-6H"
then_level = 1
then_ids = "CVD-6chamber,MBE-epitaxial"

# GaN-on-Si needs MBE or CVD epitaxial growth
[[rule]]
type = "prefer"
if_level = 0
if_id = "GaN-on-Si"
then_level = 1
then_ids = "MBE-epitaxial,CVD-6chamber"

# High-NA EUV pairs with ALE for sub-8nm critical etch
[[rule]]
type = "prefer"
if_level = 2
if_id = "High-NA-EUV"
then_level = 3
then_ids = "ALE-atomic-layer,RIE-6gas"

# DSA self-assembly needs specific etch for pattern transfer
[[rule]]
type = "prefer"
if_level = 2
if_id = "DSA-self-assembly"
then_level = 3
then_ids = "RIE-6gas,ALE-atomic-layer"

# Si-450mm limited lithography ecosystem (no High-NA EUV yet)
[[rule]]
type = "exclude"
if_level = 0
if_id = "Si-450mm"
then_level = 2
then_ids = "High-NA-EUV"

# Ge-substrate needs low-temperature processing
[[rule]]
type = "prefer"
if_level = 0
if_id = "Ge-substrate"
then_level = 4
then_ids = "Laser-anneal,Plasma-doping"

# ALD-12cycle best for high-k gate stacks with ALE etch
[[rule]]
type = "prefer"
if_level = 1
if_id = "ALD-12cycle"
then_level = 3
then_ids = "ALE-atomic-layer"

# Ion-mill primarily for MRAM, pairs with PVD metal deposition
[[rule]]
type = "prefer"
if_level = 3
if_id = "Ion-mill"
then_level = 1
then_ids = "PVD-sputter"

# In-situ doping requires MBE or CVD process
[[rule]]
type = "prefer"
if_level = 4
if_id = "In-situ-doping"
then_level = 1
then_ids = "MBE-epitaxial,CVD-6chamber"
