# N6 Wafer Fabrication DSE — Semiconductor manufacturing process
# 6×6×6×6×6 = 7,776 combos
# n=6: 6-step FEOL flow (oxidation/deposition/lithography/etch/doping/CMP = n=6 EXACT)
#       sigma=12 inch wafer (300mm), tau=4 quadrant alignment,
#       phi=2 front/back side, J2=24 mask layers

[meta]
name = "wafer-fabrication"
desc = "Wafer Fabrication DSE — 6-step FEOL (n=6), 12-inch wafer (sigma), 24 masks (J2)"

[scoring]
n6 = 0.35
perf = 0.25
power = 0.20
cost = 0.20

