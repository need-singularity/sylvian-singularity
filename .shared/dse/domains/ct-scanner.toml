# ============================================================
# Compatibility Rules
# ============================================================

# Dual-source needs ultrafast or dual gantry
[[rule]]
type = "prefer"
if_level = 0
if_id = "DualSource"
then_level = 2
then_ids = "Ultrafast_025s,DualGantry"

# Photon-counting detectors pair with spectral reconstruction
[[rule]]
type = "prefer"
if_level = 1
if_id = "CdTe_Photon"
then_level = 3
then_ids = "Spectral_Decomp,DL_Recon"

# CZT spectral detector needs photon-counting source optimization
[[rule]]
type = "prefer"
if_level = 1
if_id = "CZT_Spectral"
then_level = 0
then_ids = "PhotonCounting_Src,DualSource"

# Deep learning recon benefits from wide-coverage detectors
[[rule]]
type = "prefer"
if_level = 3
if_id = "DL_Recon"
then_level = 1
then_ids = "GOS_Ceramic,CdTe_Photon"

# Portable C-arm works best with routine body or low-dose modes
[[rule]]
type = "prefer"
if_level = 2
if_id = "Portable_CArm"
then_level = 4
then_ids = "Routine_Body,LowDose_Screening"
