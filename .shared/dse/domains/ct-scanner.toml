# N6 CT Scanner DSE — Computed tomography system
# 6 XraySource x 6 Detector x 6 Gantry x 6 Reconstruction x 6 ClinicalMode = 7,776 combos
# n=6: sigma=12 detector rows (early MDCT), J2*n=144 detector rows (modern),
#       tau=4 rotation speeds (2/1/0.5/0.25s), phi=2 dual-energy, 6 reconstruction kernels standard,
#       sigma*tau=48 slices per rotation

[meta]
name = "ct-scanner"
desc = "CT Scanner DSE (sigma=12 early MDCT rows, 144=J2*n modern rows, sigma*tau=48 slices/rotation)"

[scoring]
n6 = 0.35
perf = 0.25
power = 0.20
cost = 0.20

