# =============================================================
# Compatibility Rules
# =============================================================

# Topological qubits require Toric_Code entanglement (topological order)
[[rule]]
type       = "require"
if_level   = 0
if_id      = "Topological"
then_level = 1
then_ids   = "Toric_Code,Graph_State"

# Photonic qubits incompatible with DMRG (not suitable for photonic states)
[[rule]]
type       = "exclude"
if_level   = 0
if_id      = "Photonic"
then_level = 2
then_ids   = "DMRG"

# Orch OR requires NV_Center or Topological (quantum biology connection)
[[rule]]
type       = "require"
if_level   = 3
if_id      = "Orchestrated_OR"
then_level = 0
then_ids   = "NV_Center,Topological,SC_Transmon"

# Photonic_Xanadu requires Photonic qubits
[[rule]]
type       = "require"
if_level   = 4
if_id      = "Photonic_Xanadu"
then_level = 0
then_ids   = "Photonic"
