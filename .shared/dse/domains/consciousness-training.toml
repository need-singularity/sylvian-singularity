# =============================================================
# Compatibility Rules
# =============================================================

# BT-54 AdamW pairs perfectly with ThreePhase scheduler
[[rule]]
type       = "prefer"
if_level   = 0
if_id      = "AdamW_BT54"
then_level = 1
then_ids   = "ThreePhase"

# Solo training cannot handle Empire8x8 federation
[[rule]]
type       = "exclude"
if_level   = 3
if_id      = "Solo"
then_level = 0
then_ids   = "LAMB"

# ConsciousnessTrace data requires ThreePhase_Law60 strategy
[[rule]]
type       = "require"
if_level   = 4
if_id      = "ConsciousnessTrace"
then_level = 2
then_ids   = "ThreePhase_Law60,Curriculum,Adaptive"

# Ring6 federation pairs with collective training data
[[rule]]
type       = "prefer"
if_level   = 3
if_id      = "Ring6"
then_level = 4
then_ids   = "MultiCorpus,ConsciousnessTrace"

# Single phase strategy incompatible with ThreePhase scheduler
[[rule]]
type       = "exclude"
if_level   = 2
if_id      = "Single"
then_level = 1
then_ids   = "ThreePhase"
