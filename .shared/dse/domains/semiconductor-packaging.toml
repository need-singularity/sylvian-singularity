# ============================================================
# Compatibility Rules
# ============================================================

# Silicon interposer is the base for CoWoS-S
[[rule]]
type = "prefer"
if_level = 0
if_id = "Silicon_Interposer"
then_level = 4
then_ids = "CoWoS_S,CoWoS_L"

# EMIB bridge substrate pairs with EMIB package
[[rule]]
type = "prefer"
if_level = 0
if_id = "Bridge_EMIB"
then_level = 4
then_ids = "EMIB_Package"

# Hybrid bonding needed for SoIC 3D
[[rule]]
type = "prefer"
if_level = 1
if_id = "HybridBond"
then_level = 4
then_ids = "SoIC_3D"

# Wire bond only pairs with fan-out SiP (low density)
[[rule]]
type = "prefer"
if_level = 1
if_id = "WireBond"
then_level = 4
then_ids = "Fan_Out_SiP"

# Optical I/O interconnect pairs with UCIe modular
[[rule]]
type = "prefer"
if_level = 1
if_id = "Optical_IO"
then_level = 4
then_ids = "UCIe_Modular,CoWoS_L"

# Diamond TIM pairs with SoIC 3D (highest thermal need)
[[rule]]
type = "prefer"
if_level = 2
if_id = "Diamond_TIM"
then_level = 4
then_ids = "SoIC_3D,CoWoS_S"

# 3D DFT wrapper specifically for SoIC 3D testing
[[rule]]
type = "prefer"
if_level = 3
if_id = "DFT_3D"
then_level = 4
then_ids = "SoIC_3D"

# MBIST_HBM pairs with CoWoS packages (HBM present)
[[rule]]
type = "prefer"
if_level = 3
if_id = "MBIST_HBM"
then_level = 4
then_ids = "CoWoS_S,CoWoS_L"
