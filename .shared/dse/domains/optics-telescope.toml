# =============================================================
# Compatibility Rules
# =============================================================

# GravLens requires SegmentMirror or HoloOpt (needs large collecting area)
[[rule]]
type       = "require"
if_level   = 0
if_id      = "GravLens"
then_level = 1
then_ids   = "SegmentMirror,HoloOpt,RitcheyChret"

# TopoLens requires PHBarcode analysis (persistent homology needed)
[[rule]]
type       = "require"
if_level   = 0
if_id      = "TopoLens"
then_level = 3
then_ids   = "PHBarcode,EulerProdConv,RFilterSpec"

# Bolometer only with SpaceTelesc or GravWaveObs (needs cryogenic/space)
[[rule]]
type       = "require"
if_level   = 2
if_id      = "Bolometer"
then_level = 4
then_ids   = "SpaceTelesc,GravWaveObs"

# Interferom detection requires GravWaveObs or RadioArray
[[rule]]
type       = "require"
if_level   = 2
if_id      = "Interferom"
then_level = 4
then_ids   = "GravWaveObs,RadioArray"

# SegmentMirror incompatible with GroundAdapt without adaptive optics complexity
# (actually they work together in ELT, so no exclude -- but HoloOpt is incompatible with RadioArray)
[[rule]]
type       = "exclude"
if_level   = 1
if_id      = "HoloOpt"
then_level = 4
then_ids   = "RadioArray"

# ClassRefract incompatible with SpaceTelesc (too heavy for space, reflectors preferred)
[[rule]]
type       = "exclude"
if_level   = 0
if_id      = "ClassRefract"
then_level = 4
then_ids   = "SpaceTelesc,GravWaveObs"
