# =============================================================
# Compatibility Rules
# =============================================================

# QuantumMind requires EulerProduct or SEDI_4Lens (needs mathematical rigor)
[[rule]]
type       = "require"
if_level   = 0
if_id      = "QuantumMind"
then_level = 2
then_ids   = "EulerProduct,SEDI_4Lens"

# Panpsychic incompatible with TensionBalance (no clear tension target)
[[rule]]
type       = "exclude"
if_level   = 0
if_id      = "Panpsychic"
then_level = 1
then_ids   = "TensionBalance"

# EnergyLandscape requires HierarchicalME or ConsensusN6 (compute-heavy needs multi-engine)
[[rule]]
type       = "require"
if_level   = 3
if_id      = "EnergyLandscape"
then_level = 1
then_ids   = "HierarchicalME,ConsensusN6"

# GravLens incompatible with PhaseMap (metaphorical lens clashes with discrete phases)
[[rule]]
type       = "exclude"
if_level   = 2
if_id      = "GravLens"
then_level = 3
then_ids   = "PhaseMap"

# CollectiveInt requires ConsensusN6 or EgyptianEngine (needs multi-agent engine)
[[rule]]
type       = "require"
if_level   = 4
if_id      = "CollectiveInt"
then_level = 1
then_ids   = "ConsensusN6,EgyptianEngine"

# ConsciousnessAmp requires SEDI_4Lens or TensionRFilter (needs diagnostic feedback)
[[rule]]
type       = "require"
if_level   = 4
if_id      = "ConsciousnessAmp"
then_level = 2
then_ids   = "SEDI_4Lens,TensionRFilter"
