# =============================================================
# Compatibility Rules
# =============================================================

# FullyConnected topology impractical with 24 nodes (24*23/2=276 edges)
[[rule]]
type       = "exclude"
if_level   = 0
if_id      = "FullyConnected"
then_level = 1
then_ids   = "N24"

# Quantum coupling requires small node counts (entanglement hard to scale)
[[rule]]
type       = "exclude"
if_level   = 2
if_id      = "Quantum"
then_level = 1
then_ids   = "N24,N12"

# SharedMemory only works on same host, so small node count
[[rule]]
type       = "exclude"
if_level   = 2
if_id      = "SharedMemory"
then_level = 1
then_ids   = "N24,N12"

# Empire federation not suitable for Emergent consensus
[[rule]]
type       = "exclude"
if_level   = 3
if_id      = "Empire"
then_level = 4
then_ids   = "Emergent"

# Ring topology pairs well with Rotating leadership
[[rule]]
type       = "prefer"
if_level   = 0
if_id      = "Ring"
then_level = 3
then_ids   = "Rotating"
