name = "mri-medical-imaging"
desc = "MRI Medical Imaging DSE (J2=24 gradient coils, sigma=12 channels, 6-axis shim coils)"

[scoring]
n6 = 0.35
perf = 0.25
power = 0.20
cost = 0.20

