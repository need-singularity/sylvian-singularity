# ============================================================
# Compatibility Rules
# ============================================================

# UHF 7T needs dipole antenna arrays or high-channel coils
[[rule]]
type = "prefer"
if_level = 0
if_id = "UHF_7T"
then_level = 2
then_ids = "Dipole_Array,Head_24ch"

# HTS 12T research magnet needs matrix gradient
[[rule]]
type = "prefer"
if_level = 0
if_id = "HTS_12T"
then_level = 1
then_ids = "Matrix_24ch,HighPerf_80mT"

# EPI 6-echo best with high-performance gradients
[[rule]]
type = "prefer"
if_level = 3
if_id = "EPI_6echo"
then_level = 1
then_ids = "HighPerf_80mT,Matrix_24ch"

# AI reconstruction needs high-channel coil data
[[rule]]
type = "prefer"
if_level = 4
if_id = "AI_Recon"
then_level = 2
then_ids = "Head_24ch,Phased_12ch"

# Portable Halbach works best with low-complexity sequences
[[rule]]
type = "prefer"
if_level = 0
if_id = "Halbach_Portable"
then_level = 3
then_ids = "SpinEcho,GRE"
