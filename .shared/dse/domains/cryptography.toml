# =============================================================
# 궁극의 암호학 DSE Domain Definition
# Source: docs/cryptography/goal.md + hypotheses H-CR-1~80
# BT-53 (Crypto n=6: BTC 6 confirms, ETH 12s)
# BT-58 (sigma-tau=8 universal: AES-256, ChaCha20, SHA-3)
# H-CR-61 (Golay [24,12,8] EXACT 4-parameter match)
# Total raw combos: 6x5x6x5x5 = 4,500 (pre-filter)
# =============================================================

[meta]
name = "cryptography"
desc = "Cryptographic Architecture DSE (BT-53/58, H-CR-1~80)"
levels = ["Foundation", "KeyMgmt", "Primitive", "Engine", "System"]
vision = "Zero-trust world -- every bit encrypted, every proof verified, every key quantum-safe"

[scoring]
n6   = 0.35
perf = 0.25
power = 0.20
cost  = 0.20

