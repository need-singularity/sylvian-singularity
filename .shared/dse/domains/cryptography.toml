# =============================================================
# Compatibility Rules
# =============================================================

# FHE requires FPGA or GPU (heavy computation)
[[rule]]
type       = "require"
if_level   = 0
if_id      = "FHE"
then_level = 3
then_ids   = "FPGA_Crypto,GPU_Crypto"

# QKD requires PostQuantum or Symmetric (quantum-safe pairing)
[[rule]]
type       = "require"
if_level   = 3
if_id      = "QKD"
then_level = 0
then_ids   = "PostQuantum,Symmetric"

# EdgeSec excludes FHE and MPC (too heavy for IoT)
[[rule]]
type       = "exclude"
if_level   = 4
if_id      = "EdgeSec"
then_level = 0
then_ids   = "FHE,MPC"

# Blockchain prefers ZKProof or Asymmetric foundation
[[rule]]
type       = "prefer"
if_level   = 4
if_id      = "Blockchain"
then_level = 0
then_ids   = "ZKProof,Asymmetric"

# TLS prefers AES256/ChaCha20 + Ed25519 primitives
[[rule]]
type       = "prefer"
if_level   = 4
if_id      = "TLS_Web"
then_level = 2
then_ids   = "AES256,ChaCha20,Ed25519"

# PostQuantum foundation prefers ML_KEM/ML_DSA primitives
[[rule]]
type       = "prefer"
if_level   = 0
if_id      = "PostQuantum"
then_level = 2
then_ids   = "ML_KEM,ML_DSA"

# Symmetric foundation prefers AES256/ChaCha20
[[rule]]
type       = "prefer"
if_level   = 0
if_id      = "Symmetric"
then_level = 2
then_ids   = "AES256,ChaCha20"

# Asymmetric foundation prefers Ed25519
[[rule]]
type       = "prefer"
if_level   = 0
if_id      = "Asymmetric"
then_level = 2
then_ids   = "Ed25519,ML_KEM"

# Threshold key management prefers MPC foundation
[[rule]]
type       = "prefer"
if_level   = 1
if_id      = "Threshold"
then_level = 0
then_ids   = "MPC,Asymmetric,ZKProof"

# DID prefers Blockchain system
[[rule]]
type       = "prefer"
if_level   = 1
if_id      = "DID"
then_level = 4
then_ids   = "Blockchain"

# AESNI prefers AES256 primitive
[[rule]]
type       = "prefer"
if_level   = 3
if_id      = "AESNI"
then_level = 2
then_ids   = "AES256,SHA3"

# GPU_Crypto prefers ZKProof foundation
[[rule]]
type       = "prefer"
if_level   = 3
if_id      = "GPU_Crypto"
then_level = 0
then_ids   = "ZKProof,FHE"
