# ============================================================
# Compatibility Rules
# ============================================================

# Geopolymer does not use standard water curing
[[rule]]
type = "require"
if_level = 0
if_id = "Geopolymer"
then_level = 4
then_ids = ["Steam-Cure", "Autoclave", "CO2-Cure"]

# 3D print mixing only with superplasticizer or fiber
[[rule]]
type = "require"
if_level = 3
if_id = "3D-Print-Mix"
then_level = 2
then_ids = ["Superplasticizer", "Fiber-Reinforce"]

# LECA lightweight only with membrane or internal cure
[[rule]]
type = "require"
if_level = 1
if_id = "Lightweight-LECA"
then_level = 4
then_ids = ["Membrane-Cure", "Internal-Cure", "CO2-Cure"]

# Steel heavy aggregate for special applications
[[rule]]
type = "require"
if_level = 1
if_id = "Steel-Heavy"
then_level = 3
then_ids = ["Twin-Shaft", "Pan-Mixer"]
