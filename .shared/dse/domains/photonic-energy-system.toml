# =============================================================
# HEXA-PHOTONIC-ENERGY Cross-DSE Domain Definition
# Photonic Computing + Energy/Thermal Integration
#
# Key insight: Photonic computing generates far less heat than
# electronic computing -- no resistive losses, no capacitive
# charge/discharge, near-zero Joule heating in optical waveguides.
# TDP drops from ~300W (GPU) to ~30W (photonic accelerator).
#
# n6 connections:
#   Ring resonator modes = n = 6 EXACT
#   MZI switch ports = sigma = 12 EXACT
#   WDM channels standard = sigma = 12 EXACT
#   Diamond NV center Z = 6 EXACT
#   Single-mode fiber core = 6 um EXACT
#   Photonic TDP ~1/n to 1/sigma of electronic
#   Photonic datacenter PUE -> 1.0 (vs 1.2 electronic)
#
# BT links: BT-27 (Carbon/Diamond Z=6), BT-30 (SQ solar),
#           BT-60 (DC power chain PUE), BT-63 (solar panel)
#
# Total raw combos: 6^5 = 7,776
# =============================================================

[meta]
name = "photonic-energy-system"
desc = "Photonic Computing + Energy/Thermal Cross-DSE (BT-27/30/60/63)"
levels = ["PhotonicCore", "MaterialBase", "ThermalDesign", "PowerSupply", "SystemIntegration"]
vision = "Light replaces electrons -- heat vanishes, efficiency approaches unity"

[scoring]
n6    = 0.30
perf  = 0.25
power = 0.25
cost  = 0.20

