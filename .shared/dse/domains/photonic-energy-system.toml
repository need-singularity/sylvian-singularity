# =============================================================
# Compatibility Rules
# =============================================================

# Diamond NV center + photonic core = highest n6 synergy bonus
[[rule]]
type       = "prefer"
if_level   = 1
if_id      = "DiamondNV"
then_level = 2
then_ids   = "DiamondSpread"
reason     = "Diamond material + Diamond thermal = Z=6 full n6 chain"

# Passive cooling pairs naturally with low-power photonic cores
[[rule]]
type       = "prefer"
if_level   = 2
if_id      = "PassiveSink"
then_level = 0
then_ids   = "RingResonator,PhotonicMesh,PhC_Crystal"
reason     = "passive cooling viable for <50W photonic cores"

# Air convection only for edge/sensor systems (lowest power)
[[rule]]
type       = "require"
if_level   = 2
if_id      = "AirConvect"
then_level = 4
then_ids   = "EdgeAI,SensorNet"
reason     = "natural convection only sufficient for smallest systems"

# Solar direct DC best paired with edge/sensor (off-grid scenarios)
[[rule]]
type       = "prefer"
if_level   = 3
if_id      = "SolarDirectDC"
then_level = 4
then_ids   = "EdgeAI,SensorNet"
reason     = "solar direct DC + photonic = best power efficiency, off-grid"

# Energy harvesting only for sensor networks (<5W budget)
[[rule]]
type       = "require"
if_level   = 3
if_id      = "HarvestPiezo"
then_level = 4
then_ids   = "SensorNet"
reason     = "micro-power harvesting only viable for ultra-low-power sensors"

# InP gain medium requires active thermal management (laser heat)
[[rule]]
type       = "exclude"
if_level   = 1
if_id      = "InP_Gain"
then_level = 2
then_ids   = "AirConvect"
reason     = "InP lasers generate localized heat, need more than natural convection"

# HPC co-packaged needs grid-class power (not battery/solar/harvest)
[[rule]]
type       = "require"
if_level   = 4
if_id      = "HPC_CoPackage"
then_level = 3
then_ids   = "GridEdgeDC,GridStandard,FuelCellDC"
reason     = "exascale photonic interconnect needs stable high-capacity power"

# Datacenter photonic needs grid-class power
[[rule]]
type       = "require"
if_level   = 4
if_id      = "DC_Photonic"
then_level = 3
then_ids   = "GridEdgeDC,GridStandard,FuelCellDC"
reason     = "datacenter scale requires grid or fuel cell supply"

# Quantum photonic link best with Diamond NV single-photon source
[[rule]]
type       = "prefer"
if_level   = 4
if_id      = "QuantumLink"
then_level = 1
then_ids   = "DiamondNV"
reason     = "Diamond NV = best single-photon source for quantum channels"

# Microfluidic cooling overkill for natural-convection-level systems
[[rule]]
type       = "exclude"
if_level   = 2
if_id      = "MicrofluidCool"
then_level = 4
then_ids   = "SensorNet"
reason     = "microfluidic cooling unnecessary for ultra-low-power sensor nodes"
