# =============================================================
# Compatibility Rules
# =============================================================

# PH_Topology retrieval requires Consciousness or Mixed embedding
[[rule]]
type       = "require"
if_level   = 2
if_id      = "PH_Topology"
then_level = 1
then_ids   = "Consciousness,Mixed"

# Hivemind scaling requires Consciousness_Binding integration
[[rule]]
type       = "require"
if_level   = 4
if_id      = "Hivemind"
then_level = 3
then_ids   = "Consciousness_Binding,Adaptive"

# Binary embedding excludes Learned retrieval (incompatible)
[[rule]]
type       = "exclude"
if_level   = 1
if_id      = "Binary"
then_level = 2
then_ids   = "Learned,PH_Topology"

# SQLite backend excludes Hivemind scaling
[[rule]]
type       = "exclude"
if_level   = 0
if_id      = "SQLite"
then_level = 4
then_ids   = "Hivemind,Distributed"
