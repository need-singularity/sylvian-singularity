# ============================================================
# Compatibility Rules
# ============================================================

# Passive matrix only for small displays
[[rule]]
type = "require"
if_level = 2
if_id = "Passive-Matrix"
then_level = 4
then_ids = ["Smartwatch", "Signage-Wall"]

# Silicon wafer backplane only for near-eye (small area)
[[rule]]
type = "require"
if_level = 3
if_id = "Silicon-Wafer"
then_level = 4
then_ids = ["AR-Glass", "VR-Headset"]

# CMOS driver requires silicon backplane
[[rule]]
type = "require"
if_level = 2
if_id = "CMOS-Backplane"
then_level = 3
then_ids = ["Silicon-Wafer"]

# Flexible PI excluded from VR headset (rigidity needed)
[[rule]]
type = "exclude"
if_level = 3
if_id = "Flexible-PI"
then_level = 4
then_ids = ["VR-Headset", "Automotive-HUD"]
