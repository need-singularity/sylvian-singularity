# n=6: 6 primary+secondary colors, σ=12 bit depth, μLED pitch in n=6 multiples
# Total raw combos: 6x6x6x6x6 = 7,776 (pre-filter)
# =============================================================

[meta]
name = "micro-led"
desc = "MicroLED Display Architecture DSE (epitaxy/transfer/driver/backplane/module)"

[scoring]
n6 = 0.35
perf = 0.25
power = 0.20
cost = 0.20

