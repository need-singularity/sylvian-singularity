# ============================================================
# Compatibility Rules
# ============================================================

# BGO crystals work well with PMT (traditional pairing)
[[rule]]
type = "prefer"
if_level = 0
if_id = "BGO"
then_level = 1
then_ids = "PMT_Standard,PS_PMT"

# LSO/LYSO best with SiPM for TOF-PET
[[rule]]
type = "prefer"
if_level = 0
if_id = "LSO"
then_level = 1
then_ids = "SiPM_Digital,SiPM_Analog"

# Digital SiPM pairs with ASIC TOF electronics
[[rule]]
type = "prefer"
if_level = 1
if_id = "SiPM_Digital"
then_level = 2
then_ids = "ASIC_TOF,DeadTimeFree"

# TOF reconstruction needs TOF-capable electronics
[[rule]]
type = "prefer"
if_level = 3
if_id = "TOF_OSEM"
then_level = 2
then_ids = "ASIC_TOF,FPGA_Coincidence"

# Short half-life isotopes (O-15, C-11) need fast reconstruction
[[rule]]
type = "prefer"
if_level = 4
if_id = "O15_Water"
then_level = 3
then_ids = "DL_PET_Recon,TOF_OSEM"
