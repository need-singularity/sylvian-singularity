# N6 PET Imaging DSE — Positron emission tomography
# 6 Scintillator x 6 Photodetector x 6 Electronics x 6 Reconstruction x 6 Isotope = 7,776 combos
# n=6: 6 scintillator ring layers (n=6), sigma=12 ns coincidence window, tau=4 isotopes (F-18/C-11/N-13/O-15),
#       phi=2 annihilation photon pair (511keV each), J2=24 detector blocks per ring, 6mm spatial resolution

[meta]
name = "pet-imaging"
desc = "PET Imaging DSE (n=6 ring layers, sigma=12 ns coincidence, phi=2 annihilation photons, 6mm resolution)"

[scoring]
n6 = 0.35
perf = 0.25
power = 0.20
cost = 0.20

