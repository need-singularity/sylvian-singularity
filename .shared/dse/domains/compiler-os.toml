# =============================================================
# Compatibility Rules
# =============================================================

# Custom N6 ISA needs N6-specific compiler pipeline
[[rule]]
type = "prefer"
if_level = 0
if_id = "Custom_N6_ISA"
then_level = 1
then_ids = "LLVM_N6,ML_Guided"

# x86-64 is poorly aligned with full N6 stack
[[rule]]
type = "exclude"
if_level = 0
if_id = "x86_64"
then_level = 4
then_ids = "FullStack_N6"

# Unikernel incompatible with full monolithic kernel
[[rule]]
type = "exclude"
if_level = 2
if_id = "Unikernel"
then_level = 3
then_ids = "N6_Monolithic,Linux_Stock"

# AOT minimal compiler limits kernel sophistication
[[rule]]
type = "prefer"
if_level = 1
if_id = "AOT_Minimal"
then_level = 3
then_ids = "Exokernel"

# seL4 runtime matches seL4 kernel naturally
[[rule]]
type = "prefer"
if_level = 2
if_id = "Microkernel_L4"
then_level = 3
then_ids = "Micro_seL4,N6_Hybrid_Kernel"

# RISC-V N6 ISA pairs best with LLVM N6 compiler
[[rule]]
type = "prefer"
if_level = 0
if_id = "RISCV_N6"
then_level = 1
then_ids = "LLVM_N6,ML_Guided"

# RT_Preempt runtime pairs with embedded or full N6 ecosystem
[[rule]]
type = "prefer"
if_level = 2
if_id = "RT_Preempt"
then_level = 4
then_ids = "Embedded_N6,FullStack_N6"

# Formal verified ecosystem requires seL4 kernel
[[rule]]
type = "prefer"
if_level = 4
if_id = "Formal_Verified"
then_level = 3
then_ids = "Micro_seL4,N6_Hybrid_Kernel"
