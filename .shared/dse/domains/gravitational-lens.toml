# =============================================================
# GRAVITATIONAL-LENS DSE Domain Definition
# Ultimate Gravitational Lens/Telescope DSE
# Einstein ring + SGL + GW lens + n=6 ISCO
# ISCO=6M=n EXACT, photon sphere=3M=n/phi, R_s coefficient=phi=2
# Max images tau=4, spacetime 3+1=tau=4, Einstein ring C=1=mu
# Total raw combos: 6x6x6x6x6 = 7,776 (pre-filter)
# =============================================================

[meta]
name = "gravitational-lens"
desc = "Ultimate Gravitational Lens/Telescope DSE — Einstein ring + SGL + GW lens + n=6 ISCO"
levels = ["Optics", "Propulsion", "LensType", "Analysis", "Mission"]
vision = "n=6 gravitational optics: ISCO=6M, photon sphere=3M=n/phi, Schwarzschild R_s=2GM/c^2 (phi=2), max images=tau=4"

[scoring]
n6   = 0.35
perf = 0.25
power = 0.20
cost  = 0.20

