# =============================================================
# Compatibility Rules
# =============================================================

# SGL_Probe requires deep-space propulsion (not chemical)
[[rule]]
type       = "require"
if_level   = 0
if_id      = "SGL_Probe"
then_level = 1
then_ids   = "Solar_Sail,Nuclear_Thermal,Laser_Propulsion"

# Einstein_Ring analysis needs wave optics or topology methods
[[rule]]
type       = "require"
if_level   = 2
if_id      = "Einstein_Ring"
then_level = 3
then_ids   = "PH_Topology,Wave_Optics_Sim,Bayesian_Inference"

# Weak_Lensing only meaningful for Dark_Matter_Map or CMB_Lensing missions
[[rule]]
type       = "require"
if_level   = 2
if_id      = "Weak_Lensing"
then_level = 4
then_ids   = "Dark_Matter_Map,CMB_Lensing"

# Chemical_Rocket incompatible with Exoplanet_Imaging (insufficient delta-v for 550AU)
[[rule]]
type       = "exclude"
if_level   = 1
if_id      = "Chemical_Rocket"
then_level = 4
then_ids   = "Exoplanet_Imaging"
