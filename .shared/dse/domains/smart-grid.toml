# ============================================================
# Rules
# ============================================================

# HTS cable only for high-value corridors
[[rule]]
type = "exclude"
if_level = 1
if_id = "Superconductor-12kA"
then_level = 2
then_ids = ["LV-480V", "AutoReclose-6cycle"]

# DC microgrid requires SST or direct DC distribution
[[rule]]
type = "require"
if_level = 2
if_id = "DC-Microgrid-48V"
then_level = 0
then_ids = ["Solar-6MW", "BESS-48V"]

# V2G needs smart metering
[[rule]]
type = "exclude"
if_level = 4
if_id = "V2G-6fleet"
then_level = 3
then_ids = ["SCADA-12RTU"]

# PMU only for transmission-level monitoring
[[rule]]
type = "require"
if_level = 3
if_id = "PMU-48sample"
then_level = 1
then_ids = ["HVAC-6bus", "HVDC-12GW", "FACTS-6device", "GIL-6phase", "Superconductor-12kA", "Overhead-6bundle"]
