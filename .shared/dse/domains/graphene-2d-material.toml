# ============================================================
# Compatibility Rules
# ============================================================

# Graphene pairs best with CVD or epitaxial synthesis
[[rule]]
type = "prefer"
if_level = 0
if_id = "Graphene"
then_level = 1
then_ids = "CVD_6zone,EpitaxialSiC"

# h-BN is primary substrate/encapsulant, pairs with all structures
[[rule]]
type = "prefer"
if_level = 0
if_id = "hBN"
then_level = 2
then_ids = "Heterostructure6,Bilayer"

# MoS2 semiconductor pairs with transistor and sensor applications
[[rule]]
type = "prefer"
if_level = 0
if_id = "MoS2"
then_level = 4
then_ids = "Transistor6nm,SensorArray"

# MXene metallic pairs with battery and thermal applications
[[rule]]
type = "prefer"
if_level = 0
if_id = "MXene_Ti3C2"
then_level = 4
then_ids = "BatteryAnode,ThermalSpreader"

# Moire twisted requires mechanical exfoliation (highest quality)
[[rule]]
type = "prefer"
if_level = 2
if_id = "MoireTwisted"
then_level = 1
then_ids = "ExfoliationMech,MBE"

# Moire twisted structure leads to superconductor property
[[rule]]
type = "prefer"
if_level = 2
if_id = "MoireTwisted"
then_level = 3
then_ids = "SuperconductorMagic,TopologicalInsulator"

# Nanoribbon needs precise synthesis
[[rule]]
type = "prefer"
if_level = 2
if_id = "Nanoribbon"
then_level = 1
then_ids = "MBE,CVD_6zone"

# Transistor application pairs with semiconductor gap property
[[rule]]
type = "prefer"
if_level = 4
if_id = "Transistor6nm"
then_level = 3
then_ids = "SemiconductorGap,ElectronicConductor"

# Membrane filter pairs with monolayer structure (thinnest)
[[rule]]
type = "prefer"
if_level = 4
if_id = "MembraneFilter"
then_level = 2
then_ids = "Monolayer,Nanoribbon"

# Phosphorene is air-sensitive, needs ALD encapsulation
[[rule]]
type = "prefer"
if_level = 0
if_id = "Phosphorene"
then_level = 1
then_ids = "ExfoliationMech,ALD_12cycle"
