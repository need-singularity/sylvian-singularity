# ============================================================
# Compatibility Rules
# ============================================================

# Droplet generation pairs best with electrowetting actuation
[[rule]]
type = "prefer"
if_level = 1
if_id = "Droplet_Gen"
then_level = 3
then_ids = "Electrowetting,Piezo_Micro"

# Digital microfluidics needs electrowetting
[[rule]]
type = "prefer"
if_level = 1
if_id = "Digital_Micro"
then_level = 3
then_ids = "Electrowetting,Magnetic_Bead"

# Paper substrate best with passive capillary and colorimetric
[[rule]]
type = "prefer"
if_level = 0
if_id = "Paper_Cellulose"
then_level = 2
then_ids = "Colorimetric,Electrochemical"

# SPR detection needs glass or silicon substrate
[[rule]]
type = "prefer"
if_level = 2
if_id = "SPR_Plasmonic"
then_level = 0
then_ids = "Glass_Borosil,Silicon_MEMS"

# Organ-on-chip needs hydrogel substrate
[[rule]]
type = "prefer"
if_level = 4
if_id = "Organ_on_Chip"
then_level = 0
then_ids = "Hydrogel_3D,PDMS_6layer"

# DNA sequencing benefits from fluorescence detection
[[rule]]
type = "prefer"
if_level = 4
if_id = "DNA_Sequencing"
then_level = 2
then_ids = "Optical_Fluor,SPR_Plasmonic"
