# N6 Aerogel DSE — Ultra-lightweight porous solid engineering
# 6 Materials x 6 SolGels x 6 Dryings x 6 Modifications x 6 Applications = 7,776 combos
# n=6 connections: SiO2 network 6-member ring (n=6 EXACT), sigma=12 nm average pore diameter,
#   tau=4 drying methods (supercritical/freeze/ambient/subcritical), phi=2 hydrophobic/hydrophilic,
#   J2=24 mg/cm3 minimum density target, 99.8% porosity -> 0.2%=phi/1000

[meta]
name = "aerogel"
desc = "Aerogel DSE — ultra-lightweight porous solid engineering (n=6 universality)"

[scoring]
n6 = 0.35
perf = 0.25
power = 0.20
cost = 0.20

