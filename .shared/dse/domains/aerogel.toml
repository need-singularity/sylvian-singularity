# ============================================================
# Compatibility Rules
# ============================================================

# Silica pairs best with TEOS or waterglass sol-gel
[[rule]]
type = "prefer"
if_level = 0
if_id = "Silica_SiO2"
then_level = 1
then_ids = "TEOS_Standard,Waterglass_Sodium"

# Carbon RF requires resorcinol-formaldehyde sol-gel
[[rule]]
type = "prefer"
if_level = 0
if_id = "Carbon_RF"
then_level = 1
then_ids = "Resorcinol_Formaldehyde"

# Cellulose pairs with bio-derived sol-gel processes
[[rule]]
type = "prefer"
if_level = 0
if_id = "Cellulose_Bio"
then_level = 1
then_ids = "Alginate_Bio,CNF_Nanofiber"

# Graphene aerogel pairs best with freeze drying for aligned pores
[[rule]]
type = "prefer"
if_level = 0
if_id = "Graphene_Aerogel"
then_level = 2
then_ids = "Freeze_Drying,Supercritical_CO2"

# Supercritical CO2 drying pairs with hydrophobic modification
[[rule]]
type = "prefer"
if_level = 2
if_id = "Supercritical_CO2"
then_level = 3
then_ids = "Hydrophobic_HMDS,Opacifier_TiO2"

# Ambient APD requires hydrophobic modification to prevent collapse
[[rule]]
type = "prefer"
if_level = 2
if_id = "Ambient_APD_6step"
then_level = 3
then_ids = "Hydrophobic_HMDS,Aerogel_Composite_12pct"

# Carbon aerogel pairs with supercapacitor electrode application
[[rule]]
type = "prefer"
if_level = 0
if_id = "Carbon_RF"
then_level = 4
then_ids = "Supercapacitor_Electrode,Oil_Spill_Absorb"

# Graphene aerogel pairs with supercapacitor and oil spill applications
[[rule]]
type = "prefer"
if_level = 0
if_id = "Graphene_Aerogel"
then_level = 4
then_ids = "Supercapacitor_Electrode,Oil_Spill_Absorb"

# Polymer polyimide pairs best with thermal and space applications
[[rule]]
type = "prefer"
if_level = 0
if_id = "Polymer_Polyimide"
then_level = 4
then_ids = "Thermal_Insulation,Space_Dust_Collector"

# Amine surface modification targets drug delivery and CO2 capture
[[rule]]
type = "prefer"
if_level = 3
if_id = "Surface_Amine"
then_level = 4
then_ids = "Drug_Delivery,Thermal_Insulation"
