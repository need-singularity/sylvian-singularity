# ============================================================
# Compatibility Rules
# ============================================================

# Composting requires organic collection (not mixed single stream)
[[rule]]
type = "exclude"
if_level = 2
if_id = "Composting"
then_level = 0
then_ids = ["Industrial-Bulk"]

# Smelting requires eddy current sorting (metal pre-sort)
[[rule]]
type = "require"
if_level = 2
if_id = "Smelting"
then_level = 1
then_ids = ["Eddy-Current", "AI-Vision-6class", "Robot-Arm-6dof"]

# Anaerobic digestion requires biogas CHP recovery
[[rule]]
type = "require"
if_level = 2
if_id = "Anaerobic-Digest"
then_level = 3
then_ids = ["Biogas-CHP"]

# Rare earth recovery requires smelting process
[[rule]]
type = "require"
if_level = 3
if_id = "RareEarth"
then_level = 2
then_ids = ["Smelting", "ChemRecycle"]
