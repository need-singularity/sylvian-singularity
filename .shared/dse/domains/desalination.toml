# ============================================================
# Compatibility Rules
# ============================================================

# Brackish well requires BWRO or NF (low pressure sufficient)
[[rule]]
type = "require"
if_level = 0
if_id = "Brackish-Well"
then_level = 2
then_ids = ["BWRO", "NF"]

# Waste heat recovery requires MD or thermal process
[[rule]]
type = "require"
if_level = 3
if_id = "Waste-Heat"
then_level = 2
then_ids = ["MD", "FO"]

# Forward osmosis excluded from industrial (insufficient purity)
[[rule]]
type = "exclude"
if_level = 2
if_id = "FO"
then_level = 4
then_ids = ["Industrial"]

# Solar direct excluded from industrial (intermittent)
[[rule]]
type = "exclude"
if_level = 3
if_id = "Solar-Direct"
then_level = 4
then_ids = ["Industrial"]
