# ============================================================
# Compatibility Rules
# ============================================================

# LUT6 pairs naturally with segmented 6-hop routing
[[rule]]
type = "prefer"
if_level = 0
if_id = "LUT6"
then_level = 1
then_ids = "Segmented_6hop,Programmable_Switch"

# ALM 8-input benefits from hierarchical routing
[[rule]]
type = "prefer"
if_level = 0
if_id = "ALM_8input"
then_level = 1
then_ids = "Hierarchical_12ch,Unidirectional"

# DSP48 cascade needs BRAM for coefficient storage
[[rule]]
type = "prefer"
if_level = 3
if_id = "MAC_Cascade"
then_level = 2
then_ids = "BRAM_36Kb,URAM_288Kb"

# AI Tensor requires high-bandwidth memory
[[rule]]
type = "prefer"
if_level = 3
if_id = "AI_Tensor_12"
then_level = 2
then_ids = "HBM_Interface,URAM_288Kb"

# PCIe Gen6 pairs with GT transceivers
[[rule]]
type = "prefer"
if_level = 4
if_id = "PCIe_Gen6"
then_level = 3
then_ids = "AI_Tensor_12,DSP48"

# HBM interface needs GT transceivers in I/O
[[rule]]
type = "prefer"
if_level = 2
if_id = "HBM_Interface"
then_level = 4
then_ids = "GT_Transceiver,PCIe_Gen6"
