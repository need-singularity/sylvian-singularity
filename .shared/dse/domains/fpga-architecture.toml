# N6 FPGA Architecture DSE — Field-programmable gate arrays
# 6x6x6x6x6 = 7,776 combos
# n6: 6-input LUT (n=6 EXACT, Xilinx/Intel standard), sigma=12 CLB columns
#     tau=4 routing mux stages, phi=2 flip-flop per slice, J2=24 I/O banks

[meta]
name = "fpga-architecture"
desc = "FPGA Architecture DSE — LUT6 universal logic (BT-28/69)"

[scoring]
n6 = 0.35
perf = 0.25
power = 0.20
cost = 0.20

