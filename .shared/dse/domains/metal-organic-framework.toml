# ============================================================
# Compatibility Rules
# ============================================================

# Zn4O cluster pairs with BDC for classic MOF-5
[[rule]]
type = "prefer"
if_level = 0
if_id = "Zn4O_Cluster"
then_level = 1
then_ids = "BDC_Terephthalic,NDC_Naphthalene"

# Zr6 UiO cluster pairs with BDC and BPDC (UiO-66/67)
[[rule]]
type = "prefer"
if_level = 0
if_id = "Zr6_UiO"
then_level = 1
then_ids = "BDC_Terephthalic,BPDC_Biphenyl"

# Cu paddlewheel pairs with BTC trimesic (HKUST-1)
[[rule]]
type = "prefer"
if_level = 0
if_id = "Cu_Paddlewheel"
then_level = 1
then_ids = "BTC_Trimesic,Porphyrin_PCN"

# Fe-MIL pairs with drug delivery and catalysis applications
[[rule]]
type = "prefer"
if_level = 0
if_id = "Fe_MIL"
then_level = 4
then_ids = "Drug_Delivery,Catalysis_6site"

# Cr-MIL-101 pairs with water harvest and gas storage (giant pore)
[[rule]]
type = "prefer"
if_level = 0
if_id = "Cr_MIL101"
then_level = 4
then_ids = "Water_Harvest,Gas_Storage_H2"

# Porphyrin linker best for catalysis applications
[[rule]]
type = "prefer"
if_level = 1
if_id = "Porphyrin_PCN"
then_level = 4
then_ids = "Catalysis_6site,Sensor_Luminescent"

# Imidazolate ZIF pairs with gas storage and sensor (molecular sieve)
[[rule]]
type = "prefer"
if_level = 1
if_id = "Imidazolate_ZIF"
then_level = 4
then_ids = "Gas_Storage_H2,CO2_Capture"

# Hexagonal topology suits water harvest (directional channels)
[[rule]]
type = "prefer"
if_level = 2
if_id = "Hexagonal_hxl"
then_level = 4
then_ids = "Water_Harvest,Sensor_Luminescent"

# Interpenetrated topology suits gas selectivity
[[rule]]
type = "prefer"
if_level = 2
if_id = "Interpenetrated_2fold"
then_level = 4
then_ids = "CO2_Capture,Gas_Storage_H2"

# Supercritical CO2 activation gives highest surface area
[[rule]]
type = "prefer"
if_level = 3
if_id = "Supercritical_CO2"
then_level = 4
then_ids = "Gas_Storage_H2,Water_Harvest"

# Al-MIL-53 is cheapest, pairs with industrial CO2 capture
[[rule]]
type = "prefer"
if_level = 0
if_id = "Al_MIL53"
then_level = 4
then_ids = "CO2_Capture,Water_Harvest"
