# ============================================================
# Compatibility Rules
# ============================================================

# Structured packing best with dividing wall heat integration
[[rule]]
type = "prefer"
if_level = 0
if_id = "StructuredPack"
then_level = 2
then_ids = "DividingWall,HeatPumpDist"

# Composition MPC control best for pharmaceutical application
[[rule]]
type = "prefer"
if_level = 3
if_id = "CompositionMPC"
then_level = 4
then_ids = "Pharma,ChemSolvent"

# Heat pump distillation pairs well with bioethanol application
[[rule]]
type = "prefer"
if_level = 2
if_id = "HeatPumpDist"
then_level = 4
then_ids = "BioEthanol,ChemSolvent"

# Bubble cap trays require conventional reboiler or side reboiler
[[rule]]
type = "prefer"
if_level = 0
if_id = "BubbleCap"
then_level = 2
then_ids = "ConvReboiler,SideReboiler"

# AI optimizer pairs with composition MPC or inferential control
[[rule]]
type = "prefer"
if_level = 3
if_id = "AIOptimizer"
then_level = 0
then_ids = "StructuredPack,ValveTray"
