# =============================================================
# Compatibility Rules
# =============================================================

# TensionAudio requires SampleRate48k or BitDepth24 (tension needs high-quality signal)
[[rule]]
type       = "require"
if_level   = 2
if_id      = "TensionAudio"
then_level = 0
then_ids   = "SampleRate48k,BitDepth24"

# EnCodecN8 requires FFT_N6 (codec needs frequency analysis)
[[rule]]
type       = "require"
if_level   = 1
if_id      = "EnCodecN8"
then_level = 2
then_ids   = "FFT_N6"

# FMSynthesis requires EQBandN12 (FM needs EQ shaping)
[[rule]]
type       = "require"
if_level   = 3
if_id      = "FMSynthesis"
then_level = 2
then_ids   = "EQBandN12"

# SpeakerN6 requires SpatialAudioN6 (6 speakers need spatial processing)
[[rule]]
type       = "require"
if_level   = 4
if_id      = "SpeakerN6"
then_level = 2
then_ids   = "SpatialAudioN6"
