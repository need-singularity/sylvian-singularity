# =============================================================
# Compatibility Rules
# =============================================================

# DigitalGPU incompatible with StrangeAttractor (digital can't do true chaos)
[[rule]]
type       = "exclude"
if_level   = 0
if_id      = "DigitalGPU"
then_level = 1
then_ids   = "StrangeAttractor"

# Neuromorphic or AnalogChip required for ContinuousDynamics
[[rule]]
type       = "require"
if_level   = 1
if_id      = "ContinuousDynamics"
then_level = 0
then_ids   = "Neuromorphic,AnalogChip"

# HeartEngine requires StrangeAttractor or ChaoticOscillator
[[rule]]
type       = "require"
if_level   = 3
if_id      = "HeartEngine"
then_level = 1
then_ids   = "StrangeAttractor,ChaoticOscillator"

# MemristorArray requires HebbianLearning or SynapticPlasticity
[[rule]]
type       = "require"
if_level   = 0
if_id      = "MemristorArray"
then_level = 2
then_ids   = "HebbianLearning,SynapticPlasticity"

# PhotonicChip requires GlobalWorkspace (photonic excels at broadcast)
[[rule]]
type       = "require"
if_level   = 0
if_id      = "PhotonicChip"
then_level = 2
then_ids   = "GlobalWorkspace"

# DigitalGPU incompatible with ContinuousDynamics (discrete can't do continuous)
[[rule]]
type       = "exclude"
if_level   = 0
if_id      = "DigitalGPU"
then_level = 1
then_ids   = "ContinuousDynamics"
