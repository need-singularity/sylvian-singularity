# ============================================================
# Compatibility Rules
# ============================================================

# Global update only for simple applications
[[rule]]
type = "require"
if_level = 2
if_id = "Global-Update"
then_level = 4
then_ids = ["E-Reader", "Smart-Label", "Architectural"]

# Glass-free direct drive only for simple displays
[[rule]]
type = "require"
if_level = 3
if_id = "Glass-Free-Direct"
then_level = 4
then_ids = ["Smart-Label", "Wearable-Band"]

# Dithered video mode requires fast backplane
[[rule]]
type = "require"
if_level = 2
if_id = "Dithered-Video"
then_level = 3
then_ids = ["IGZO-TFT", "Flex-PI"]

# Open cell encapsulation excluded from wearable (leak risk)
[[rule]]
type = "exclude"
if_level = 1
if_id = "Open-Cell"
then_level = 4
then_ids = ["Wearable-Band", "E-Reader"]
