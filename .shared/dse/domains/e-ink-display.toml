# =============================================================
# N6 E-Ink Display DSE Domain Definition
# Electrophoretic electronic paper technology
# n=6: 6 pigment particle types (n=6), sigma=12 V driving voltage,
#   tau=4 grayscale waveform phases, phi=2 bistable states (black/white),
#   J2=24 ppi target density, 6-color ACeP system (n=6 EXACT)
# Total raw combos: 6x6x6x6x6 = 7,776 (pre-filter)
# =============================================================

[meta]
name = "e-ink-display"
desc = "E-Ink Display Architecture DSE (particle/encapsulation/driving/backplane/application)"

[scoring]
n6 = 0.35
perf = 0.25
power = 0.20
cost = 0.20

