# N6 Magnetic Material DSE — Soft & hard magnetic engineering
# 6 Materials × 6 Processings × 6 Structures × 6 Characterizations × 6 Applications = 7,776 combos
# n=6 connections: Fe BCC->FCC CN=8/12 (sigma-tau, sigma), 6 magnetic domains typical (n=6),
#   sigma=12 crystallographic easy axes, tau=4 magnetic states (ferro/antiferro/ferri/para),
#   phi=2 magnetic poles (N/S), J2=24 Weiss domains per grain

[meta]
name = "magnetic-material"
desc = "Magnetic Material DSE — soft & hard magnetic engineering (n=6 universality)"

[scoring]
n6 = 0.35
perf = 0.25
power = 0.20
cost = 0.20

