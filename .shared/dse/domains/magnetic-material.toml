# ============================================================
# Compatibility Rules
# ============================================================

# Silicon steel pairs best with hot rolling and field annealing
[[rule]]
type = "prefer"
if_level = 0
if_id = "SiliconSteel_6p5Si"
then_level = 1
then_ids = "HotRolling_6pass,AnnealingField"

# Amorphous ribbon requires rapid quench processing
[[rule]]
type = "prefer"
if_level = 0
if_id = "AmorphousRibbon"
then_level = 1
then_ids = "RapidQuench"

# Finemet requires nanocrystallization from amorphous precursor
[[rule]]
type = "prefer"
if_level = 0
if_id = "Nanocrystalline_Finemet"
then_level = 1
then_ids = "RapidQuench,Nanocrystallization"

# Finemet naturally leads to nanocrystal structure
[[rule]]
type = "prefer"
if_level = 0
if_id = "Nanocrystalline_Finemet"
then_level = 2
then_ids = "Nanocrystal_12nm"

# Permalloy best as thin film for recording/sensor
[[rule]]
type = "prefer"
if_level = 0
if_id = "Permalloy_NiFe"
then_level = 1
then_ids = "ThinFilmSputter"

# Permalloy pairs with shielding and recording applications
[[rule]]
type = "prefer"
if_level = 0
if_id = "Permalloy_NiFe"
then_level = 4
then_ids = "ShieldingEMI,RecordingHead"

# MnZn ferrite made by powder sintering
[[rule]]
type = "prefer"
if_level = 0
if_id = "FerriteSoft_MnZn"
then_level = 1
then_ids = "PowderSintering"

# MnZn ferrite pairs with RF inductor application
[[rule]]
type = "prefer"
if_level = 0
if_id = "FerriteSoft_MnZn"
then_level = 4
then_ids = "InductorRF,TransformerCore"

# Multilayer structure needs thin-film sputtering
[[rule]]
type = "prefer"
if_level = 2
if_id = "Multilayer"
then_level = 1
then_ids = "ThinFilmSputter"

# Composite soft-hard leads to motor applications (high BHmax)
[[rule]]
type = "prefer"
if_level = 2
if_id = "CompositeSoftHard"
then_level = 4
then_ids = "MotorStator_6pole"

# Fluxgate sensor prefers amorphous glass structure (low noise)
[[rule]]
type = "prefer"
if_level = 4
if_id = "SensorFluxgate"
then_level = 2
then_ids = "AmorphousGlass,Multilayer"
