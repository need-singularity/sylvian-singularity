# ============================================================
# Rules
# ============================================================

# Hollow-core fiber needs Raman or hybrid amplifiers
[[rule]]
type = "exclude"
if_level = 0
if_id = "HCF-6ring"
then_level = 1
then_ids = ["SOA-6channel"]

# GPON protocol only with simple splitter switches
[[rule]]
type = "require"
if_level = 3
if_id = "GPON-6split"
then_level = 2
then_ids = ["PLC-6x6"]

# Submarine topology requires hybrid amplification
[[rule]]
type = "require"
if_level = 4
if_id = "Submarine-6pair"
then_level = 1
then_ids = ["Hybrid-EDFA-Raman", "EDFA-CL"]

# Multi-core fiber excluded from GPON (overkill)
[[rule]]
type = "exclude"
if_level = 0
if_id = "MCF-6core"
then_level = 3
then_ids = ["GPON-6split"]
