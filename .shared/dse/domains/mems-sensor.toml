# N6 MEMS Sensor DSE — Micro-electro-mechanical systems
# 6×6×6×6×6 = 7,776 combos
# n=6: 6DOF inertial (n=6 EXACT: 3-axis accel + 3-axis gyro),
#       sigma=12 resonant modes, tau=4 transduction types (capacitive/piezo/thermal/optical),
#       phi=2 differential sensing, J2=24 electrode pairs

[meta]
name = "mems-sensor"
desc = "MEMS Sensor DSE — 6DOF inertial (n=6), 12 resonant modes (sigma), 24 electrodes (J2)"

[scoring]
n6 = 0.35
perf = 0.25
power = 0.20
cost = 0.20

# ============================================================
# Level 0: Transduction (변환 방식)
#   n6 checks: plates==6(n), modes==12(sigma), pairs==24(J2)
# ============================================================

