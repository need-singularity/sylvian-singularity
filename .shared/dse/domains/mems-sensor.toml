# ============================================================
# Compatibility Rules
# ============================================================

# Capacitive 6-plate best with comb-drive and charge-amp readout
[[rule]]
type = "prefer"
if_level = 0
if_id = "Capacitive-6plate"
then_level = 1
then_ids = "Comb-drive-12finger,Tuning-fork"

# Piezoelectric transduction pairs with cantilever and diaphragm
[[rule]]
type = "prefer"
if_level = 0
if_id = "Piezoelectric"
then_level = 1
then_ids = "Cantilever-beam,Diaphragm-membrane"

# Optical interferometric needs bulk proof mass for sensitivity
[[rule]]
type = "prefer"
if_level = 0
if_id = "Optical-interferometric"
then_level = 1
then_ids = "Bulk-proof-mass,Ring-gyroscope"

# LIGA process for high-aspect-ratio structures only
[[rule]]
type = "prefer"
if_level = 2
if_id = "LIGA-6step"
then_level = 1
then_ids = "Comb-drive-12finger,Bulk-proof-mass"

# CMOS-MEMS requires ASIC readout integration
[[rule]]
type = "prefer"
if_level = 2
if_id = "CMOS-MEMS"
then_level = 3
then_ids = "ASIC-6ch,Mixed-signal-12bit"

# IMU-6DOF application requires 6-channel readout
[[rule]]
type = "prefer"
if_level = 4
if_id = "IMU-6DOF"
then_level = 3
then_ids = "ASIC-6ch,Sigma-delta-ADC"

# Ring gyroscope needs lock-in or sigma-delta readout
[[rule]]
type = "prefer"
if_level = 1
if_id = "Ring-gyroscope"
then_level = 3
then_ids = "Lock-in-detect,Sigma-delta-ADC"

# Microphone array needs diaphragm structure
[[rule]]
type = "prefer"
if_level = 4
if_id = "Microphone-array"
then_level = 1
then_ids = "Diaphragm-membrane"

# Energy harvester pairs with piezoelectric transduction
[[rule]]
type = "prefer"
if_level = 4
if_id = "Energy-harvester"
then_level = 0
then_ids = "Piezoelectric,Magnetic-Lorentz"

# SOI-MEMS best for bulk proof mass high-performance sensors
[[rule]]
type = "prefer"
if_level = 2
if_id = "SOI-MEMS"
then_level = 1
then_ids = "Bulk-proof-mass,Comb-drive-12finger"
