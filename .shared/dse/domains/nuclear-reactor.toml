# ============================================================
# Compatibility Rules
# ============================================================

# TRISO requires graphite moderator or helium coolant
[[rule]]
type = "require"
if_level = 0
if_id = "TRISO"
then_level = 1
then_ids = "Graphite-C6,BeO"

# Metal alloy fuel requires no moderator (fast spectrum)
[[rule]]
type = "require"
if_level = 0
if_id = "Metal-Alloy"
then_level = 1
then_ids = "NoModerator"

# Sodium coolant excluded from BWR containment
[[rule]]
type = "exclude"
if_level = 2
if_id = "Sodium-Liquid"
then_level = 4
then_ids = "BWR-Mark3"

# Molten salt coolant requires MSR drain tank containment
[[rule]]
type = "require"
if_level = 2
if_id = "MoltenSalt"
then_level = 4
then_ids = "MSR-Drain"

# No moderator requires sodium or molten salt coolant (fast spectrum)
[[rule]]
type = "require"
if_level = 1
if_id = "NoModerator"
then_level = 2
then_ids = "Sodium-Liquid,MoltenSalt"
