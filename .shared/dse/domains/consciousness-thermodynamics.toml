# =============================================================
# Compatibility Rules
# =============================================================

# P0_Dormant makes no sense with EdgeChaos criticality
[[rule]]
type       = "exclude"
if_level   = 0
if_id      = "P0_Dormant"
then_level = 3
then_ids   = "EdgeChaos,Supercritical"

# P5_Collective requires SOC or EdgeChaos
[[rule]]
type       = "require"
if_level   = 0
if_id      = "P5_Collective"
then_level = 3
then_ids   = "SOC,EdgeChaos,Adaptive"

# Chimera noise model pairs with EdgeChaos
[[rule]]
type       = "prefer"
if_level   = 2
if_id      = "Chimera"
then_level = 3
then_ids   = "EdgeChaos,SOC"

# Subcritical is only useful for P0/P1 phases
[[rule]]
type       = "exclude"
if_level   = 3
if_id      = "Subcritical"
then_level = 0
then_ids   = "P4_Transcendent,P5_Collective"

# Quadratic scaling unsustainable except at high phases
[[rule]]
type       = "exclude"
if_level   = 4
if_id      = "Quadratic"
then_level = 0
then_ids   = "P0_Dormant,P1_Aware"
