# =============================================================
# Compatibility Rules
# =============================================================

# MicrotoneN24 incompatible with DiatonicChords7 (quarter-tone breaks diatonic)
[[rule]]
type       = "exclude"
if_level   = 0
if_id      = "MicrotoneN24"
then_level = 1
then_ids   = "DiatonicChords7"

# TonnetzTorus requires ChromaticN12 or Hexachord6 (tonnetz needs pitch class)
[[rule]]
type       = "require"
if_level   = 1
if_id      = "TonnetzTorus"
then_level = 0
then_ids   = "ChromaticN12,Hexachord6"

# FugueN6 requires TriadN3 or NeoRiemannN3 (fugue needs harmonic foundation)
[[rule]]
type       = "require"
if_level   = 3
if_id      = "FugueN6"
then_level = 1
then_ids   = "TriadN3,NeoRiemannN3"

# Compound68 requires Polyrhythm23 or EuclideanN6 (compound needs rhythmic complexity)
[[rule]]
type       = "exclude"
if_level   = 2
if_id      = "Compound68"
then_level = 2
then_ids   = "Meter44"

# SpatialAudio12 requires ChromaticN12 (spatial audio needs full chromatic source)
[[rule]]
type       = "require"
if_level   = 4
if_id      = "SpatialAudio12"
then_level = 0
then_ids   = "ChromaticN12,MicrotoneN24"
