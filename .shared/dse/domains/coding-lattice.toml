# =============================================================
# Compatibility Rules
# =============================================================

# LeechN24 requires Golay24 (Leech lattice constructed from Golay code)
[[rule]]
type       = "require"
if_level   = 1
if_id      = "LeechN24"
then_level = 0
then_ids   = "Golay24"

# QuantumDecode642 requires PolarN6 or LDPC_N8 (quantum needs modern codes)
[[rule]]
type       = "require"
if_level   = 3
if_id      = "QuantumDecode642"
then_level = 0
then_ids   = "PolarN6,LDPC_N8"

# QEC requires QuantumDecode642 (quantum error correction needs quantum decoder)
[[rule]]
type       = "require"
if_level   = 4
if_id      = "QEC"
then_level = 3
then_ids   = "QuantumDecode642"

# DNA_Storage requires ListDecoding (DNA channels need list decoding)
[[rule]]
type       = "require"
if_level   = 4
if_id      = "DNA_Storage"
then_level = 3
then_ids   = "ListDecoding,BeliefPropagation"

# SyndromeDecoding best with Hamming7 or Golay24 (syndrome table feasible)
[[rule]]
type       = "require"
if_level   = 3
if_id      = "SyndromeDecoding"
then_level = 0
then_ids   = "Hamming7,Golay24,BCH_N6"

# BeliefPropagation requires LDPC_N8 or PolarN6 (graph-based codes)
[[rule]]
type       = "require"
if_level   = 3
if_id      = "BeliefPropagation"
then_level = 0
then_ids   = "LDPC_N8,PolarN6"
