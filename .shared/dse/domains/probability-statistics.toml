# =============================================================
# Probability-Statistics DSE Domain Definition
# 궁극의 확률/통계 아키텍처 — chi^2(6) + 6 모멘트 + 중심극한정리
# n=6 constants: sigma=12, tau=4, phi=2, sopfr=5, J2=24, mu=1
# Total raw combos: 6x6x6x6x5 = 6,480 (pre-filter)
# =============================================================

[meta]
name = "probability-statistics"
desc = "Ultimate Probability & Statistics DSE — chi^2(6) + CLT + Bayes"
levels = ["Distribution", "Estimation", "Testing", "Regression", "Bayesian"]
vision = "n=6 based probability-statistics -- chi^2(6) distribution + 6 moments + CLT"

[scoring]
n6   = 0.35
perf = 0.25
power = 0.20
cost  = 0.20

