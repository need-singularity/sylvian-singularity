# =============================================================
# Compatibility Rules
# =============================================================

# ChiSquaredTest requires ChiSquaredN6 distribution

[[candidate]]
level  = 4
id     = "BayesN6"
label  = "n=6 사전분포 베이지안 (n=6 EXACT)"
n6     = 1.00
perf   = 0.85
power  = 0.55
cost   = 0.45
notes  = "prior_families=n=6 EXACT, n6-prior Bayesian inference"
[[rule]]
type       = "require"
if_level   = 2
if_id      = "ChiSquaredTest"
then_level = 0
then_ids   = "ChiSquaredN6"

# LogisticN2 requires MLE estimation
[[rule]]
type       = "require"
if_level   = 3
if_id      = "LogisticN2"
then_level = 1
then_ids   = "MLE"

# MCMC_N6 requires BayesEstimate
[[rule]]
type       = "require"
if_level   = 4
if_id      = "MCMC_N6"
then_level = 1
then_ids   = "BayesEstimate"

# ANOVA requires FTest (ANOVA is based on F-test)
[[rule]]
type       = "require"
if_level   = 3
if_id      = "ANOVA"
then_level = 2
then_ids   = "FTest"

# HierarchicalN4 requires BayesEstimate (hierarchical needs Bayesian framework)
[[rule]]
type       = "require"
if_level   = 4
if_id      = "HierarchicalN4"
then_level = 1
then_ids   = "BayesEstimate"
