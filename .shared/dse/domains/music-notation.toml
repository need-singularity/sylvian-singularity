# =============================================================
# MUSIC-NOTATION DSE Domain Definition
# n=6 기반 음악 기보법 — 오선 sopfr=5 + 음자리표 tau=4 + 음표 n=6 종
# Based on 80 CLEFNOTE+NOTESHAPE hypotheses in TECS-L
# Chain: Staff -> Clef -> NoteValue -> Dynamics -> Layout
# Total raw combos: 6x6x6x6x5 = 6,480 (pre-filter)
# =============================================================

[meta]
name = "music-notation"
desc = "Ultimate Music Notation DSE -- staff sopfr=5 + clef tau=4 + notes n=6"
levels = ["Staff", "Clef", "NoteValue", "Dynamics", "Layout"]
vision = "n=6 music notation -- FiveLineStaff sopfr=5 + tau=4 clefs + n=6 note values"

[scoring]
n6   = 0.35
perf = 0.25
power = 0.20
cost  = 0.20

