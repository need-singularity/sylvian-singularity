# =============================================================
# Compatibility Rules
# =============================================================

# GrandStaff requires MainClefsTau (grand staff uses treble+bass clefs)
[[rule]]
type       = "require"
if_level   = 0
if_id      = "GrandStaff"
then_level = 1
then_ids   = "MainClefsTau"

# TablatureN6 requires TabClef (tab needs tab clef)
[[rule]]
type       = "require"
if_level   = 0
if_id      = "TablatureN6"
then_level = 1
then_ids   = "TabClef"

# FilledNotesTau incompatible with OpenNotesPhi (exclusive types at same level)
[[rule]]
type       = "exclude"
if_level   = 2
if_id      = "FilledNotesTau"
then_level = 2
then_ids   = "OpenNotesPhi"

# PercussionStaff requires PercussionClef
[[rule]]
type       = "require"
if_level   = 0
if_id      = "PercussionStaff"
then_level = 1
then_ids   = "PercussionClef"

# ModernGraphic incompatible with ScoreOrder (non-standard layout)
[[rule]]
type       = "exclude"
if_level   = 0
if_id      = "ModernGraphic"
then_level = 4
then_ids   = "ScoreOrder"
