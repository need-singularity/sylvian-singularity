# ============================================================
# Compatibility Rules
# ============================================================

# PCD Diamond not for ferrous metals
[[rule]]
type = "exclude"
if_level = 1
if_id = "Diamond-PCD"
then_level = 2
then_ids = ["Steel4340", "Inconel-718"]

# Swiss-Type lathe excluded from large aerospace structures
[[rule]]
type = "exclude"
if_level = 0
if_id = "SwissType-12Tool"
then_level = 4
then_ids = ["AeroStructural", "EnergyTurbine"]

# 3-Axis VMC excluded from turbine blades (needs 5+ axis)
[[rule]]
type = "exclude"
if_level = 0
if_id = "3Axis-VMC"
then_level = 4
then_ids = ["EnergyTurbine", "MedicalImplant"]

# Cryogenic cooling mainly for hard materials
[[rule]]
type = "exclude"
if_level = 3
if_id = "CryoCool-6Bar"
then_level = 2
then_ids = ["Al6061", "Brass-C360"]

# HSS tools excluded from Inconel/Ti at high speed
[[rule]]
type = "exclude"
if_level = 1
if_id = "HSS-4Flute"
then_level = 2
then_ids = ["Inconel-718", "Ti6Al4V"]
