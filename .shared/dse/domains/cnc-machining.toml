#       sigma=12 tool positions (turret), tau=4 operations
#       (mill/turn/drill/grind), phi=2 dual-spindle,
#       J2=24 krpm spindle speed
# Total raw combos: 6x6x6x6x6 = 7,776 (pre-filter)
# =============================================================

