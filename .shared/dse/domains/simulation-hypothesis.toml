# =============================================================
# Compatibility Rules
# =============================================================

# CompileTime requires GoldenZoneConst or DimensionlessN6 (needs constant set)
[[rule]]
type       = "require"
if_level   = 0
if_id      = "CompileTime"
then_level = 0
then_ids   = "GoldenZoneConst,DimensionlessN6"

# WavefunctionLazy incompatible with ManyWorldsBranch (collapse vs many-worlds)
[[rule]]
type       = "exclude"
if_level   = 2
if_id      = "WavefunctionLazy"
then_level = 2
then_ids   = "ManyWorldsBranch"

# HolographicBound requires PixelLimit or SimSignature (needs observational test)
[[rule]]
type       = "require"
if_level   = 1
if_id      = "HolographicBound"
then_level = 4
then_ids   = "PixelLimit,SimSignature"

# TensionCost requires FineTuningParam (tension optimizes parameters)
[[rule]]
type       = "require"
if_level   = 3
if_id      = "TensionCost"
then_level = 3
then_ids   = "FineTuningParam"
