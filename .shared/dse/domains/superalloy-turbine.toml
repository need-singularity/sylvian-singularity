# =============================================================
# Rules
# =============================================================

# Single-crystal casting only for SX crystal structure
[[rule]]
type      = "prefer"
if_level  = 2
if_id     = "SX"
then_level = 1
then_ids  = "SX_6pass,DS"

# Jet blade demands SX + TBC
[[rule]]
type      = "prefer"
if_level  = 4
if_id     = "Jet_Blade"
then_level = 2
then_ids  = "SX,Columnar_DS"

[[rule]]
type      = "prefer"
if_level  = 4
if_id     = "Jet_Blade"
then_level = 3
then_ids  = "TBC_YSZ,MCrAlY"

# Powder HIP for disk alloys (not blades)
[[rule]]
type      = "prefer"
if_level  = 1
if_id     = "Powder_HIP"
then_level = 4
then_ids  = "Power_Turbine,Nuclear_Rx"

# TiAl is lightweight — LP turbine / racing only
[[rule]]
type      = "prefer"
if_level  = 0
if_id     = "Intermet_TiAl"
then_level = 4
then_ids  = "Jet_Blade,Racing_Exhaust"

# Self-healing coating pairs with ceramic EBC for CMC
[[rule]]
type      = "prefer"
if_level  = 3
if_id     = "Self_Heal"
then_level = 3
then_ids  = "CVD_SiC,Ceramic_EBC"
