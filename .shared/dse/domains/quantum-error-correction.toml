# =============================================================
# Compatibility Rules
# =============================================================

# N6_Code_642 best with Custom_N6 decoder
[[rule]]
type       = "require"
if_level   = 0
if_id      = "N6_Code_642"
then_level = 1
then_ids   = "Custom_N6,Tensor_Network,MWPM"

# Steane_7 incompatible with Neural decoder (overkill for small code)
[[rule]]
type       = "exclude"
if_level   = 0
if_id      = "Steane_7"
then_level = 1
then_ids   = "Neural"

# Distributed architecture requires Surface_Code or Toric_Code (long-range friendly)
[[rule]]
type       = "require"
if_level   = 4
if_id      = "Distributed"
then_level = 0
then_ids   = "Surface_Code,Toric_Code"

# Transversal overhead requires Color_Code or N6_Code_642 (transversal gates)
[[rule]]
type       = "require"
if_level   = 3
if_id      = "Transversal"
then_level = 0
then_ids   = "Color_Code,N6_Code_642"
