# =============================================================
# Compatibility Rules
# =============================================================

# 6/8 prefers compound-friendly scales
[[rule]]
type     = "prefer"
if_level = 0
if_id    = "TS_6_8"
then_level = 1
then_ids = "SC_BLUES,SC_PENTA,SC_HEXATONIC"

# 12/8 prefers blues
[[rule]]
type     = "prefer"
if_level = 0
if_id    = "TS_12_8"
then_level = 1
then_ids = "SC_BLUES,SC_CHROMATIC"

# Polyrhythm 2:3 prefers percussion
[[rule]]
type     = "prefer"
if_level = 0
if_id    = "TS_POLY_2_3"
then_level = 2
then_ids = "IN_DRUMS,IN_GAMELAN"

# Guitar prefers pentatonic/blues
[[rule]]
type     = "prefer"
if_level = 2
if_id    = "IN_GUITAR"
then_level = 1
then_ids = "SC_PENTA,SC_BLUES,SC_DIATONIC"

# Gamelan uses slendro/pelog, not chromatic
[[rule]]
type     = "exclude"
if_level = 2
if_id    = "IN_GAMELAN"
then_level = 1
then_ids = "SC_CHROMATIC,SC_QUARTER"

# Dance prefers strong meters
[[rule]]
type     = "prefer"
if_level = 4
if_id    = "PE_DANCE"
then_level = 0
then_ids = "TS_4_4,TS_6_8,TS_POLY_2_3"

# Neural entrainment prefers repetitive meters
[[rule]]
type     = "prefer"
if_level = 4
if_id    = "PE_ENTRAIN"
then_level = 0
then_ids = "TS_4_4,TS_6_8,TS_12_8"

# Vinyl excludes streaming tech
[[rule]]
type     = "exclude"
if_level = 3
if_id    = "PR_VINYL"
then_level = 3
then_ids = "PR_STREAMING"
