# =============================================================
# MUSIC-RHYTHM DSE Domain Definition
# 박자/리듬/음악 구조의 n=6 정합 탐색
# 12 semitones = sigma, 6/8 compound = n, 4/4 = tau
# Guitar 6 strings, pentatonic 5 = sopfr, 24fps = J2
# Total raw combos: 8×8×7×6×6 = 16,128
# =============================================================

[meta]
name = "music-rhythm"
desc = "Music & Rhythm DSE — n=6 in temporal/harmonic/structural patterns"
levels = ["TimeSignature", "Scale", "Instrument", "Production", "Perception"]
vision = "음악의 시간 구조(박자)와 화성 구조(음계)가 n=6 산술에 수렴하는지 탐색"

[scoring]
n6    = 0.35
perf  = 0.25
power = 0.25
cost  = 0.15

