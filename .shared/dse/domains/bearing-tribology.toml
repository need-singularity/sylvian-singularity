# ============================================================
# Rules
# ============================================================

# Magnetic bearings only for high-speed/turbine/spindle
[[rule]]
type = "require"
if_level = 0
if_id = "Magnetic-6axis"
then_level = 4
then_ids = ["Spindle-6krpm", "Turbine-24krpm"]

# Plain journal bearings not for high-speed spindles
[[rule]]
type = "exclude"
if_level = 0
if_id = "PlainJournal-6lobe"
then_level = 4
then_ids = ["Spindle-6krpm", "Turbine-24krpm"]

# PTFE composite only for low-speed applications
[[rule]]
type = "require"
if_level = 1
if_id = "PTFE-Composite"
then_level = 4
then_ids = ["Automotive-4wheel", "Robot-6DOF", "Pump-6stage"]

# Full ceramic required for extreme environments
[[rule]]
type = "require"
if_level = 1
if_id = "ZrO2-FullCeramic"
then_level = 4
then_ids = ["Turbine-24krpm", "Spindle-6krpm", "Pump-6stage"]

# Sealed-for-life not for turbines (maintenance needed)
[[rule]]
type = "exclude"
if_level = 3
if_id = "Sealed-ForLife"
then_level = 4
then_ids = ["Turbine-24krpm", "WindTurbine-12MW"]
