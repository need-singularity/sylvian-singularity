# ============================================================
# Compatibility Rules
# ============================================================

# Magnetron only for simple applications
[[rule]]
type = "require"
if_level = 0
if_id = "Magnetron"
then_level = 4
then_ids = ["Weather", "Marine-Nav"]

# STAP requires AESA or PESA antenna
[[rule]]
type = "require"
if_level = 3
if_id = "STAP"
then_level = 1
then_ids = ["AESA-Planar", "PESA-Planar", "Conformal"]

# Crystal video only for simple RWR
[[rule]]
type = "require"
if_level = 2
if_id = "Crystal-Video"
then_level = 3
then_ids = ["FMCW", "Phase-Coded"]

# Fire control requires advanced transmitter
[[rule]]
type = "require"
if_level = 4
if_id = "Fire-Control"
then_level = 0
then_ids = ["Solid-State-GaN", "Klystron", "TWT"]
