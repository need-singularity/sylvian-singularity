# =============================================================
# Rules
# =============================================================

# Multi-gas sensing pairs with BMS integrated control
[[rule]]
type      = "prefer"
if_level  = 0
if_id     = "MultiGas"
then_level = 4
then_ids  = "BMS_Integrated,AI_MPC"

# HEPA H12 pairs with ERV for balanced filtration + ventilation
[[rule]]
type      = "prefer"
if_level  = 1
if_id     = "HEPA_H12"
then_level = 3
then_ids  = "ERV_System,DCV_CO2"

# Natural ventilation incompatible with ozone treatment
[[rule]]
type      = "exclude"
if_level  = 3
if_id     = "NatVent_Stack"
then_level = 2
then_ids  = "Ozone_Low"

# PCO purification pairs with digital twin modeling
[[rule]]
type      = "prefer"
if_level  = 2
if_id     = "PCO_TiO2"
then_level = 4
then_ids  = "DigitalTwin,AI_MPC"
