# =============================================================
# HEXA-AQI DSE Domain Definition
# Indoor Air Quality: Sensing, Filtration, Purification,
# Ventilation, Control
# n=6: 6 pollutant classes (PM/VOC/CO2/CO/O3/radon),
#       HEPA sigma=12 grade, CADR ratio n/phi=3, J2=24hr cycle
# BT-60 (DC power chain), BT-48 (Display-Audio sigma=12)
# Total raw combos: 6x6x6x6x6 = 7,776
# =============================================================

[meta]
name = "air-quality-indoor"
desc = "Indoor Air Quality DSE (6 pollutants, HEPA sigma=12, CADR n/phi=3)"
levels = ["Sensing", "Filtration", "Purification", "Ventilation", "Control"]
vision = "Perfect indoor air — 6-pollutant sentinel with n=6 clean air architecture"

[scoring]
n6   = 0.30
perf = 0.30
power = 0.20
cost  = 0.20

