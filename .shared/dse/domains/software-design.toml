# =============================================================
# Compatibility Rules
# =============================================================

# Serverless excludes OnPremise (architectural mismatch)
[[rule]]
type     = "exclude"
if_level = 1
if_id    = "Serverless"
then_level = 4
then_ids = "OnPremise"

# CQRS/EventSourcing prefers EventBus or MsgQueue
[[rule]]
type     = "prefer"
if_level = 1
if_id    = "EventSourcing"
then_level = 2
then_ids = "EventBus,MsgQueue"

[[rule]]
type     = "prefer"
if_level = 1
if_id    = "CQRS_Only"
then_level = 2
then_ids = "EventBus,MsgQueue,gRPC"

# Monolith prefers REST or gRPC (simpler communication)
[[rule]]
type     = "prefer"
if_level = 1
if_id    = "Monolith"
then_level = 2
then_ids = "REST,gRPC"

# ChaosEng requires CloudNative or Hybrid (needs resilience infra)
[[rule]]
type     = "require"
if_level = 3
if_id    = "ChaosEng"
then_level = 4
then_ids = "CloudNative,Hybrid"

# Embedded excludes Serverless
[[rule]]
type     = "exclude"
if_level = 4
if_id    = "Embedded"
then_level = 1
then_ids = "Serverless"

# EventDriven prefers EventBus or MsgQueue
[[rule]]
type     = "prefer"
if_level = 0
if_id    = "EventDriven"
then_level = 2
then_ids = "EventBus,MsgQueue"

# Reactive prefers EventBus, WebSocket (streaming)
[[rule]]
type     = "prefer"
if_level = 0
if_id    = "Reactive"
then_level = 2
then_ids = "EventBus,WebSocket,gRPC"

# Hexagonal architecture works best with DDD paradigm
[[rule]]
type     = "prefer"
if_level = 1
if_id    = "Hexagonal"
then_level = 0
then_ids = "DDD,OOP"

# CloudNative prefers CICD and IaC
[[rule]]
type     = "prefer"
if_level = 4
if_id    = "CloudNative"
then_level = 3
then_ids = "CICD_6Stage,InfraAsCode,Observability"

# Microservices prefers gRPC or EventBus
[[rule]]
type     = "prefer"
if_level = 1
if_id    = "Microservices"
then_level = 2
then_ids = "gRPC,EventBus,REST"
