# =============================================================
# HEXA-SD DSE Domain Definition
# Source: docs/software-design/goal.md + extreme-hypotheses H-SD-61~80
# H-SD-64 (SOLID=sopfr=5), H-SD-65 (REST=n=6), H-SD-66 (12-Factor=sigma)
# H-SD-67 (Agile 4+12=tau+sigma), H-SD-69 (CAP=n/phi=3)
