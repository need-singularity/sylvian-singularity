[meta]
name = "software-design"
desc = "Software Design Architecture DSE (H-SD-61~80, SOLID/REST/12Factor)"
levels = ["Paradigm", "Architecture", "Communication", "Quality", "Deployment"]
vision = "Software that self-organizes -- SOLID(5)+REST(6)+12Factor(12)+ACID(4)+CAP(3)"

[scoring]
n6   = 0.35
perf = 0.25
power = 0.20
cost  = 0.20

