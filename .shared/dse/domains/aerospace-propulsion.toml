# ============================================================
# Compatibility Rules
# ============================================================

# Xenon ion fuel only meaningful with ion chamber combustion
[[rule]]
type = "prefer"
if_level = 0
if_id = "Xenon_Ion"
then_level = 1
then_ids = "IonChamber"

# Ion chamber pairs with Hall thruster or ion grid nozzle
[[rule]]
type = "prefer"
if_level = 1
if_id = "IonChamber"
then_level = 2
then_ids = "HallThruster"

[[rule]]
type = "prefer"
if_level = 1
if_id = "IonChamber"
then_level = 3
then_ids = "IonGrid"

# Deep space system pairs with ion propulsion
[[rule]]
type = "prefer"
if_level = 4
if_id = "DeepSpace"
then_level = 0
then_ids = "Xenon_Ion,Hydrazine"

# LH2 fuel pairs with SABRE hybrid or scramjet
[[rule]]
type = "prefer"
if_level = 0
if_id = "LH2"
then_level = 1
then_ids = "Scramjet,RDE"

# Hypersonic flight needs scramjet or RDE combustion
[[rule]]
type = "prefer"
if_level = 4
if_id = "Hypersonic"
then_level = 1
then_ids = "Scramjet,RDE"

# Electric fan pairs with eVTOL
[[rule]]
type = "prefer"
if_level = 2
if_id = "ElectricFan"
then_level = 4
then_ids = "eVTOL,CommAir"

# Scramjet pairs with aerospike or dual-bell nozzle
[[rule]]
type = "prefer"
if_level = 1
if_id = "Scramjet"
then_level = 3
then_ids = "AeroSpike,DualBell"
