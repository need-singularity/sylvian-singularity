# ============================================================
# Compatibility Rules
# ============================================================

# Blister pack requires heat seal or ultrasonic seal
[[rule]]
type = "prefer"
if_level = 0
if_id = "Blister"
then_level = 1
then_ids = "HeatSeal,Ultrasonic"

# Pharmaceutical requires X-ray inspection or vision check
[[rule]]
type = "prefer"
if_level = 4
if_id = "PharmBlister"
then_level = 3
then_ids = "XrayInspect,VisionCheck"

# Vacuum packer pairs with multi-layer or aluminum material
[[rule]]
type = "prefer"
if_level = 0
if_id = "Vacuum"
then_level = 2
then_ids = "MultiLayer,Aluminum"

# Laser seal best for pharma or electronics application
[[rule]]
type = "prefer"
if_level = 1
if_id = "LaserSeal"
then_level = 4
then_ids = "PharmBlister,Electronics"

# Bio-PLA material pairs with food or cosmetic application
[[rule]]
type = "prefer"
if_level = 2
if_id = "BioPLA"
then_level = 4
then_ids = "FoodSnack,CosmeticCare"
