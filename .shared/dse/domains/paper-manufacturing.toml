# ============================================================
# Compatibility Rules
# ============================================================

# Nanocellulose requires enzyme or TCF bleaching
[[rule]]
type = "require"
if_level = 0
if_id = "Nano-Cellulose"
then_level = 1
then_ids = ["TCF", "Enzyme-Bio", "Ozone-Stage"]

# Crescent former requires yankee dryer pressing
[[rule]]
type = "require"
if_level = 2
if_id = "Crescent-Former"
then_level = 3
then_ids = ["Yankee-Dry", "Air-Through"]

# Recycled DIP uses unbleached or enzyme bleaching
[[rule]]
type = "require"
if_level = 0
if_id = "Recycled-DIP"
then_level = 1
then_ids = ["Unbleached", "Enzyme-Bio", "Oxygen-Delignify"]

# Air-laid forming needs through-air drying
[[rule]]
type = "require"
if_level = 2
if_id = "Air-Laid"
then_level = 3
then_ids = ["Air-Through", "Impulse-Dry"]
