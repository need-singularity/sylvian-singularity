# =============================================================
# N6 CRISPR Gene Editing DSE — Precision genome engineering
# Cas6 protein family (n=6), σ=12 PAM positions,
# τ=4 repair pathways (NHEJ/HDR/MMEJ/HITI),
# φ=2 double-strand break, J₂=24 nt spacer + PAM,
# 6-base seed region
# Total raw combos: 6x6x6x6x6 = 7,776
# =============================================================

[meta]
name = "crispr-gene-editing"
desc = "CRISPR Gene Editing Architecture DSE — Cas6 (n=6), σ=12 PAM, τ=4 repair, J₂=24 nt"
levels = ["CasProtein", "GuideRNA", "Delivery", "EditType", "Target"]
vision = "n=6 precision genome engineering — Cas6 family, 6-base seed, J₂=24 nt spacer+PAM"

[scoring]
n6   = 0.35
perf = 0.25
power = 0.20
cost  = 0.20

