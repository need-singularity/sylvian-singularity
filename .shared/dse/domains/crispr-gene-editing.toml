# =============================================================
# Compatibility Rules
# =============================================================

# Cas13 (RNA-targeting) only with Epigenome or BaseEdit (no DNA cutting)
[[rule]]
type       = "exclude"
if_level   = 0
if_id      = "Cas13_RNA"
then_level = 3
then_ids   = "Knockout_NHEJ,Knockin_HDR,MultiEdit_6site"

# PrimeEditor requires sgRNA or EngScaffold (needs pegRNA)
[[rule]]
type       = "require"
if_level   = 0
if_id      = "PrimeEditor"
then_level = 3
then_ids   = "PrimeEdit,BaseEdit_C2T"

# Gene drive excludes Exosome and CPP delivery (needs stable integration)
[[rule]]
type       = "require"
if_level   = 4
if_id      = "GeneDrive"
then_level = 2
then_ids   = "Viral_AAV,LNP,Electroporation"

# BaseEditor excludes Knockout_NHEJ and Knockin_HDR (no DSB)
[[rule]]
type       = "require"
if_level   = 0
if_id      = "BaseEditor"
then_level = 3
then_ids   = "BaseEdit_C2T,EpigenomeEdit"
