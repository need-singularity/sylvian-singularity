# =============================================================
# Compatibility Rules
# =============================================================

# L5 Full Autonomy requires LiDAR + V2X sensors
[[rule]]
type       = "require"
if_level   = 4
if_id      = "L5_Full"
then_level = 0
then_ids   = "LiDAR,V2X"

# L2 ADAS excludes WorldModel (overkill)
[[rule]]
type       = "exclude"
if_level   = 4
if_id      = "L2_ADAS"
then_level = 3
then_ids   = "WorldModel"

# EndToEnd requires Camera + LiDAR
[[rule]]
type       = "require"
if_level   = 3
if_id      = "EndToEnd"
then_level = 0
then_ids   = "Camera,LiDAR"
