[meta]
name = "autonomous"
desc = "Autonomous Driving DSE (SAE n=6 + BT-66 Vision AI)"
levels = ["SensorFusion", "Perception", "ControlCore", "AIEngine", "VehicleSystem"]
vision = "Level 5 full autonomy -- SAE n=6 levels, n=6 DOF sensing, sigma=12 surround view"

[scoring]
n6   = 0.35
perf = 0.25
power = 0.20
cost  = 0.20

