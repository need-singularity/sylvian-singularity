# =============================================================
# Compatibility Rules
# =============================================================

# Graphene requires Carbon_Z6

[[candidate]]
level  = 4
id     = "AppSolarN6"
label  = "sigma*phi=24 효율 태양전지 응용 (J2=24 EXACT)"
n6     = 1.00
perf   = 0.85
power  = 0.55
cost   = 0.45
notes  = "efficiency_factor=J2=24 EXACT, n6-solar cell application"
[[rule]]
type       = "require"
if_level   = 1
if_id      = "Graphene"
then_level = 0
then_ids   = "Carbon_Z6"

# DiamondCN4 requires Carbon_Z6
[[rule]]
type       = "require"
if_level   = 1
if_id      = "DiamondCN4"
then_level = 0
then_ids   = "Carbon_Z6"

# REBCO_Perovskite requires CriticalTempTc
[[rule]]
type       = "require"
if_level   = 1
if_id      = "REBCO_Perovskite"
then_level = 2
then_ids   = "CriticalTempTc"

# HBN_Hexagonal requires Nitrogen_Z7 or Carbon_Z6
[[rule]]
type       = "require"
if_level   = 1
if_id      = "HBN_Hexagonal"
then_level = 0
then_ids   = "Nitrogen_Z7,Carbon_Z6"

# QuantumMaterial requires MBE (precise growth needed)
[[rule]]
type       = "require"
if_level   = 4
if_id      = "QuantumMaterial"
then_level = 3
then_ids   = "MBE"

# Superconductor requires CriticalTempTc
[[rule]]
type       = "require"
if_level   = 4
if_id      = "Superconductor"
then_level = 2
then_ids   = "CriticalTempTc"
