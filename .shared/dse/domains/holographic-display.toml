# ============================================================
# Compatibility Rules
# ============================================================

# LED array insufficient coherence for wavefront recording
[[rule]]
type = "exclude"
if_level = 1
if_id = "LED-Array"
then_level = 2
then_ids = ["Wavefront-Record", "Fourier-CGH"]

# Acousto-optic SLM only for small displays
[[rule]]
type = "require"
if_level = 0
if_id = "Acousto-Optic"
then_level = 4
then_ids = ["Near-Eye-VR", "Holographic-Print"]

# Waveguide optical path only for near-eye and HUD
[[rule]]
type = "require"
if_level = 3
if_id = "Waveguide"
then_level = 4
then_ids = ["AR-HUD", "Near-Eye-VR"]

# Fiber bundle only for medical/telepresence
[[rule]]
type = "require"
if_level = 3
if_id = "Fiber-Bundle"
then_level = 4
then_ids = ["Medical-3D", "Telepresence"]
