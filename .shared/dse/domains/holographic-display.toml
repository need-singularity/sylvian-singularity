# =============================================================
# N6 Holographic Display DSE Domain Definition
# 3D holographic visualization technology
# n=6: 6 hologram types (n=6: Fresnel/Fourier/Lippmann/rainbow/CGH/digital),
#   sigma=12 diffraction orders, tau=4 color channels (R/G/B/IR),
#   phi=2 phase/amplitude modulation, J2=24 viewing angles,
#   6-layer volume hologram
# Total raw combos: 6x6x6x6x6 = 7,776 (pre-filter)
# =============================================================

[meta]
name = "holographic-display"
desc = "Holographic Display Architecture DSE (SLM/light-source/encoding/optical-path/application)"

[scoring]
n6 = 0.35
perf = 0.25
power = 0.20
cost = 0.20

