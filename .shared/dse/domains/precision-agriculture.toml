# ============================================================
# Compatibility Rules
# ============================================================

# Hyperspectral requires AI crop model (too complex for simple threshold)
[[rule]]
type = "exclude"
if_level = 0
if_id = "HyperSpec"
then_level = 1
then_ids = ["Simple-Threshold"]

# Flood/furrow excluded from robot picker (incompatible field layout)
[[rule]]
type = "exclude"
if_level = 2
if_id = "Flood-Furrow"
then_level = 4
then_ids = ["RobotPicker", "Swarm-Robot"]

# Fertigation requires drip or subsurface drip irrigation
[[rule]]
type = "require"
if_level = 3
if_id = "Fertigation"
then_level = 2
then_ids = ["Drip-6zone", "Subsurface-Drip"]

# Simple threshold excluded from swarm robot (needs advanced control)
[[rule]]
type = "exclude"
if_level = 1
if_id = "Simple-Threshold"
then_level = 4
then_ids = ["Swarm-Robot", "RobotPicker"]
