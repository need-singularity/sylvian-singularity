# N6 Autonomous Drone DSE — UAV systems
# 6 Airframe x 6 Propulsion x 6 Navigation x 6 Communication x 6 Payload = 7,776 combos
# n=6: hexacopter=6 rotors, sigma=12 waypoints, tau=4 flight modes, J2=24 sensor channels

[meta]
name = "autonomous-drone"
desc = "Autonomous Drone DSE (hexacopter=6, sigma=12 waypoints, tau=4 flight modes, J2=24 sensors)"

[scoring]
n6 = 0.35
perf = 0.25
power = 0.20
cost = 0.20

