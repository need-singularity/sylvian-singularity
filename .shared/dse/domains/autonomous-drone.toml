# ============================================================
# Compatibility Rules
# ============================================================

# Heavy-lift hex frame required for delivery pod payload
[[rule]]
type = "prefer"
if_level = 4
if_id = "DeliveryPod"
then_level = 0
then_ids = "HeavyHex,CoaxHex"

# Satellite comm required for beyond-visual-line-of-sight with hexa-wing
[[rule]]
type = "prefer"
if_level = 0
if_id = "HexaWing"
then_level = 3
then_ids = "SatComm,LTE_Cat"

# Swarm navigation requires mesh radio communication
[[rule]]
type = "prefer"
if_level = 2
if_id = "SwarmNav"
then_level = 3
then_ids = "MeshRadio,WiFi6"

# H2 fuel cell best for long-endurance hexa-wing missions
[[rule]]
type = "prefer"
if_level = 1
if_id = "H2FuelCell"
then_level = 0
then_ids = "HexaWing,HexaTilt"

# LiDAR navigation pairs with LiDAR payload for mapping missions
[[rule]]
type = "prefer"
if_level = 2
if_id = "LiDAR_Nav"
then_level = 4
then_ids = "LiDAR_Pay,HyperSpec"
