# ============================================================
# Compatibility Rules
# ============================================================

# Rumen bolus only for ruminants (cattle, sheep)
[[rule]]
type = "prefer"
if_level = 0
if_id = "BolusSensor"
then_level = 4
then_ids = "DairyCattle,BeefCattle,Sheep"

# Robotic milking only for dairy cattle
[[rule]]
type = "prefer"
if_level = 3
if_id = "RoboMilk"
then_level = 4
then_ids = "DairyCattle"

# Herding drones best for outdoor species
[[rule]]
type = "prefer"
if_level = 3
if_id = "DroneHerd"
then_level = 4
then_ids = "BeefCattle,Sheep"

# Acoustic monitoring especially effective for poultry and swine
[[rule]]
type = "prefer"
if_level = 0
if_id = "AcousticMic"
then_level = 4
then_ids = "Poultry,Swine"

# Satellite IoT for remote pasture species
[[rule]]
type = "prefer"
if_level = 1
if_id = "Satellite_IoT"
then_level = 4
then_ids = "BeefCattle,Sheep"
