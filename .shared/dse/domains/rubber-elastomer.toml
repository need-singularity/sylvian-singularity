# N6 Rubber & Elastomer DSE — Elastic polymer material engineering
# 6 Polymers × 6 Fillers × 6 Vulcanizations × 6 Processings × 6 Applications = 7,776 combos
# n=6 connections: Isoprene C5H8 -> cis-1,4-polyisoprene 6-carbon repeat (n~6),
#   sulfur crosslink at every ~6th monomer, sigma=12 vulcanization cure stages,
#   tau=4 rubber types (NR/SR/TPE/silicone), phi=2 crosslink density (soft/hard),
#   J2=24 Shore A durometer grades

[meta]
name = "rubber-elastomer"
desc = "Rubber & Elastomer DSE — elastic polymer material engineering (n=6 universality)"

[scoring]
n6 = 0.35
perf = 0.25
power = 0.20
cost = 0.20

