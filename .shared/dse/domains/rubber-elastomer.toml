# ============================================================
# Compatibility Rules
# ============================================================

# Natural rubber pairs best with sulfur vulcanization (traditional)
[[rule]]
type = "prefer"
if_level = 0
if_id = "NR_natural"
then_level = 2
then_ids = "Sulfur_6phr,Dynamic_vulcanization"

# Silicone requires platinum or peroxide cure (no sulfur)
[[rule]]
type = "prefer"
if_level = 0
if_id = "Silicone_VMQ"
then_level = 2
then_ids = "Platinum_cure,Peroxide"

# FKM fluoroelastomer requires peroxide or radiation cure
[[rule]]
type = "prefer"
if_level = 0
if_id = "FKM_fluoroelastomer"
then_level = 2
then_ids = "Peroxide,Radiation"

# Carbon black N6 pairs best with tire tread application
[[rule]]
type = "prefer"
if_level = 1
if_id = "CarbonBlack_N6"
then_level = 4
then_ids = "Tire_tread,Conveyor_belt"

# Graphene platelet pairs with high-performance applications
[[rule]]
type = "prefer"
if_level = 1
if_id = "Graphene_platelet"
then_level = 4
then_ids = "Vibration_damper,Hose_tube"

# Thermoplastic physical crosslink pairs with injection and 3D printing
[[rule]]
type = "prefer"
if_level = 2
if_id = "Thermoplastic_physical"
then_level = 3
then_ids = "Injection_mold_6cavity,Printing_3D"

# Medical glove pairs with NR or NBR polymer
[[rule]]
type = "prefer"
if_level = 4
if_id = "Medical_glove"
then_level = 0
then_ids = "NR_natural,NBR_nitrile"

# Seal O-ring pairs with compression or transfer molding
[[rule]]
type = "prefer"
if_level = 4
if_id = "Seal_Oring"
then_level = 3
then_ids = "Compression_mold,Transfer_mold"

# EPDM pairs with extrusion for weather seals
[[rule]]
type = "prefer"
if_level = 0
if_id = "EPDM_6carbon"
then_level = 3
then_ids = "Extrusion,Calendering"

# CNT filler pairs with vibration damper and hose (conductivity)
[[rule]]
type = "prefer"
if_level = 1
if_id = "CNT_reinforced"
then_level = 4
then_ids = "Vibration_damper,Hose_tube"
