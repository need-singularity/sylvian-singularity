# ============================================================
# Compatibility Rules
# ============================================================

# Epoxy structural pairs with heat cure or two-part mix
[[rule]]
type = "prefer"
if_level = 0
if_id = "Epoxy_structural"
then_level = 1
then_ids = "Heat_cure,TwoPart_mix"

# Cyanoacrylate is moisture-cure initiated
[[rule]]
type = "prefer"
if_level = 0
if_id = "Cyanoacrylate"
then_level = 1
then_ids = "Moisture_cure,Anaerobic"

# Silicone sealant pairs with moisture cure (RTV)
[[rule]]
type = "prefer"
if_level = 0
if_id = "Silicone_sealant"
then_level = 1
then_ids = "Moisture_cure,UV_cure"

# Hot-melt needs no chemical cure — pressure-sensitive family
[[rule]]
type = "prefer"
if_level = 0
if_id = "HotMelt_6min"
then_level = 1
then_ids = "Pressure_sensitive,Heat_cure"

# Aerospace application pairs with scarf joint and film adhesive
[[rule]]
type = "prefer"
if_level = 4
if_id = "Aerospace_panel"
then_level = 3
then_ids = "Scarf_6degree,Film_adhesive"

# Aerospace application pairs with plasma or laser surface prep
[[rule]]
type = "prefer"
if_level = 4
if_id = "Aerospace_panel"
then_level = 2
then_ids = "Plasma_treat_6sec,Laser_texture"

# Electronics die-attach pairs with UV cure and epoxy
[[rule]]
type = "prefer"
if_level = 4
if_id = "Electronics_die"
then_level = 0
then_ids = "Epoxy_structural,Silicone_sealant"

# Packaging seal pairs with hot-melt and pressure-sensitive
[[rule]]
type = "prefer"
if_level = 4
if_id = "Packaging_seal"
then_level = 0
then_ids = "HotMelt_6min,Acrylic_fast"

# Laser texture pairs with high-precision joint designs
[[rule]]
type = "prefer"
if_level = 2
if_id = "Laser_texture"
then_level = 3
then_ids = "Scarf_6degree,SpotBond_12point"

# Construction anchor pairs with two-part mix and abrasion prep
[[rule]]
type = "prefer"
if_level = 4
if_id = "Construction_anchor"
then_level = 1
then_ids = "TwoPart_mix,Anaerobic"
