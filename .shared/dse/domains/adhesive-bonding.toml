# N6 Adhesive & Bonding DSE — Joining material engineering
# 6 AdhesiveTypes × 6 CureMechanisms × 6 SurfacePreps × 6 JointDesigns × 6 Applications = 7,776 combos
# n=6 connections: 6 adhesion mechanisms (mechanical/adsorption/diffusion/electrostatic/chemical/weak-boundary = n=6 EXACT),
#   sigma=12 MPa typical structural bond, tau=4 cure mechanisms (heat/UV/moisture/anaerobic),
#   phi=2 two-component, J2=24 ASTM test standards

[meta]
name = "adhesive-bonding"
desc = "Adhesive & Bonding DSE — joining material engineering (n=6 universality)"

[scoring]
