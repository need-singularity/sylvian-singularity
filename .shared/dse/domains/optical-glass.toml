#   sigma=12 glass types in Schott catalog main groups, tau=4 dispersion parameters (nd/vd/Pg,F/dPg,F),
#   phi=2 crown/flint pair, J2=24 element optical systems

[meta]
name = "optical-glass"
desc = "Optical Glass DSE — precision optical material engineering (n=6 universality)"

