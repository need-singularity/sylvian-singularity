# ============================================================
# Compatibility Rules
# ============================================================

# Crown glass pairs best with flint for achromatic doublet
[[rule]]
type = "prefer"
if_level = 0
if_id = "BK7_Crown"
then_level = 4
then_ids = "Camera_Lens,Telescope_Mirror"

# Flint glass is the achromatic partner
[[rule]]
type = "prefer"
if_level = 0
if_id = "SF_Flint"
then_level = 4
then_ids = "Camera_Lens,Telescope_Mirror"

# ZBLAN fluoride glass pairs with fiber optic mid-IR
[[rule]]
type = "prefer"
if_level = 0
if_id = "ZBLAN_Fluoride"
then_level = 3
then_ids = "Fiber_Preform"

# Chalcogenide IR glass for thermal imaging
[[rule]]
type = "prefer"
if_level = 0
if_id = "Chalcogenide_IR"
then_level = 4
then_ids = "Medical_Endoscope,Laser_Gain"

# Phosphate laser glass pairs with laser gain medium
[[rule]]
type = "prefer"
if_level = 0
if_id = "Phosphate_Laser"
then_level = 4
then_ids = "Laser_Gain"

# Precision molding pairs with aspheric and camera lens
[[rule]]
type = "prefer"
if_level = 1
if_id = "Precision_Molding"
then_level = 3
then_ids = "Aspheric,Spherical_Lens"

# CVD preform pairs with fiber preform shape
[[rule]]
type = "prefer"
if_level = 1
if_id = "CVD_Preform"
then_level = 3
then_ids = "Fiber_Preform"

# HR mirror coating pairs with telescope and laser
[[rule]]
type = "prefer"
if_level = 2
if_id = "HR_Mirror_12layer"
then_level = 4
then_ids = "Telescope_Mirror,Laser_Gain"

# Freeform optic pairs with display and medical
[[rule]]
type = "prefer"
if_level = 3
if_id = "Freeform"
then_level = 4
then_ids = "Display_Substrate,Medical_Endoscope"

# AR coating essential for camera multi-element systems
[[rule]]
type = "prefer"
if_level = 2
if_id = "AR_6layer"
then_level = 4
then_ids = "Camera_Lens,Medical_Endoscope"
