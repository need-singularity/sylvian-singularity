# =============================================================
# Compatibility Rules
# =============================================================

# Superconducting transformers only with HTS or MgB2 conductors
[[rule]]
type       = "require"
if_level   = 2
if_id      = "SC_Xfmr"
then_level = 0
then_ids   = "HTS_YBCO,MgB2_SC"

# HVDC 1100kV requires MMC or 12Pulse conversion
[[rule]]
type       = "require"
if_level   = 3
if_id      = "HVDC_1100"
then_level = 1
then_ids   = "MMC,12Pulse"

# MVDC 48V only pairs with SST or SiC conversion
[[rule]]
type       = "require"
if_level   = 3
if_id      = "MVDC_48V"
then_level = 1
then_ids   = "SiC_MOSFET,GaN_HEMT"

# MVDC 48V only with microgrid or central radial (not supergrid)
[[rule]]
type       = "exclude"
if_level   = 3
if_id      = "MVDC_48V"
then_level = 4
then_ids   = "Supergrid"

# Submarine cable only with HVDC systems (not MVDC)
[[rule]]
type       = "require"
if_level   = 0
if_id      = "XLPE_Sub"
then_level = 3
then_ids   = "HVDC_500,HVDC_800,HVDC_1100"

# 6Pulse too low quality for supergrid
[[rule]]
type       = "exclude"
if_level   = 1
if_id      = "6Pulse"
then_level = 4
then_ids   = "Supergrid"

# GIL underground best paired with urban microgrid or central
[[rule]]
type       = "prefer"
if_level   = 0
if_id      = "GIL_SF6"
then_level = 4
then_ids   = "Microgrid_24,Central_Radial"
