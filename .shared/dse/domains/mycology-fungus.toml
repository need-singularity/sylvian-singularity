# =============================================================
# Compatibility Rules
# =============================================================

# Cordyceps requires controlled environment
[[rule]]
type       = "require"
if_level   = 0
if_id      = "Cordyceps"
then_level = 2
then_ids   = "Bioreactor,BottleLine,TrayShelf"

# Outdoor log culture limited to hardy species
[[rule]]
type       = "require"
if_level   = 2
if_id      = "OutdoorLog"
then_level = 0
then_ids   = "Shiitake,Oyster,Reishi"

# Biomaterial output requires mycelium casting
[[rule]]
type       = "require"
if_level   = 4
if_id      = "Biomaterial"
then_level = 3
then_ids   = "MyceliumCast"
