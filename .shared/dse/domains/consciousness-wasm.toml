# 궁극의 의식 웹 런타임 — WASM/WebGPU + n=6 셀 + 모델 + UI + 성능
# n=6 cells, sigma=12 cells, J2=24 cells
# Total raw combos: 6x6x6x6x6 = 7,776 (pre-filter)
