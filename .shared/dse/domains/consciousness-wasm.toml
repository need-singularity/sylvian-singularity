# =============================================================
# Compatibility Rules
# =============================================================

# M1B requires WebGPU or Native runtime
[[rule]]
type       = "require"
if_level   = 2
if_id      = "M1B"
then_level = 0
then_ids   = "WebGPU,Native"

# VR UI requires Realtime_60fps
[[rule]]
type       = "require"
if_level   = 3
if_id      = "VR"
then_level = 4
then_ids   = "Realtime_60fps"

# C24 cells require WebGPU or Native for compute
[[rule]]
type       = "require"
if_level   = 1
if_id      = "C24"
then_level = 0
then_ids   = "WebGPU,SharedArrayBuffer,Native"

# ServiceWorker excludes VR UI
[[rule]]
type       = "exclude"
if_level   = 0
if_id      = "ServiceWorker"
then_level = 3
then_ids   = "VR,ThreeJS"
