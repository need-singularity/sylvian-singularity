# ============================================================
# Compatibility Rules
# ============================================================

# Bi2Te3 room-temp pairs with zone melting and bulk processing
[[rule]]
type = "prefer"
if_level = 0
if_id = "Bi2Te3_room"
then_level = 2
then_ids = "Zone_melting,Hot_press_6min"

# PbTe mid-temp pairs with SPS for nanostructuring
[[rule]]
type = "prefer"
if_level = 0
if_id = "PbTe_mid"
then_level = 2
then_ids = "SPS,Ball_milling"

# SiGe high-temp pairs with space RTG application
[[rule]]
type = "prefer"
if_level = 0
if_id = "SiGe_high"
then_level = 4
then_ids = "Space_RTG,Waste_heat_recovery"

# SnSe record pairs with single crystal structure
[[rule]]
type = "prefer"
if_level = 0
if_id = "SnSe_record"
then_level = 1
then_ids = "Single_crystal,Nanostructured_12nm"

# Skutterudite pairs with segmented and cascaded modules
[[rule]]
type = "prefer"
if_level = 0
if_id = "Skutterudite_CoSb3"
then_level = 3
then_ids = "Segmented_4stage,Cascaded_6stage"

# Superlattice structure requires MBE epitaxy
[[rule]]
type = "prefer"
if_level = 1
if_id = "Superlattice"
then_level = 2
then_ids = "MBE_epitaxy,SPS"

# Nanostructured grains pair with SPS fabrication
[[rule]]
type = "prefer"
if_level = 1
if_id = "Nanostructured_12nm"
then_level = 2
then_ids = "SPS,Hot_press_6min"

# Micro module pairs with Peltier cooling and sensor
[[rule]]
type = "prefer"
if_level = 3
if_id = "Micro_module"
then_level = 4
then_ids = "Cooling_Peltier,Sensor_self_powered"

# Flexible wearable module pairs with wearable power
[[rule]]
type = "prefer"
if_level = 3
if_id = "Flexible_wearable"
then_level = 4
then_ids = "Wearable_power,Sensor_self_powered"

# Cascaded 6-stage pairs with waste heat and automotive
[[rule]]
type = "prefer"
if_level = 3
if_id = "Cascaded_6stage"
then_level = 4
then_ids = "Waste_heat_recovery,Automotive_TEG"
