# =============================================================
# Compatibility Rules
# =============================================================

# LorenzN6 has period-doubling route to chaos

[[candidate]]
level  = 4
id     = "WeatherN6"
label  = "기상 카오스 n=6 변수 앙상블 (n=6 EXACT)"
n6     = 1.00
perf   = 0.85
power  = 0.55
cost   = 0.45
notes  = "ensemble_vars=n=6 EXACT, weather prediction, Lorenz system"
[[rule]]
type       = "require"
if_level   = 0
if_id      = "LorenzN6"
then_level = 1
then_ids   = "PeriodDoubl,Feigenbaum,RChainTree"

# RChainTree requires FixedPtMu1 (R-chain has fixed point at R=1)
[[rule]]
type       = "require"
if_level   = 1
if_id      = "RChainTree"
then_level = 0
then_ids   = "FixedPtMu1,LorenzN6,StrangeN6"

# SpecGapHalf only meaningful with mixing/recurrence
[[rule]]
type       = "require"
if_level   = 2
if_id      = "SpecGapHalf"
then_level = 1
then_ids   = "PeriodDoubl,Feigenbaum,RChainTree,PitchforkN3"

# HenonN2 (discrete) incompatible with continuous-only Hopf bifurcation
[[rule]]
type       = "exclude"
if_level   = 0
if_id      = "HenonN2"
then_level = 1
then_ids   = "HopfBif"

# WeatherTau4 requires Lorenz-type attractor
[[rule]]
type       = "require"
if_level   = 4
if_id      = "WeatherTau4"
then_level = 0
then_ids   = "LorenzN6,StrangeN6"

# NeuralChaos requires edge-of-chaos Lyapunov analysis
[[rule]]
type       = "require"
if_level   = 4
if_id      = "NeuralChaos"
then_level = 3
then_ids   = "LyapPositive,LyapSpecSig,MaxLyapPhi"
