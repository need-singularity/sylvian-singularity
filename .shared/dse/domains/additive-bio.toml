# ============================================================
# Rules
# ============================================================

# Graphene scaffold requires electrical stimulation maturation
[[rule]]
type = "require"
if_level = 2
if_id = "Graphene-C6"
then_level = 3
then_ids = ["Electrical-6V", "Mechanical-12cycle"]

# dECM bioink pairs with decellularized scaffold
[[rule]]
type = "require"
if_level = 0
if_id = "dECM-6tissue"
then_level = 2
then_ids = ["Decellular-6organ", "Hydrogel-12kPa"]

# Volumetric printer needs photo-crosslinkable inks
[[rule]]
type = "require"
if_level = 1
if_id = "Volumetric-12sec"
then_level = 0
then_ids = ["GelMA-6pct", "Silk-6kDa"]

# Neural implant requires electrical stimulation
[[rule]]
type = "require"
if_level = 4
if_id = "Neural-12ch"
then_level = 3
then_ids = ["Electrical-6V"]

# HA ceramic scaffold only for bone implants
[[rule]]
type = "require"
if_level = 2
if_id = "HA-Ceramic-6pore"
then_level = 4
then_ids = ["Bone-6cm"]
