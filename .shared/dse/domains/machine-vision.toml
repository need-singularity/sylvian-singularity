# ============================================================
# Compatibility Rules
# ============================================================

# Line scan cameras need back light or dark field illumination
[[rule]]
type = "prefer"
if_level = 0
if_id = "LineScan"
then_level = 1
then_ids = "BackLight,DarkField"

# Telecentric lens best for subpixel edge detection
[[rule]]
type = "prefer"
if_level = 2
if_id = "Telecentric"
then_level = 3
then_ids = "EdgeSubpixel,PatternMatch"

# Structured light requires 3D point cloud algorithm
[[rule]]
type = "prefer"
if_level = 1
if_id = "StructuredLight"
then_level = 3
then_ids = "PointCloud3D,DeepDefect"

# Deep learning defect detection needs Edge GPU
[[rule]]
type = "prefer"
if_level = 3
if_id = "DeepDefect"
then_level = 4
then_ids = "EdgeGPU,CloudHybrid"

# Robot-guided vision needs stereo 3D camera
[[rule]]
type = "prefer"
if_level = 4
if_id = "RobotGuided"
then_level = 0
then_ids = "Stereo3D,AreaScan"
