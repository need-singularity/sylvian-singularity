# ============================================================
# Rules
# ============================================================

# Scroll only for HVAC (capacity limited)
[[rule]]
type = "require"
if_level = 0
if_id = "Scroll-2orbit"
then_level = 4
then_ids = ["HVAC-12ton"]

# Gas/steam turbine drives only for large industrial
[[rule]]
type = "exclude"
if_level = 1
if_id = "GasTurbine-24blade"
then_level = 4
then_ids = ["HVAC-12ton", "Water-4pump"]

[[rule]]
type = "exclude"
if_level = 1
if_id = "SteamTurbine-12stage"
then_level = 4
then_ids = ["HVAC-12ton", "Water-4pump"]

# Diaphragm sealing only for hazardous/clean service
[[rule]]
type = "require"
if_level = 2
if_id = "Diaphragm-4layer"
then_level = 4
then_ids = ["Refinery-6train", "AirSep-12column"]

# MPC control only justified for large-scale
[[rule]]
type = "exclude"
if_level = 3
if_id = "MPC-6horizon"
then_level = 4
then_ids = ["HVAC-12ton", "Water-4pump"]
