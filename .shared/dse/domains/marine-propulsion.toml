# ============================================================
# Rules
# ============================================================

# Hydrogen fuel requires fuel cell or gas turbine engine
[[rule]]
type = "require"
if_level = 0
if_id = "H2-Fuel"
then_level = 1
then_ids = ["FuelCell-6stack", "GasTurbine-6stage"]

# Fuel cell engine requires electric transmission
[[rule]]
type = "require"
if_level = 1
if_id = "FuelCell-6stack"
then_level = 2
then_ids = ["DieselElectric", "Hybrid-6mode"]

# 2-stroke slow speed needs direct drive or gearbox
[[rule]]
type = "require"
if_level = 1
if_id = "2Stroke-6cyl"
then_level = 2
then_ids = ["DirectDrive", "Gearbox-6ratio"]

# Waterjet only for ferry/tug (high-speed vessels)
[[rule]]
type = "exclude"
if_level = 3
if_id = "Waterjet-6nozzle"
then_level = 4
then_ids = ["Bulk-6hold", "Tanker-6tank", "Container-12bay"]

# Ammonia fuel excluded from cruise (safety)
[[rule]]
type = "exclude"
if_level = 0
if_id = "Ammonia"
then_level = 4
then_ids = ["Cruise-12deck"]
