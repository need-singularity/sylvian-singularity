# =============================================================
# Compatibility Rules
# =============================================================

# EnergyBased only with Shampoo or AdamW (needs 2nd-order info)
[[rule]]
type       = "require"
if_level   = 0
if_id      = "EnergyBased"
then_level = 1
then_ids   = "AdamW_BT54,Shampoo"

# ReinforcementL incompatible with LoRA (RL doesn't fine-tune)
[[rule]]
type       = "exclude"
if_level   = 0
if_id      = "ReinforcementL"
then_level = 3
then_ids   = "LoRA_N6"

# DiffusionNet requires AdamW, Lion, or Muon (as optimizer)
[[rule]]
type       = "require"
if_level   = 2
if_id      = "DiffusionNet"
then_level = 1
then_ids   = "AdamW_BT54,Lion,Muon"

# Edge can't run full EFA 17 techniques suite
[[rule]]
type       = "exclude"
if_level   = 4
if_id      = "Edge_N6"
then_level = 3
then_ids   = "EFA_17Tech"
