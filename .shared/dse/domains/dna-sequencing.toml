# ============================================================
# Compatibility Rules
# ============================================================

# Long-read library pairs best with PacBio or Nanopore
[[rule]]
type = "prefer"
if_level = 0
if_id = "LongReadLib"
then_level = 1
then_ids = "PacBioHiFi,NanoporeSeq"

# Nanopore sequencing uses Guppy/Dorado basecallers
[[rule]]
type = "prefer"
if_level = 1
if_id = "NanoporeSeq"
then_level = 2
then_ids = "GuppyNN,DoradoTF,BonitoLSTM"

# T2T assembly requires hybrid or long-read data
[[rule]]
type = "prefer"
if_level = 3
if_id = "TelomereT2T"
then_level = 0
then_ids = "LongReadLib,WGSLib"

# Clinical reporting requires robust variant calling
[[rule]]
type = "prefer"
if_level = 4
if_id = "ClinicalReport"
then_level = 3
then_ids = "HybridAssembly,RefGuided"
