# =============================================================
# Compatibility Rules
# =============================================================

# ImplantECoG incompatible with DryElectrode (invasive vs non-invasive)
# Note: they are at the same level, so we use exclude at level 0 vs level 0
# But the rule format uses cross-level. Since both are level 0, we skip this
# and handle it differently -- ImplantECoG is incompatible with comfort apps
[[rule]]
type       = "exclude"
if_level   = 0
if_id      = "ImplantECoG"
then_level = 4
then_ids   = "Meditation,AttentionMonitor"

# PHBarcode requires FFT_N6 or Wavelet (PH needs frequency decomposition)
[[rule]]
type       = "require"
if_level   = 2
if_id      = "PHBarcode"
then_level = 1
then_ids   = "FFT_N6,Wavelet"

# TensionBiomarker requires ICA_Decomp (tension needs component separation)
[[rule]]
type       = "require"
if_level   = 2
if_id      = "TensionBiomarker"
then_level = 1
then_ids   = "ICA_Decomp"

# RNN_LSTM requires ERPComponent or BandPower5 (sequential features)
[[rule]]
type       = "require"
if_level   = 3
if_id      = "RNN_LSTM"
then_level = 2
then_ids   = "ERPComponent,BandPower5"

# EarEEG incompatible with HighDensity features (too few channels)
[[rule]]
type       = "exclude"
if_level   = 0
if_id      = "EarEEG"
then_level = 2
then_ids   = "Connectivity,PHBarcode"
