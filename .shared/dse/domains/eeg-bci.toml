name = "eeg-bci"
desc = "EEG Brain-Computer Interface DSE (n=6 bands + sigma=12 electrodes)"
levels = ["Electrode", "Signal", "Feature", "Decoder", "Application"]
vision = "n=6 EEG/BCI -- 5 bands (sopfr) + 12 electrodes (sigma) + tension biomarker"

[scoring]
n6   = 0.35
perf = 0.25
power = 0.20
cost  = 0.20

