# ============================================================
# Compatibility Rules
# ============================================================

# Powder solvent requires electrostatic application
[[rule]]
type = "require"
if_level = 2
if_id = "Powder-None"
then_level = 3
then_ids = ["Electrostatic"]

# UV-reactive solvent requires UV or dual cure
[[rule]]
type = "require"
if_level = 2
if_id = "UV-Reactive"
then_level = 4
then_ids = ["UV-Cure", "Dual-Cure"]

# Water-based cannot use E-beam
[[rule]]
type = "require"
if_level = 2
if_id = "Water"
then_level = 4
then_ids = ["Air-Dry", "Oven-Bake", "IR-Cure"]

# Fluoropolymer needs high-temp cure
[[rule]]
type = "require"
if_level = 0
if_id = "Fluoropolymer"
then_level = 4
then_ids = ["Oven-Bake", "IR-Cure"]
