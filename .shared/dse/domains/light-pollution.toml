# ============================================================
# Compatibility Rules
# ============================================================

# Circadian tunable requires spectral measurement for calibration
[[rule]]
type = "bonus"
if_level = 3
if_id = "Circadian-Tune"
then_level = 1
then_ids = ["Spectrometer"]
bonus = 0.10

# Dark sky reserve requires satellite baseline measurement
[[rule]]
type = "bonus"
if_level = 3
if_id = "Dark-Sky-Zone"
then_level = 1
then_ids = ["Satellite-VIIRS", "SQM-Network"]
bonus = 0.10

# Smart dimming incompatible with sports venue high-demand source
[[rule]]
type = "exclude"
if_level = 2
if_id = "Smart-Dim"
then_level = 0
then_ids = ["Sports-Venue"]
