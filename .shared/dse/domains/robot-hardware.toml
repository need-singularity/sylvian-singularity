# =============================================================
# Compatibility Rules
# =============================================================

# SoftRobot requires PneumaticSoft or SMA_Artificial (needs compliant actuator)
[[rule]]
type       = "require"
if_level   = 0
if_id      = "SoftRobot"
then_level = 1
then_ids   = "PneumaticSoft,SMA_Artificial"

# Snake incompatible with Hydraulic (too heavy for snake robot)
[[rule]]
type       = "exclude"
if_level   = 0
if_id      = "Snake"
then_level = 1
then_ids   = "Hydraulic"

# WholeBody requires Humanoid or ModularN6 (needs high-DOF structure)
[[rule]]
type       = "require"
if_level   = 3
if_id      = "WholeBody"
then_level = 0
then_ids   = "Humanoid,ModularN6"

# PiezoLinear incompatible with Humanoid (too small range for humanoid joints)
[[rule]]
type       = "exclude"
if_level   = 1
if_id      = "PiezoLinear"
then_level = 0
then_ids   = "Humanoid,Quadruped,Hexapod,HexapodN6"

# SwarmN6 requires Hexapod or HexapodN6 or Quadruped or ModularN6 (swarm needs mobile platforms)
[[rule]]
type       = "require"
if_level   = 4
if_id      = "SwarmN6"
then_level = 0
then_ids   = "Hexapod,HexapodN6,Quadruped,ModularN6"

# Hydraulic incompatible with EdgeAI (hydraulic systems need dedicated power, not edge compute)
[[rule]]
type       = "exclude"
if_level   = 1
if_id      = "Hydraulic"
then_level = 4
then_ids   = "CloudRobot"
