# =============================================================
# Compatibility Rules
# =============================================================

# BSD_Conjecture requires RankN6 (BSD connects rank to L-function)
[[rule]]
type       = "require"
if_level   = 2
if_id      = "BSD_Conjecture"
then_level = 1
then_ids   = "RankN6"

# FermatLastThm requires E6_Curve or WeierstrassN3 (needs elliptic curve)
[[rule]]
type       = "require"
if_level   = 4
if_id      = "FermatLastThm"
then_level = 0
then_ids   = "E6_Curve,WeierstrassN3"

# StringTheoryEC requires SupersingularN12 or E6_Curve (needs special curves)
[[rule]]
type       = "require"
if_level   = 4
if_id      = "StringTheoryEC"
then_level = 0
then_ids   = "SupersingularN12,E6_Curve"

# LeechN24 would require Golay24 but that's cross-domain (coding-lattice)
# CryptoECC prefers EdwardsN2 or MontgomeryN2 (efficient curves)
[[rule]]
type       = "require"
if_level   = 4
if_id      = "CryptoECC"
then_level = 0
then_ids   = "EdwardsN2,MontgomeryN2,SupersingularN12"

# DiophantineN6 requires RankN6 (rational points via Mordell-Weil)
[[rule]]
type       = "require"
if_level   = 4
if_id      = "DiophantineN6"
then_level = 1
then_ids   = "RankN6"
