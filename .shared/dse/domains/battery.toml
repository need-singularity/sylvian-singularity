# ============================================================
# Compatibility Rules (from is_compatible function)
# ============================================================

# Na-ion requires Na-HardCarbon anode
[[rule]]
type = "require"
if_level = 0
if_id = "Na-ion"
then_level = 1
then_ids = ["Na-HardCarbon"]

# Na-HardCarbon requires Na-ion material (reverse constraint)
[[rule]]
type = "require"
if_level = 1
if_id = "Na-HardCarbon"
then_level = 0
then_ids = ["Na-ion"]

# Li-S requires Si-SSB process
[[rule]]
type = "require"
if_level = 0
if_id = "Li-S"
then_level = 1
then_ids = ["Si-SSB"]

# Si-SSB incompatible with Na-ion
[[rule]]
type = "exclude"
if_level = 1
if_id = "Si-SSB"
then_level = 0
then_ids = ["Na-ion"]

# Minimal-4ch BMS excluded from high-voltage systems
[[rule]]
type = "exclude"
if_level = 3
if_id = "Minimal-4ch"
then_level = 4
then_ids = ["400V-EV", "800V-EV", "Grid-MW"]

# 18650 excluded from 800V EV
[[rule]]
type = "exclude"
if_level = 2
if_id = "18650"
then_level = 4
then_ids = ["800V-EV"]
