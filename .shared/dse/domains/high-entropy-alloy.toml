# ============================================================
# Compatibility Rules
# ============================================================

# Cantor alloy is FCC single-phase
[[rule]]
type = "prefer"
if_level = 0
if_id = "CoCrFeMnNi_Cantor"
then_level = 1
then_ids = "FCC_single,Dual_phase"

# Refractory HEA is BCC
[[rule]]
type = "prefer"
if_level = 0
if_id = "TiZrHfNbTa_refractory"
then_level = 1
then_ids = "BCC_single,Dual_phase"

# Refractory HEA targets high-temperature applications
[[rule]]
type = "prefer"
if_level = 0
if_id = "TiZrHfNbTa_refractory"
then_level = 4
then_ids = "Aerospace_turbine,Nuclear_cladding"

# CoCrNi MEA excels at cryogenic
[[rule]]
type = "prefer"
if_level = 0
if_id = "CoCrNi_MEA"
then_level = 3
then_ids = "Cryogenic_tough,High_strength"

# 6-component alloys maximize entropy, best with arc or additive
[[rule]]
type = "prefer"
if_level = 0
if_id = "HfNbTaTiZrV_6comp"
then_level = 2
then_ids = "Arc_melt,Additive_LPBF"

# Amorphous BMG needs rapid solidification
[[rule]]
type = "prefer"
if_level = 1
if_id = "Amorphous_BMG"
then_level = 2
then_ids = "Magnetron_sputter,Additive_LPBF"

# Dual-phase structure provides strength-ductility for aerospace
[[rule]]
type = "prefer"
if_level = 1
if_id = "Dual_phase"
then_level = 4
then_ids = "Aerospace_turbine,Cryogenic_vessel"

# Hydrogen storage needs BCC open structure
[[rule]]
type = "prefer"
if_level = 4
if_id = "Hydrogen_storage"
then_level = 1
then_ids = "BCC_single,Dual_phase"

# Biomedical needs non-toxic refractory compositions
[[rule]]
type = "prefer"
if_level = 4
if_id = "Biomedical"
then_level = 0
then_ids = "TiZrHfNbTa_refractory,HfNbTaTiZrV_6comp"

# Mechanical alloying produces nanocrystalline for high strength
[[rule]]
type = "prefer"
if_level = 2
if_id = "Mechanical_alloying"
then_level = 3
then_ids = "High_strength,Radiation_tolerant"
