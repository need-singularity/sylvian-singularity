# ============================================================
# Compatibility Rules
# ============================================================

# Micro TBM only for utility tunnels
[[rule]]
type = "exclude"
if_level = 0
if_id = "MicroTBM-4m"
then_level = 4
then_ids = ["RailTunnel-12m", "RoadTunnel", "SubseaTunnel"]

# Hard rock gripper TBM excluded from soft ground metro
[[rule]]
type = "exclude"
if_level = 0
if_id = "HardRock-Gripper"
then_level = 1
then_ids = ["SoftGround-Spoke"]

# GPS-Surface guidance only useful near portals, excluded from subsea
[[rule]]
type = "exclude"
if_level = 3
if_id = "GPS-Surface"
then_level = 4
then_ids = ["SubseaTunnel"]

# Ground freezing excluded from deep subsea (impractical at depth)
[[rule]]
type = "exclude"
if_level = 2
if_id = "FreezeWall-12m"
then_level = 4
then_ids = ["SubseaTunnel"]

# Raise bore head only for vertical shafts, excluded from metro/road
[[rule]]
type = "exclude"
if_level = 1
if_id = "RaiseBore-12"
then_level = 4
then_ids = ["MetroTunnel", "RoadTunnel", "RailTunnel-12m"]
