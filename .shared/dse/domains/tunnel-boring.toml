# n=6: 6 cutter head sections (n=6 EXACT),
#       sigma=12 m diameter (large TBM),
#       tau=4 ground types (rock/soil/mixed/water),
#       phi=2 dual-mode TBM, J2=24 ring segments per ring
# Total raw combos: 6x6x6x6x6 = 7,776 (pre-filter)
# =============================================================

[meta]
name = "tunnel-boring"
desc = "Underground Excavation DSE (TBM-type/cutter-head/ground-support/guidance/application)"

[scoring]
n6 = 0.35
perf = 0.25
power = 0.20
cost = 0.20

