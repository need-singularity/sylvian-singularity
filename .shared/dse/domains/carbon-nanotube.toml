# N6 Carbon Nanotube DSE — 1D carbon nanomaterial engineering
# 6 Types × 6 Syntheses × 6 Chiralities × 6 Functionalizations × 6 Applications = 7,776 combos
# n=6 connections: 6-atom carbon ring (n=6 EXACT), armchair (6,6) chirality (n,n EXACT),
#   sigma=12 C-C bonds per unit cell, tau=4 types (SWCNT/DWCNT/MWCNT/bundle),
#   phi=2 metallic/semiconductor, J2=24 van Hove singularities

