# ============================================================
# Compatibility Rules
# ============================================================

# Armchair (6,6) metallic is ideal for interconnect and transistor
[[rule]]
type = "prefer"
if_level = 2
if_id = "Armchair_6_6"
then_level = 4
then_ids = "Interconnect_via,Transistor_FET"

# Zigzag (12,0) semiconductor pairs with transistor and sensor
[[rule]]
type = "prefer"
if_level = 2
if_id = "Zigzag_12_0"
then_level = 4
then_ids = "Transistor_FET,Sensor_6ch"

# CoMoCAT synthesis targets specific chiralities for electronics
[[rule]]
type = "prefer"
if_level = 1
if_id = "CoMoCAT"
then_level = 2
then_ids = "Chiral_6_4,Sorted_single"

# SWCNT pairs best with CVD and laser ablation
[[rule]]
type = "prefer"
if_level = 0
if_id = "SWCNT_single"
then_level = 1
then_ids = "CVD_6zone,LaserAblation,CoMoCAT"

# MWCNT 6-wall pairs with arc discharge and flame synthesis
[[rule]]
type = "prefer"
if_level = 0
if_id = "MWCNT_6wall"
then_level = 1
then_ids = "ArcDischarge,CVD_6zone"

# Pristine functionalization best for electronic applications
[[rule]]
type = "prefer"
if_level = 3
if_id = "Pristine"
then_level = 4
then_ids = "Transistor_FET,Interconnect_via"

# COOH functionalization enables biomedical and sensor
[[rule]]
type = "prefer"
if_level = 3
if_id = "Covalent_COOH"
then_level = 4
then_ids = "Biomedical_delivery,Sensor_6ch"

# N-doped pairs with energy storage (ORR catalyst)
[[rule]]
type = "prefer"
if_level = 3
if_id = "Doped_N"
then_level = 4
then_ids = "EnergyStorage,Sensor_6ch"

# Bundle rope is best for composite filler applications
[[rule]]
type = "prefer"
if_level = 0
if_id = "Bundle_rope"
then_level = 4
then_ids = "Composite_filler,EnergyStorage"

# Peapod C60 pairs with endohedral filling functionalization
[[rule]]
type = "prefer"
if_level = 0
if_id = "Peapod_C60"
then_level = 3
then_ids = "Endohedral_filling,Pristine"
