# =============================================================
# Compatibility Rules
# =============================================================

# InverseE_Zone routing pairs with Boltzmann gate
[[rule]]
type       = "prefer"
if_level   = 0
if_id      = "InverseE_Zone"
then_level = 2
then_ids   = "Boltzmann,PhiGate"

# PhiGated routing requires PhiGate
[[rule]]
type       = "require"
if_level   = 0
if_id      = "PhiGated"
then_level = 2
then_ids   = "PhiGate"

# Hash routing is incompatible with PhiGate (no gate needed)
[[rule]]
type       = "exclude"
if_level   = 0
if_id      = "Hash"
then_level = 2
then_ids   = "PhiGate,Boltzmann"

# Egyptian capacity pairs with Deterministic balance
[[rule]]
type       = "prefer"
if_level   = 3
if_id      = "Egyptian_Fraction"
then_level = 4
then_ids   = "Deterministic,ExpertBuffer"

# Unlimited capacity doesn't need load balance
[[rule]]
type       = "exclude"
if_level   = 3
if_id      = "Unlimited"
then_level = 4
then_ids   = "TokenDrop,AuxiliaryLoss"
