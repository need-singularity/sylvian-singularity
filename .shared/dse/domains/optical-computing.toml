# ============================================================
# Compatibility Rules
# ============================================================

# Free-space interconnect requires diffractive gates
[[rule]]
type = "require"
if_level = 1
if_id = "Free-Space"
then_level = 0
then_ids = ["Diffractive-D2NN", "SOA-Gate"]

# Quantum linear requires quantum programming
[[rule]]
type = "require"
if_level = 3
if_id = "Quantum-Linear"
then_level = 4
then_ids = ["Quantum-Strawberry"]

# Holographic memory only for specialized architectures
[[rule]]
type = "require"
if_level = 2
if_id = "Holographic"
then_level = 3
then_ids = ["Ising-Machine", "Reservoir-ORC"]

# Plasmonic gate needs silicon waveguide or SiN
[[rule]]
type = "require"
if_level = 0
if_id = "Plasmonic"
then_level = 1
then_ids = ["Si-Waveguide", "SiN-Waveguide"]
