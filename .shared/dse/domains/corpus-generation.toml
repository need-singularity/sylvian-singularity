# =============================================================
# Compatibility Rules
# =============================================================

# Consciousness_Trace generator requires Consciousness datatype
[[rule]]
type       = "require"
if_level   = 0
if_id      = "Consciousness_Trace"
then_level = 1
then_ids   = "Consciousness,MultiDomain"

# S_100TB requires Web_Crawl or Rust_CorpusGen
[[rule]]
type       = "require"
if_level   = 2
if_id      = "S_100TB"
then_level = 0
then_ids   = "Web_Crawl,Rust_CorpusGen"

# Phi_Score filter requires Consciousness data or MultiDomain
[[rule]]
type       = "require"
if_level   = 4
if_id      = "Phi_Score"
then_level = 1
then_ids   = "Consciousness,MultiDomain"

# Market generator excludes Scientific datatype
[[rule]]
type       = "exclude"
if_level   = 0
if_id      = "Market"
then_level = 1
then_ids   = "Scientific,Consciousness"
