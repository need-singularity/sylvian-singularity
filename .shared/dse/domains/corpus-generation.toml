# =============================================================
# Corpus Generation DSE Domain Definition
# 궁극의 코퍼스 생성 — 생성기 + 데이터타입 + 크기 + 토큰화 + 품질필터
# BT-73 (BPE 32K=2^(sopfr*n/phi)), BT-26 (Chinchilla scaling)
# Total raw combos: 6x6x6x6x6 = 7,776 (pre-filter)
