# =============================================================
# Compatibility Rules
# =============================================================

# FusionDrive only practical for Mars/Deep missions
[[rule]]
type       = "require"
if_level   = 0
if_id      = "FusionDrive"
then_level = 4
then_ids   = "MarsColony,DeepExplore"

# SolarSail cannot reach deep space (insufficient photon pressure)
[[rule]]
type       = "exclude"
if_level   = 0
if_id      = "SolarSail"
then_level = 4
then_ids   = "DeepExplore"

# Deep exploration requires advanced comms (Laser or Quantum)
[[rule]]
type       = "require"
if_level   = 4
if_id      = "DeepExplore"
then_level = 3
then_ids   = "LaserComm,QuantumComm"
