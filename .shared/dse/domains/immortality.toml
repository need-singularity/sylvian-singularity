# =============================================================
# Compatibility Rules
# =============================================================

# ConsciousnessTransfer requires Connectome (need brain map first)

[[candidate]]
level  = 4
id     = "TranscendN6"
label  = "n=6 인터페이스 초월 (n=6 EXACT)"
n6     = 1.00
perf   = 0.85
power  = 0.55
cost   = 0.45
notes  = "interfaces=n=6 EXACT, n6-interface transcendence system"
[[rule]]
type       = "require"
if_level   = 2
if_id      = "ConsciousnessTransfer"
then_level = 2
then_ids   = "Connectome"

# WholeBrainUpload requires BrainScan
[[rule]]
type       = "require"
if_level   = 2
if_id      = "WholeBrainUpload"
then_level = 2
then_ids   = "BrainScan"

# NanoRepair requires GeneTherapyN6 (nano repair uses gene therapy tech)
[[rule]]
type       = "require"
if_level   = 3
if_id      = "NanoRepair"
then_level = 1
then_ids   = "GeneTherapyN6"

# DigitalImmortality requires WholeBrainUpload or ConsciousnessTransfer
[[rule]]
type       = "require"
if_level   = 4
if_id      = "DigitalImmortality"
then_level = 2
then_ids   = "WholeBrainUpload,ConsciousnessTransfer"

# PostBiological requires Emulation or WholeBrainUpload
[[rule]]
type       = "require"
if_level   = 4
if_id      = "PostBiological"
then_level = 2
then_ids   = "Emulation,WholeBrainUpload"
