# ============================================================
# Compatibility Rules
# ============================================================

# APM excluded from high frequency 24tph (capacity mismatch)
[[rule]]
type = "exclude"
if_level = 0
if_id = "APM-Shuttle"
then_level = 4
then_ids = ["HighFreq-24tph"]

# LRT articulated excluded from deep tunnel (vehicle gauge conflict)
[[rule]]
type = "exclude"
if_level = 0
if_id = "LRT-Articulated"
then_level = 3
then_ids = ["Deep-Tunnel"]

# Street running excluded from high frequency (signal conflict)
[[rule]]
type = "exclude"
if_level = 3
if_id = "Street-Running"
then_level = 4
then_ids = ["HighFreq-24tph", "Express-Local"]

# Monorail requires elevated infrastructure
[[rule]]
type = "require"
if_level = 0
if_id = "Monorail-6car"
then_level = 3
then_ids = ["Elevated-Concrete", "Elevated-Steel"]

# DC Motor excluded from GoA4 driverless (no modern diagnostics)
[[rule]]
type = "exclude"
if_level = 1
if_id = "DC-Motor-Regen"
then_level = 2
then_ids = ["CBTC-GoA4", "Virtual-Coupling"]

# Heavy metro 12-car requires deep tunnel or cut-cover (platform length)
[[rule]]
type = "require"
if_level = 0
if_id = "HeavyMetro-12car"
then_level = 3
then_ids = ["Deep-Tunnel", "Cut-Cover", "Elevated-Concrete"]
