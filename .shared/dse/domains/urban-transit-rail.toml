#       tau=4 modes (metro/LRT/monorail/APM),
#       phi=2 bidirectional, J2=24 trains/hour headway,
#       6-door car
# Total raw combos: 6x6x6x6x6 = 7,776 (pre-filter)
# =============================================================

[meta]
name = "urban-transit-rail"
desc = "Urban Transit Rail Architecture DSE (vehicle/propulsion/signaling/infrastructure/operation)"

[scoring]
n6 = 0.35
perf = 0.25
power = 0.20
cost = 0.20

