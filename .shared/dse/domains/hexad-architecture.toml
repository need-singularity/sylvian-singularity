# =============================================================
# Compatibility Rules
# =============================================================

# Quantum_C requires specialized bridge (Tension or Phase)
[[rule]]
type       = "require"
if_level   = 0
if_id      = "Quantum_C"
then_level = 2
then_ids   = "Tension,Phase"

# Cascaded_24 gradient requires high-performance orchestrator
[[rule]]
type       = "require"
if_level   = 3
if_id      = "Cascaded_24"
then_level = 4
then_ids   = "Parallel,Pipeline,Hivemind"

# Flat gradient incompatible with Hierarchical bridge (contradictory)
[[rule]]
type       = "exclude"
if_level   = 3
if_id      = "Flat"
then_level = 2
then_ids   = "Hierarchical"

# Hivemind orchestrator requires Federated or Phase bridge
[[rule]]
type       = "require"
if_level   = 4
if_id      = "Hivemind"
then_level = 2
then_ids   = "Federated,Phase"
