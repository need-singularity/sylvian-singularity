# ============================================================
# Compatibility Rules
# ============================================================

# PTFE insulation required for aerospace harness
[[rule]]
type = "prefer"
if_level = 1
if_id = "PTFE_Teflon"
then_level = 4
then_ids = "AerospaceHarness"

# Mineral insulated not suitable for flexible applications
[[rule]]
type = "exclude"
if_level = 1
if_id = "MineralMI"
then_level = 4
then_ids = "IndustrialAutomation"

# Triple shield best for data center and aerospace
[[rule]]
type = "prefer"
if_level = 2
if_id = "TripleShield"
then_level = 4
then_ids = "DataCenter,AerospaceHarness"

# Armored SWA construction best for subsea and power distribution
[[rule]]
type = "prefer"
if_level = 3
if_id = "ArmoredSWA"
then_level = 4
then_ids = "SubseaMarine,PowerDistribution"
