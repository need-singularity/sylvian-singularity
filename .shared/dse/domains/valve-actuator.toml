# ============================================================
# Rules
# ============================================================

# Check valves have no actuator (self-actuated) — pair with manual only
[[rule]]
type = "require"
if_level = 0
if_id = "Check-2flap"
then_level = 1
then_ids = ["Manual-6turn"]

# Hydraulic actuators only for large industrial
[[rule]]
type = "exclude"
if_level = 1
if_id = "Hydraulic-24bar"
then_level = 4
then_ids = ["HVAC-6zone"]

# SMA actuators not for high-pressure oil & gas
[[rule]]
type = "exclude"
if_level = 1
if_id = "SMA-6wire"
then_level = 4
then_ids = ["Oil-Gas-6line", "Marine-24bar"]

# PTFE-lined required for pharma clean service
[[rule]]
type = "require"
if_level = 2
if_id = "PTFE-Lined"
then_level = 4
then_ids = ["Pharma-Clean", "WaterTreat-12stage", "HVAC-6zone"]

# Inconel only for extreme service
[[rule]]
type = "require"
if_level = 2
if_id = "Inconel-625"
then_level = 4
then_ids = ["Oil-Gas-6line", "PowerPlant-6FWH", "Marine-24bar"]
