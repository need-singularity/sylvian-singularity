# ============================================================
# Compatibility Rules
# ============================================================

# RV64G general-purpose needs full privilege support
[[rule]]
type = "prefer"
if_level = 0
if_id = "RV64G_6ext"
then_level = 3
then_ids = "M_S_U_Linux,M_H_S_U_virtual"

# RV32I minimal pairs with simple pipeline and single-issue
[[rule]]
type = "prefer"
if_level = 0
if_id = "RV32I_base"
then_level = 1
then_ids = "2stage_minimal,4stage_embedded"

[[rule]]
type = "prefer"
if_level = 0
if_id = "RV32I_base"
then_level = 2
then_ids = "Single_issue,Dual_issue"

# Vector extension needs vector execution unit
[[rule]]
type = "prefer"
if_level = 0
if_id = "Vector_V"
then_level = 2
then_ids = "Vector_unit,6wide_superscalar"

# 12-stage OoO needs superscalar or wider execution
[[rule]]
type = "prefer"
if_level = 1
if_id = "12stage_OoO"
then_level = 2
then_ids = "6wide_superscalar,Quad_issue"

# 12-stage OoO warrants advanced node
[[rule]]
type = "prefer"
if_level = 1
if_id = "12stage_OoO"
then_level = 4
then_ids = "ASIC_6nm,Custom_datapath"

# 2-stage minimal belongs on FPGA or mature ASIC
[[rule]]
type = "prefer"
if_level = 1
if_id = "2stage_minimal"
then_level = 4
then_ids = "FPGA_softcore,ASIC_28nm"

# Machine-only privilege pairs with minimal pipelines
[[rule]]
type = "prefer"
if_level = 3
if_id = "Machine_only"
then_level = 1
then_ids = "2stage_minimal,4stage_embedded"

# Hypervisor mode needs high-performance execution
[[rule]]
type = "prefer"
if_level = 3
if_id = "M_H_S_U_virtual"
then_level = 2
then_ids = "Quad_issue,6wide_superscalar"

# Matrix extension best on advanced silicon
[[rule]]
type = "prefer"
if_level = 2
if_id = "Matrix_ext"
then_level = 4
then_ids = "ASIC_6nm,Custom_datapath,Chiplet_die"
