# N6 RISC-V Core DSE — Open ISA processor design
# 6×6×6×6×6 = 7,776 combos
# n=6: 6 base extensions IMAFD+C (n=6 EXACT)
#       sigma=12 CSR registers, tau=4 privilege modes (M/S/H/U)
#       phi=2 RV32/RV64, J2=24 standard extensions

[meta]
name = "risc-v-core"
desc = "RISC-V Core DSE (BT-28/33/56/59)"

[scoring]
n6 = 0.35
perf = 0.25
power = 0.20
cost = 0.20

