# =============================================================
# Compatibility Rules
# =============================================================

# CalabiYau requires SpectralSequence or KTheory (needs advanced algebraic tools)
[[rule]]
type       = "require"
if_level   = 0
if_id      = "CalabiYau"
then_level = 2
then_ids   = "SpectralSequence,KTheory"

# TopologicalQC requires BottPeriodicity or KTheory (needs K-theory for anyonic classification)
[[rule]]
type       = "require"
if_level   = 3
if_id      = "TopologicalQC"
then_level = 1
then_ids   = "BottPeriodicity,KTheory"

# PersistentHomol required for TDA_DataScience
[[rule]]
type       = "require"
if_level   = 3
if_id      = "TDA_DataScience"
then_level = 2
then_ids   = "PersistentHomol"

# Manifold6D incompatible with SimplicialComplex (continuous vs discrete)
[[rule]]
type       = "exclude"
if_level   = 0
if_id      = "Manifold6D"
then_level = 0
then_ids   = "SimplicialComplex"

# TopologicalQC needs BottPeriodicity or KTheory at Homology level too
[[rule]]
type       = "require"
if_level   = 3
if_id      = "TopologicalQC"
then_level = 2
then_ids   = "KTheory,SpectralSequence"

# HomotopyType requires DeRhamCohom or KTheory (needs advanced cohomology)
[[rule]]
type       = "require"
if_level   = 3
if_id      = "HomotopyType"
then_level = 2
then_ids   = "DeRhamCohom,KTheory,SpectralSequence"
