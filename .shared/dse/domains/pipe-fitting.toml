# ============================================================
# Compatibility Rules
# ============================================================

# Inconel 625 required for nuclear safety class
[[rule]]
type = "prefer"
if_level = 0
if_id = "InconelAlloy625"
then_level = 4
then_ids = "NuclearSafetyClass,PowerPlantSteam"

# HDPE best for water treatment, not for high-temperature
[[rule]]
type = "prefer"
if_level = 0
if_id = "HDPE_PE100"
then_level = 4
then_ids = "WaterTreatment"

# HDPE not suitable for steam or nuclear
[[rule]]
type = "exclude"
if_level = 0
if_id = "HDPE_PE100"
then_level = 4
then_ids = "PowerPlantSteam,NuclearSafetyClass"

# Electrofusion only for PE materials
[[rule]]
type = "prefer"
if_level = 1
if_id = "ElectrofusionPE"
then_level = 0
then_ids = "HDPE_PE100"
