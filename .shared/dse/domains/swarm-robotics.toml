# ============================================================
# Compatibility Rules
# ============================================================

# Underwater AUV requires acoustic communication
[[rule]]
type = "require"
if_level = 0
if_id = "Underwater-AUV"
then_level = 1
then_ids = ["Acoustic"]

# Underwater AUV requires underwater environment
[[rule]]
type = "require"
if_level = 0
if_id = "Underwater-AUV"
then_level = 4
then_ids = ["Underwater"]

# Quadrotor requires aerial environment
[[rule]]
type = "require"
if_level = 0
if_id = "Quadrotor"
then_level = 4
then_ids = ["Aerial-3D", "Outdoor-Field", "Urban"]

# Stigmergy only for simple tasks
[[rule]]
type = "require"
if_level = 1
if_id = "Stigmergy"
then_level = 2
then_ids = ["Flocking-Reynolds", "Leader-Follower", "Consensus"]

# Nano-bot requires hazardous or underwater
[[rule]]
type = "require"
if_level = 0
if_id = "Nano-Bot"
then_level = 4
then_ids = ["Hazardous", "Underwater"]
