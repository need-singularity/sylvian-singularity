# ============================================================
# Compatibility Rules
# ============================================================

# HTS winding requires water or phase-change cooling
[[rule]]
type = "prefer"
if_level = 1
if_id = "HTS_Winding"
then_level = 3
then_ids = "WaterCooled,PhaseCoolant"

# Amorphous core pairs best with epoxy resin (dry type)
[[rule]]
type = "prefer"
if_level = 0
if_id = "AmorphousMetal"
then_level = 2
then_ids = "EpoxyResin,NomexAramid"

# Oil-paper insulation needs Buchholz and DGA protection
[[rule]]
type = "prefer"
if_level = 2
if_id = "OilPaper"
then_level = 4
then_ids = "BuchholzRelay,DGA_Monitor"

# ODAF cooling requires CTC or disc winding for directed flow
[[rule]]
type = "prefer"
if_level = 3
if_id = "ODAF"
then_level = 1
then_ids = "CTC_Conductor,DiscWinding"
