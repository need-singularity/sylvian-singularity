# =============================================================
# Compatibility Rules
# =============================================================

# CQRS requires EventSourcing (CQRS often paired with event sourcing)
[[rule]]
type       = "require"
if_level   = 1
if_id      = "CQRS"
then_level = 1
then_ids   = "EventSourcing"

# RelationalN6 requires CacheN4 (relational needs caching)
[[rule]]
type       = "require"
if_level   = 0
if_id      = "RelationalN6"
then_level = 2
then_ids   = "CacheN4"

# DistributedN6 requires MicroserviceN6 (distributed needs microservices)
[[rule]]
type       = "require"
if_level   = 2
if_id      = "DistributedN6"
then_level = 1
then_ids   = "MicroserviceN6"

# gRPC requires StreamN6 or RealTimeStream (gRPC needs streaming)
[[rule]]
type       = "require"
if_level   = 3
if_id      = "gRPC"
then_level = 0
then_ids   = "StreamN6,RealTimeStream"
