# ============================================================
# Compatibility Rules
# ============================================================

# Ocean plastic requires extra identification due to degradation
[[rule]]
type = "prefer"
if_level = 0
if_id = "OceanCleanup"
then_level = 1
then_ids = "LIBS_Sort,AI_Vision"

# Chemical depolymerization produces circular feedstock
[[rule]]
type = "prefer"
if_level = 2
if_id = "ChemDepolymer"
then_level = 4
then_ids = "CircularFeedstock,Packaging"

# Enzymatic degradation best for PET to packaging loop
[[rule]]
type = "prefer"
if_level = 2
if_id = "EnzymDegrade"
then_level = 4
then_ids = "Packaging,CircularFeedstock"

# Mechanical recycling pairs with twin-screw compounding
[[rule]]
type = "prefer"
if_level = 2
if_id = "MechRecycle"
then_level = 3
then_ids = "TwinScrew,Compatibilizer"
