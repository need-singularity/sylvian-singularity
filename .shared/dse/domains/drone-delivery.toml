# ============================================================
# Compatibility Rules
# ============================================================

# Hexacopter pairs with box drop or winch lowering
[[rule]]
type = "prefer"
if_level = 0
if_id = "Hexacopter"
then_level = 2
then_ids = "BoxDrop,WinchLower"

# Hydrogen drone needs full vertiport for refueling
[[rule]]
type = "prefer"
if_level = 0
if_id = "HydrogenDrone"
then_level = 3
then_ids = "VertiportFull,MicroDepot"

# Medical payload needs RTK-GPS precision
[[rule]]
type = "prefer"
if_level = 2
if_id = "MedicalPayload"
then_level = 1
then_ids = "RTK_GPS,LiDARNav"

# Swarm coordination requires AI path planning
[[rule]]
type = "prefer"
if_level = 4
if_id = "SwarmCoord"
then_level = 1
then_ids = "AIPathPlan,LiDARNav"
