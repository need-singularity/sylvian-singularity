# =============================================================
# Compatibility Rules
# =============================================================

# Satellite channel requires Free_Space compatible protocol (not CV_QKD)
[[rule]]
type       = "exclude"
if_level   = 0
if_id      = "Satellite"
then_level = 1
then_ids   = "CV_QKD"

# None repeater incompatible with Distributed_QC (needs multi-hop)
[[rule]]
type       = "exclude"
if_level   = 2
if_id      = "None"
then_level = 4
then_ids   = "Distributed_QC,Quantum_Internet"

# All_Photonic repeater requires Photonic node
[[rule]]
type       = "require"
if_level   = 2
if_id      = "All_Photonic"
then_level = 3
then_ids   = "Photonic,Quantum_Dot"

# Underwater channel requires short-range protocols
[[rule]]
type       = "require"
if_level   = 0
if_id      = "Underwater"
then_level = 2
then_ids   = "None,First_Gen"
