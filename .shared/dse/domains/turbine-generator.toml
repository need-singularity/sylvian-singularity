# =============================================================
# HEXA-TURB DSE Domain Definition
# n=6: 6 turbine stages, sigma=12 blade rows per stage pair,
#       tau=4 turbine types, phi=2 dual-fuel, J2=24 MW class
# BT-62 (60Hz=sigma*sopfr), BT-38 (H2 LHV=120)
# Total combos: 6x6x6x6x6 = 7,776
# =============================================================

[meta]
name = "turbine-generator"
desc = "Power Generation Turbine DSE (n=6 stages, BT-38/62/68)"
levels = ["TurbineType", "BladeDesign", "Generator", "Control", "Application"]
vision = "n=6 stage turbine -- sigma=12 blade rows, tau=4 types (gas/steam/hydro/wind), phi=2 dual-fuel, J2=24 MW class"

[scoring]
n6    = 0.35
perf  = 0.25
power = 0.20
cost  = 0.20

