# =============================================================
# Compatibility Rules
# =============================================================

# Wind turbine requires composite fan blades
[[rule]]
type       = "require"
if_level   = 0
if_id      = "WindTurbine"
then_level = 1
then_ids   = "CompositeFan,3D_Printed"

# Wind turbine requires induction or PMSG generator
[[rule]]
type       = "require"
if_level   = 0
if_id      = "WindTurbine"
then_level = 2
then_ids   = "InductionGen,PMSG"

# Hydro turbine limited to sync or axial flux generator
[[rule]]
type       = "require"
if_level   = 0
if_id      = "HydroTurbine"
then_level = 2
then_ids   = "SyncGen,AxialFlux"

# Microturbine requires high-speed generator
[[rule]]
type       = "require"
if_level   = 0
if_id      = "MicroTurbine"
then_level = 2
then_ids   = "HighSpeedPMG,PMSG"

# CMC blades only for gas/combined cycle (high temp)
[[rule]]
type       = "require"
if_level   = 1
if_id      = "CMC_Blade"
then_level = 0
then_ids   = "GasTurbine,CombinedCycle"
