# =============================================================
# Compatibility Rules
# =============================================================

# Neuromorphic compute only with Edge or Fog platforms (not cloud-dependent)
[[rule]]
type       = "exclude"
if_level   = 2
if_id      = "Neuromorphic"
then_level = 3
then_ids   = "CommandCenter,GIS_12layer"

# LoRaWAN not suitable for Traffic camera (bandwidth too low)
[[rule]]
type       = "exclude"
if_level   = 0
if_id      = "TrafficCam"
then_level = 1
then_ids   = "LoRaWAN,Mesh_Zigbee"

# Emergency response requires high-bandwidth network (not LoRaWAN/Zigbee)
[[rule]]
type       = "require"
if_level   = 4
if_id      = "EmergencyResp"
then_level = 1
then_ids   = "5G_Massive,WiFi6,FiberBackbone,NB_IoT"

# Digital twin requires GPU or Cloud compute (heavy simulation)
[[rule]]
type       = "require"
if_level   = 3
if_id      = "DigitalTwin"
then_level = 2
then_ids   = "CloudCentral,GPU_Inference,FogNode"
