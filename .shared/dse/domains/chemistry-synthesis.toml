# =============================================================
# Compatibility Rules
# =============================================================

# Carbon_Z6 required for OrganicSynth (carbon is essential for organic chemistry)
[[rule]]
type       = "require"
if_level   = 2
if_id      = "OrganicSynth"
then_level = 0
then_ids   = "Carbon_Z6"

# Carbon_Z6 required for Photochemistry (glucose C₆H₁₂O₆ needs carbon)
[[rule]]
type       = "require"
if_level   = 2
if_id      = "Photochemistry"
then_level = 0
then_ids   = "Carbon_Z6"

# NuclearChem incompatible with EnzymeBio (scale mismatch: nuclear vs biological)
[[rule]]
type       = "exclude"
if_level   = 2
if_id      = "NuclearChem"
then_level = 3
then_ids   = "EnzymeBio"

# Hydrogen_Z1 requires Electrochemistry or NuclearChem
[[rule]]
type       = "require"
if_level   = 0
if_id      = "Hydrogen_Z1"
then_level = 2
then_ids   = "Electrochemistry,NuclearChem"

# AICatalystDesign requires MaterialSynth or Pharmaceutical (needs application target)
[[rule]]
type       = "require"
if_level   = 3
if_id      = "AICatalystDesign"
then_level = 4
then_ids   = "MaterialSynth,Pharmaceutical"

# RareEarth incompatible with FoodChem (rare earth not food-safe)
[[rule]]
type       = "exclude"
if_level   = 0
if_id      = "RareEarth"
then_level = 4
then_ids   = "FoodChem"
