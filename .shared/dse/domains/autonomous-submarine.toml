# ============================================================
# Compatibility Rules
# ============================================================

# Deep hadal missions require titanium, glass, or ceramic hull
[[rule]]
type = "require"
if_level = 4
if_id = "Deep-Hadal"
then_level = 0
then_ids = ["Titanium-Pressure", "Glass-Sphere", "Ceramic-SiC"]

# Buoyancy glider only for survey or under-ice
[[rule]]
type = "require"
if_level = 1
if_id = "Glider-Buoyancy"
then_level = 4
then_ids = ["Ocean-Survey", "Under-Ice"]

# MHD propulsion requires steel or titanium hull (magnetic shielding)
[[rule]]
type = "require"
if_level = 1
if_id = "MHD"
then_level = 0
then_ids = ["Titanium-Pressure", "Steel-HY80"]

# SAS sonar requires stable navigation
[[rule]]
type = "require"
if_level = 2
if_id = "Synthetic-Aperture"
then_level = 3
then_ids = ["INS-FOG", "DVL-Aided", "Quantum-INS"]
