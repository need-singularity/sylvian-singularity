# ============================================================
# Compatibility Rules
# ============================================================

# Fused silica needs all-electric or plasma melting
[[rule]]
type = "require"
if_level = 0
if_id = "Fused-Silica"
then_level = 1
then_ids = ["All-Electric", "Plasma-Melt"]

# Fiber drawing only for fused silica or chalcogenide
[[rule]]
type = "require"
if_level = 2
if_id = "Fiber-Drawing"
then_level = 0
then_ids = ["Fused-Silica", "Chalcogenide"]

# Chemical strengthening only for aluminosilicate or soda-lime
[[rule]]
type = "require"
if_level = 3
if_id = "Chemical-Strengthen"
then_level = 0
then_ids = ["Aluminosilicate", "Soda-Lime"]

# Fusion draw only for aluminosilicate or borosilicate
[[rule]]
type = "require"
if_level = 2
if_id = "Fusion-Draw"
then_level = 0
then_ids = ["Aluminosilicate", "Borosilicate"]
