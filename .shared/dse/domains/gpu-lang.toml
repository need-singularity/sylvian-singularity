[meta]
name = "gpu-lang"
desc = "Ultimate GPU Compute Language DSE (BT-55/58/59/69)"
levels = ["Memory", "Execution", "Kernel", "Optimization", "Framework"]
vision = "Unified GPU compute language where memory/execution/kernel align to n=6 constants"

[scoring]
n6   = 0.35
perf = 0.30
power = 0.20
cost  = 0.15

