# =============================================================
# Compatibility Rules
# =============================================================

# CUDA_Native only with SIMT_Warp or StreamExec (NVIDIA execution model)

[[candidate]]
level  = 4
id     = "FrameworkN6"
label  = "n=6 컴퓨트 스테이지 프레임워크 (n=6 파이프라인)"
n6     = 1.00
perf   = 0.85
power  = 0.55
cost   = 0.45
notes  = "pipeline_stages=n=6 EXACT, n6-compute framework"
[[rule]]
type       = "require"
if_level   = 2
if_id      = "CUDA_Native"
then_level = 1
then_ids   = "SIMT_Warp,StreamExec"

# WGSL_Web only with TaskGraph or DataParallel (web-compatible execution)
[[rule]]
type       = "require"
if_level   = 2
if_id      = "WGSL_Web"
then_level = 1
then_ids   = "TaskGraph,DataParallel"

# WGSL_Web requires WebGPU_Port framework
[[rule]]
type       = "require"
if_level   = 2
if_id      = "WGSL_Web"
then_level = 4
then_ids   = "WebGPU_Port"

# VirtualMem incompatible with OccupancyOpt (paging kills occupancy)
[[rule]]
type       = "exclude"
if_level   = 0
if_id      = "VirtualMem"
then_level = 3
then_ids   = "OccupancyOpt"

# HBM_Aware requires CUDA_Eco or ROCm_Open (HBM-capable frameworks)
[[rule]]
type       = "require"
if_level   = 0
if_id      = "HBM_Aware"
then_level = 4
then_ids   = "CUDA_Eco,ROCm_Open"

# EgyptianMem incompatible with VirtualMem approach — different philosophy
[[rule]]
type       = "exclude"
if_level   = 0
if_id      = "EgyptianMem"
then_level = 0
then_ids   = "VirtualMem"
