# =============================================================
# Compatibility Rules
# =============================================================

# Perovskite only with Perov-Print or HJT
[[rule]]
type       = "require"
if_level   = 0
if_id      = "Perovskite"
then_level = 1
then_ids   = "Perov-Print,HJT"

# Perov-Print only with Perovskite
[[rule]]
type       = "require"
if_level   = 1
if_id      = "Perov-Print"
then_level = 0
then_ids   = "Perovskite"

# GaAs only with CPV, Triple-3J, or N6_Tandem_6J (too expensive for flat panel)
[[rule]]
type       = "require"
if_level   = 0
if_id      = "GaAs"
then_level = 2
then_ids   = "CPV,Triple-3J,N6_Tandem_6J"

# OPV only with Single-1J or Bifacial
[[rule]]
type       = "require"
if_level   = 0
if_id      = "OPV"
then_level = 2
then_ids   = "Single-1J,Bifacial"

# CPV only with GaAs
[[rule]]
type       = "require"
if_level   = 2
if_id      = "CPV"
then_level = 0
then_ids   = "GaAs"

# CIGS: no IBC process
[[rule]]
type       = "exclude"
if_level   = 0
if_id      = "CIGS"
then_level = 1
then_ids   = "IBC"

# CdTe: no IBC process
[[rule]]
type       = "exclude"
if_level   = 0
if_id      = "CdTe"
then_level = 1
then_ids   = "IBC"

# OPV: only Al-BSF or Perov-Print process
[[rule]]
type       = "require"
if_level   = 0
if_id      = "OPV"
then_level = 1
then_ids   = "Al-BSF,Perov-Print"

# N6_Tandem_6J only with GaAs (only III-V can do 6-junction)
[[rule]]
type       = "require"
if_level   = 2
if_id      = "N6_Tandem_6J"
then_level = 0
then_ids   = "GaAs"

# N6_Tandem_6J only with SiC-Central or DC-Optimizer (needs high-end power electronics)
[[rule]]
type       = "require"
if_level   = 2
if_id      = "N6_Tandem_6J"
then_level = 3
then_ids   = "SiC-Central,DC-Optimizer"

# Micro-Inv impractical for large commercial HC-144
[[rule]]
type       = "exclude"
if_level   = 3
if_id      = "Micro-Inv"
then_level = 4
then_ids   = "HC-144"

# SiC-Central overkill for residential / BIPV
[[rule]]
type       = "exclude"
if_level   = 3
if_id      = "SiC-Central"
then_level = 4
then_ids   = "Res-60,BIPV"
