# =============================================================

[meta]
name = "noise-cancellation"
desc = "Active Noise Control Architecture DSE (microphone/dsp/speaker/algorithm/integration)"

[scoring]
n6 = 0.35
perf = 0.25
power = 0.20
cost = 0.20

