# ============================================================
# Compatibility Rules
# ============================================================

# Fiber optic mic only for industrial or HVAC
[[rule]]
type = "require"
if_level = 0
if_id = "Fiber-Optic"
then_level = 4
then_ids = ["Industrial", "HVAC-Duct"]

# Multi-channel algorithm requires automotive or industrial
[[rule]]
type = "require"
if_level = 3
if_id = "Multi-Channel"
then_level = 4
then_ids = ["Automotive", "HVAC-Duct", "Industrial"]

# Subwoofer array only for room/vehicle applications
[[rule]]
type = "require"
if_level = 2
if_id = "Subwoofer-Array"
then_level = 4
then_ids = ["Automotive", "HVAC-Duct", "Industrial"]

# Deep ANC requires neural NPU or floating-point DSP
[[rule]]
type = "require"
if_level = 3
if_id = "Deep-ANC"
then_level = 1
then_ids = ["Neural-NPU", "Floating-Point", "FPGA"]
