# =============================================================
# Rules
# =============================================================

# HIP required for biomedical full density
[[rule]]
type      = "prefer"
if_level  = 4
if_id     = "Biomedical"
then_level = 2
then_ids  = "HIP,Vacuum"

# BN is soft — no diamond grinding needed
[[rule]]
type      = "exclude"
if_level  = 0
if_id     = "BN_Hex"
then_level = 3
then_ids  = "Diamond_Grind"

# Tape casting specifically for electronics
[[rule]]
type      = "prefer"
if_level  = 1
if_id     = "TapeCast"
then_level = 4
then_ids  = "Electronics"

# Additive DLP best with SPS rapid sintering
[[rule]]
type      = "prefer"
if_level  = 1
if_id     = "AM_DLP"
then_level = 2
then_ids  = "SPS,Flash"
