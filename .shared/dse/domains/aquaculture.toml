# ============================================================
# Compatibility Rules
# ============================================================

# Salmon requires RAS or offshore cages
[[rule]]
type = "prefer"
if_level = 0
if_id = "AtlanticSalmon"
then_level = 2
then_ids = "RAS_Indoor,OffshoreCage"

# Shrimp requires biofloc or earthen pond
[[rule]]
type = "prefer"
if_level = 0
if_id = "ShrimpVannamei"
then_level = 2
then_ids = "BioflockTank,EarthPond"

# RAS indoor tanks need biofiltration
[[rule]]
type = "prefer"
if_level = 2
if_id = "RAS_Indoor"
then_level = 3
then_ids = "BioFilter,AIWaterMgmt"

# AI precision feeding pairs with AI water management
[[rule]]
type = "prefer"
if_level = 1
if_id = "PrecisionFeed"
then_level = 3
then_ids = "AIWaterMgmt,OzoneWQ"

# Seaweed IMTA best with open net pen integration
[[rule]]
type = "prefer"
if_level = 0
if_id = "SeaweedIMTA"
then_level = 2
then_ids = "OpenNetPen,OffshoreCage"
