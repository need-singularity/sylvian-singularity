# =============================================================
# Compatibility Rules
# =============================================================

# CustomBinary requires specialized analysis -- not LazyAnalysis
[[rule]]
type       = "exclude"
if_level   = 0
if_id      = "CustomBinary"
then_level = 1
then_ids   = "LazyAnalysis"

# GraphQL_LSP requires SemanticModel or AIHybrid (needs schema awareness)
[[rule]]
type       = "require"
if_level   = 0
if_id      = "GraphQL_LSP"
then_level = 1
then_ids   = "SemanticModel,AIHybrid"

# CopilotInteg requires DevContainer or CollabEdit (cloud infra)
[[rule]]
type       = "require"
if_level   = 2
if_id      = "CopilotInteg"
then_level = 4
then_ids   = "DevContainer,CollabEdit"

# AIRefactor requires MLRanking or CopilotInteg (needs AI completion)
[[rule]]
type       = "require"
if_level   = 3
if_id      = "AIRefactor"
then_level = 2
then_ids   = "MLRanking,CopilotInteg"

# AbstractInterp incompatible with QuickFix (too slow for quick fixes)
[[rule]]
type       = "exclude"
if_level   = 1
if_id      = "AbstractInterp"
then_level = 3
then_ids   = "QuickFix"

# ThemeEngine incompatible with CustomBinary (no visual protocol support)
[[rule]]
type       = "exclude"
if_level   = 4
if_id      = "ThemeEngine"
then_level = 0
then_ids   = "CustomBinary"
