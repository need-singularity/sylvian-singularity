then_ids = "Autoclave_Cure,Filament_Winding"

# Sandwich panel pairs with aerospace and marine
[[rule]]
type = "prefer"
if_level = 3
if_id = "Sandwich_Panel"
then_level = 4
then_ids = "Aerospace_Wing,Marine_Hull"

