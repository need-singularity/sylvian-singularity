# ============================================================
# Compatibility Rules
# ============================================================

# Epoxy pairs with autoclave and carbon fiber (aerospace standard)
[[rule]]
type = "prefer"
if_level = 0
if_id = "Epoxy_6crosslink"
then_level = 2
then_ids = "Autoclave_Cure,RTM_6port"

[[rule]]
type = "prefer"
if_level = 0
if_id = "Epoxy_6crosslink"
then_level = 1
then_ids = "CarbonFiber_12K,Aramid_Kevlar"

# Nylon-6 is injection/compression moldable with short fibers
[[rule]]
type = "prefer"
if_level = 0
if_id = "Polyamide_Nylon6"
then_level = 2
then_ids = "Compression_Molding,3D_Printing"

[[rule]]
type = "prefer"
if_level = 0
if_id = "Polyamide_Nylon6"
then_level = 3
then_ids = "ShortFiber_Random,Woven_6harness"

# PEEK pairs with biomedical and aerospace applications
[[rule]]
type = "prefer"
if_level = 0
if_id = "PEEK"
then_level = 4
then_ids = "Biomedical_Implant,Aerospace_Wing"

# Carbon fiber 12K pairs with aerospace and wind turbine
[[rule]]
type = "prefer"
if_level = 1
if_id = "CarbonFiber_12K"
then_level = 4
then_ids = "Aerospace_Wing,WindTurbine_Blade,Automotive_Body"

# Glass fiber for marine and wind turbine
[[rule]]
type = "prefer"
if_level = 1
if_id = "GlassFiber"
then_level = 4
then_ids = "Marine_Hull,WindTurbine_Blade,Sports_Equipment"

# Natural fiber for automotive interior (eco)
[[rule]]
