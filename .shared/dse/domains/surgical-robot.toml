# ============================================================
# Compatibility Rules
# ============================================================

# Micro-robots need EM tracking for localization
[[rule]]
type = "prefer"
if_level = 0
if_id = "Micro_Robot"
then_level = 1
then_ids = "EM_Tracking,Ultrasound"

# Bilateral teleoperation needs haptic feedback
[[rule]]
type = "prefer"
if_level = 2
if_id = "Bilateral_Tele"
then_level = 1
then_ids = "Haptic_12ch,Force_6axis"

# AI autonomous control benefits from multi-modal sensing
[[rule]]
type = "prefer"
if_level = 2
if_id = "AI_Autonomous"
then_level = 1
then_ids = "Vision_Stereo,Force_6axis"

# VR immersive interface best for teleoperation
[[rule]]
type = "prefer"
if_level = 3
if_id = "VR_Immersive"
then_level = 2
then_ids = "Bilateral_Tele,Shared_Control"

# Continuum flexible robots best for single-port access
[[rule]]
type = "prefer"
if_level = 0
if_id = "Continuum_Flex"
then_level = 4
then_ids = "Single_Port,Cardiac"

# Snake articulated robots ideal for neurosurgery
[[rule]]
type = "prefer"
if_level = 0
if_id = "Snake_Articulated"
then_level = 4
then_ids = "Neurosurgery,Single_Port"
