# =============================================================
# Neuroscience DSE Domain Definition
# 궁극의 뇌과학 — n=6 기반 뉴런 + 시냅스 + 피질 + 의식 + BCI
# BT-48 (Display-Audio sigma=12) + BT-51 (Genetic chain) + BT-59 (8-layer AI)
# Total raw combos: 6x6x7x6x5 = 7,560 (pre-filter)
# =============================================================

[meta]
name = "neuroscience"
desc = "Ultimate Neuroscience DSE (neurons + cortex + cognition + BCI)"
levels = ["Neuron", "Circuit", "Region", "Cognition", "Interface"]
vision = "n=6 기반 궁극의 뇌과학 — 뉴런 + 시냅스 + 피질 + 의식 + BCI"

[scoring]
n6   = 0.35
perf = 0.25
power = 0.20
cost  = 0.20

