# =============================================================
# Compatibility Rules
# =============================================================

# CorticalColumn requires CerebralN6 or HippocampusN6 (cortical region)
[[rule]]
type       = "require"
if_level   = 1
if_id      = "CorticalColumn"
then_level = 2
then_ids   = "CerebralN6,HippocampusN6"

# ConsciousnessIIT requires Oscillation or SmallWorld (global integration)
[[rule]]
type       = "require"
if_level   = 3
if_id      = "ConsciousnessIIT"
then_level = 1
then_ids   = "Oscillation,SmallWorld"

# Optogenetics requires IonChannel6 (light-sensitive channels)
[[rule]]
type       = "require"
if_level   = 4
if_id      = "Optogenetics"
then_level = 0
then_ids   = "IonChannel6"

# NeuralDust excludes ModularCircuit (too fine-grained for macro modules)
[[rule]]
type       = "exclude"
if_level   = 4
if_id      = "NeuralDust"
then_level = 1
then_ids   = "ModularCircuit"

# BrainOrganoid requires BasalGanglia or Amygdala (primitive structures first)
[[rule]]
type       = "require"
if_level   = 4
if_id      = "BrainOrganoid"
then_level = 2
then_ids   = "BasalGanglia,Amygdala,CerebellumN3"

# LanguageN2 requires CerebralN6 (language areas in cerebral cortex)
[[rule]]
type       = "require"
if_level   = 3
if_id      = "LanguageN2"
then_level = 2
then_ids   = "CerebralN6"
