# =============================================================
# Compatibility Rules
# =============================================================

# ColumnarUnit core requires Cortex6 or BrodmannAreas foundation
[[rule]]
type       = "require"
if_level   = 2
if_id      = "ColumnarUnit"
then_level = 0
then_ids   = "Cortex6,BrodmannAreas"

# GammaSync core requires GammaOscil foundation
[[rule]]
type       = "require"
if_level   = 2
if_id      = "GammaSync"
then_level = 0
then_ids   = "GammaOscil"

# Neuropixels measurement requires HodgkinHuxley or SpikingNet foundation
[[rule]]
type       = "require"
if_level   = 1
if_id      = "Neuropixels"
then_level = 0
then_ids   = "HodgkinHuxley,SpikingNet,Cortex6"

# IIT engine requires EntropyGate or GammaSync core
[[rule]]
type       = "require"
if_level   = 3
if_id      = "IIT"
then_level = 2
then_ids   = "EntropyGate,GammaSync,ColumnarUnit"

# BrainSim system requires Connectome engine
[[rule]]
type       = "require"
if_level   = 4
if_id      = "BrainSim"
then_level = 3
then_ids   = "Connectome,NeuralODE"

# AnesthesiaMonitor requires EEG measurement
[[rule]]
type       = "require"
if_level   = 4
if_id      = "AnesthesiaMonitor"
then_level = 1
then_ids   = "EEG,MEG"

# fMRI too slow for real-time BCI
[[rule]]
type       = "exclude"
if_level   = 1
if_id      = "fMRI"
then_level = 4
then_ids   = "NeuroFeedback,NeuroProsthetic"
