# N6 GaN Power Device DSE — Gallium nitride electronics
# 6×6×6×6×6 = 7,776 combos
# n=6: 6H-GaN polytype (n=6 EXACT hexagonal stacking),
#       sigma=12 eV direct+indirect gaps sum, tau=4 epitaxial layers (buffer/channel/barrier/cap),
#       phi=2 normally-off enhancement, J2=24 W/mm power density target

[meta]
name = "gan-power-device"
desc = "GaN Power Device DSE — 6H polytype (n=6), 4-layer epitaxy (tau), 24 W/mm (J2)"

[scoring]
n6 = 0.35
perf = 0.25
power = 0.20
cost = 0.20

