# ============================================================
# Compatibility Rules
# ============================================================

# Vertical HEMT requires native GaN or SiC-6H substrate
[[rule]]
type = "prefer"
if_level = 0
if_id = "HEMT-vertical"
then_level = 1
then_ids = "GaN-native,SiC-6H"

# Lateral HEMT cost-optimized on Si substrate
[[rule]]
type = "prefer"
if_level = 0
if_id = "HEMT-lateral"
then_level = 1
then_ids = "Si-200mm,QST-engineered"

# Diamond substrate for highest power density RF applications
[[rule]]
type = "prefer"
if_level = 1
if_id = "Diamond-heat"
then_level = 4
then_ids = "RF-6GHz,Data-center-12kW"

# Multi-channel 6-layer needs advanced gate for channel control
[[rule]]
type = "prefer"
if_level = 2
if_id = "Multi-channel-6"
then_level = 3
then_ids = "Tri-gate-6fin,Recessed-gate"

# p-GaN cap naturally pairs with p-GaN gate
[[rule]]
type = "prefer"
if_level = 2
if_id = "P-GaN-cap"
then_level = 3
then_ids = "p-GaN-gate"

# Cascode hybrid is Si-compatible, pairs with Si substrate
[[rule]]
type = "prefer"
if_level = 0
if_id = "Cascode-hybrid"
then_level = 1
then_ids = "Si-200mm,QST-engineered"

# Sapphire substrate only for RF and LED, not high-power
[[rule]]
type = "exclude"
if_level = 1
if_id = "Sapphire"
then_level = 4
then_ids = "EV-charger,Motor-drive"

# ScAlN barrier is research frontier, pairs with tri-gate
[[rule]]
type = "prefer"
if_level = 2
if_id = "ScAlN-barrier"
then_level = 3
then_ids = "Tri-gate-6fin,Nano-channel"

# Server PSU 48V primarily lateral HEMT on Si
[[rule]]
type = "prefer"
if_level = 4
if_id = "Server-PSU-48V"
then_level = 0
then_ids = "HEMT-lateral,Cascode-hybrid"

# RF-6GHz needs high power density epitaxy
[[rule]]
type = "prefer"
if_level = 4
if_id = "RF-6GHz"
then_level = 2
then_ids = "Multi-channel-6,ScAlN-barrier,InAlN-GaN"

# Nano-channel gate for RF applications primarily
[[rule]]
type = "prefer"
if_level = 3
if_id = "Nano-channel"
then_level = 4
then_ids = "RF-6GHz"
