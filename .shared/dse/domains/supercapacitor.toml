# ============================================================
# Compatibility Rules
# ============================================================

# Aqueous electrolyte excluded from high-voltage modules
[[rule]]
type = "exclude"
if_level = 1
if_id = "Aqueous-H2SO4"
then_level = 4
then_ids = ["48V-Mild-Hybrid", "Grid-Bank"]

# Micro-SC requires solid polymer electrolyte (no liquid leak)
[[rule]]
type = "require"
if_level = 3
if_id = "Micro-SC"
then_level = 1
then_ids = ["Solid-Polymer", "Ionic-Liquid"]

# MXene electrode needs non-aqueous to reach full voltage
[[rule]]
type = "exclude"
if_level = 0
if_id = "MXene"
then_level = 1
then_ids = ["Aqueous-H2SO4"]

# Wearable module requires flexible cell format
[[rule]]
type = "require"
if_level = 4
if_id = "Wearable"
then_level = 3
then_ids = ["Pouch", "Micro-SC"]
