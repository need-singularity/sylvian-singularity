# =============================================================
# Compatibility Rules
# =============================================================

# HighNA_EUV requires EUV_13_5nm base technology

[[candidate]]
level  = 4
id     = "InspectN6"
label  = "n=6 시그마 수율 검사 (n=6 EXACT)"
n6     = 1.00
perf   = 0.85
power  = 0.55
cost   = 0.45
notes  = "sigma_quality=n=6 EXACT, n6-sigma yield inspection"
[[rule]]
type       = "require"
if_level   = 1
if_id      = "HighNA_EUV"
then_level = 1
then_ids   = "EUV_13_5nm"

# HBM_Stack requires TSMC_CoWoS or Intel_Foveros (advanced packaging)
[[rule]]
type       = "require"
if_level   = 3
if_id      = "HBM_Stack"
then_level = 3
then_ids   = "TSMC_CoWoS,Intel_Foveros"

# Chiplet_N6 requires UCIe (die-to-die interconnect standard)
[[rule]]
type       = "require"
if_level   = 3
if_id      = "Chiplet_N6"
then_level = 3
then_ids   = "UCIe"

# DSA incompatible with HighNA_EUV (different patterning paradigm)
[[rule]]
type       = "exclude"
if_level   = 1
if_id      = "DSA"
then_level = 1
then_ids   = "HighNA_EUV"

# NIL incompatible with HighNA_EUV (competing technologies)
[[rule]]
type       = "exclude"
if_level   = 1
if_id      = "NIL"
then_level = 1
then_ids   = "HighNA_EUV"
