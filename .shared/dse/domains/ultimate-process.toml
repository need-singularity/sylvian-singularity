# =============================================================
# ULTIMATE-PROCESS DSE Domain Definition
# 궁극의 반도체 공정 아키텍처 — EUV + 3D 패키징 + 검사 + 수율
# EDA n=6 단계 EXACT + ALE phi=2 EXACT + Chiplet n=6 EXACT (BT-69)
# Total raw combos: 6x6x6x6x5 = 6,480 (pre-filter)
# =============================================================

[meta]
name = "ultimate-process"
desc = "Ultimate Semiconductor Process DSE — EUV + 3D Packaging + Inspection + Yield"
levels = ["Design", "Lithography", "Etch", "Package", "Inspect"]
vision = "n=6 기반 궁극의 반도체 공정 — EUV + 3D 패키징 + 검사 + 수율"

[scoring]
n6   = 0.35
perf = 0.25
power = 0.20
cost  = 0.20

