# ============================================================
# Compatibility Rules
# ============================================================

# EDS superconducting requires LSM SC propulsion (field compatibility)
[[rule]]
type = "require"
if_level = 0
if_id = "EDS-SC-Coil"
then_level = 1
then_ids = ["LSM-SC-Onboard", "LSM-Long-Stator"]

# Inductrack PM cannot use LSM SC Onboard (no SC field)
[[rule]]
type = "exclude"
if_level = 0
if_id = "Inductrack-PM"
then_level = 1
then_ids = ["LSM-SC-Onboard"]

# HTS pinning only compatible with deep tunnel (thermal shielding) or U-channel
[[rule]]
type = "require"
if_level = 0
if_id = "HTS-Pinning"
then_level = 2
then_ids = ["Deep-Tunnel", "U-Channel"]

# Electrodynamic wheel excluded from intercity 600 (speed limit)
[[rule]]
type = "exclude"
if_level = 0
if_id = "Electrodynamic-Wheel"
then_level = 4
then_ids = ["Intercity-600"]

# Linear reluctance excluded from intercity 600 (insufficient thrust density)
[[rule]]
type = "exclude"
if_level = 1
if_id = "Linear-Reluctance"
then_level = 4
then_ids = ["Intercity-600", "Regional-HSR"]
