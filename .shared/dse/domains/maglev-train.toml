# =============================================================
# N6 Maglev Train DSE Domain Definition
# Magnetic levitation railway architecture
# n=6: 6 magnet arrays per bogie (n=6), sigma=12 guideway coils/m,
#       tau=4 suspension modes (EMS/EDS/Inductrack/hybrid),
#       phi=2 attract/repel, J2=24 car consist,
#       6-phase propulsion motor
# Total raw combos: 6x6x6x6x6 = 7,776 (pre-filter)
# =============================================================

[meta]
name = "maglev-train"
desc = "Maglev Train Architecture DSE (suspension/propulsion/guideway/control/service)"

[scoring]
n6 = 0.35
perf = 0.25
power = 0.20
cost = 0.20

