# ============================================================
# Compatibility Rules
# ============================================================

# Membrane reactor pairs with enzyme or electrocatalyst
[[rule]]
type = "prefer"
if_level = 0
if_id = "MembraneReactor"
then_level = 1
then_ids = "Enzyme,ElectroCat"

# Fluidized bed requires gas sparger or jet mixer
[[rule]]
type = "prefer"
if_level = 0
if_id = "FluidBed"
then_level = 3
then_ids = "GasSparger,JetMixer"

# Photocatalyst best with microwave or plasma heat transfer
[[rule]]
type = "prefer"
if_level = 1
if_id = "PhotoCat"
then_level = 2
then_ids = "MicrowaveHeat,PlasmaAssist"

# Autothermal heat transfer best for H2 production or waste-to-energy
[[rule]]
type = "prefer"
if_level = 2
if_id = "Autothermal"
then_level = 4
then_ids = "H2Production,WasteToEnergy"

# Microfluidic mixing pairs with pharma API or polymerization
[[rule]]
type = "prefer"
if_level = 3
if_id = "MicrofluidicMix"
then_level = 4
then_ids = "PharmaAPI,Polymerization"
