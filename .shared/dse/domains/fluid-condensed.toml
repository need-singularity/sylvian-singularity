# =============================================================
# Compatibility Rules
# =============================================================

# QHE_Fractional requires GrapheneC6 or TopologicalInsulator (needs 2D electron system)
[[rule]]
type       = "require"
if_level   = 3
if_id      = "QHE_Fractional"
then_level = 2
then_ids   = "GrapheneC6,TopologicalInsulator"

# DNS_Full incompatible with StokesLow (DNS is for turbulence, Stokes is laminar)
[[rule]]
type       = "exclude"
if_level   = 1
if_id      = "DNS_Full"
then_level = 0
then_ids   = "StokesLow"

# Superconductor requires BCC_CN8 or FCC_CN12 (needs metallic crystal)
[[rule]]
type       = "require"
if_level   = 3
if_id      = "Superconductor"
then_level = 2
then_ids   = "BCC_CN8,FCC_CN12"

# MHD_Plasma requires CascadeN6 or KolmogorovK41 (MHD needs turbulence theory)
[[rule]]
type       = "require"
if_level   = 0
if_id      = "MHD_Plasma"
then_level = 1
then_ids   = "CascadeN6,KolmogorovK41"

# GrapheneC6 boosts QHE (carbon Z=6 — always highest n6 for crystal, no rule needed, just high n6 score)
# QuantumDevice requires QHE or Superconductor or TopologicalInsulator
[[rule]]
type       = "require"
if_level   = 4
if_id      = "QuantumDevice"
then_level = 3
then_ids   = "QHE_Integer,QHE_Fractional,Superconductor,TopologicalInsulator,WeylSemimetal"
