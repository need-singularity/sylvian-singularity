# n=6: 6-element phased array (n=6), sigma=12 MHz center frequency, tau=4 imaging modes (B/M/Doppler/3D),
#       phi=2 harmonic imaging, J2=24 focal zones, 6cm depth penetration standard

[meta]
name = "ultrasound-imaging"
desc = "Ultrasound Imaging DSE (n=6 phased array, sigma=12 MHz, J2=24 focal zones, 6cm depth)"

[scoring]
n6 = 0.35
perf = 0.25
power = 0.20
cost = 0.20

