# ============================================================
# Compatibility Rules
# ============================================================

# Single crystal transducers best with advanced beamforming
[[rule]]
type = "prefer"
if_level = 0
if_id = "SingleCrystal"
then_level = 1
then_ids = "Adaptive_MV,AI_Beamformer"

# CMUT arrays pair well with plane wave compounding
[[rule]]
type = "prefer"
if_level = 0
if_id = "CMUT_Array"
then_level = 1
then_ids = "PlaneWave,SyntheticAperture"

# 4D real-time needs high-performance transducers
[[rule]]
type = "prefer"
if_level = 3
if_id = "4D_RealTime"
then_level = 0
then_ids = "CMUT_Array,SingleCrystal"

# AI beamformer pairs with AI signal enhancement
[[rule]]
type = "prefer"
if_level = 1
if_id = "AI_Beamformer"
then_level = 2
then_ids = "AI_Enhancement,Elastography"

# Wearable patch needs simple imaging modes
[[rule]]
type = "prefer"
if_level = 4
if_id = "Wearable_Patch"
then_level = 3
then_ids = "BMode,MMode"
