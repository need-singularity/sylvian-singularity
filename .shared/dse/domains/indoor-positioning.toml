# ============================================================
# Compatibility Rules
# ============================================================

# RFID only suitable for warehouse/factory asset tracking
[[rule]]
type = "require"
if_level = 0
if_id = "RFID-Reader"
then_level = 4
then_ids = ["Warehouse", "Factory-AGV"]

# LiDAR scanner requires edge or hybrid server (bandwidth)
[[rule]]
type = "require"
if_level = 0
if_id = "LiDAR-Scanner"
then_level = 3
then_ids = ["Edge-Gateway", "Hybrid-Edge-Cloud"]

# Graph SLAM requires LiDAR or hybrid signals
[[rule]]
type = "require"
if_level = 2
if_id = "GraphSLAM"
then_level = 0
then_ids = ["LiDAR-Scanner", "UWB-Anchor"]

# Emergency requires UWB or hybrid for reliability
[[rule]]
type = "require"
if_level = 4
if_id = "Emergency"
then_level = 0
then_ids = ["UWB-Anchor", "BLE-Beacon"]
