# ============================================================
# Compatibility Rules
# ============================================================

# PU polyurethane pairs with chemical CO2 blowing (standard reaction)
[[rule]]
type = "prefer"
if_level = 0
if_id = "PU_polyurethane"
then_level = 2
then_ids = "Chemical_CO2,Mechanical_froth"

# PS polystyrene pairs with physical pentane blowing
[[rule]]
type = "prefer"
if_level = 0
if_id = "PS_polystyrene"
then_level = 2
then_ids = "Physical_pentane,Supercritical_CO2"

# Aluminum metal foam pairs with sintering process
[[rule]]
type = "prefer"
if_level = 0
if_id = "Metal_aluminum"
then_level = 3
then_ids = "Sintering_metal,Freeze_casting"

# Ceramic SiC pairs with sintering and freeze-casting
[[rule]]
type = "prefer"
if_level = 0
if_id = "Ceramic_SiC"
then_level = 3
then_ids = "Sintering_metal,Freeze_casting"

# Carbon graphite pairs with closed-cell and lattice structures
[[rule]]
type = "prefer"
if_level = 0
if_id = "Carbon_graphite"
then_level = 1
then_ids = "Closed_cell,Lattice_6strut"

# Lattice 6-strut structure pairs with 3D-printed void blowing
[[rule]]
type = "prefer"
if_level = 1
if_id = "Lattice_6strut"
then_level = 2
then_ids = "Printed_void_3D,Supercritical_CO2"

# Auxetic structure pairs with 3D printing and freeze-casting
[[rule]]
type = "prefer"
if_level = 1
if_id = "Auxetic_negative"
then_level = 2
then_ids = "Printed_void_3D,Hollow_sphere"

# Structural sandwich application pairs with closed-cell structure
[[rule]]
type = "prefer"
if_level = 4
if_id = "Structural_sandwich"
then_level = 1
then_ids = "Closed_cell,Lattice_6strut"

# Biomedical scaffold pairs with freeze-casting and open-cell
[[rule]]
type = "prefer"
if_level = 4
if_id = "Biomedical_scaffold"
then_level = 1
then_ids = "Open_cell,Lattice_6strut"

# Automotive seat pairs with mold-pour 6-section processing
[[rule]]
type = "prefer"
if_level = 4
if_id = "Automotive_seat"
then_level = 3
then_ids = "Mold_pour_6section,Injection_foam"

# Insulation pairs with extrusion XPS or free-rise spray
[[rule]]
type = "prefer"
if_level = 4
if_id = "Insulation_thermal"
then_level = 3
then_ids = "Extrusion_XPS,Free_rise"
