# =============================================================
# Compatibility Rules
# =============================================================

# ChromosomalN6 requires MolecularClock or MaxLikelihood (needs phylogenetic context)
[[rule]]
type       = "require"
if_level   = 0
if_id      = "ChromosomalN6"
then_level = 3
then_ids   = "MolecularClock,MaxLikelihood,SixRankTaxonomy"

# HorizontalTransfer incompatible with Cladistics (HGT breaks tree assumptions)
[[rule]]
type       = "exclude"
if_level   = 0
if_id      = "HorizontalTransfer"
then_level = 3
then_ids   = "Cladistics"

# NeutralDrift requires CoalescentTheory or BayesianPhylo (neutral theory uses coalescent)
[[rule]]
type       = "require"
if_level   = 1
if_id      = "NeutralDrift"
then_level = 3
then_ids   = "CoalescentTheory,BayesianPhylo"

# AdaptiveRadiation requires NaturalSelection or SexualSelection (adaptation needs selection)
[[rule]]
type       = "require"
if_level   = 2
if_id      = "AdaptiveRadiation"
then_level = 1
then_ids   = "NaturalSelection,SexualSelection,SixSelection"

# MassExtinction requires Allopatric or AdaptiveRadiation (extinction drives speciation)
[[rule]]
type       = "require"
if_level   = 4
if_id      = "MassExtinction"
then_level = 2
then_ids   = "Allopatric,AdaptiveRadiation"
