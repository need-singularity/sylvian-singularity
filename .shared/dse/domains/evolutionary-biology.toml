# =============================================================
# Evolutionary Biology DSE Domain Definition
# 궁극의 진화생물학 — 자연선택 + 유전적 부동 + 종분화 + 생명의 나무
# BT-51: Genetic code chain tau->n/phi->2^n->J2-tau (4->3->64->20)
# Total raw combos: 6x6x6x6x5 = 6,480 (pre-filter)
# =============================================================

[meta]
name = "evolutionary-biology"
desc = "Ultimate Evolutionary Biology DSE (BT-51 genetic code chain)"
levels = ["Mutation", "Selection", "Speciation", "Phylogeny", "MacroEvolution"]
vision = "n=6 기반 궁극의 진화생물학 — 자연선택 + 유전적 부동 + 종분화 + 생명의 나무"

[scoring]
n6   = 0.35
perf = 0.25
power = 0.20
cost  = 0.20

