# ============================================================
# Compatibility Rules
# ============================================================

# EMG sensor requires EMG spectrogram feature
[[rule]]
type = "require"
if_level = 0
if_id = "EMG-Surface"
then_level = 1
then_ids = ["Spectrogram-EMG", "Learned-Embed"]

# SNN model requires neuromorphic inference
[[rule]]
type = "require"
if_level = 2
if_id = "SNN-Spiking"
then_level = 3
then_ids = ["Neuromorphic", "FPGA"]

# Surgical robot requires cloud or edge NPU
[[rule]]
type = "require"
if_level = 4
if_id = "Surgical-Robot"
then_level = 3
then_ids = ["Cloud-GPU", "Edge-NPU", "FPGA"]

# MCU TinyML only for simple applications
[[rule]]
type = "require"
if_level = 3
if_id = "MCU-TinyML"
then_level = 4
then_ids = ["Smart-Home", "Vehicle-HMI", "Gaming"]
