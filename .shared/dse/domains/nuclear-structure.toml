name = "nuclear-structure"
desc = "Ultimate Nuclear Structure DSE (BT-27/43/51)"
levels = ["Nucleon", "Shell", "Force", "Clustering", "Synthesis"]
vision = "Carbon-12 as the universal nuclear n=6 node -- 3 alpha clusters, CNO catalyst"

[scoring]
n6   = 0.35
perf = 0.25
power = 0.20
cost  = 0.20

