# =============================================================
# Compatibility Rules
# =============================================================

# AlphaCluster required for Carbon12Shell
[[rule]]
type       = "require"
if_level   = 3
if_id      = "AlphaCluster"
then_level = 1
then_ids   = "Carbon12Shell,Helium4Shell"

# ChiralEFT requires ThreeBody (systematic expansion demands 3NF)
[[rule]]
type       = "require"
if_level   = 2
if_id      = "ChiralEFT"
then_level = 2
then_ids   = "ThreeBody"

# Superheavy requires MagicN (shell closure is essential)
[[rule]]
type       = "require"
if_level   = 4
if_id      = "Superheavy"
then_level = 1
then_ids   = "MagicN"

# BBN/PPChain requires Isospin2 (proton-neutron distinction fundamental)
[[rule]]
type       = "require"
if_level   = 4
if_id      = "PPChain"
then_level = 0
then_ids   = "Isospin2,QuarkTriplet"
