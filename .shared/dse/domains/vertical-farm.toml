# =============================================================
# Rules
# =============================================================

# Aquaponic nutrient needs DWC or NFT growing
[[rule]]
type      = "prefer"
if_level  = 2
if_id     = "Aquaponic"
then_level = 1
then_ids  = "DWC,NFT_Hydro"

# Organic tea incompatible with aeroponics
[[rule]]
type      = "exclude"
if_level  = 2
if_id     = "Organic_Tea"
then_level = 1
then_ids  = "Aeroponic"

# AI climate pairs with AI dosing
[[rule]]
type      = "prefer"
if_level  = 3
if_id     = "AI_Climate"
then_level = 2
then_ids  = "AI_Dosing"

# Robotic harvest needs conveyor infrastructure
[[rule]]
type      = "prefer"
if_level  = 4
if_id     = "Robot_Arm"
then_level = 1
then_ids  = "NFT_Hydro,Aeroponic"
