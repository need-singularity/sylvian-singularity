# =============================================================
# Rules
# =============================================================

# Raman detection pairs well with photocatalytic degradation
[[rule]]
type      = "prefer"
if_level  = 0
if_id     = "Raman_Spec"
then_level = 2
then_ids  = "PhotoCat_TiO2,Fenton_Adv"

# Magnetic separation enables easy chemical recycling
[[rule]]
type      = "prefer"
if_level  = 1
if_id     = "Magnetic_Sep"
then_level = 3
then_ids  = "Chemical_Recycle,Solvent_Extract"

# Supercritical water oxidation is too harsh for monomer recovery
[[rule]]
type      = "exclude"
if_level  = 2
if_id     = "Supercrit_H2O"
then_level = 3
then_ids  = "Chemical_Recycle"

# AI predictive model best with real-time inline sensors
[[rule]]
type      = "prefer"
if_level  = 4
if_id     = "AI_Predict"
then_level = 0
then_ids  = "AI_Vision,Flow_Cyto"
