desc = "Microplastics Removal DSE (6um mesh, CN=6 catalysis, 6-stage pipeline)"
levels = ["Detection", "Filtration", "Degradation", "Recovery", "Monitoring"]
vision = "Zero-microplastic water — n=6 filtration-to-degradation full-cycle architecture"

[scoring]
n6   = 0.35
perf = 0.25
power = 0.20
cost  = 0.20

