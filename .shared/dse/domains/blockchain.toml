# =============================================================
# Compatibility Rules
# =============================================================

# STARK_FRI requires CairoVM_ZK or RISC_V_ZK
[[rule]]
type       = "require"
if_level   = 1
if_id      = "STARK_FRI"
then_level = 2
then_ids   = "CairoVM_ZK,RISC_V_ZK"

# SNARK_Groth16 requires ZK rollup or CairoVM_ZK
[[rule]]
type       = "require"
if_level   = 1
if_id      = "SNARK_Groth16"
then_level = 3
then_ids   = "Rollup_ZK,Sharding_Dank"

# Nakamoto PoW excludes ZK rollup (no finality for proof verification)
[[rule]]
type       = "exclude"
if_level   = 0
if_id      = "Nakamoto_PoW"
then_level = 3
then_ids   = "Rollup_ZK"

# State channels exclude DAG consensus
[[rule]]
type       = "exclude"
if_level   = 3
if_id      = "State_Channel"
then_level = 0
then_ids   = "DAG_Consensus"

# PoH_Solana requires SVM_Solana
[[rule]]
type       = "require"
if_level   = 0
if_id      = "PoH_Solana"
then_level = 2
then_ids   = "SVM_Solana"

# BLS12_381 preferred with PoS_Ethereum
[[rule]]
type       = "prefer"
if_level   = 1
if_id      = "BLS12_381"
then_level = 0
then_ids   = "PoS_Ethereum"

# Danksharding preferred with PoS_Ethereum
[[rule]]
type       = "prefer"
if_level   = 3
if_id      = "Sharding_Dank"
then_level = 0
then_ids   = "PoS_Ethereum"

# ZK Rollup prefers SNARK or STARK crypto
[[rule]]
type       = "prefer"
if_level   = 3
if_id      = "Rollup_ZK"
then_level = 1
then_ids   = "SNARK_Groth16,STARK_FRI,BLS12_381"

# DeFi prefers EVM or MoveVM (established ecosystems)
[[rule]]
type       = "prefer"
if_level   = 4
if_id      = "DeFi_AMM"
then_level = 2
then_ids   = "EVM_Solidity,MoveVM,SVM_Solana"

# Identity DID prefers MPC or BLS for key management
[[rule]]
type       = "prefer"
if_level   = 4
if_id      = "Identity_DID"
then_level = 1
then_ids   = "MPC_TSS,BLS12_381"
