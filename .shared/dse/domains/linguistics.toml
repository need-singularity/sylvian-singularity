# =============================================================
# Linguistics DSE Domain Definition
# 언어학/인지과학 아키텍처 — n=6 기반 언어학
# Zipf 법칙 + 6 기본 언어 유형 + 음운 체계
# Based on H-LING-001~015, H-ARCH-languages
# Total raw combos: 6x6x6x6x5 = 6,480 (pre-filter)
# =============================================================

[meta]
name = "linguistics"
desc = "Ultimate Linguistics DSE (H-LING-001~015, Zipf/Typology/Phonology)"
levels = ["Phonology", "Syntax", "Semantics", "Typology", "Computation"]
vision = "n=6 기반 언어학 — Zipf 법칙 + 6 기본 언어 유형 + 음운 체계"

[scoring]
n6   = 0.35
perf = 0.25
power = 0.20
cost  = 0.20

