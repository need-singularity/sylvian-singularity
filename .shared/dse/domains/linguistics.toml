name = "linguistics"
desc = "Language & Communication Architecture DSE (6 families, σ=12 tenses)"
levels = ["Foundation", "Encoding", "Core", "Engine", "System"]
vision = "n=6 linguistic universals -- phoneme to discourse, Zipf to Chomsky"

[scoring]
n6   = 0.35
perf = 0.25
power = 0.20
cost  = 0.20

