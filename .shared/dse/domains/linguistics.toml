# =============================================================
# Compatibility Rules
# =============================================================

# SemanticRoles core requires SyntaxDepth or CFG foundation/core
[[rule]]
type       = "require"
if_level   = 2
if_id      = "SemanticRoles"
then_level = 0
then_ids   = "SyntaxDepth,MorphemeRoots"

# Transformer engine requires BPE or WordEmbedding
[[rule]]
type       = "require"
if_level   = 3
if_id      = "Transformer"
then_level = 1
then_ids   = "BPE,Unicode"

# SpeechRecog requires IPA or ToneSystem encoding
[[rule]]
type       = "require"
if_level   = 3
if_id      = "SpeechRecog"
then_level = 1
then_ids   = "IPA,ToneSystem"

# UniversalTranslator requires LangFamilies6 foundation
[[rule]]
type       = "require"
if_level   = 4
if_id      = "UniversalTranslator"
then_level = 0
then_ids   = "LangFamilies6,ZipfLaw"

# ChildLangModel requires SyntaxDepth foundation
[[rule]]
type       = "require"
if_level   = 4
if_id      = "ChildLangModel"
then_level = 0
then_ids   = "SyntaxDepth,Phoneme6"

# CaseSystem encoding not compatible with pure isolating language analysis
[[rule]]
type       = "exclude"
if_level   = 1
if_id      = "CaseSystem"
then_level = 2
then_ids   = "WordEmbedding"

# CorpusAnalysis prefers ZipfLaw foundation
[[rule]]
type       = "prefer"
if_level   = 3
if_id      = "CorpusAnalysis"
then_level = 0
then_ids   = "ZipfLaw,LangFamilies6"
