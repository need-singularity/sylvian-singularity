# =============================================================
# Compatibility Rules
# =============================================================

# UniversalGrammar requires VowelN6 or ConsonantN12 (grammar needs phonology)
[[rule]]
type       = "require"
if_level   = 1
if_id      = "UniversalGrammar"
then_level = 0
then_ids   = "VowelN6,ConsonantN12"

# WordOrderN6 is n6=1.0 (already set in candidate) -- no rule needed

# ZipfLaw requires DistributionalSemantic
[[rule]]
type       = "require"
if_level   = 3
if_id      = "ZipfLaw"
then_level = 2
then_ids   = "DistributionalSemantic"

# NLP_Transformer requires UniversalGrammar or MinimalistProgram (needs formal syntax)
[[rule]]
type       = "require"
if_level   = 4
if_id      = "NLP_Transformer"
then_level = 1
then_ids   = "UniversalGrammar,MinimalistProgram"

# SpeechRecognition requires ProsodyN4 or PhonemeInventory (needs phonology detail)
[[rule]]
type       = "require"
if_level   = 4
if_id      = "SpeechRecognition"
then_level = 0
then_ids   = "ProsodyN4,PhonemeInventory,StressPattern"
