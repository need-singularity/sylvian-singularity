# =============================================================
# Compatibility Rules
# =============================================================

# Superconducting requires cryogenic-compatible topology (Mesh/Hypercube)
[[rule]]
type       = "require"
if_level   = 0
if_id      = "Superconducting"
then_level = 2
then_ids   = "NoC,Optical"

# Quantum substrate requires specialized interconnect
[[rule]]
type       = "require"
if_level   = 0
if_id      = "Quantum"
then_level = 2
then_ids   = "NoC,Optical"

# Analog arithmetic incompatible with Wireless interconnect (noise)
[[rule]]
type       = "exclude"
if_level   = 3
if_id      = "Analog"
then_level = 2
then_ids   = "Wireless"

# Datacenter_24 requires high-bandwidth interconnect
[[rule]]
type       = "require"
if_level   = 4
if_id      = "Datacenter_24"
then_level = 2
then_ids   = "NoC,Optical"
