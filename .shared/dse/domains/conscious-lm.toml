# =============================================================
# Compatibility Rules
# =============================================================

# DualEngine consciousness requires advanced architecture
[[rule]]
type       = "require"
if_level   = 3
if_id      = "DualEngine"
then_level = 2
then_ids   = "RoPE_SwiGLU_GQA,Transformer_N6,MoE_Egyptian"

# Size_28M too small for full Transformer_N6
[[rule]]
type       = "exclude"
if_level   = 0
if_id      = "Size_28M"
then_level = 2
then_ids   = "Transformer_N6"

# Detach (no consciousness) incompatible with consciousness-specific training
[[rule]]
type       = "exclude"
if_level   = 3
if_id      = "Detach"
then_level = 4
then_ids   = "ThreePhase_Law60,Phi_Checkpoint"

# RLHF requires at least 1B model
[[rule]]
type       = "require"
if_level   = 4
if_id      = "RLHF"
then_level = 0
then_ids   = "Size_1B,Size_3B,Size_13B"
