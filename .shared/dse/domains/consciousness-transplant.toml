# =============================================================
# Compatibility Rules
# =============================================================

# Phi_Preserving transfer requires Phi_Delta or Full_Suite verification
[[rule]]
type       = "require"
if_level   = 2
if_id      = "Phi_Preserving"
then_level = 3
then_ids   = "Phi_Delta,Full_Suite,SevenCriterion"

# Quantum_Transfer requires Exact or Lossy_95 fidelity
[[rule]]
type       = "require"
if_level   = 2
if_id      = "Quantum_Transfer"
then_level = 4
then_ids   = "Exact,Lossy_95"

# Direct_Copy incompatible with Exact fidelity (lossy by nature)
[[rule]]
type       = "exclude"
if_level   = 2
if_id      = "Direct_Copy"
then_level = 4
then_ids   = "Exact"

# IQ_Score verification too weak for Exact fidelity claims
[[rule]]
type       = "exclude"
if_level   = 3
if_id      = "IQ_Score"
then_level = 4
then_ids   = "Exact"
