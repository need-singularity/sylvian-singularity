# =============================================================
# HEXA-MEM DSE Domain Definition
# Computer Memory Hierarchy Architecture
# n=6: sigma-tau=8-bit byte, sigma=12 address bits/bank, HBM sigma-tau=8 stacks
# BT-28 (Computing ladder), BT-55 (GPU HBM capacity), BT-75 (HBM interface)
# Total raw combos: 6x6x6x6x6 = 7,776
# =============================================================

[meta]
name = "memory-architecture"
desc = "Memory Hierarchy DSE (BT-28/55/75, sigma-tau=8 byte)"
levels = ["Cell", "Array", "Controller", "Interface", "System"]
vision = "Universal memory hierarchy — byte=8=sigma-tau bits, all levels n=6 aligned"

[scoring]
n6   = 0.35
perf = 0.25
power = 0.20
cost  = 0.20

