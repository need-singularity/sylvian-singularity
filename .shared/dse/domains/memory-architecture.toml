# =============================================================
# Rules
# =============================================================

# SRAM cells go in cache, not system-level storage
[[rule]]
type      = "prefer"
if_level  = 0
if_id     = "SRAM_6T"
then_level = 4
then_ids  = "HPC_Flat,AI_Server"

# HBM interface needs 3D stacked arrays
[[rule]]
type      = "prefer"
if_level  = 3
if_id     = "HBM3E_IF"
then_level = 1
then_ids  = "3D_Stack,Bank24"

# Mobile interface needs low-power controller
[[rule]]
type      = "prefer"
if_level  = 3
if_id     = "LPDDR5X_IF"
then_level = 2
then_ids  = "LPDDR5_Ctrl"

# ReRAM/PCRAM cells pair with CIM or crossbar arrays
[[rule]]
type      = "prefer"
if_level  = 0
if_id     = "ReRAM"
then_level = 1
then_ids  = "CIM_Array,Crossbar"
