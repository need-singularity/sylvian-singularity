# ============================================================
# Compatibility Rules
# ============================================================

# Na-ion excluded from sports car (energy density too low)
[[rule]]
type = "exclude"
if_level = 0
if_id = "Na-ion-EV"
then_level = 4
then_ids = ["SportsCar", "SUV-800V"]

# GaN 48V requires city car 48V (voltage class match)
[[rule]]
type = "require"
if_level = 2
if_id = "GaN-48V"
then_level = 4
then_ids = ["City-48V"]

# MCS charging requires truck platform
[[rule]]
type = "require"
if_level = 3
if_id = "Megawatt-MCS"
then_level = 4
then_ids = ["Truck-MCS"]

# 192S battery requires 800V vehicle (SUV or SportsCar)
[[rule]]
type = "require"
if_level = 0
if_id = "NMC-192S"
then_level = 4
then_ids = ["SUV-800V", "SportsCar"]

# City-48V excluded from 350kW DC fast charging
[[rule]]
type = "exclude"
if_level = 4
if_id = "City-48V"
then_level = 3
then_ids = ["CCS2-350kW", "Megawatt-MCS"]
