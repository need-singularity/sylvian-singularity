# ============================================================
# Compatibility Rules
# ============================================================

# Ti-6Al-4V is the gold standard for load-bearing implants
[[rule]]
type = "prefer"
if_level = 0
if_id = "Ti_6Al_4V"
then_level = 4
then_ids = "Hip_joint,Dental_implant,Spinal_cage"

# Ti-6Al-4V pairs well with anodization and nano-texture surfaces
[[rule]]
type = "prefer"
if_level = 0
if_id = "Ti_6Al_4V"
then_level = 1
then_ids = "Anodization_12V,Nano_texture_6nm,Hydroxyapatite_coat"

# CoCrMo for joint bearing surfaces
[[rule]]
type = "prefer"
if_level = 0
if_id = "CoCrMo_ortho"
then_level = 4
then_ids = "Hip_joint,Knee_replacement"

# CoCrMo typically investment cast or CNC
[[rule]]
type = "prefer"
if_level = 0
if_id = "CoCrMo_ortho"
then_level = 2
then_ids = "Investment_casting,CNC_machining"

# PEEK for spinal applications, injection molded
[[rule]]
type = "prefer"
if_level = 0
if_id = "PEEK_polymer"
then_level = 4
then_ids = "Spinal_cage,Cranial_plate"

[[rule]]
type = "prefer"
if_level = 0
if_id = "PEEK_polymer"
then_level = 2
then_ids = "Injection_molding,CNC_machining"

# Hydroxyapatite coating enables osseointegration
[[rule]]
type = "prefer"
if_level = 1
if_id = "Hydroxyapatite_coat"
then_level = 3
then_ids = "Osseointegration_12week,Immune_response"

# 3D print SLM for patient-specific and porous designs
[[rule]]
type = "prefer"
if_level = 2
if_id = "3D_print_SLM"
then_level = 4
then_ids = "Cranial_plate,Spinal_cage,Hip_joint"

# Cardiac stent needs hemocompatibility
[[rule]]
type = "prefer"
if_level = 4
if_id = "Cardiac_stent"
then_level = 3
then_ids = "Hemocompatibility,Degradation_rate"

# Drug-eluting surface pairs with cardiac stent and dental
[[rule]]
type = "prefer"
if_level = 1
if_id = "Drug_eluting"
then_level = 4
then_ids = "Cardiac_stent,Dental_implant"

# Electrospinning scaffold for tissue engineering with degradation
[[rule]]
type = "prefer"
if_level = 2
if_id = "Electrospinning_6fiber"
then_level = 3
then_ids = "Degradation_rate,Immune_response"
