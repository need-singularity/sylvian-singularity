# n=6: 6 orbital planes (GPS), σ=12 frequency bands, J₂=24 satellites/plane
# Total raw combos: 6x6x6x6x6 = 7,776 (pre-filter)
# =============================================================

[meta]
name = "satellite-communication"
desc = "Satellite Communication Architecture DSE (orbit/antenna/transponder/protocol/ground)"

[scoring]
n6 = 0.35
perf = 0.25
power = 0.20
cost = 0.20

