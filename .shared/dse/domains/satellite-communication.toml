# ============================================================
# Compatibility Rules
# ============================================================

# GEO requires parabolic or deployable (high gain needed)
[[rule]]
type = "require"
if_level = 0
if_id = "GEO-Slot"
then_level = 1
then_ids = ["Parabolic-12m", "Deployable-Mesh"]

# Optical ISL requires LEO or MEO (GEO too far for mesh)
[[rule]]
type = "exclude"
if_level = 2
if_id = "Optical-ISL"
then_level = 0
then_ids = ["GEO-Slot", "HEO-Molniya"]

# Mobile satphone excluded from high-throughput gateway
[[rule]]
type = "exclude"
if_level = 4
if_id = "Mobile-Satphone"
then_level = 2
then_ids = ["Optical-ISL", "Regenerative"]

# SSO orbit excluded from consumer ground (observation only)
[[rule]]
type = "exclude"
if_level = 0
if_id = "SSO"
then_level = 4
then_ids = ["FlatPanel-User", "Mobile-Satphone"]
