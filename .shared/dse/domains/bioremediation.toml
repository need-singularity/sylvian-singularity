# =============================================================
# HEXA-BRM DSE Domain Definition
# Bioremediation: Assessment, Organism, Inoculation, Monitoring,
# Restoration
# n=6: CN=6 enzyme active sites, 6-week treatment cycle,
#       phi=2 microbial doubling, sigma=12 metabolic pathways
# BT-51 (Genetic code chain), BT-101 (Photosynthesis universality)
# Total raw combos: 6x6x6x6x6 = 7,776
