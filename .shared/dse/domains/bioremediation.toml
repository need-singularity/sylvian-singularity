[meta]
name = "bioremediation"
desc = "Bioremediation DSE (CN=6 enzymes, 6-week cycle, phi=2 doubling)"
levels = ["Assessment", "Organism", "Inoculation", "Monitoring", "Restoration"]
vision = "Living remediation — CN=6 enzymatic pollutant destruction architecture"

[scoring]
n6   = 0.35
perf = 0.25
power = 0.20
cost  = 0.20

