# =============================================================
# Rules
# =============================================================

# Engineered microbes need stringent genetic monitoring
[[rule]]
type      = "prefer"
if_level  = 1
if_id     = "Engineered"
then_level = 3
then_ids  = "qPCR_Genetic,Metagenome"

# Phytoremediation naturally flows to native revegetation
[[rule]]
type      = "prefer"
if_level  = 1
if_id     = "Phytoremed"
then_level = 4
then_ids  = "Native_Revegetate,Wetland_Construct"

# Landfarming inoculation too disruptive for constructed wetland
[[rule]]
type      = "exclude"
if_level  = 2
if_id     = "Landfarming"
then_level = 4
then_ids  = "Wetland_Construct"

# Isotope tracing assessment pairs with MNA monitoring
[[rule]]
type      = "prefer"
if_level  = 0
if_id     = "Isotope_Trace"
then_level = 3
then_ids  = "MNA_Model,Geochem_Sensor"
