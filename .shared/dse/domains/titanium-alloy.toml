# ============================================================
# Compatibility Rules
# ============================================================

# Ti-6Al-4V is the universal workhorse, pairs with most processes
[[rule]]
type = "prefer"
if_level = 0
if_id = "Ti6Al4V"
then_level = 1
then_ids = "Forging_6step,VAR_Melt"

[[rule]]
type = "prefer"
if_level = 0
if_id = "Ti6Al4V"
then_level = 2
then_ids = "Bimodal,Equiaxed_Alpha"

# Ti-6242 high-temp alloy for aerospace compressor
[[rule]]
type = "prefer"
if_level = 0
if_id = "Ti6242"
then_level = 4
then_ids = "Aerospace_Compressor,Chemical_Reactor"

[[rule]]
type = "prefer"
if_level = 0
if_id = "Ti6242"
then_level = 2
then_ids = "Lamellar_Colony_12um,Widmanstatten"

# CP-Ti grade 4 for medical and chemical applications
[[rule]]
type = "prefer"
if_level = 0
if_id = "CPTi_Grade4"
then_level = 4
then_ids = "Medical_Implant_6Al,Chemical_Reactor"

[[rule]]
type = "prefer"
if_level = 0
if_id = "CPTi_Grade4"
then_level = 3
then_ids = "HA_Biocoat,Anodizing_6V"

# TiAl gamma intermetallic needs specialized processing
[[rule]]
type = "prefer"
if_level = 0
if_id = "TiAl_Gamma"
then_level = 1
then_ids = "EBM_Melt,HIP_Densify"

# Ti-5553 beta alloy for maximum strength landing gear
[[rule]]
type = "prefer"
if_level = 0
if_id = "Ti5553"
then_level = 2
then_ids = "Beta_Quenched,Nano_Crystalline"

# Additive manufacturing pairs with HIP densification
[[rule]]
type = "prefer"
if_level = 1
if_id = "Powder_SLM"
then_level = 1
then_ids = "HIP_Densify"

# Medical implant requires biocoating surface treatment
[[rule]]
type = "prefer"
if_level = 4
if_id = "Medical_Implant_6Al"
then_level = 3
then_ids = "HA_Biocoat,Anodizing_6V"

# Aerospace compressor needs shot peening for fatigue
[[rule]]
type = "prefer"
if_level = 4
if_id = "Aerospace_Compressor"
then_level = 3
then_ids = "Shot_Peening,Nitriding"

# Bimodal microstructure is optimized via forging route
[[rule]]
type = "prefer"
if_level = 2
if_id = "Bimodal"
then_level = 1
then_ids = "Forging_6step,VAR_Melt"
