# ============================================================
# Compatibility Rules
# ============================================================

# PZT ceramic pairs with standard sintering
[[rule]]
type = "prefer"
if_level = 0
if_id = "PZT_ceramic"
then_level = 1
then_ids = "Sintering_6step,Tape_casting"

# AlN thin film pairs with sputtering for MEMS
[[rule]]
type = "prefer"
if_level = 0
if_id = "AlN_thin_film"
then_level = 1
then_ids = "Sputtering_12target,Sol_gel"

# PMN-PT single crystal pairs with crystal growth
[[rule]]
type = "prefer"
if_level = 0
if_id = "PMN_PT_crystal"
then_level = 1
then_ids = "Single_crystal_growth,Sputtering_12target"

# PVDF polymer pairs with flexible electrode and wearable
[[rule]]
type = "prefer"
if_level = 0
if_id = "PVDF_polymer"
then_level = 3
then_ids = "Flexible_polymer,ITO_transparent"

# ZnO wurtzite pairs with thin film configurations
[[rule]]
type = "prefer"
if_level = 0
if_id = "ZnO_wurtzite"
then_level = 2
then_ids = "Thin_film_6layer,Fiber_composite"

# Stack 12-layer configuration pairs with precision actuator
[[rule]]
type = "prefer"
if_level = 2
if_id = "Stack_12layer"
then_level = 4
then_ids = "Actuator_precision,Inkjet_printhead"

# Bimorph configuration pairs with buzzer and energy harvester
[[rule]]
type = "prefer"
if_level = 2
if_id = "Bimorph"
then_level = 4
then_ids = "Buzzer_speaker,Energy_harvester"

# Bulk disk pairs with ultrasound transducer
[[rule]]
type = "prefer"
if_level = 2
if_id = "Bulk_disk"
then_level = 4
then_ids = "Ultrasound_transducer,Sensor_accelerometer"

# Interdigitated electrode pairs with thin-film configuration
[[rule]]
type = "prefer"
if_level = 3
if_id = "Interdigitated_6pair"
then_level = 2
then_ids = "Thin_film_6layer,Fiber_composite"

# Pt sputter electrode pairs with MEMS applications
[[rule]]
type = "prefer"
if_level = 3
if_id = "Pt_sputter"
then_level = 4
then_ids = "Actuator_precision,Inkjet_printhead"
