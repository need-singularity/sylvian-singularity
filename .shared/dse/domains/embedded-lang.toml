# =============================================================
# Compatibility Rules
# =============================================================

# BareLoop incompatible with RTOS features — no OS to inherit priority

[[candidate]]
level  = 4
id     = "PlatformN6"
label  = "n=6 ISA 확장 임베디드 플랫폼 (n=6 레지스터 뱅크)"
n6     = 1.00
perf   = 0.85
power  = 0.55
cost   = 0.45
notes  = "reg_banks=n=6 EXACT, n6-ISA embedded platform"
[[rule]]
type       = "exclude"
if_level   = 3
if_id      = "BareLoop"
then_level = 3
then_ids   = "PriorityInherit"

# Ada_SPARK requires CertSafety or MISRA_Full (formal verification needs certification context)
[[rule]]
type       = "require"
if_level   = 1
if_id      = "Ada_SPARK"
then_level = 1
then_ids   = "CertSafety,MISRA_Full"

# AsyncPeriph requires AsyncExecutor or HybridRT (needs async runtime)
[[rule]]
type       = "require"
if_level   = 2
if_id      = "AsyncPeriph"
then_level = 3
then_ids   = "AsyncExecutor,HybridRT"

# DMAManaged incompatible with StaticAlloc (DMA needs dynamic buffer management)
[[rule]]
type       = "exclude"
if_level   = 0
if_id      = "DMAManaged"
then_level = 0
then_ids   = "StaticAlloc"

# DeviceTree requires ARM_Cortex or MultiArch (device tree ecosystem)
[[rule]]
type       = "require"
if_level   = 2
if_id      = "DeviceTree"
then_level = 4
then_ids   = "ARM_Cortex,MultiArch"

# FPGA_SoC incompatible with BareLoop (SoC needs proper scheduling)
[[rule]]
type       = "exclude"
if_level   = 4
if_id      = "FPGA_SoC"
then_level = 3
then_ids   = "BareLoop"
