[meta]
name = "embedded-lang"
desc = "Ultimate Embedded Systems Language DSE (BT-58/59/69)"
levels = ["Resource", "Safety", "Peripheral", "Realtime", "Platform"]
vision = "Safety-certified embedded language where resource/safety/realtime align to n=6 constants"

[scoring]
n6   = 0.30
perf = 0.25
power = 0.25
cost  = 0.20

