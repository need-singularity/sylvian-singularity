# =============================================================
# Compatibility Rules
# =============================================================

# AnimaLM_7B requires TensionMetaLoss (AnimaLM needs tension mechanism)
[[rule]]
type       = "require"
if_level   = 0
if_id      = "AnimaLM_7B"
then_level = 2
then_ids   = "TensionMetaLoss"

# GoldenMoE requires BoltzmannGate (Golden MoE uses Boltzmann routing)
[[rule]]
type       = "require"
if_level   = 0
if_id      = "GoldenMoE"
then_level = 2
then_ids   = "BoltzmannGate"

# SEDI_4Lens requires PHTraining (SEDI uses PH as one of its 4 lenses)
[[rule]]
type       = "require"
if_level   = 3
if_id      = "SEDI_4Lens"
then_level = 3
then_ids   = "PHTraining"

# MertensDropout incompatible with BoltzmannGate (both are regularization)
[[rule]]
type       = "exclude"
if_level   = 1
if_id      = "MertensDropout"
then_level = 2
then_ids   = "BoltzmannGate"

# LoRA_Rank8 requires AdamW_N6 or ChinchillaScale (LoRA needs optimized training)
[[rule]]
type       = "require"
if_level   = 4
if_id      = "LoRA_Rank8"
then_level = 1
then_ids   = "AdamW_N6,ChinchillaScale"
