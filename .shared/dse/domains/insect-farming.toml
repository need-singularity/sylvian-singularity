# =============================================================
# Compatibility Rules
# =============================================================

# BSF is waste-specialist: pairs best with organic waste or manure
[[rule]]
type       = "require"
if_level   = 0
if_id      = "PalmWeevil"
then_level = 1
then_ids   = "OpenShed,Greenhouse"

# Silkworm requires controlled environment
[[rule]]
type       = "require"
if_level   = 0
if_id      = "Silkworm"
then_level = 1
then_ids   = "ClimateRoom,ContainerMod,Greenhouse"

# Enzymatic hydrolysis only for high-value products
[[rule]]
type       = "require"
if_level   = 3
if_id      = "Enzymatic"
then_level = 4
then_ids   = "ProteinPowder,ChitinBio,OilLipid"
