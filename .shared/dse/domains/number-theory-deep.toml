# =============================================================
# Compatibility Rules
# =============================================================

# SigmaPhiNTau has n6=1.0 (core theorem, always valid — no rule needed, just highest n6)

# RiemannZeta requires EulerProduct (Euler product is zeta's prime factorization)

[[candidate]]
level  = 4
id     = "BTC6Confirm"
label  = "BTC 6 Confirmations + Golay J2=24 Code (n=6, J2=24 EXACT)"
n6     = 1.00
perf   = 0.88
power  = 0.52
cost   = 0.42
notes  = "BTC_confirms=6=n EXACT (BT-53), Golay_code=24=J2 EXACT, RSA_primes=2=phi EXACT, AES_rounds=10=sigma-phi EXACT"
[[rule]]
type       = "require"
if_level   = 1
if_id      = "RiemannZeta"
then_level = 1
then_ids   = "EulerProduct"

# SymmetricS6 requires GaloisGroup or CyclotomicField (S6 lives in algebraic structures)
[[rule]]
type       = "require"
if_level   = 2
if_id      = "SymmetricS6"
then_level = 2
then_ids   = "GaloisGroup,CyclotomicField"

# RamseyN6 is EXACT n=6 — boost by requiring strong arithmetic base
# (No exclusion needed — Ramsey works with all arithmetic)

# ModularForm requires algebraic structure (class number or cyclotomic)
[[rule]]
type       = "require"
if_level   = 1
if_id      = "ModularForm"
then_level = 2
then_ids   = "CyclotomicField,ClassNumber,AlgebraicInt"
