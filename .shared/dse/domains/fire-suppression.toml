# ============================================================
# Compatibility Rules
# ============================================================

# Clean agent requires total flooding delivery
[[rule]]
type = "require"
if_level = 1
if_id = "Clean-Agent"
then_level = 2
then_ids = ["Total-Flood", "Pre-Action"]

# CO2 requires total flood with sealed room
[[rule]]
type = "require"
if_level = 1
if_id = "CO2-System"
then_level = 2
then_ids = ["Total-Flood"]

# Standalone controller only for simple systems
[[rule]]
type = "require"
if_level = 3
if_id = "Standalone"
then_level = 2
then_ids = ["Wet-Sprinkler", "Localized"]

# AFFF foam for deluge or localized only
[[rule]]
type = "require"
if_level = 1
if_id = "Foam-AFFF"
then_level = 2
then_ids = ["Deluge", "Localized"]

# Refuge floor requires networked or BMS control
[[rule]]
type = "require"
if_level = 4
if_id = "Refuge-Floor"
then_level = 3
then_ids = ["Networked", "BMS-Integrated", "AI-Analytics"]
