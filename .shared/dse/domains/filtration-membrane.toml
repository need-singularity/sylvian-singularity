# ============================================================
# Compatibility Rules
# ============================================================

# RO membrane type requires PA_TFC or Ceramic material
[[rule]]
type = "prefer"
if_level = 0
if_id = "RO"
then_level = 1
then_ids = "PA_TFC,Ceramic"

# Graphene material best with NF or RO membrane type
[[rule]]
type = "prefer"
if_level = 1
if_id = "Graphene"
then_level = 0
then_ids = "NF,RO"

# Hollow fiber modules pair with submerged MBR or backwash operation
[[rule]]
type = "prefer"
if_level = 2
if_id = "HollowFiber"
then_level = 3
then_ids = "Backwash,AirScour"

# Pharma application requires chemical CIP or adaptive flux operation
[[rule]]
type = "prefer"
if_level = 4
if_id = "PharmaBio"
then_level = 3
then_ids = "ChemicalCIP,AdaptiveFlux"

# ED membrane type pairs with industrial or desalination application
[[rule]]
type = "prefer"
if_level = 0
if_id = "ED"
then_level = 4
then_ids = "DesalSeawater,IndustrialProcess"
