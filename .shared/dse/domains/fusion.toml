then_ids = "N6_Li6_Blanket,SiC_LiPb"

# N6 Brayton cycle prefers N6 Li-6 Blanket for high T_out
# (D12: Fe-56 binding energy max -> optimal thermal conversion)
[[rule]]
type     = "prefer"
if_level = 4
if_id    = "N6_Brayton6"
then_level = 3
then_ids = "N6_Li6_Blanket,SiC_LiPb"

# DT_Li6 complete fuel cycle prefers N6 Li-6 Blanket
# (closed n=6 breeding cycle: D5 baryon + D14 BBN ratio)
