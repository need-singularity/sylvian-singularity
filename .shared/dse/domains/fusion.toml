# =============================================================
# HEXA-FUSION DSE Domain Definition
# Source: docs/fusion/goal.md + tools/fusion-calc/main.rs
# BT-27 (Carbon-6 energy chain) + BT-38 (Hydrogen quadruplet)
# H-FU-1 (D-T nucleon sopfr=5), H-FU-30 (Li-6 isotope n=6)
# H-FU-9 (optimal T_i=14keV=sigma+phi), H-FU-48 (p-B11 3 alphas)
# Total raw combos: 5x6x6x5x5 = 4,500 (pre-filter)
# =============================================================

[meta]
name = "fusion"
desc = "Nuclear Fusion Architecture DSE (BT-27/38, 60 H-FU)"
levels = ["Fuel", "Confinement", "Heating", "Blanket", "Plant"]
vision = "Baseload fusion power -- limitless clean energy from seawater"

[scoring]
n6   = 0.35
perf = 0.30
power = 0.20
cost  = 0.15

