# =============================================================
# Compatibility Rules
#   type: "require" = must pair, "exclude" = cannot pair,
#         "prefer"  = bonus when paired
# =============================================================

# ── Fuel constraints ──

# p-B11 requires non-standard confinement (too hard for conventional tokamak)
[[rule]]
type     = "require"
if_level = 0
if_id    = "pB11"
then_level = 1
then_ids = "ICF,FRC,MCF_Compact"

# D-He3 excludes Z-Pinch (insufficient confinement for high-T)
[[rule]]
type     = "exclude"
if_level = 0
if_id    = "DHe3"
then_level = 1
then_ids = "Z_Pinch"

# ── Heating constraints ──

# Laser heating requires ICF confinement
[[rule]]
type     = "require"
if_level = 2
if_id    = "Laser"
then_level = 1
then_ids = "ICF"

# Ohmic alone insufficient for advanced fuels (D-He3, p-B11)
[[rule]]
type     = "exclude"
if_level = 2
if_id    = "Ohmic"
then_level = 0
then_ids = "DHe3,pB11"

# ── Plant constraints ──

# Direct MHD requires charged-particle-rich output (DT or DD)
[[rule]]
type     = "require"
if_level = 4
if_id    = "Direct_MHD"
then_level = 0
then_ids = "DT,DD,DHe3,pB11"

# Brayton-SCO2 and Hybrid need high blanket outlet T (SiC_LiPb or FLiBe)
[[rule]]
type     = "prefer"
if_level = 4
if_id    = "Brayton_SCO2"
then_level = 3
then_ids = "SiC_LiPb,FLiBe"

[[rule]]
type     = "prefer"
if_level = 4
if_id    = "Hybrid_Brayton"
then_level = 3
then_ids = "SiC_LiPb,FLiBe"

# ── Confinement-heating affinities ──

# Tokamak pairs best with NBI + ICRH + ECRH (the proven n/phi=3 methods)
[[rule]]
type     = "prefer"
if_level = 1
if_id    = "Tokamak"
then_level = 2
then_ids = "NBI,ICRH,ECRH,LHCD"

# ICF requires Laser (no magnetic heating in inertial scheme)
[[rule]]
type     = "require"
if_level = 1
if_id    = "ICF"
then_level = 2
then_ids = "Laser"

# Stellarator benefits from ECRH (localized, steady-state compatible)
[[rule]]
type     = "prefer"
if_level = 1
if_id    = "Stellarator"
then_level = 2
then_ids = "ECRH,NBI"

# FRC pairs well with NBI (TAE approach) and ICRH
[[rule]]
type     = "prefer"
if_level = 1
if_id    = "FRC"
then_level = 2
then_ids = "NBI,ICRH"

# ── Blanket-confinement affinities ──

# ICF does not use tritium breeding blankets in same way (hohlraum design)
[[rule]]
type     = "exclude"
if_level = 1
if_id    = "ICF"
then_level = 3
then_ids = "V_Li"

# SiC_LiPb is the advanced DEMO-class blanket, best with tokamak/stellarator
[[rule]]
type     = "prefer"
if_level = 3
if_id    = "SiC_LiPb"
then_level = 1
then_ids = "Tokamak,Stellarator"

# ── Cross-level n6 resonance preferences ──

# DT + Tokamak + NBI = ITER/KSTAR reference path (highest TRL)
[[rule]]
type     = "prefer"
if_level = 0
if_id    = "DT"
then_level = 1
then_ids = "Tokamak,Stellarator"

# p-B11 + FRC = TAE Technologies reference path
[[rule]]
type     = "prefer"
if_level = 0
if_id    = "pB11"
then_level = 1
then_ids = "FRC"

# Aneutronic fuels (D-He3, p-B11) prefer Direct MHD plant
[[rule]]
type     = "prefer"
if_level = 0
if_id    = "DHe3"
then_level = 4
then_ids = "Direct_MHD,Brayton_SCO2"

[[rule]]
type     = "prefer"
if_level = 0
if_id    = "pB11"
then_level = 4
then_ids = "Direct_MHD"

# ── Alien-level discovery rules (D1~D15) ──

# pB11_CNO requires FRC or MCF_Compact (CNO-assisted needs high-T, compact geometry)
[[rule]]
type     = "require"
if_level = 0
if_id    = "pB11_CNO"
then_level = 1
then_ids = "FRC,MCF_Compact"

# pB11_CNO prefers Direct MHD (aneutronic charged-particle output)
[[rule]]
type     = "prefer"
if_level = 0
if_id    = "pB11_CNO"
then_level = 4
then_ids = "Direct_MHD,Brayton_SCO2"

# pB11_CNO prefers NBI heating (high-energy injection for CNO cross-section)
[[rule]]
type     = "prefer"
if_level = 0
if_id    = "pB11_CNO"
then_level = 2
then_ids = "NBI,N6_TriHeat"

# Ohmic insufficient for CNO-assisted fuel (needs T_CNO~17MK)
[[rule]]
type     = "exclude"
if_level = 2
if_id    = "Ohmic"
then_level = 0
then_ids = "pB11_CNO"

# N6 Tokamak pairs best with N6 Triple Heating and N6 Li-6 Blanket
