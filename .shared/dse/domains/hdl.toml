# =============================================================
# Compatibility Rules
# =============================================================

# FormalSpec abstraction requires formal verification
[[rule]]
type       = "require"
if_level   = 0
if_id      = "FormalSpec"
then_level = 2
then_ids   = "FormalVerif,AITestGen"

# HLS C-style incompatible with ASIC flow (needs RTL intermediate)
[[rule]]
type       = "exclude"
if_level   = 0
if_id      = "HLS_CStyle"
then_level = 3
then_ids   = "MixedSignal"

# EmulationHW requires chiplet or EDA cloud (expensive infra)
[[rule]]
type       = "require"
if_level   = 2
if_id      = "EmulationHW"
then_level = 4
then_ids   = "ChipletInteg,EDACloud"

# PythonHDL incompatible with ASIC_Flow directly (maturity gap)
[[rule]]
type       = "exclude"
if_level   = 0
if_id      = "PythonHDL"
then_level = 1
then_ids   = "ASIC_Flow"

# GPU-accelerated sim requires EDA cloud or chiplet (GPU resources)
[[rule]]
type       = "require"
if_level   = 3
if_id      = "GPUAccelSim"
then_level = 4
then_ids   = "EDACloud,ChipletInteg"

# Open-source synthesis pairs well with open HW but exclude formal lib alone
[[rule]]
type       = "exclude"
if_level   = 1
if_id      = "OpenSource"
then_level = 2
then_ids   = "EmulationHW"
