# =============================================================
# HDL DSE Domain Definition
# 궁극의 하드웨어 기술 언어 — n=6 기반 HDL + AI 합성 통합
# Chain: Abstraction → Synthesis → Verification → Simulation → Ecosystem
# Total raw combos: 7x6x6x6x5 = 7,560 (pre-filter)
# =============================================================

[meta]
name = "hdl"
desc = "Ultimate Hardware Description Language DSE — n=6 aligned HDL architecture"
levels = ["Abstraction", "Synthesis", "Verification", "Simulation", "Ecosystem"]
vision = "Say 'build this chip' and it auto-generates verified RTL -- n=6 silicon-first language"

[scoring]
n6   = 0.35
perf = 0.25
power = 0.20
cost  = 0.20

