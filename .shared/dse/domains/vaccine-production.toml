# ============================================================
# Compatibility Rules
# ============================================================

# mRNA requires LNP formulation
[[rule]]
type = "require"
if_level = 0
if_id = "mRNA"
then_level = 2
then_ids = ["LNP-Encap"]

# mRNA self-adjuvant only with mRNA antigen
[[rule]]
type = "require"
if_level = 1
if_id = "None-mRNA"
then_level = 0
then_ids = ["mRNA"]

# Live attenuated requires cold chain (not ambient)
[[rule]]
type = "require"
if_level = 0
if_id = "Live-Attenuated"
then_level = 4
then_ids = ["Standard-2-8", "Frozen-20", "UltraCold-80"]

# Lyophilizer fill only for lyophilized formulation
[[rule]]
type = "require"
if_level = 3
if_id = "Lyophilizer"
then_level = 2
then_ids = ["Lyophilized", "Spray-Dry"]
