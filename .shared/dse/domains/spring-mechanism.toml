# ============================================================
# Compatibility Rules
# ============================================================

# Inconel best for aerospace high-temperature applications
[[rule]]
type = "prefer"
if_level = 1
if_id = "InconelX750"
then_level = 4
then_ids = "AerospaceActuator"

# Electroforming best for miniature/MEMS designs
[[rule]]
type = "prefer"
if_level = 2
if_id = "Electroform"
then_level = 3
then_ids = "MiniatureHex"

# Leaf springs not suitable for precision clock applications
[[rule]]
type = "exclude"
if_level = 0
if_id = "LeafSpring"
then_level = 4
then_ids = "PrecisionClock,ElectronicsContact"

# Ti-6Al-4V pairs well with medical and aerospace
[[rule]]
type = "prefer"
if_level = 1
if_id = "TitaniumTi6Al4V"
then_level = 4
then_ids = "AerospaceActuator,MedicalDevice"
