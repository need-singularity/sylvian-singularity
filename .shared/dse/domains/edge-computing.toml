# ============================================================
# Compatibility Rules
# ============================================================

# MCU too weak for autonomous vehicle
[[rule]]
type = "exclude"
if_level = 1
if_id = "MCU-Low"
then_level = 4
then_ids = ["Autonomous-Vehicle", "Smart-City"]

# Autonomous vehicle requires low-latency network
[[rule]]
type = "require"
if_level = 4
if_id = "Autonomous-Vehicle"
then_level = 2
then_ids = ["5G-MEC", "TSN-Ethernet"]

# BLE mesh too slow for factory real-time
[[rule]]
type = "exclude"
if_level = 2
if_id = "BLE-Mesh"
then_level = 4
then_ids = ["Smart-Factory", "Autonomous-Vehicle"]

# Bare metal orchestration for real-time only
[[rule]]
type = "require"
if_level = 3
if_id = "Bare-Metal"
then_level = 4
then_ids = ["Smart-Factory", "Autonomous-Vehicle", "Healthcare"]
