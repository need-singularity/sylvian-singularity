# ============================================================
# Compatibility Rules
# ============================================================

# GaN wide bandgap pairs with MOCVD (industrial) and wurtzite structure
[[rule]]
type = "prefer"
if_level = 0
if_id = "GaN_wide"
then_level = 1
then_ids = "MOCVD_12flow,MBE_6source"

[[rule]]
type = "prefer"
if_level = 0
if_id = "GaN_wide"
then_level = 2
then_ids = "Wurtzite_6fold,Quantum_well"

# GaAs standard is the workhorse for laser and RF
[[rule]]
type = "prefer"
if_level = 0
if_id = "GaAs_standard"
then_level = 4
then_ids = "Laser_diode,RF_HEMT,THz_emitter"

# InP telecom pairs with laser diode and photodetector
[[rule]]
type = "prefer"
if_level = 0
if_id = "InP_telecom"
then_level = 4
then_ids = "Laser_diode,Photodetector_IR"

# CdTe pairs with solar cell and zero-gap topological
[[rule]]
type = "prefer"
if_level = 0
if_id = "CdTe_II_VI_group6"
then_level = 3
then_ids = "Direct_medium,Zero_gap_topological"

# MBE 6-source for quantum dot and nanowire precision growth
[[rule]]
type = "prefer"
if_level = 1
if_id = "MBE_6source"
then_level = 2
then_ids = "Quantum_dot,Nanowire_6facet,Superlattice_12period"

# Quantum well structure for LED and laser active regions
[[rule]]
type = "prefer"
if_level = 2
if_id = "Quantum_well"
then_level = 4
then_ids = "LED_lighting,Laser_diode"

# Nanowire 6-facet for solar and wrap-gate HEMT
[[rule]]
type = "prefer"
if_level = 2
if_id = "Nanowire_6facet"
then_level = 4
then_ids = "Solar_cell_III_V,RF_HEMT"

# Wide bandgap for LED and RF power
[[rule]]
type = "prefer"
if_level = 3
if_id = "Direct_wide"
then_level = 4
then_ids = "LED_lighting,RF_HEMT"

# Narrow bandgap for IR detection
[[rule]]
type = "prefer"
if_level = 3
if_id = "Direct_narrow"
then_level = 4
then_ids = "Photodetector_IR,THz_emitter"
