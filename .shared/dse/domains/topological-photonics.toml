# =============================================================
# Compatibility Rules
# =============================================================

# Chiral edge modes require time-reversal breaking (magneto-optic Chern insulator)
[[rule]]
type       = "require"
if_level   = 2
if_id      = "Chiral_Unidirect"
then_level = 1
then_ids   = "Time_Reversal_Break"

# Topological laser requires active gain media (III-V) or integrated platform
[[rule]]
type       = "require"
if_level   = 3
if_id      = "Topological_Laser"
then_level = 4
then_ids   = "III_V_InP,Integrated_N6"

# Acoustic analog is incompatible with quantum emitter (no single photon in sound)
[[rule]]
type       = "exclude"
if_level   = 4
if_id      = "Acoustic_Analog"
then_level = 3
then_ids   = "Quantum_Emitter,Topological_Laser"

# Helical phi=2 edge modes require spin-orbit or valley symmetry
[[rule]]
type       = "require"
if_level   = 2
if_id      = "Helical_Phi2"
then_level = 1
then_ids   = "Spin_Orbit,Valley_Tau4"
