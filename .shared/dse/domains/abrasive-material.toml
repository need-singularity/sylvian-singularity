# =============================================================
# HEXA-ABRASIVE DSE Domain Definition
# N6 Abrasive Material DSE — Cutting & grinding material engineering
# n=6: SiC 6H polytype (n=6 EXACT hexagonal stacking),
#       corundum Al2O3 6-fold (n=6), Mohs 6=orthoclase reference,
#       sigma=12 grit grades (coarse-to-fine),
#       tau=4 bonding types (vitrified/resinoid/metal/electroplated),
#       phi=2 peripheral/face grinding
# BT-43 (CN=6 universality)
# Total raw combos: 6x6x6x6x6 = 7,776
# =============================================================

[meta]
name = "abrasive-material"
desc = "Abrasive Material DSE (BT-43, SiC 6H polytype, corundum 6-fold)"
levels = ["AbrasiveGrain", "Bond", "WheelForm", "Process", "Application"]
vision = "Cutting & grinding materials — SiC 6H stacking, Al2O3 6-fold coordination in every abrasive"

[scoring]
n6   = 0.35
perf = 0.25
power = 0.20
cost  = 0.20

