# =============================================================
# Rules
# =============================================================

# CBN/Diamond require vitrified or metal/electroplated bond
[[rule]]
type      = "prefer"
if_level  = 0
if_id     = "CBN"
then_level = 1
then_ids  = "Vitrified,Metal_Sinter,Electroplated"

[[rule]]
type      = "prefer"
if_level  = 0
if_id     = "Diamond_Synth"
then_level = 1
then_ids  = "Metal_Sinter,Electroplated,Resinoid"

# Honing requires specific wheel forms (mounted/segmented)
[[rule]]
type      = "prefer"
if_level  = 3
if_id     = "Honing_6"
then_level = 2
then_ids  = "Mounted,Segmented_6"

# Wafer backgrind requires diamond
[[rule]]
type      = "prefer"
if_level  = 4
if_id     = "Wafer_Backgrind"
then_level = 0
then_ids  = "Diamond_Synth,SiC_6H"

# Turbine blade needs superabrasive
[[rule]]
type      = "prefer"
if_level  = 4
if_id     = "Turbine_Blade"
then_level = 0
then_ids  = "CBN,Diamond_Synth,SolGel_Cer"
