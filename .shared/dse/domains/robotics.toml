[meta]
name = "robotics"
desc = "Robotics & Embodiment Architecture DSE (6-DOF, hexapod, σ=12 servos)"
levels = ["Foundation", "Actuation", "Core", "Engine", "System"]
vision = "n=6 embodied intelligence -- 6-DOF manipulation to full-body autonomy"

[scoring]
n6   = 0.30
perf = 0.30
power = 0.20
cost  = 0.20

