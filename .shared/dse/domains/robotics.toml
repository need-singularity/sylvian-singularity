# =============================================================
# Compatibility Rules
# =============================================================

# GaitGen core requires Hexapod foundation
[[rule]]
type       = "require"
if_level   = 2
if_id      = "GaitGen"
then_level = 0
then_ids   = "Hexapod"

# InverseKin6 core requires 6DOF_Arm or StewartPlatform foundation
[[rule]]
type       = "require"
if_level   = 2
if_id      = "InverseKin6"
then_level = 0
then_ids   = "6DOF_Arm,StewartPlatform,Humanoid"

# HydraulicHex actuation excludes PiezoMEMS-scale cores
[[rule]]
type       = "exclude"
if_level   = 1
if_id      = "HydraulicHex"
then_level = 0
then_ids   = "Wheeled"

# ReinforceLoco engine requires GaitGen or ImpedanceCtrl core
[[rule]]
type       = "require"
if_level   = 3
if_id      = "ReinforceLoco"
then_level = 2
then_ids   = "GaitGen,ImpedanceCtrl"

# SurgicalRobot system requires ForceCtrl or ImpedanceCtrl core
[[rule]]
type       = "require"
if_level   = 4
if_id      = "SurgicalRobot"
then_level = 2
then_ids   = "ForceCtrl,ImpedanceCtrl"

# HexapodExplorer system requires Hexapod foundation
[[rule]]
type       = "require"
if_level   = 4
if_id      = "HexapodExplorer"
then_level = 0
then_ids   = "Hexapod"

# PneumaticSoft not suitable for industrial precision
[[rule]]
type       = "exclude"
if_level   = 1
if_id      = "PneumaticSoft"
then_level = 4
then_ids   = "IndustrialCell,SurgicalRobot"
