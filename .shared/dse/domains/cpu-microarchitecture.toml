# N6 CPU Microarchitecture DSE — Processor core design
# 6x6x6x6x6 = 7,776 combos
# n6: sigma=12 pipeline stages (classic RISC), tau=4 issue width (quad-issue)
#     phi=2 SMT threads, n=6 execution units (ALU+FPU+Load+Store+Branch+SIMD)
#     J2=24 ROB entries*n, sigma-tau=8 decode width

[meta]
name = "cpu-microarchitecture"
desc = "CPU Microarchitecture DSE — Processor core design (BT-28/59/69)"

[scoring]
n6 = 0.35
perf = 0.25
power = 0.20
cost = 0.20

# ============================================================
# Level 0: Pipeline (파이프라인)
#   n6 checks: stages==6 or 12, issue_width==4 or 8
# ============================================================

[[level]]
name = "Pipeline"

