# ============================================================
# Compatibility Rules
# ============================================================

# In-order pipeline pairs with simpler execution and cache
[[rule]]
type = "prefer"
if_level = 0
if_id = "InOrder_6stage"
then_level = 1
then_ids = "ALU_6port,FPU_Dual"

# OoO 12-stage needs wide execution
[[rule]]
type = "prefer"
if_level = 0
if_id = "OoO_12stage"
then_level = 1
then_ids = "SIMD_256bit,Matrix_AMX,ALU_6port"

# Superscalar 8-wide needs large caches and advanced branch prediction
[[rule]]
type = "prefer"
if_level = 0
if_id = "Superscalar_8wide"
then_level = 2
then_ids = "L3_Shared_24MB,L2_12way"

[[rule]]
type = "prefer"
if_level = 0
if_id = "Superscalar_8wide"
then_level = 3
then_ids = "TAGE_12table,Neural_Branch"

# VLIW 4-issue pairs with simpler branch prediction
[[rule]]
type = "prefer"
if_level = 0
if_id = "VLIW_4issue"
then_level = 3
then_ids = "Tournament,Loop_Detect"

# Matrix AMX needs large memory bandwidth
[[rule]]
type = "prefer"
if_level = 1
if_id = "Matrix_AMX"
then_level = 4
then_ids = "LSQ_24entry,Prefetch_HW"

# Non-blocking cache benefits from hardware prefetching
[[rule]]
type = "prefer"
if_level = 2
if_id = "NonBlocking_4MSHR"
then_level = 4
then_ids = "Prefetch_HW,LSQ_24entry"

# In-order pipeline can use scratchpad for deterministic behavior
[[rule]]
type = "prefer"
if_level = 0
if_id = "InOrder_6stage"
then_level = 4
then_ids = "Scratchpad_Local,Store_Buffer_12"
