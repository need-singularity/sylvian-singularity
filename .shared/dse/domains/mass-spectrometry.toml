# =============================================================
# N6 Mass Spectrometry DSE — Molecular mass analysis
# n=6: 6 ionization methods (EI/ESI/MALDI/APCI/ICP/FAB),
#   sigma=12 orders of mass range dynamic, tau=4 analyzer types
#   (quadrupole/TOF/ion-trap/magnetic), phi=2 positive/negative
#   mode, J2=24 Da resolution target, 6-pole ion guide (hexapole=n)
# Total raw combos: 6x6x6x6x6 = 7,776 (pre-filter)
# =============================================================

[meta]
name = "mass-spectrometry"
desc = "Mass Spectrometry Architecture DSE (ionization/analyzer/fragmentation/detector/application)"

[scoring]
n6 = 0.35
perf = 0.25
power = 0.20
cost = 0.20

