# ============================================================
# Compatibility Rules
# ============================================================

# ECD fragmentation requires FT-ICR magnet
[[rule]]
type = "require"
if_level = 2
if_id = "ECD"
then_level = 1
then_ids = ["FT-ICR"]

# Image current detection only works with Orbitrap/FT-ICR
[[rule]]
type = "require"
if_level = 3
if_id = "Image-Current"
then_level = 1
then_ids = ["Orbitrap", "FT-ICR"]

# ICP source excludes soft fragmentation methods
[[rule]]
type = "require"
if_level = 0
if_id = "ICP"
then_level = 1
then_ids = ["Quadrupole", "TOF", "Magnetic-Sector"]

# MALDI pairs best with TOF
[[rule]]
type = "require"
if_level = 0
if_id = "MALDI"
then_level = 1
then_ids = ["TOF", "Orbitrap", "FT-ICR"]

# FAB is legacy — limited to magnetic sector and quadrupole
[[rule]]
type = "require"
if_level = 0
if_id = "FAB"
then_level = 1
then_ids = ["Magnetic-Sector", "Quadrupole"]

# MS Imaging requires MALDI or ESI (DESI) ionization
[[rule]]
type = "require"
if_level = 4
if_id = "Imaging-MS"
then_level = 0
then_ids = ["MALDI", "ESI"]
