# N6 SoC Integration DSE — System-on-chip design
# 6×6×6×6×6 = 7,776 combos
# n=6: 6 IP blocks (CPU/GPU/NPU/ISP/DSP/Modem = n=6 EXACT)
#       sigma=12 power domains, tau=4 voltage islands
#       phi=2 big.LITTLE, J2=24 clock domains

[meta]
name = "soc-integration"
desc = "SoC Integration DSE (BT-28/33/56/59/69)"

[scoring]
n6 = 0.35
perf = 0.25
power = 0.20
cost = 0.20

