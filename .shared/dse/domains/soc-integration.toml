# ============================================================
# Compatibility Rules
# ============================================================

# x86 hybrid core needs high-bandwidth memory
[[rule]]
type = "prefer"
if_level = 0
if_id = "x86_hybrid"
then_level = 3
then_ids = "HBM_PHY,L3_unified_12MB"

# RISC-V 6-stage pairs well with SRAM tightly-coupled memory
[[rule]]
type = "prefer"
if_level = 0
if_id = "RISCV_6stage"
then_level = 3
then_ids = "SRAM_6bank,LPDDR5_ctrl"

# NoC mesh best with power gating for per-node control
[[rule]]
type = "prefer"
if_level = 2
if_id = "NoC_mesh_6x6"
then_level = 4
then_ids = "Powergating_12domain,DVFS_6state"

# HBM PHY requires crossbar or NoC for bandwidth
[[rule]]
type = "prefer"
if_level = 3
if_id = "HBM_PHY"
then_level = 2
then_ids = "Crossbar_switch,NoC_mesh_6x6"

# Energy harvesting pairs with low-power RISC-V cores
[[rule]]
type = "prefer"
if_level = 4
if_id = "Energy_harvesting"
then_level = 0
then_ids = "RISCV_6stage,Custom_VLIW"

# GPU accelerator needs high-bandwidth interconnect
[[rule]]
type = "prefer"
if_level = 1
if_id = "GPU_6CU"
then_level = 2
then_ids = "NoC_mesh_6x6,Crossbar_switch"

# NPU benefits from dedicated memory subsystem
[[rule]]
type = "prefer"
if_level = 1
if_id = "NPU_12TOPS"
then_level = 3
then_ids = "L3_unified_12MB,HBM_PHY"
