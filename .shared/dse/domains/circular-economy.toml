# =============================================================
# HEXA-CE DSE Domain Definition
# Circular Economy: Design, Collection, Sorting, Processing,
# Remanufacture
# n=6: 6R framework (Refuse/Reduce/Reuse/Repair/Recycle/Recover),
#       sigma=12 month cycle, J2=24 material streams
# BT-27 (Carbon-6 chain), BT-85 (Carbon Z=6 synthesis universality)
# Total raw combos: 6x6x6x6x6 = 7,776
# =============================================================

[meta]
name = "circular-economy"
desc = "Circular Economy DSE (6R framework, sigma=12 cycle, J2=24 streams)"
levels = ["Design", "Collection", "Sorting", "Processing", "Remanufacture"]
vision = "Zero-waste material loop — 6R principles with n=6 circular architecture"

[scoring]
n6   = 0.30
perf = 0.25
power = 0.20
cost  = 0.25

