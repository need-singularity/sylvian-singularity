# =============================================================
# Rules
# =============================================================

# Cradle-to-Cradle design pairs with chemical depolymerization
[[rule]]
type      = "prefer"
if_level  = 0
if_id     = "Cradle2Cradle"
then_level = 3
then_ids  = "Chem_Depolym,Biorefinery"

# DfD modular design enables industrial remanufacture
[[rule]]
type      = "prefer"
if_level  = 0
if_id     = "DfD_Modular"
then_level = 4
then_ids  = "IndustrialReman,AdditiveMfg"

# AI robotic sorting pairs with digital watermark
[[rule]]
type      = "prefer"
if_level  = 2
if_id     = "AI_Robotic"
then_level = 1
then_ids  = "SmartBin,EPR_Platform"

# Composting not suitable for industrial remanufacture
[[rule]]
type      = "exclude"
if_level  = 3
if_id     = "Composting"
then_level = 4
then_ids  = "IndustrialReman,AdditiveMfg"
