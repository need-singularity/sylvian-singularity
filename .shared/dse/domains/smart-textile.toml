# ============================================================
# Compatibility Rules
# ============================================================

# CNT fibers pair best with strain sensing
[[rule]]
type = "prefer"
if_level = 0
if_id = "Carbon_Nanotube"
then_level = 1
then_ids = "Strain_Resist,Multimodal_Fusion"

# Piezo PVDF fibers should use piezo harvesting
[[rule]]
type = "prefer"
if_level = 0
if_id = "Piezo_PVDF"
then_level = 2
then_ids = "Piezo_Harvest,Supercap_Fiber"

# Bio-electrodes best for medical monitoring
[[rule]]
type = "prefer"
if_level = 1
if_id = "Bio_Electrode"
then_level = 4
then_ids = "Medical_Monitor,Rehab_Therapy"

# Multimodal fusion needs body area network bandwidth
[[rule]]
type = "prefer"
if_level = 1
if_id = "Multimodal_Fusion"
then_level = 3
then_ids = "Body_Area_Net,BLE_Mesh"

# Shape memory alloy actuation pairs with rehabilitation
[[rule]]
type = "prefer"
if_level = 0
if_id = "Shape_Memory"
then_level = 4
then_ids = "Rehab_Therapy,Medical_Monitor"

# NFC passive best for fashion display (battery-free interaction)
[[rule]]
type = "prefer"
if_level = 3
if_id = "NFC_Passive"
then_level = 4
then_ids = "Fashion_Display,Sports_Perf"
