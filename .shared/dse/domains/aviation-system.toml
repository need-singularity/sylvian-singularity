# ============================================================
# Compatibility Rules
# ============================================================

# Biplane excluded from UAM
[[rule]]
type = "exclude"
if_level = 0
if_id = "Biplane-12Wing"
then_level = 4
then_ids = ["UAM-6Pad"]

# Electric distributed propulsion requires BWB or Flying Wing for integration
[[rule]]
type = "exclude"
if_level = 1
if_id = "ElectricDistrib"
then_level = 0
then_ids = ["Biplane-12Wing"]

# Quad turbofan excluded from short-haul (overkill)
[[rule]]
type = "exclude"
if_level = 1
if_id = "QuadTurbofan"
then_level = 4
then_ids = ["ShortHaul-4Phase", "UAM-6Pad"]

# Morphing wing control excluded from biplane
[[rule]]
type = "exclude"
if_level = 3
if_id = "MorphingWing"
then_level = 0
then_ids = ["Biplane-12Wing"]

# Turboprop excluded from UAM (noise/size)
[[rule]]
type = "exclude"
if_level = 1
if_id = "Turboprop-6Blade"
then_level = 4
then_ids = ["UAM-6Pad"]
