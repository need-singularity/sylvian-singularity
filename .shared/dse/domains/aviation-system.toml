# =============================================================
# Aviation System DSE Domain Definition
# Aircraft design & operations architecture
# n=6: 6DOF flight (n=6 EXACT), sigma=12 control surfaces,
#       tau=4 flight phases (taxi/takeoff/cruise/land),
#       phi=2 dual-engine, J2=24 sector FAA zones
# Total raw combos: 6x6x6x6x6 = 7,776 (pre-filter)
# =============================================================

[meta]
name = "aviation-system"
desc = "Aircraft Design & Operations DSE (airframe/propulsion/avionics/control/operation)"

[scoring]
n6 = 0.35
perf = 0.25
power = 0.20
cost = 0.20

