# =============================================================
# Compatibility Rules
# =============================================================

# AlphaFold requires Genome64 or AminoAcid20 at Genetic level (needs sequence data)
[[rule]]
type       = "require"
if_level   = 1
if_id      = "AlphaFold"
then_level = 0
then_ids   = "Genome64,AminoAcid20"

# ProteinDesign requires advanced cell: SignalN12 or Mitosis6Phase
[[rule]]
type       = "require"
if_level   = 1
if_id      = "ProteinDesign"
then_level = 2
then_ids   = "SignalN12,MetabolismEF,OrganellaN6"

# Interactome requires organism-level NervousSystem or ImmuneSystem (network context)
[[rule]]
type       = "require"
if_level   = 1
if_id      = "Interactome"
then_level = 3
then_ids   = "NervousSystem,ImmuneSystem"

# Epigenetic foundation excludes simple SymbiosisN3 ecosystem (too basic)
[[rule]]
type       = "exclude"
if_level   = 0
if_id      = "Epigenetic"
then_level = 4
then_ids   = "SymbiosisN3"

# CRISPR_N6 requires advanced protein level (AlphaFold or ProteinDesign)
[[rule]]
type       = "require"
if_level   = 0
if_id      = "CRISPR_N6"
then_level = 1
then_ids   = "AlphaFold,ProteinDesign"

# RespiratoryGas requires CarbonCycle or FoodWebN6 ecosystem (gas exchange context)
[[rule]]
type       = "require"
if_level   = 3
if_id      = "RespiratoryGas"
then_level = 4
then_ids   = "CarbonCycle,FoodWebN6"
