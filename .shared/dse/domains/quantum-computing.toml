# =============================================================
# Compatibility Rules
# =============================================================

# TopologicalAnyon requires ToricCode or ColorCode (topological error correction)
[[rule]]
type       = "require"
if_level   = 0
if_id      = "TopologicalAnyon"
then_level = 2
then_ids   = "ToricCode,ColorCode"

# SurfaceCode incompatible with ContinuousVar (discrete vs continuous)
[[rule]]
type       = "exclude"
if_level   = 2
if_id      = "SurfaceCode"
then_level = 1
then_ids   = "ContinuousVar"

# AdiabaticEvol requires QAOA or VQE (variational connection)
[[rule]]
type       = "require"
if_level   = 1
if_id      = "AdiabaticEvol"
then_level = 3
then_ids   = "QAOA,VQE"

# MSTopological requires TopologicalAnyon (topological hardware needs topological qubits)
[[rule]]
type       = "require"
if_level   = 4
if_id      = "MSTopological"
then_level = 0
then_ids   = "TopologicalAnyon"

# Photonic requires ContinuousVar or UniversalSet (photonic gate model)
[[rule]]
type       = "require"
if_level   = 0
if_id      = "Photonic"
then_level = 1
then_ids   = "ContinuousVar,UniversalSet"

# Code642 is optimal with SuperconductN6 or NV_Diamond (n=6 qubits)
[[rule]]
type       = "exclude"
if_level   = 2
if_id      = "ConcatenatedCode"
then_level = 1
then_ids   = "ContinuousVar"
