# =============================================================
# Compatibility Rules
# =============================================================

# HodgkinHuxley too expensive for TC_1ms (compute explosion)
[[rule]]
type       = "exclude"
if_level   = 0
if_id      = "HodgkinHuxley"
then_level = 1
then_ids   = "TC_1ms"

# Conductance model requires powerful platform
[[rule]]
type       = "require"
if_level   = 0
if_id      = "Conductance"
then_level = 4
then_ids   = "BrainScaleS,Software"

# LIF too simple for Triplet STDP
[[rule]]
type       = "exclude"
if_level   = 0
if_id      = "LIF"
then_level = 3
then_ids   = "Triplet,Structural"

# Ring6 topology pairs well with STDP learning
[[rule]]
type       = "prefer"
if_level   = 2
if_id      = "Ring6"
then_level = 3
then_ids   = "STDP,Homeostatic"
