# ============================================================
# Compatibility Rules
# ============================================================

# Frozen logistics requires freeze preservation
[[rule]]
type = "prefer"
if_level = 4
if_id = "FrozenLogis"
then_level = 2
then_ids = "Freeze"

# Bio-Pack only suitable for short-shelf items
[[rule]]
type = "prefer"
if_level = 3
if_id = "BioPack"
then_level = 2
then_ids = "MAP,HPP"

# UHT processing pairs with Tetra Pak packaging
[[rule]]
type = "prefer"
if_level = 1
if_id = "UHT"
then_level = 3
then_ids = "TetraPak,HexaLayer"

# Cold press requires cold chain distribution
[[rule]]
type = "prefer"
if_level = 1
if_id = "ColdPress"
then_level = 4
then_ids = "ColdChain6,FrozenLogis"

# Protein raw material best with fermentation or HTST
[[rule]]
type = "prefer"
if_level = 0
if_id = "Protein"
then_level = 1
then_ids = "HTST,Fermentation"
