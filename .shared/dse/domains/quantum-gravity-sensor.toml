# =============================================================
# Compatibility Rules
# =============================================================

# BEC source requires Atom_Interferometer or Superconducting sensor (ultra-cold)
[[rule]]
type       = "require"
if_level   = 1
if_id      = "BEC"
then_level = 0
then_ids   = "Atom_Interferometer,Superconducting"

# Optical_Clock sensor requires Frequency measurement
[[rule]]
type       = "require"
if_level   = 0
if_id      = "Optical_Clock"
then_level = 2
then_ids   = "Frequency,Phase_Shift"

# Entangled measurement incompatible with Classical_DSP processing
[[rule]]
type       = "exclude"
if_level   = 2
if_id      = "Entangled"
then_level = 3
then_ids   = "Classical_DSP"

# Dark_Matter application requires high-sensitivity sensors
[[rule]]
type       = "require"
if_level   = 4
if_id      = "Dark_Matter"
then_level = 0
then_ids   = "Atom_Interferometer,Superconducting,Optical_Clock"
