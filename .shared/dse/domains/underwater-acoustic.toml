# ============================================================
# Compatibility Rules
# ============================================================

# Arctic under-ice requires robust modulation
[[rule]]
type = "require"
if_level = 2
if_id = "Arctic-Under-Ice"
then_level = 1
then_ids = ["DSSS", "Chirp-Spread", "FHSS"]

# MIMO spatial requires multi-element transducer
[[rule]]
type = "require"
if_level = 1
if_id = "MIMO-Spatial"
then_level = 0
then_ids = ["Hexagonal-6elem", "CMUT", "Piezo-Ceramic"]

# Diver unit limited to simple modulation and short-range channels
[[rule]]
type = "require"
if_level = 4
if_id = "Diver-Unit"
then_level = 1
then_ids = ["Single-Carrier", "DSSS", "Chirp-Spread"]

# Submarine requires covert-capable network topology
[[rule]]
type = "require"
if_level = 4
if_id = "Submarine"
then_level = 3
then_ids = ["Point-to-Point", "Relay-Chain", "Acoustic-Internet"]
