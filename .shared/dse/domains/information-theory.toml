[meta]
name = "information-theory"
desc = "Ultimate Information Theory DSE — Shannon + Kolmogorov + Entropy"
levels = ["Source", "Channel", "Coding", "Complexity", "Application"]
vision = "n=6 기반 정보이론 — Shannon 채널 용량 + Kolmogorov 복잡도 + 엔트로피"

[scoring]
n6   = 0.35
perf = 0.25
power = 0.20
cost  = 0.20

