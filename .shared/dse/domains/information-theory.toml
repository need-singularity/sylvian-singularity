# =============================================================
# Compatibility Rules
# =============================================================

# QuantumCode642 requires QuantumChannel (quantum code needs quantum channel)
[[rule]]
type       = "require"
if_level   = 2
if_id      = "QuantumCode642"
then_level = 1
then_ids   = "QuantumChannel"

# BSC_Channel incompatible with VonNeumann (classical vs quantum)
[[rule]]
type       = "exclude"
if_level   = 1
if_id      = "BSC_Channel"
then_level = 0
then_ids   = "VonNeumann"

# KolmogorovComp requires AlgorithmicRandom (Kolmogorov defines randomness)
[[rule]]
type       = "require"
if_level   = 3
if_id      = "KolmogorovComp"
then_level = 3
then_ids   = "AlgorithmicRandom"

# TurboCode requires AWGN_Channel or BSC_Channel (designed for these channels)
[[rule]]
type       = "require"
if_level   = 2
if_id      = "TurboCode"
then_level = 1
then_ids   = "AWGN_Channel,BSC_Channel"
