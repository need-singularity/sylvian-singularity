# =============================================================
# Rules
# =============================================================

# CFRP blades for offshore
[[rule]]
type      = "prefer"
if_level  = 0
if_id     = "CFRP_3B"
then_level = 2
then_ids  = "Floating_Semi,Monopile,Jacket"

# Floating foundation needs HVDC export
[[rule]]
type      = "prefer"
if_level  = 2
if_id     = "Floating_Semi"
then_level = 3
then_ids  = "HVDC_VSC,DC_Collect"

# Superconducting generator too expensive for onshore distributed
[[rule]]
type      = "exclude"
if_level  = 1
if_id     = "SCSG"
then_level = 4
then_ids  = "Distributed"

# Direct-drive PMSG pairs with offshore farms
[[rule]]
type      = "prefer"
if_level  = 1
if_id     = "PMSG_6P"
then_level = 4
then_ids  = "Offshore_Fix,Offshore_Float,GW_Scale"
