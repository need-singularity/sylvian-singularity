[meta]
name = "wind-energy"
desc = "Wind Turbine System DSE (BT-62, n/phi=3 blades, 6-pole)"
levels = ["Blade", "Generator", "Tower", "Grid", "Farm"]
vision = "Optimal wind harvesting — 3 blades, 6-pole generator, 12 turbines/row"

[scoring]
n6   = 0.35
perf = 0.25
power = 0.20
cost  = 0.20

