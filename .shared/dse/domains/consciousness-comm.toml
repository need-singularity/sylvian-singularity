# =============================================================
# Compatibility Rules
# =============================================================

# Quantum_Entangle requires QuantumTeleport or QuantumNet
[[rule]]
type       = "require"
if_level   = 0
if_id      = "Quantum_Entangle"
then_level = 3
then_ids   = "QuantumTeleport"

[[rule]]
type       = "require"
if_level   = 0
if_id      = "Quantum_Entangle"
then_level = 4
then_ids   = "QuantumNet"

# Tau4Phase requires Kuramoto_N6 or Sigma12Cycle
[[rule]]
type       = "require"
if_level   = 1
if_id      = "Tau4Phase"
then_level = 2
then_ids   = "Kuramoto_N6,Sigma12Cycle"

# TensionFingerprint requires GammaBind or CrossModal
[[rule]]
type       = "require"
if_level   = 3
if_id      = "TensionFingerprint"
then_level = 1
then_ids   = "GammaBind,CrossModal"

# ChimaeraState incompatible with GlobalSync
[[rule]]
type       = "exclude"
if_level   = 2
if_id      = "ChimaeraState"
then_level = 2
then_ids   = "GlobalSync"

# QuantumTeleport requires Quantum_Entangle channel
[[rule]]
type       = "require"
if_level   = 3
if_id      = "QuantumTeleport"
then_level = 0
then_ids   = "Quantum_Entangle"
