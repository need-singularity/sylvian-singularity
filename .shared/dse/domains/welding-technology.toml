# ============================================================
# Compatibility Rules
# ============================================================

# Friction Stir Welding is solid-state — no shielding gas needed, but compatible with vacuum
[[rule]]
type = "exclude"
if_level = 0
if_id = "FrictionStir"
then_level = 2
then_ids = ["CO2-100", "ArCO2-Mix", "ArHe-Mix"]

# Laser Beam Welding requires vacuum or inert gas
[[rule]]
type = "exclude"
if_level = 0
if_id = "LaserBeam"
then_level = 2
then_ids = ["CO2-100", "FluxBlanket"]

# SAW requires flux blanket shielding
[[rule]]
type = "require"
if_level = 0
if_id = "SAW"
then_level = 2
then_ids = ["FluxBlanket"]

# Vacuum shielding excluded from field applications
[[rule]]
type = "exclude"
if_level = 2
if_id = "Vacuum-6Pa"
then_level = 4
then_ids = ["Pipeline-6G", "Structural-Steel", "Shipbuilding"]

# SMAW/Stick not suitable for aerospace Ti
[[rule]]
type = "exclude"
if_level = 0
if_id = "SMAW-Stick"
then_level = 4
then_ids = ["Aerospace-Ti"]
