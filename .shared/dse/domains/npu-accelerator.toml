# =============================================================
# N6 NPU/AI Accelerator DSE — Neural processing units
# n=6: sigma-tau=8 bit inference (INT8), sigma=12 tensor cores,
#       J2=24 PE rows, tau=4 dataflow dimensions, phi=2 sparsity (2:4),
#       6-stage pipeline (n=6)
# BT-28 (Computing ladder), BT-58 (sigma-tau=8 universal), BT-59 (8-layer AI stack)
# Total raw combos: 6x6x6x6x6 = 7,776
# =============================================================

[meta]
name = "npu-accelerator"
desc = "NPU/AI Accelerator DSE (BT-28/58/59, sigma-tau=8 INT8, sigma=12 cores, J2=24 PE)"
levels = ["Dataflow", "Precision", "Memory", "Interconnect", "Workload"]
vision = "Ultimate NPU — sigma-tau=8 bit precision, sigma=12 tensor cores, n=6 pipeline, all n=6 aligned"

[scoring]
n6   = 0.35
perf = 0.25
power = 0.20
cost  = 0.20

