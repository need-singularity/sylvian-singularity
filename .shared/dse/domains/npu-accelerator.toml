# =============================================================
# Rules
# =============================================================

# Systolic arrays pair naturally with HBM for AI training
[[rule]]
type      = "prefer"
if_level  = 0
if_id     = "Systolic_12x12"
then_level = 2
then_ids  = "HBM_12hi,OnChip_24MB"

# ReRAM CIM pairs with crossbar or spatial dataflow
[[rule]]
type      = "prefer"
if_level  = 2
if_id     = "ReRAM_CIM"
then_level = 0
then_ids  = "Spatial_6PE,Reconfigurable"

# Edge TinyML needs low-power memory and precision
[[rule]]
type      = "prefer"
if_level  = 4
if_id     = "Edge_TinyML"
then_level = 1
then_ids  = "INT4,Mixed_2bit"

# Transformer workloads need high bandwidth interconnect
[[rule]]
type      = "prefer"
if_level  = 4
if_id     = "Transformer_6head"
then_level = 3
then_ids  = "Crossbar,NoC_Butterfly,Optical_Link"

# Sparse MoE needs flexible routing interconnect
[[rule]]
type      = "prefer"
if_level  = 4
if_id     = "Sparse_MoE"
then_level = 3
then_ids  = "Mesh_6x6,NoC_Butterfly"
