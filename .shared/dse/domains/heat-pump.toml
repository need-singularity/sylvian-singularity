# ============================================================
# Compatibility Rules
# ============================================================

# Centrifugal only for large installations
[[rule]]
type = "require"
if_level = 0
if_id = "Centrifugal"
then_level = 4
then_ids = ["District", "WSHP"]

# Ground loop requires geothermal installation
[[rule]]
type = "require"
if_level = 1
if_id = "Ground-Loop"
then_level = 4
then_ids = ["Geothermal"]

# Ammonia only for industrial/district (toxic)
[[rule]]
type = "require"
if_level = 2
if_id = "R717-Ammonia"
then_level = 4
then_ids = ["District", "WSHP"]

# On-Off control only for simple installations
[[rule]]
type = "require"
if_level = 3
if_id = "On-Off"
then_level = 4
then_ids = ["Residential-Split", "Portable"]
