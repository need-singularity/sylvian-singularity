# =============================================================
# Compatibility Rules
# =============================================================

# DoubleHelix required for Nucleosome
[[rule]]
type       = "require"
if_level   = 2
if_id      = "Nucleosome"
then_level = 1
then_ids   = "DoubleHelix"

# Histone4 required for ChromatinRemodel
[[rule]]
type       = "require"
if_level   = 3
if_id      = "ChromatinRemodel"
then_level = 3
then_ids   = "Histone4"

# GQuadruplex incompatible with Metaphase
[[rule]]
type       = "exclude"
if_level   = 1
if_id      = "GQuadruplex"
then_level = 2
then_ids   = "Metaphase"

# CodonTriple required for Transcription
[[rule]]
type       = "require"
if_level   = 4
if_id      = "Transcription"
then_level = 0
then_ids   = "CodonTriple"
