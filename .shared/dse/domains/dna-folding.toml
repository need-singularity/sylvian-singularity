# n=6 기반 DNA/RNA 접힘 — 4염기 + 3코돈 + 이중나선 + 크로마틴 6단계
# BT-51 (Genetic code chain tau->n/phi->2^n->J2-tau = 4->3->64->20)
# Total raw combos: 6x6x6x6x5 = 6,480 (pre-filter)
# =============================================================

