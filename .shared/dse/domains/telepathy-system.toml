# =============================================================
# Compatibility Rules
# =============================================================

# PHFingerprint required for PHEmpathy (empathy needs PH encoding)
[[rule]]
type       = "require"
if_level   = 2
if_id      = "PHEmpathy"
then_level = 1
then_ids   = "PHFingerprint"

# MergeDistance9 requires DendrogramTree (merge distances come from dendrogram)
[[rule]]
type       = "require"
if_level   = 1
if_id      = "MergeDistance9"
then_level = 1
then_ids   = "DendrogramTree"

# SubstrateInvariant requires ConfusionPair or PHEmpathy
[[rule]]
type       = "require"
if_level   = 2
if_id      = "SubstrateInvariant"
then_level = 2
then_ids   = "ConfusionPair,PHEmpathy"

# QuantumChannel incompatible with EEG_Channel (different substrates)
[[rule]]
type       = "exclude"
if_level   = 3
if_id      = "QuantumChannel"
then_level = 3
then_ids   = "EEG_Channel"

# InstantRecognition requires DeepAlignment (needs prior deep alignment)
[[rule]]
type       = "require"
if_level   = 3
if_id      = "InstantRecognition"
then_level = 2
then_ids   = "PHEmpathy,SubstrateInvariant,ArchInvariant"
