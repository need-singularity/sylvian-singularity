# ============================================================
# Compatibility Rules
# ============================================================

# Antibody requires bioreactor manufacturing
[[rule]]
type = "require"
if_level = 1
if_id = "Antibody"
then_level = 3
then_ids = ["Bioreactor", "Cell-Free"]

# ADC requires bioreactor
[[rule]]
type = "require"
if_level = 1
if_id = "ADC"
then_level = 3
then_ids = ["Bioreactor"]

# mRNA construct requires LNP formulation
[[rule]]
type = "require"
if_level = 1
if_id = "mRNA-Construct"
then_level = 2
then_ids = ["LNP-Nanoparticle"]

# Oligonucleotide requires solid phase synthesis
[[rule]]
type = "require"
if_level = 1
if_id = "Oligonucleotide"
then_level = 3
then_ids = ["Solid-Phase", "Cell-Free"]

# Tablet-IR excluded from antibody (oral bioavailability too low)
[[rule]]
type = "exclude"
if_level = 2
if_id = "Tablet-IR"
then_level = 1
then_ids = ["Antibody", "ADC", "mRNA-Construct"]
