# ============================================================
# Compatibility Rules
# ============================================================

# Carbon fiber requires specialized high-temp melt spinning
[[rule]]
type = "prefer"
if_level = 0
if_id = "CarbonFiber"
then_level = 1
then_ids = "MeltSpin,Electropin"

# Silk pairs best with satin or jacquard weaving
[[rule]]
type = "prefer"
if_level = 0
if_id = "Silk"
then_level = 2
then_ids = "SatinWeave,Jacquard"

# Medical textile requires antimicrobial or nano coating finish
[[rule]]
type = "prefer"
if_level = 4
if_id = "MedTextile"
then_level = 3
then_ids = "AntiMicrobe,NanoCoat"

# Non-woven weaving pairs with geotextile or technical products
[[rule]]
type = "prefer"
if_level = 2
if_id = "NonWoven"
then_level = 4
then_ids = "GeoTextile,TechTextile,MedTextile"

# Cotton requires mercerization for best finish
[[rule]]
type = "prefer"
if_level = 0
if_id = "Cotton"
then_level = 3
then_ids = "Mercerize,DyeReactive"
