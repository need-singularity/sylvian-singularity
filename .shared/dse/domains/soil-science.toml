# ============================================================
# Compatibility Rules
# ============================================================

# Peat only for restoration or carbon farming
[[rule]]
type = "require"
if_level = 1
if_id = "Peat"
then_level = 4
then_ids = ["Restoration", "Carbon-Farming"]

# Synthetic microbiome requires sensor-smart or subsurface drip
[[rule]]
type = "require"
if_level = 3
if_id = "Microbiome-Synth"
then_level = 2
then_ids = ["Subsurface-Drip", "Sensor-Smart", "Drip-Irrigation"]

# Flood irrigation only for broadacre or restoration
[[rule]]
type = "require"
if_level = 2
if_id = "Flood-Basin"
then_level = 4
then_ids = ["Broadacre-Cereal", "Restoration"]

# Rhizobium best with green manure or broadacre
[[rule]]
type = "require"
if_level = 3
if_id = "Rhizobium"
then_level = 4
then_ids = ["Broadacre-Cereal", "Agroforestry", "Carbon-Farming"]
