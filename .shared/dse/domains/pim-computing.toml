# ============================================================
# Compatibility Rules
# ============================================================

# SRAM-6T best for LUT and digital near-bank compute
[[rule]]
type = "prefer"
if_level = 0
if_id = "SRAM_6T"
then_level = 1
then_ids = "LUT_6bit,Digital_near_bank"

# ReRAM crossbar designed for analog MAC
[[rule]]
type = "prefer"
if_level = 0
if_id = "ReRAM_crossbar"
then_level = 1
then_ids = "MAC_analog,Reduce_tree"

# DRAM bank pairs with row/column parallel dataflow
[[rule]]
type = "prefer"
if_level = 0
if_id = "DRAM_bank"
then_level = 2
then_ids = "Row_parallel,Bank_group_12"

# HBM-PIM highest bandwidth for GEMM and Transformer
[[rule]]
type = "prefer"
if_level = 3
if_id = "HBM_PIM_12ch"
then_level = 4
then_ids = "GEMM_matrix,Transformer_attention"

# LPDDR-PIM for mobile/edge workloads
[[rule]]
type = "prefer"
if_level = 3
if_id = "LPDDR_PIM"
then_level = 4
then_ids = "Recommendation,Search_CAM"

# Flash NAND only for search/scan workloads
[[rule]]
type = "prefer"
if_level = 0
if_id = "Flash_NAND"
then_level = 4
then_ids = "Search_CAM,Genome_align"

# PCM multilevel pairs with analog MAC for weight storage
[[rule]]
type = "prefer"
if_level = 0
if_id = "PCM_multilevel"
then_level = 1
then_ids = "MAC_analog,Bitwise_logic"

# Optical interconnect pairs with HBM-class bandwidth
[[rule]]
type = "prefer"
if_level = 3
if_id = "Optical_interconnect"
then_level = 2
then_ids = "Bank_group_12,Pipeline_6stage"

# Transformer attention benefits from broadcast dataflow
[[rule]]
type = "prefer"
if_level = 4
if_id = "Transformer_attention"
then_level = 2
then_ids = "Broadcast,Bank_group_12"

# Graph traversal needs fine-grained activation
[[rule]]
type = "prefer"
if_level = 4
if_id = "Graph_traverse"
then_level = 2
then_ids = "Subarray_4,Pipeline_6stage"
