# N6 Processing-In-Memory DSE — Near/in-memory computing
# 6×6×6×6×6 = 7,776 combos
# n=6: SRAM-6T (6 transistors = n EXACT), n=6 computation modes
#       sigma-tau=8 bit MAC (INT8), phi=2 bank-level parallelism
#       sigma=12 subarray groups, J2=24 bit-lines per group, tau=4 operand registers

[meta]
name = "pim-computing"
desc = "Processing-In-Memory DSE (BT-28/55/58/59)"

[scoring]
n6 = 0.35
perf = 0.25
power = 0.20
cost = 0.20

