# ============================================================
# Rules
# ============================================================

# Cube storage requires robotic retrieval
[[rule]]
type = "require"
if_level = 0
if_id = "Cube-6x6x6"
then_level = 1
then_ids = ["Robot-6axis", "VisionPick-6cam"]

# Human-assisted picking incompatible with drone shipping
[[rule]]
type = "exclude"
if_level = 1
if_id = "HumanAssist-6zone"
then_level = 4
then_ids = ["Drone-12unit"]

# Manual packing only with sort wall or conveyor shipping
[[rule]]
type = "require"
if_level = 3
if_id = "Manual-6station"
then_level = 4
then_ids = ["SortWall-12dock", "Conveyor-6merge"]
