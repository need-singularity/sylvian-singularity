# ============================================================
# Rules
# ============================================================

# Microchannel not suitable for marine (fouling)
[[rule]]
type = "exclude"
if_level = 0
if_id = "Microchannel-6array"
then_level = 4
then_ids = ["Marine-4circuit"]

# PCM enhancement only for HVAC and data center (thermal storage)
[[rule]]
type = "require"
if_level = 3
if_id = "PhaseChange-24kJ"
then_level = 4
then_ids = ["HVAC-12zone", "DataCenter-6row"]

# Graphite/SiC only for high-temperature applications
[[rule]]
type = "require"
if_level = 1
if_id = "Graphite-SiC"
then_level = 4
then_ids = ["PowerPlant-6unit", "Chemical-24stream", "Cryo-LNG"]

# Nanofluid not practical for LNG cryogenic
[[rule]]
type = "exclude"
if_level = 3
if_id = "Nano-TiO2"
then_level = 4
then_ids = ["Cryo-LNG"]
