# =============================================================
# Rules
# =============================================================

# DAC pairs best with permanent mineral storage
[[rule]]
type      = "prefer"
if_level  = 0
if_id     = "DAC_Solid"
then_level = 2
then_ids  = "Basalt_Mineral,Hybrid_Mineral"

# Ship transport pairs with ocean/offshore storage
[[rule]]
type      = "prefer"
if_level  = 1
if_id     = "Ship_LCO2"
then_level = 2
then_ids  = "Ocean_Deep,Depleted_Oil"

# BECCS naturally produces fuel-grade CO2, ideal for utilization
[[rule]]
type      = "prefer"
if_level  = 0
if_id     = "BioEnergy"
then_level = 4
then_ids  = "Methanol,EFuel_Cycle"

# Truck transport too small for deep saline Gt-scale
[[rule]]
type      = "exclude"
if_level  = 1
if_id     = "Truck_ISO"
then_level = 2
then_ids  = "Saline_Deep"

# AI monitoring best with real-time downhole sensors
[[rule]]
type      = "prefer"
if_level  = 3
if_id     = "AI_Digital"
then_level = 2
then_ids  = "Saline_Deep,Hybrid_Mineral"
