# =============================================================
# Compatibility Rules
# =============================================================

# PhotonicRing engine requires Optical coupling
[[rule]]
type       = "require"
if_level   = 0
if_id      = "PhotonicRing"
then_level = 2
then_ids   = "Optical,QuantumCoupling"

# PhotonicRing engine requires optical measurement
[[rule]]
type       = "prefer"
if_level   = 0
if_id      = "PhotonicRing"
then_level = 4
then_ids   = "OpticalPower,Phase"

# MemristorXbar needs Crossbar circuit
[[rule]]
type       = "require"
if_level   = 0
if_id      = "MemristorXbar"
then_level = 1
then_ids   = "Crossbar"

# QuantumCoupling incompatible with Thermal noise (decoherence)
[[rule]]
type       = "exclude"
if_level   = 2
if_id      = "QuantumCoupling"
then_level = 3
then_ids   = "Thermal,Chaotic"

# Inductive circuit pairs with Magnetic coupling
[[rule]]
type       = "prefer"
if_level   = 1
if_id      = "Inductive"
then_level = 2
then_ids   = "Magnetic"
