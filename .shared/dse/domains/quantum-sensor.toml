# ============================================================
# Compatibility Rules
# ============================================================

# SQUID requires cryogenic — exclude room-temp applications
[[rule]]
type = "exclude"
if_level = 0
if_id = "SQUID"
then_level = 4
then_ids = ["Biomedical", "Navigation"]

# Cold atoms require gravity interaction for best performance
[[rule]]
type = "require"
if_level = 0
if_id = "Cold-Atom"
then_level = 1
then_ids = ["Gravity", "Rotation", "Time-Frequency"]

# NV Diamond optimal for magnetic and temperature sensing
[[rule]]
type = "require"
if_level = 0
if_id = "NV-Diamond"
then_level = 1
then_ids = ["Magnetic-Field", "Temperature"]

# Single photon detector requires photon-based qubits
[[rule]]
type = "require"
if_level = 2
if_id = "Single-Photon"
then_level = 0
then_ids = ["NV-Diamond", "SiV-Diamond", "Photon-Pair"]
