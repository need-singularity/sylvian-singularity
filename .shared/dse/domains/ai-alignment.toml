# =============================================================
# Compatibility Rules
# =============================================================

# DeceptionDetect requires TensionMonitor or AnomalyDetect
[[rule]]
type       = "require"
if_level   = 3
if_id      = "DeceptionDetect"
then_level = 1
then_ids   = "TensionMonitor,AnomalyDetect"

# Corrigibility requires ShutdownSafe
[[rule]]
type       = "require"
if_level   = 2
if_id      = "Corrigibility"
then_level = 3
then_ids   = "ShutdownSafe"

# SelfAlignment incompatible with CapabilityControl
[[rule]]
type       = "exclude"
if_level   = 2
if_id      = "SelfAlignment"
then_level = 3
then_ids   = "CapabilityControl"

# RScoreAlign requires InterpretabilityN6
[[rule]]
type       = "require"
if_level   = 0
if_id      = "RScoreAlign"
then_level = 1
then_ids   = "InterpretabilityN6"
