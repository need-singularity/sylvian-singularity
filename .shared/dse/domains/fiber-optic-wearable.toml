# ============================================================
# Compatibility Rules
# ============================================================

# Sapphire fiber too rigid for textile
[[rule]]
type = "exclude"
if_level = 0
if_id = "Sapphire-HT"
then_level = 3
then_ids = ["Textile-Weave", "Knit-Embed"]

# Implantable integration only for medical applications
[[rule]]
type = "require"
if_level = 3
if_id = "Implantable"
then_level = 4
then_ids = ["Medical-Vital", "MRI-Compatible"]

# Edge filter too imprecise for robot skin
[[rule]]
type = "exclude"
if_level = 2
if_id = "Edge-Filter"
then_level = 4
then_ids = ["Robot-Skin", "Sport-Motion"]

# OFDR distributed sensing requires tunable laser or OTDR
[[rule]]
type = "require"
if_level = 1
if_id = "OFDR-Distributed"
then_level = 2
then_ids = ["Tunable-Laser", "OTDR-Pulse", "PIC-Chip"]
