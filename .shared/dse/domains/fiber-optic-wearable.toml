# =============================================================
# N6 Fiber Optic Wearable DSE Domain Definition
# Photonic sensor wearable systems
# n=6: 6 FBG sensors per fiber (n=6), sigma=12 wavelength channels (WDM),
#   tau=4 sensing parameters (strain/temp/pressure/bend), phi=2 core/cladding,
#   J2=24 sensing points per garment, 6 um core diameter
# Total raw combos: 6x6x6x6x6 = 7,776 (pre-filter)
# =============================================================

[meta]
name = "fiber-optic-wearable"
desc = "Fiber Optic Wearable Architecture DSE (fiber/sensing/interrogator/integration/application)"

[scoring]
n6 = 0.35
perf = 0.25
power = 0.20
cost = 0.20

