# ============================================================
# Compatibility Rules
# ============================================================

# Excimer UV only for ablation and marking (not thermal processes)
[[rule]]
type = "require"
if_level = 0
if_id = "Excimer"
then_level = 3
then_ids = ["Ablation", "Marking"]

# CO2 excluded from micro components (wavelength too long)
[[rule]]
type = "exclude"
if_level = 0
if_id = "CO2"
then_level = 4
then_ids = ["Micro-Part", "Semiconductor"]

# Ultrafast required for semiconductor wafer processing
[[rule]]
type = "require"
if_level = 4
if_id = "Semiconductor"
then_level = 0
then_ids = ["Ultrafast", "Excimer"]

# Polygon scanner only for marking (high speed surface)
[[rule]]
type = "require"
if_level = 2
if_id = "Polygon-Scanner"
then_level = 3
then_ids = ["Marking"]
