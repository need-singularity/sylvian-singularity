# =============================================================
# Compatibility Rules
# =============================================================

# Kerr or KerrNewman required for ExtremalBH (needs rotation parameters)
[[rule]]
type       = "require"
if_level   = 2
if_id      = "ExtremalBH"
then_level = 1
then_ids   = "Kerr,KerrNewman"

# Holographic requires HigherDimBH or BTZ_3D (needs AdS geometry)
[[rule]]
type       = "require"
if_level   = 3
if_id      = "Holographic"
then_level = 1
then_ids   = "HigherDimBH,BTZ_3D"

# EREPR requires HawkingRadiation (needs entanglement context)
[[rule]]
type       = "require"
if_level   = 3
if_id      = "EREPR"
then_level = 2
then_ids   = "HawkingRadiation"

# NakedSingularity incompatible with Holographic (censorship vs holography)
[[rule]]
type       = "exclude"
if_level   = 0
if_id      = "NakedSingularity"
then_level = 3
then_ids   = "Holographic"

# EHTImaging requires Schwarzschild or Kerr (needs metric for imaging model)
[[rule]]
type       = "require"
if_level   = 4
if_id      = "EHTImaging"
then_level = 1
then_ids   = "Schwarzschild,Kerr,KerrNewman"

# FuzzballString requires HigherDimBH (needs extra dimensions for string theory)
[[rule]]
type       = "require"
if_level   = 3
if_id      = "FuzzballString"
then_level = 1
then_ids   = "HigherDimBH"
