# =============================================================
# Compatibility Rules
# =============================================================

# DHT_Androgen required for Finasteride

[[candidate]]
level  = 4
id     = "TrichoscopyN6"
label  = "6-Metric Trichoscopy Score (n=6 EXACT endpoints)"
n6     = 1.00
perf   = 0.85
power  = 0.60
cost   = 0.55
notes  = "metrics=6=n EXACT (density/thickness/growth_rate/anagen_ratio/vellus_ratio/coverage), standardized=true"
[[rule]]
type       = "require"
if_level   = 2
if_id      = "Finasteride"
then_level = 1
then_ids   = "DHT_Androgen"

# WntPathway required for StemCellTherapy
[[rule]]
type       = "require"
if_level   = 2
if_id      = "StemCellTherapy"
then_level = 1
then_ids   = "WntPathway"

# RNATherapeutics requires Nanoparticle or MicroneedlePatch
[[rule]]
type       = "require"
if_level   = 2
if_id      = "RNATherapeutics"
then_level = 3
then_ids   = "Nanoparticle,MicroneedlePatch"

# HairCycleTau4 required for CycleRestoration
[[rule]]
type       = "require"
if_level   = 4
if_id      = "CycleRestoration"
then_level = 0
then_ids   = "HairCycleTau4"
