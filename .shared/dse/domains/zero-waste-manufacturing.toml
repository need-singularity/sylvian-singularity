# =============================================================
# Rules
# =============================================================

# Bio-based materials pair with composting/biorefinery recovery
[[rule]]
type      = "prefer"
if_level  = 0
if_id     = "BioPolymer"
then_level = 3
then_ids  = "BioConvert,SolventRegen"

# Additive manufacturing minimizes waste audit needs
[[rule]]
type      = "prefer"
if_level  = 1
if_id     = "AdditiveMfg"
then_level = 2
then_ids  = "DigitalWaste,SolidResidue"

# Industrial symbiosis requires eco-industrial park integration
[[rule]]
type      = "prefer"
if_level  = 0
if_id     = "IndustSymb"
then_level = 4
then_ids  = "EcoIndPark,SupplyChain"

# ZLD too expensive for low-value bio-process wastewater
[[rule]]
type      = "exclude"
if_level  = 2
if_id     = "ZeroLiquid"
then_level = 1
then_ids  = "BioProcess"
