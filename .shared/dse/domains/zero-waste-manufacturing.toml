[meta]
name = "zero-waste-manufacturing"
desc = "Zero Waste Manufacturing DSE (6-sigma, tau=4 streams, sigma-phi=10x reduction)"
levels = ["Material", "Process", "Waste", "Recovery", "Integration"]
vision = "True zero-waste factory — 6-sigma quality with n=6 closed-loop architecture"

[scoring]
n6   = 0.30
perf = 0.25
power = 0.25
cost  = 0.20

