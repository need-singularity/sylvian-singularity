# =============================================================
# Compatibility Rules
# =============================================================

# MRI requires CMOS_Sensor or Quantum_Sensor
[[rule]]
type       = "require"
if_level   = 0
if_id      = "MRI"
then_level = 2
then_ids   = "CMOS_Sensor,Quantum_Sensor"

# Wearable excludes MRI, CT, PET_SPECT (too large)
[[rule]]
type       = "exclude"
if_level   = 4
if_id      = "Wearable"
then_level = 0
then_ids   = "MRI,CT,PET_SPECT"

# SurgicalAI requires Hospital or SurgicalSuite
[[rule]]
type       = "require"
if_level   = 3
if_id      = "SurgicalAI"
then_level = 4
then_ids   = "Hospital,SurgicalSuite"

# PET_SPECT requires Hospital or SurgicalSuite (nuclear facility)
[[rule]]
type       = "require"
if_level   = 0
if_id      = "PET_SPECT"
then_level = 4
then_ids   = "Hospital,SurgicalSuite"

# Quantum_Sensor only with MRI or PET_SPECT (needs cryogenic)
[[rule]]
type       = "require"
if_level   = 2
if_id      = "Quantum_Sensor"
then_level = 0
then_ids   = "MRI,PET_SPECT"

# ECG best with Electrode core
[[rule]]
type       = "require"
if_level   = 0
if_id      = "ECG"
then_level = 2
then_ids   = "Electrode,MEMS,Piezo"

# Endoscope requires Fiber or CMOS_Sensor
[[rule]]
type       = "require"
if_level   = 0
if_id      = "Endoscope"
then_level = 2
then_ids   = "Fiber,CMOS_Sensor"

# Ultrasound requires Piezo transducer
[[rule]]
type       = "require"
if_level   = 0
if_id      = "Ultrasound"
then_level = 2
then_ids   = "Piezo,MEMS"
