# =============================================================
# HEXA-BMS DSE Domain Definition
# n=6: 6S cell config (n=6 EXACT), sigma=12 monitoring channels,
#       tau=4 BMS functions, phi=2 active/passive, J2=24V nominal
# BT-43 (CN=6 cathode), BT-57 (6->12->24 cell ladder), BT-82
# Total combos: 6x6x6x6x6 = 7,776
# =============================================================

[meta]
name = "battery-management"
desc = "BMS Battery Management System DSE (n=6 cell config, BT-43/57/82)"
levels = ["Topology", "CellMonitoring", "Balancing", "StateEstimation", "Communication"]
vision = "n=6 cell BMS -- sigma=12 channels, tau=4 functions (monitor/balance/protect/communicate), J2=24V nominal"

[scoring]
n6    = 0.35
perf  = 0.25
power = 0.20
cost  = 0.20

