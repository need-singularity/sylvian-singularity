# =============================================================
# Compatibility Rules
# =============================================================

# Wireless BMS topology requires wireless communication
[[rule]]
type       = "require"
if_level   = 0
if_id      = "Wireless"
then_level = 4
then_ids   = "Wireless_BLE"

# Cloud hybrid topology requires high-bandwidth communication
[[rule]]
type       = "require"
if_level   = 0
if_id      = "CloudHybrid"
then_level = 4
then_ids   = "Ethernet,CANFD"

# EIS monitoring requires advanced state estimation
[[rule]]
type       = "require"
if_level   = 1
if_id      = "EIS"
then_level = 3
then_ids   = "NeuralSOC,DualFilter,PhysicsInformed"
