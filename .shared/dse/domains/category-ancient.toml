# =============================================================
# Compatibility Rules
# =============================================================

# Grothendieck6 requires AdjointPair (6-operations use adjoint functors)
[[rule]]
type       = "require"
if_level   = 0
if_id      = "Grothendieck6"
then_level = 2
then_ids   = "AdjointPair,KanExtension,SixFunctor"

# HigherCategory requires YonedaLemma or KanExtension (needs universal properties)
[[rule]]
type       = "require"
if_level   = 0
if_id      = "HigherCategory"
then_level = 2
then_ids   = "YonedaLemma,KanExtension,SixFunctor"

# ToposTheory requires LogicFoundation (topos is logical framework)
[[rule]]
type       = "require"
if_level   = 0
if_id      = "ToposTheory"
then_level = 0
then_ids   = "LogicFoundation"

# GroupS6 uniqueness theorem -- incompatible with MonoidCategory (too simple)
[[rule]]
type       = "exclude"
if_level   = 1
if_id      = "GroupS6"
then_level = 1
then_ids   = "MonoidCategory"

# AlgebraicGeometry requires LieAlgebra or GroupS6 (needs algebraic structure)
[[rule]]
type       = "require"
if_level   = 3
if_id      = "AlgebraicGeometry"
then_level = 1
then_ids   = "LieAlgebra,GroupS6,BraidGroup"

# IChingN64 most aligned -- incompatible with MonoidCategory (conceptual mismatch)
[[rule]]
type       = "exclude"
if_level   = 4
if_id      = "IChingN64"
then_level = 1
then_ids   = "MonoidCategory"
