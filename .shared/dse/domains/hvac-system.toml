# ============================================================
# Rules
# ============================================================

# Geothermal not practical for data centers (space constraints)
[[rule]]
type = "exclude"
if_level = 0
if_id = "Geothermal-6loop"
then_level = 4
then_ids = ["DataCenter-48rack"]

# CO2 transcritical needs specialized distribution
[[rule]]
type = "require"
if_level = 3
if_id = "CO2-R744"
then_level = 1
then_ids = ["Hydronic-6loop", "FanCoil-12unit"]

# Water refrigerant only for large buildings
[[rule]]
type = "exclude"
if_level = 3
if_id = "Water-R718"
then_level = 4
then_ids = ["Residential-6room"]

# Solar thermal requires hydronic or underfloor distribution
[[rule]]
type = "require"
if_level = 0
if_id = "SolarThermal-6panel"
then_level = 1
then_ids = ["Hydronic-6loop", "UnderFloor-6zone"]
