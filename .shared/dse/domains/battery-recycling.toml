# ============================================================
# Compatibility Rules
# ============================================================

# Cryogenic shredding pairs best with cryogenic discharge
[[rule]]
type = "prefer"
if_level = 2
if_id = "CryoShred"
then_level = 1
then_ids = "CryoDischarge,InertAtmo"

# Direct recycling requires gentle separation methods
[[rule]]
type = "prefer"
if_level = 4
if_id = "DirectRecycle"
then_level = 3
then_ids = "MagneticSep,GravitySep"

# Acid leaching pairs with hydrometallurgical recovery
[[rule]]
type = "prefer"
if_level = 3
if_id = "AcidLeach"
then_level = 4
then_ids = "Hydromet,Electrowin"

# EV disassembly benefits from robotic sorting upstream
[[rule]]
type = "prefer"
if_level = 0
if_id = "EVDisassembly"
then_level = 2
then_ids = "InertAtmo,LaserCut"
