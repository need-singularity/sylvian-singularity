id     = "SixGTerahertz"
label  = "6G Terahertz Communication (n=6 EXACT generation)"
n6     = 1.00
perf   = 0.92
power  = 0.45
cost   = 0.35
notes  = "generation=6=n EXACT, THz_band=0.1-10THz, bandwidth=100Gbps+, wave_propagation=central, 6G_standard=2030"
[[rule]]
type       = "require"
if_level   = 0
if_id      = "StringVibration"
then_level = 3
then_ids   = "HarmonicSeries"

# PureFieldInterference requires Constructive or Destructive
[[rule]]
type       = "require"
if_level   = 2
if_id      = "PureFieldInterference"
then_level = 2
then_ids   = "Constructive,Destructive"

# GravitationalWave requires NonlinearWave
[[rule]]
type       = "require"
if_level   = 0
if_id      = "GravitationalWave"
then_level = 1
then_ids   = "NonlinearWave"

# DoubleSlitN6 requires MatterWave or EM_Wave
[[rule]]
type       = "require"
if_level   = 2
if_id      = "DoubleSlitN6"
then_level = 0
then_ids   = "MatterWave,EM_Wave"
