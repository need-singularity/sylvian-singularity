# ============================================================
# Compatibility Rules
# ============================================================

# PLA excluded from aerospace structural (too weak)
[[rule]]
type = "exclude"
if_level = 0
if_id = "PLA"
then_level = 4
then_ids = ["Aerospace-Struct", "Medical-Implant"]

# EBM requires Ti6Al4V or similar (vacuum process for reactive metals)
[[rule]]
type = "require"
if_level = 1
if_id = "EBM"
then_level = 0
then_ids = ["Ti6Al4V"]

# FDM excluded from aerospace structural (insufficient density)
[[rule]]
type = "exclude"
if_level = 1
if_id = "FDM"
then_level = 4
then_ids = ["Aerospace-Struct"]

# Multi-laser requires SLM process
[[rule]]
type = "require"
if_level = 3
if_id = "Multi-Laser-6"
then_level = 1
then_ids = ["SLM"]

# Ceramic requires SLA or Binder-Jet process
[[rule]]
type = "require"
if_level = 0
if_id = "Ceramic-Al2O3"
then_level = 1
then_ids = ["SLA", "Binder-Jet"]
