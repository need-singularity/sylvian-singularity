# =============================================================
# Compatibility Rules
# =============================================================

# Z2_Topological requires DiracCone (Z2 insulator has Dirac surface state)
[[rule]]
type       = "require"
if_level   = 0
if_id      = "Z2_Topological"
then_level = 2
then_ids   = "DiracCone"

# MajoranaZero requires Z2_Topological or ChernInsulator
[[rule]]
type       = "require"
if_level   = 2
if_id      = "MajoranaZero"
then_level = 0
then_ids   = "Z2_Topological,ChernInsulator"

# SmB6 requires NonlocalTransport (Kondo insulator)
[[rule]]
type       = "require"
if_level   = 1
if_id      = "SmB6"
then_level = 3
then_ids   = "NonlocalTransport"

# Graphene requires QSHE or ChiralAnomaly
[[rule]]
type       = "require"
if_level   = 1
if_id      = "Graphene"
then_level = 0
then_ids   = "QSHE,WeylSemimetal,Z2_Topological"

# NodalLine requires FermiArc or DrumheadSurface
[[rule]]
type       = "require"
if_level   = 0
if_id      = "NodalLine"
then_level = 2
then_ids   = "FermiArc,DrumheadSurface"

# Majorana_Qubit requires MajoranaZero
[[rule]]
type       = "require"
if_level   = 4
if_id      = "Majorana_Qubit"
then_level = 2
then_ids   = "MajoranaZero"

# AxionInsulator requires MagnetoElectric
[[rule]]
type       = "require"
if_level   = 0
if_id      = "AxionInsulator"
then_level = 3
then_ids   = "MagnetoElectric"
