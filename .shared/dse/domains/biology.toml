# =============================================================
# Compatibility Rules
# =============================================================

# ProteinEng core requires CryoEM or MassSpec process
[[rule]]
type       = "require"
if_level   = 2
if_id      = "ProteinEng"
then_level = 1
then_ids   = "CryoEM,MassSpec"

# AlphaFold engine requires ProteinEng or GeneCircuit core
[[rule]]
type       = "require"
if_level   = 3
if_id      = "AlphaFold"
then_level = 2
then_ids   = "ProteinEng,GeneCircuit"

# Agriculture system excludes TissueEng core
[[rule]]
type       = "exclude"
if_level   = 4
if_id      = "Agriculture"
then_level = 2
then_ids   = "TissueEng"

# CellTherapy foundation requires Bioreactor or Microfluidics process
[[rule]]
type       = "require"
if_level   = 0
if_id      = "CellTherapy"
then_level = 1
then_ids   = "Bioreactor,Microfluidics"

# TissueEng core requires CellTherapy or SynBio foundation
[[rule]]
type       = "require"
if_level   = 2
if_id      = "TissueEng"
then_level = 0
then_ids   = "CellTherapy,SynBio"

# CRISPR foundation requires NGS or Nanopore process
[[rule]]
type       = "require"
if_level   = 0
if_id      = "CRISPR"
then_level = 1
then_ids   = "NGS,Nanopore"

# GeneTherapy system requires CRISPR or Genomics foundation
[[rule]]
type       = "require"
if_level   = 4
if_id      = "GeneTherapy"
then_level = 0
then_ids   = "CRISPR,Genomics"

# MassSpec process not suitable for GeneCircuit core
[[rule]]
type       = "exclude"
if_level   = 1
if_id      = "MassSpec"
then_level = 2
then_ids   = "GeneCircuit"
