# ============================================================
# Rules
# ============================================================

# Tube amp only with analog transmission
[[rule]]
type = "require"
if_level = 1
if_id = "Tube-6L6"
then_level = 3
then_ids = ["Analog-6pair", "ADAT-6ch"]

# Laser mic needs high-end DSP processing
[[rule]]
type = "exclude"
if_level = 0
if_id = "LaserMic-6beam"
then_level = 2
then_ids = ["Compressor-6ratio"]

# Bluetooth only for headphone/soundbar (portable)
[[rule]]
type = "require"
if_level = 3
if_id = "Bluetooth-6codec"
then_level = 4
then_ids = ["Headphone-6driver", "Soundbar-6unit"]

# PA system needs networked amp
[[rule]]
type = "require"
if_level = 4
if_id = "PA-6stack"
then_level = 1
then_ids = ["Networked-48ch", "ClassD-12ch"]
