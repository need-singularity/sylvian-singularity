# =============================================================
# Compatibility Rules
# =============================================================

# HexagonalIce and BasaltColumn have n6=1.0 (already set in scores)
# No additional constraint needed -- they naturally dominate

# EarthN4 requires CrustOceanCont or CoreInnerOuter
[[rule]]
type       = "require"
if_level   = 1
if_id      = "EarthN4"
then_level = 1
then_ids   = "CrustOceanCont,CoreInnerOuter"

# CarbonCycleN6 requires GraphiteLayer or DiamondCN4 (carbon mineral basis)
[[rule]]
type       = "require"
if_level   = 2
if_id      = "CarbonCycleN6"
then_level = 0
then_ids   = "GraphiteLayer,DiamondCN4"

# PlateN6 requires MantleConvect (convection drives plates)
[[rule]]
type       = "require"
if_level   = 2
if_id      = "PlateN6"
then_level = 1
then_ids   = "MantleConvect"

# IceAge requires MilankovitchN3 (orbital forcing drives glaciation)
[[rule]]
type       = "require"
if_level   = 4
if_id      = "IceAge"
then_level = 2
then_ids   = "MilankovitchN3"
