# ============================================================
# Compatibility Rules
# ============================================================

# Hydraulic only for low-rise buildings
[[rule]]
type = "require"
if_level = 0
if_id = "Hydraulic"
then_level = 4
then_ids = ["LowRise-6", "Freight"]

# Linear motor requires ropeless magnetic
[[rule]]
type = "require"
if_level = 0
if_id = "Linear-Motor"
then_level = 1
then_ids = ["Ropeless-Mag"]

# Double deck control requires high-rise or supertall
[[rule]]
type = "require"
if_level = 2
if_id = "DualDeck"
then_level = 4
then_ids = ["HighRise-48", "SuperTall-96"]

# Chain drive only for freight
[[rule]]
type = "require"
if_level = 1
if_id = "Chain-Drive"
then_level = 4
then_ids = ["Freight"]
