# ============================================================
# Compatibility Rules
# ============================================================

# LES regional too expensive for full coupling
[[rule]]
type = "exclude"
if_level = 0
if_id = "LES-Regional"
then_level = 4
then_ids = ["Digital-Twin", "AI-Hybrid"]

# Simple bucket land excludes advanced coupling
[[rule]]
type = "exclude"
if_level = 2
if_id = "Bucket-Simple"
then_level = 4
then_ids = ["Digital-Twin"]

# DEM floe model requires fine ocean resolution
[[rule]]
type = "require"
if_level = 3
if_id = "DEM-Floe"
then_level = 1
then_ids = ["Unstructured", "Hybrid-Vertical"]

# AI emulator atmosphere pairs best with AI coupling
[[rule]]
type = "require"
if_level = 0
if_id = "AI-Emulator"
then_level = 4
then_ids = ["AI-Hybrid", "Digital-Twin"]
