# =============================================================
# Climate Modeling DSE Domain Definition
# Earth system simulation — atmosphere to coupling
# n=6: 6 atmospheric layers, σ=12 month cycle, τ=4 seasons
# Total raw combos: 6x6x6x6x6 = 7,776 (pre-filter)
# =============================================================

[meta]
name = "climate-modeling"
desc = "Climate Modeling Architecture DSE (atmosphere/ocean/land/ice/coupling)"

[scoring]
n6 = 0.35
perf = 0.25
power = 0.20
cost = 0.20

