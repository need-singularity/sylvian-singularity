# ============================================================
# Compatibility Rules
# ============================================================

# WaveNet too slow for real-time edge
[[rule]]
type = "require"
if_level = 2
if_id = "WaveNet"
then_level = 4
then_ids = ["Studio-48k", "HD-24k", "Emotional"]

# LPCNet designed for edge deployment
[[rule]]
type = "require"
if_level = 2
if_id = "LPCNet"
then_level = 4
then_ids = ["Streaming-16k", "Realtime-Edge"]

# LLM frontend requires cloud-capable output
[[rule]]
type = "require"
if_level = 0
if_id = "LLM-Frontend"
then_level = 4
then_ids = ["Studio-48k", "HD-24k", "MultiLingual", "Emotional"]

# Parametric only for simple streaming
[[rule]]
type = "require"
if_level = 1
if_id = "Parametric"
then_level = 4
then_ids = ["Streaming-16k", "Realtime-Edge"]
