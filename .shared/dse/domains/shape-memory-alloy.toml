# ============================================================
# Compatibility Rules
# ============================================================

# NiTi equiatomic is the standard for biomedical stent
[[rule]]
type = "prefer"
if_level = 0
if_id = "NiTi_equiatomic"
then_level = 4
then_ids = "Biomedical_stent,Eyeglass_frame"

# NiTiHf high-temp alloy pairs with aerospace and automotive
[[rule]]
type = "prefer"
if_level = 0
if_id = "NiTiHf_hightemp"
then_level = 4
then_ids = "Aerospace_morph,Automotive_clutch"

# NiMnGa magnetic requires magnetic field transformation
[[rule]]
type = "prefer"
if_level = 0
if_id = "NiMnGa_magnetic"
then_level = 2
then_ids = "MagneticField,TwoWay"

# Single crystal processing pairs with superelastic transformation
[[rule]]
type = "prefer"
if_level = 1
if_id = "SingleCrystal"
then_level = 2
then_ids = "Superelastic,MagneticField"

# Wire drawing pairs with wire linear actuator and spring coil
[[rule]]
type = "prefer"
if_level = 1
if_id = "WireDrawing"
then_level = 3
then_ids = "Wire_linear,Spring_coil"

# Thin film sputtering pairs with micro-actuator MEMS and bimorph
[[rule]]
type = "prefer"
if_level = 1
if_id = "ThinFilmSputter"
then_level = 3
then_ids = "MicroActuator_MEMS,Film_bimorph"

# Superelastic transformation pairs with stent and seismic applications
[[rule]]
type = "prefer"
if_level = 2
if_id = "Superelastic"
then_level = 4
then_ids = "Biomedical_stent,Seismic_damper"

# Two-way SME pairs with robotics muscle (no bias spring needed)
[[rule]]
type = "prefer"
if_level = 2
if_id = "TwoWay"
then_level = 4
then_ids = "Robotics_muscle,Aerospace_morph"

# CuAlNi is low-cost, pairs with seismic damper (large volume)
[[rule]]
type = "prefer"
if_level = 0
if_id = "CuAlNi"
then_level = 4
then_ids = "Seismic_damper,Automotive_clutch"

# Additive SLM pairs with composite embedded for complex geometry
[[rule]]
type = "prefer"
if_level = 1
if_id = "Additive_SLM"
then_level = 3
then_ids = "Composite_embedded,MicroActuator_MEMS"
