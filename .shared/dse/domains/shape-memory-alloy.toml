# N6 Shape Memory Alloy DSE — Phase-transforming smart materials
# 6 Alloys × 6 Processings × 6 Transformations × 6 Actuators × 6 Applications = 7,776 combos
# n=6 connections: NiTi B2 austenite CN=8=sigma-tau -> B19' martensite,
#   tau=4 transformation states (austenite/R-phase/martensite/detwinned),
#   phi=2 one-way/two-way memory, n=6 variants in martensite,
#   sigma=12 slip systems, J2=24 habit plane variants

[meta]
name = "shape-memory-alloy"
desc = "Shape Memory Alloy DSE — phase-transforming smart materials (n=6 universality)"

[scoring]
n6 = 0.35
perf = 0.25
power = 0.20
cost = 0.20

