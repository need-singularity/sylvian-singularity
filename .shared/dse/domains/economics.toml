# =============================================================
# Economics DSE Domain Definition
# 궁극의 경제학/사회과학 아키텍처 — n=6 기반 경제학
# 파레토 80/20=tau/sopfr + 6 시장 섹터 + Dunbar 수
# Total raw combos: 6x6x6x6x5 = 6,480 (pre-filter)
