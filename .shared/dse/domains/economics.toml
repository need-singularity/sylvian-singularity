[meta]
name = "economics"
desc = "Ultimate Economics Architecture DSE — Pareto 80/20 + 6 Sectors + Dunbar"
levels = ["Market", "Agent", "Cycle", "Network", "Policy"]
vision = "n=6 기반 경제학 — 파레토 80/20=tau/sopfr + 6 시장 섹터 + Dunbar 수"

[scoring]
n6   = 0.35
perf = 0.25
power = 0.20
cost  = 0.20

