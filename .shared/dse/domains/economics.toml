# =============================================================
# Compatibility Rules
# =============================================================

# EvolutionaryAgent requires GameTheoryN6 (evolutionary game theory)
[[rule]]
type       = "require"
if_level   = 1
if_id      = "EvolutionaryAgent"
then_level = 0
then_ids   = "GameTheoryN6"

# KondratievN6 requires TradeNetworkN6 or FinancialGrid (long waves need global networks)
[[rule]]
type       = "require"
if_level   = 2
if_id      = "KondratievN6"
then_level = 3
then_ids   = "TradeNetworkN6,FinancialGrid"

# CryptoNetworkN6 incompatible with MonopolyCompetition (decentralized vs centralized)
[[rule]]
type       = "exclude"
if_level   = 3
if_id      = "CryptoNetworkN6"
then_level = 0
then_ids   = "MonopolyCompetition"

# BoundedRational requires BehavioralBias or DunbarN150 (bounded rationality needs cognitive constraints)
[[rule]]
type       = "require"
if_level   = 1
if_id      = "BoundedRational"
then_level = 1
then_ids   = "BehavioralBias,DunbarN150"
