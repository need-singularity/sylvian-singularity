# =============================================================
# Compatibility Rules
# =============================================================

# CrystallographicRestriction is n6=1.0 (the theorem IS about n=6) -- already set

# HexagonalN6 required for Piezoelectric
[[rule]]
type       = "require"
if_level   = 4
if_id      = "Piezoelectric"
then_level = 1
then_ids   = "HexagonalN6"

# XRayN12 requires PointGroupN32 or SpaceGroupN230 (needs symmetry for indexing)
[[rule]]
type       = "require"
if_level   = 2
if_id      = "XRayN12"
then_level = 0
then_ids   = "PointGroupN32,SpaceGroupN230"

# MBE requires SynchrotronN6 or ElectronDiffraction (needs in-situ monitoring)
[[rule]]
type       = "require"
if_level   = 3
if_id      = "MBE"
then_level = 2
then_ids   = "SynchrotronN6,ElectronDiffraction"

# TriclinicN1 incompatible with Piezoelectric (no piezo in triclinic)
[[rule]]
type       = "exclude"
if_level   = 1
if_id      = "TriclinicN1"
then_level = 4
then_ids   = "Piezoelectric"
