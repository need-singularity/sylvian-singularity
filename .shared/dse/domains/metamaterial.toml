# n=6: 6-fold unit cell symmetry (n=6), σ=12 resonance modes,
#       φ=2 negative index (ε<0,μ<0), τ=4 constitutive params (ε,μ,κ,ξ),
#       J₂=24 lattice sites per supercell
# Total raw combos: 6x6x6x6x6 = 7,776 (pre-filter)
# =============================================================

