# ============================================================
# Compatibility Rules
# ============================================================

# Plasmonic nanorod requires optical-scale spectra
[[rule]]
type = "require"
if_level = 0
if_id = "Plasmonic-Nanorod"
then_level = 3
then_ids = ["Visible-Optic", "Infrared", "THz-Gap"]

# Pentamode mechanical only for acoustic/seismic
[[rule]]
type = "require"
if_level = 2
if_id = "Pentamode-Mechanical"
then_level = 3
then_ids = ["Acoustic", "Seismic"]

# Copper PCB limited to microwave/THz
[[rule]]
type = "require"
if_level = 1
if_id = "Copper-PCB"
then_level = 3
then_ids = ["Microwave", "THz-Gap"]

# Invisibility cloak requires gradient or 3D topology
[[rule]]
type = "require"
if_level = 4
if_id = "Invisibility-Cloak"
then_level = 2
then_ids = ["Gradient-GRIN", "3D-Volumetric", "Toroidal-12pole"]
