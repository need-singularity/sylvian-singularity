# =============================================================
# N6 NAND Flash Memory DSE — Non-volatile storage
# n=6: sigma*tau=48 layers (Samsung V-NAND), J2*n=144 layers (next-gen),
#       phi=2 bits/cell (MLC), tau=4 bits/cell (QLC), sigma=12 planes,
#       6-state sensing (n=6)
# BT-28 (Computing ladder), BT-59 (8-layer AI stack)
# Total raw combos: 6x6x6x6x6 = 7,776
# =============================================================

[meta]
name = "nand-flash"
desc = "NAND Flash Storage DSE (BT-28/59, sigma*tau=48 layers, phi=2 MLC, tau=4 QLC)"
levels = ["CellType", "Structure", "Interface", "Controller", "Integration"]
vision = "Ultimate NAND Flash — sigma*tau=48 base layers, n=6 bit/cell frontier, all n=6 aligned"

[scoring]
n6   = 0.35
perf = 0.25
power = 0.20
cost  = 0.20

