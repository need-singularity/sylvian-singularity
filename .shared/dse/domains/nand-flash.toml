# =============================================================
# Rules
# =============================================================

# HLC/PLC cells need advanced ECC — computational or ML controller
[[rule]]
type      = "prefer"
if_level  = 0
if_id     = "HLC_6bit"
then_level = 3
then_ids  = "ML_FTL,Computational_Storage"

# QLC cells need strong controller for write amplification
[[rule]]
type      = "prefer"
if_level  = 0
if_id     = "QLC_4bit"
then_level = 3
then_ids  = "ZNS_6zone,ML_FTL"

# PCIe Gen6 interface pairs with enterprise/high-perf integration
[[rule]]
type      = "prefer"
if_level  = 2
if_id     = "PCIe_Gen6"
then_level = 4
then_ids  = "EDSFF_E1,U2_Enterprise"

# UFS interface pairs with mobile form factors
[[rule]]
type      = "prefer"
if_level  = 2
if_id     = "UFS_4"
then_level = 4
then_ids  = "BGA_Embedded,SSD_M2"

# CXL storage needs pooled integration
[[rule]]
type      = "prefer"
if_level  = 2
if_id     = "CXL_Storage"
then_level = 4
then_ids  = "CXL_Pooled,Wafer_Bonded_3D"
