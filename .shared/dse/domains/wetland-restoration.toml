# ============================================================
# Compatibility Rules
# ============================================================

# Peatland rewetting pairs with sphagnum transfer
[[rule]]
type = "bonus"
if_level = 1
if_id = "Rewetting-Peat"
then_level = 2
then_ids = ["Sphagnum-Transfer"]
bonus = 0.15

# Tidal reconnection excludes freshwater-only vegetation
[[rule]]
type = "exclude"
if_level = 1
if_id = "Tidal-Reconnect"
then_level = 2
then_ids = ["Sphagnum-Transfer"]

# Beaver analog pairs well with natural colonization
[[rule]]
type = "bonus"
if_level = 1
if_id = "Beaver-Analog"
then_level = 2
then_ids = ["Natural-Colonize"]
bonus = 0.10
