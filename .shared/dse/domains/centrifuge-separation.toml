# ============================================================
# Compatibility Rules
# ============================================================

# Carbon fiber composite required for ultracentrifuge rotors
[[rule]]
type = "prefer"
if_level = 2
if_id = "CarbonFiberComp"
then_level = 0
then_ids = "Ultracentrifuge"

# Hastelloy best for aggressive chemical applications
[[rule]]
type = "prefer"
if_level = 2
if_id = "HasteloyC276"
then_level = 4
then_ids = "OilGasProduction,NuclearIsotope"

# Magnetic bearing drive best for ultra-high RPM applications
[[rule]]
type = "prefer"
if_level = 3
if_id = "MagneticBearing"
then_level = 0
then_ids = "Ultracentrifuge,TubularBowl"

# Disc stack separator pairs with food/dairy and pharma
[[rule]]
type = "prefer"
if_level = 0
if_id = "DiscStack"
then_level = 4
then_ids = "FoodDairy,PharmaBiotech"
