# ============================================================
# Compatibility Rules
# ============================================================

# Maglev track requires maglev vehicle
[[rule]]
type = "require"
if_level = 0
if_id = "Maglev-Track"
then_level = 1
then_ids = ["Maglev-Vehicle"]

# Maglev vehicle requires maglev track
[[rule]]
type = "require"
if_level = 1
if_id = "Maglev-Vehicle"
then_level = 0
then_ids = ["Maglev-Track"]

# Narrow gauge excluded from HSR
[[rule]]
type = "exclude"
if_level = 0
if_id = "NarrowGauge-1067"
then_level = 4
then_ids = ["HSR-Corridor"]

# Battery-48V excluded from HSR (insufficient power)
[[rule]]
type = "exclude"
if_level = 3
if_id = "Battery-48V"
then_level = 4
then_ids = ["HSR-Corridor"]

# DMU excluded from metro (emissions in tunnels)
[[rule]]
type = "exclude"
if_level = 1
if_id = "DMU-6car"
then_level = 4
then_ids = ["Metro-Loop"]
