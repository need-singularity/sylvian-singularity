# ============================================================
# Compatibility Rules
# ============================================================

# UHPC material best with high-rise braced tube or cable-stayed structures
[[rule]]
type = "prefer"
if_level = 2
if_id = "UHPC"
then_level = 1
then_ids = "BracedTube,CableStay"

# Timber structures not suitable for seismic zone design beyond moderate
[[rule]]
type = "exclude"
if_level = 2
if_id = "TimberGlulam"
then_level = 3
then_ids = "DynamicLoad"

# Base isolation requires caisson or hex pile foundation
[[rule]]
type = "prefer"
if_level = 4
if_id = "BaseIsolate"
then_level = 0
then_ids = "HexPile,CaissonDrill"

# Space frame pairs well with hex-cell concrete material
[[rule]]
type = "prefer"
if_level = 1
if_id = "SpaceFrame"
then_level = 2
then_ids = "HexConcrete,SteelS355,FRP"
