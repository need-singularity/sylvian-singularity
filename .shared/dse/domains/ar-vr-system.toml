# =============================================================
# Rules
# =============================================================

# Holographic display needs varifocal optics
[[rule]]
type      = "prefer"
if_level  = 0
if_id     = "Holographic"
then_level = 1
then_ids  = "Varifocal,Metalens"

# Waveguide optics for AR glasses only
[[rule]]
type      = "prefer"
if_level  = 1
if_id     = "Waveguide_DOE"
then_level = 0
then_ids  = "LCoS,MicroLED"

# Cloud rendering needs hand tracking (no wired controller)
[[rule]]
type      = "prefer"
if_level  = 3
if_id     = "Cloud_Render"
then_level = 4
then_ids  = "Hand_Track,Eye_Gaze"

# Haptic gloves need eye+hand tracking
[[rule]]
type      = "prefer"
if_level  = 4
if_id     = "Haptic_Glove"
then_level = 2
then_ids  = "Eye_Hand"

# BCI too experimental for mobile SoC
[[rule]]
type      = "exclude"
if_level  = 4
if_id     = "BCI_Neural"
then_level = 3
then_ids  = "Mobile_SoC"
