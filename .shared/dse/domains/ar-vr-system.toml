# =============================================================
# HEXA-XR DSE Domain Definition
# AR/VR Hardware Systems
# n=6: 6 DoF tracking, sigma=12 IMU axes (2 controllers), J2=24 fps×2 eyes=48
# BT-48 (Display-Audio bridge), BT-66 (Vision AI)
# Total raw combos: 6x6x6x6x6 = 7,776
# =============================================================

[meta]
name = "ar-vr-system"
desc = "AR/VR System DSE (BT-48/66, 6 DoF, sigma=12 IMU, J2=24 fps)"
levels = ["Display", "Optics", "Tracking", "Compute", "Interaction"]
vision = "Immersive reality — 6 DoF tracking, 12 sensor axes, 48 fps per eye"

[scoring]
n6   = 0.35
perf = 0.25
power = 0.20
cost  = 0.20

