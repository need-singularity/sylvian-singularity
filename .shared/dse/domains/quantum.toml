# =============================================================
# Compatibility Rules
# =============================================================

# TopologicalQ requires Surface or Color code (topological protection)
[[rule]]
type       = "require"
if_level   = 0
if_id      = "TopologicalQ"
then_level = 1
then_ids   = "Surface,Color"

# NoEC only with Variational or Hybrid_QC (NISQ algorithms)
[[rule]]
type       = "require"
if_level   = 1
if_id      = "NoEC"
then_level = 2
then_ids   = "Variational,Hybrid_QC"

# FaultTol requires Surface or Color or LDPC
[[rule]]
type       = "require"
if_level   = 2
if_id      = "FaultTol"
then_level = 1
then_ids   = "Surface,Color,LDPC"

# Photonic requires RoomTemp or CloudQPU (no dilution needed)
[[rule]]
type       = "exclude"
if_level   = 0
if_id      = "Photonic"
then_level = 4
then_ids   = "Dilution"

# Shor requires FaultTol or Clifford_N6 (needs deep circuits)
[[rule]]
type       = "require"
if_level   = 3
if_id      = "Shor"
then_level = 2
then_ids   = "FaultTol,Clifford_N6"

# Adiabatic incompatible with Surface code (different paradigm)
[[rule]]
type       = "exclude"
if_level   = 2
if_id      = "Adiabatic"
then_level = 1
then_ids   = "Surface,Color"
