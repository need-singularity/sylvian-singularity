# =============================================================
# Compatibility Rules
# =============================================================

# Akida (edge) requires P1W or P5W power
[[rule]]
type       = "require"
if_level   = 0
if_id      = "Akida"
then_level = 4
then_ids   = "P1W,P5W,P10W"

# Compartmental model requires Loihi2 or BrainScaleS2
[[rule]]
type       = "require"
if_level   = 1
if_id      = "Compartmental"
then_level = 0
then_ids   = "Loihi2,BrainScaleS2,Custom_N6"

# OffChip_BP excludes P1W (needs compute headroom)
[[rule]]
type       = "exclude"
if_level   = 2
if_id      = "OffChip_BP"
then_level = 4
then_ids   = "P1W"

# Random mapping excludes Custom_N6 (custom chip needs optimized mapping)
[[rule]]
type       = "exclude"
if_level   = 3
if_id      = "Random"
then_level = 0
then_ids   = "Custom_N6"

# Federated learning requires P10W+ for communication
[[rule]]
type       = "require"
if_level   = 2
if_id      = "Federated"
then_level = 4
then_ids   = "P10W,P50W,P100W,Unconstrained"
