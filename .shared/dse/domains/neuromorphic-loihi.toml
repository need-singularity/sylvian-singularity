# =============================================================
# Neuromorphic Loihi DSE Domain Definition
# 궁극의 뉴로모픽 — 칩 + 뉴런매핑 + 학습 + 토폴로지 + 전력
# 6x6=36 tile, Loihi neuron cores, SNN architecture
# Total raw combos: 6x6x6x6x6 = 7,776 (pre-filter)
# =============================================================

[meta]
name = "neuromorphic-loihi"
desc = "Ultimate Neuromorphic Loihi DSE (chip + neuron mapping + learning + topology + power)"
levels = ["Chip", "NeuronMapping", "Learning", "TopologyMapping", "PowerBudget"]
vision = "n=6 기반 궁극의 뉴로모픽 — 6x6=36 타일 + SNN + 온칩 학습"

[scoring]
n6   = 0.35
perf = 0.25
power = 0.20
cost  = 0.20

