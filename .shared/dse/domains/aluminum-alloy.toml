# ============================================================
# Compatibility Rules
# ============================================================

# 6xxx alloys pair best with extrusion and T6 heat treatment
[[rule]]
type = "prefer"
if_level = 0
if_id = "6xxx_MgSi"
then_level = 1
then_ids = "Extrusion_6die,Rolling_12pass"

[[rule]]
type = "prefer"
if_level = 0
if_id = "6xxx_MgSi"
then_level = 2
then_ids = "T6_PeakAge,T4_NaturalAge"

# 7xxx high-strength alloys need T7 overaging for SCC resistance
[[rule]]
type = "prefer"
if_level = 0
if_id = "7xxx_Zn"
then_level = 2
then_ids = "T6_PeakAge,T7_Overaged"

# 2xxx aerospace alloys pair with riveting and aircraft application
[[rule]]
type = "prefer"
if_level = 0
if_id = "2xxx_CuMg"
then_level = 3
then_ids = "Rivet_6point,FSW_FrictionStir"

[[rule]]
type = "prefer"
if_level = 0
if_id = "2xxx_CuMg"
then_level = 4
then_ids = "Aircraft_Fuselage,Automotive_Body"

# 5xxx marine alloys pair with MIG welding and marine hull
[[rule]]
type = "prefer"
if_level = 0
if_id = "5xxx_Mg"
then_level = 3
then_ids = "MIG_Welding,TIG_Welding"

[[rule]]
type = "prefer"
if_level = 0
if_id = "5xxx_Mg"
then_level = 4
then_ids = "Marine_Hull,Building_Facade"

# Al-Si casting alloys not suitable for extrusion/rolling
[[rule]]
type = "prefer"
if_level = 0
if_id = "AlSi_Cast"
then_level = 1
then_ids = "DC_Casting,Additive_LPBF"

# Additive manufacturing pairs with complex geometry applications
[[rule]]
type = "prefer"
if_level = 1
if_id = "Additive_LPBF"
then_level = 4
then_ids = "Aircraft_Fuselage,Electronics_Heatsink"

# FSW pairs best with 6xxx and automotive/aerospace applications
[[rule]]
type = "prefer"
if_level = 3
if_id = "FSW_FrictionStir"
then_level = 4
then_ids = "Aircraft_Fuselage,Automotive_Body"
