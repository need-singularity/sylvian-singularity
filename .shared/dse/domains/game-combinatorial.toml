# =============================================================
# Compatibility Rules
# =============================================================

# AssocK6 requires algebraic grounding (Catalan -> operad -> algebra)
[[rule]]
type       = "require"
if_level   = 1
if_id      = "AssocK6"
then_level = 2
then_ids   = "SigCubeN6,SymmS6,CliffordN6,BraidB6"

# SigCubeN6 proven uniqueness — requires structured game theory base
[[rule]]
type       = "require"
if_level   = 2
if_id      = "SigCubeN6"
then_level = 0
then_ids   = "SGValue,CoopSigma12,MechDesign"

# PoincareHomology requires ExoticSphere or ProjectiveGeometry context
[[rule]]
type       = "require"
if_level   = 4
if_id      = "PoincarH"
then_level = 4
then_ids   = "ExoticN6,ProjGeom"

# MonsterMoon (very abstract) incompatible with practical game theory applications
[[rule]]
type       = "exclude"
if_level   = 2
if_id      = "MonsterMoon"
then_level = 0
then_ids   = "AuctionTau4,MechDesign"

# RMT_MP proven — requires spectral analysis context
[[rule]]
type       = "require"
if_level   = 3
if_id      = "RMT_MP"
then_level = 2
then_ids   = "SigCubeN6,CliffordN6,SymmS6,MatroidK6"

# ZetaZeros requires deep algebraic structure (not practical game)
[[rule]]
type       = "require"
if_level   = 3
if_id      = "ZetaZeros"
then_level = 2
then_ids   = "MonsterMoon,SymmS6,SigCubeN6"
