# =============================================================
# Compatibility Rules
# =============================================================

# DependentType and LinearType incompatible with InterpAOT (too complex)
[[rule]]
type       = "exclude"
if_level   = 0
if_id      = "DependentType"
then_level = 1
then_ids   = "InterpAOT"

[[rule]]
type       = "exclude"
if_level   = 0
if_id      = "LinearType"
then_level = 1
then_ids   = "InterpAOT"

# EgyptMem only with N6VM or MultBackend (needs custom memory model)
[[rule]]
type       = "require"
if_level   = 2
if_id      = "EgyptMem"
then_level = 1
then_ids   = "N6VM,MultBackend"

# FormalVerify requires FormalEco or IDE_Integ (needs proof integration)
[[rule]]
type       = "require"
if_level   = 3
if_id      = "FormalVerify"
then_level = 4
then_ids   = "FormalEco,IDE_Integ"

# MambaSSM incompatible with FormalVerify (SSM can't do formal proofs)
[[rule]]
type       = "exclude"
if_level   = 3
if_id      = "MambaSSM"
then_level = 3
then_ids   = "FormalVerify"

# EdgeEmbed incompatible with MultBackend (too heavyweight)
[[rule]]
type       = "exclude"
if_level   = 4
if_id      = "EdgeEmbed"
then_level = 1
then_ids   = "MultBackend"

# MultiModal requires CloudNativ or FullStack (needs cloud resources)
[[rule]]
type       = "require"
if_level   = 3
if_id      = "MultiModal"
then_level = 4
then_ids   = "CloudNativ,FullStack"
