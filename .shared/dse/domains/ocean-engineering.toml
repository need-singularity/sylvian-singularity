# ============================================================
# Compatibility Rules
# ============================================================

# Titanium deep hull needs high-power propulsion
[[rule]]
type = "prefer"
if_level = 0
if_id = "Titanium_Deep"
then_level = 1
then_ids = "AIP_Stirling,PumpJet"

# Glider hull pairs with passive sensors (low power)
[[rule]]
type = "prefer"
if_level = 0
if_id = "Glider"
then_level = 2
then_ids = "Passive_Hydro,SideScan"

# MHD drive pairs with biomimetic hull (stealth)
[[rule]]
type = "prefer"
if_level = 1
if_id = "MHD_Drive"
then_level = 0
then_ids = "Biomimetic,TearDrop"

# Deep mining mission needs titanium hull
[[rule]]
type = "prefer"
if_level = 4
if_id = "DeepMine"
then_level = 0
then_ids = "Titanium_Deep,DoubleHull"

# Quantum underwater comm pairs with science AUV
[[rule]]
type = "prefer"
if_level = 3
if_id = "Quantum_UW"
then_level = 4
then_ids = "Science_AUV,Survey_Map"

# Biomimetic hull pairs with bio fin propulsion
[[rule]]
type = "prefer"
if_level = 0
if_id = "Biomimetic"
then_level = 1
then_ids = "BioFin,RimDrive"
