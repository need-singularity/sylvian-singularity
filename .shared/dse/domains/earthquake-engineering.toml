# ============================================================
# Compatibility Rules
# ============================================================

# No isolation requires no damping or basic only for low-cost buildings
# (not a hard rule, but triple FPS excluded from visual-inspect-only)
[[rule]]
type = "exclude"
if_level = 2
if_id = "NoIsolation"
then_level = 3
then_ids = ["MR-Damper", "SMA-Brace"]

# Triple FPS excluded from visual-only monitoring (needs instrumentation)
[[rule]]
type = "exclude"
if_level = 2
if_id = "Triple-FPS"
then_level = 4
then_ids = ["Visual-Inspect"]

# Microtremor only insufficient for pile/caisson foundations
[[rule]]
type = "exclude"
if_level = 0
if_id = "Microtremor"
then_level = 1
then_ids = ["Caisson-12m"]

# Digital twin requires SHM or fiber optic (needs sensor data)
[[rule]]
type = "require"
if_level = 4
if_id = "Digital-Twin"
then_level = 3
then_ids = ["Viscous-6unit", "BRB", "MR-Damper", "SMA-Brace", "TMD"]
