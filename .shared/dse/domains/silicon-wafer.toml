# ============================================================
# Compatibility Rules
# ============================================================

# CZ is standard for 300mm/12-inch wafers
[[rule]]
type = "prefer"
if_level = 0
if_id = "CZ_Czochralski"
then_level = 1
then_ids = "300mm_12inch,DoubleSidePolish"

# FZ pairs with power devices and intrinsic doping
[[rule]]
type = "prefer"
if_level = 0
if_id = "FZ_FloatZone"
then_level = 2
then_ids = "Intrinsic_undoped,Phosphorus_n_type"

# FZ primarily used for power devices
[[rule]]
type = "prefer"
if_level = 0
if_id = "FZ_FloatZone"
then_level = 4
then_ids = "Power_Device,RF_Analog"

# SOI bonded pairs with logic CPU and RF
[[rule]]
type = "prefer"
if_level = 0
if_id = "SOI_Bonded"
then_level = 4
then_ids = "Logic_CPU,RF_Analog,MEMS_Sensor"

# Epitaxial 6-layer for advanced CMOS logic
[[rule]]
type = "prefer"
if_level = 0
if_id = "Epitaxial_6layer"
then_level = 4
then_ids = "Logic_CPU,Memory_DRAM"

# EFG ribbon mainly for solar
[[rule]]
type = "prefer"
if_level = 0
if_id = "EFG_Ribbon"
then_level = 4
then_ids = "Photovoltaic"

# 300mm wafers need CMP and RCA clean
[[rule]]
type = "prefer"
if_level = 1
if_id = "300mm_12inch"
then_level = 3
then_ids = "CMP_Polish,RCA_Clean_6step"

# 150mm/6-inch pairs with compound semi applications
[[rule]]
type = "prefer"
if_level = 1
if_id = "150mm_6inch"
then_level = 4
then_ids = "Power_Device,Photovoltaic"

# DRAM needs specific doping and surface treatment
[[rule]]
type = "prefer"
if_level = 4
if_id = "Memory_DRAM"
then_level = 2
then_ids = "Boron_p_type,Phosphorus_n_type"

# MEMS sensors prefer SOI substrate
[[rule]]
type = "prefer"
if_level = 4
if_id = "MEMS_Sensor"
then_level = 0
then_ids = "SOI_Bonded,CZ_Czochralski"
