# N6 Silicon Wafer Material DSE — Semiconductor substrate engineering
# 6 CrystalGrowth × 6 WaferSpec × 6 Doping × 6 SurfaceTreatment × 6 Application = 7,776 combos
# n=6 connections: Si diamond cubic CN=4=tau nearest neighbor, 12=sigma second-nearest neighbor,
#   crystal orientation (100)/(110)/(111) = n/n / (sigma-phi)*(sigma-mu) / 3 Miller,
#   sigma=12 inch (300mm) wafer standard, phi=2 double-side polished, J2=24 defects/cm2 target

[meta]
name = "silicon-wafer"
desc = "Silicon Wafer Material DSE — semiconductor substrate engineering (n=6 universality)"

[scoring]
n6 = 0.35
perf = 0.25
power = 0.20
cost = 0.20

# ============================================================
# Level 0: CrystalGrowth (결정성장)
#   n6 checks: Epitaxial 6-layer (n=6), SOI bonded (phi=2),
#              CZ standard for 12-inch (sigma=12), FZ highest purity
# ============================================================

[[level]]
name = "CrystalGrowth"

[[candidate]]
id = "CZ_Czochralski"
label = "CZ Czochralski (standard pull method, 300mm/12-inch, >90% market share)"
n6 = 0.80
perf = 0.80
power = 0.60
cost = 0.85
notes = "produces sigma=12 inch wafers EXACT, dominant industrial method"

[[candidate]]
id = "FZ_FloatZone"
label = "FZ Float Zone (no crucible contact, ultra-high purity, high resistivity)"
n6 = 0.60
perf = 1.00
power = 0.50
cost = 0.40
notes = "highest purity Si, power device substrate, limited to 200mm"

[[candidate]]
id = "MCZ_MagneticCZ"
label = "MCZ Magnetic Czochralski (B-field suppressed convection, low oxygen)"
n6 = 0.80
perf = 0.90
power = 0.55
cost = 0.70
notes = "magnetic field controls melt flow, 12-inch compatible=sigma EXACT"

[[candidate]]
id = "EFG_Ribbon"
label = "EFG Ribbon (edge-defined film-fed growth, thin Si sheet, low waste)"
n6 = 0.40
perf = 0.50
power = 0.80
cost = 0.90
