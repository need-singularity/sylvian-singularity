# ============================================================
# Compatibility Rules
# ============================================================

# Captive breeding requires core reserve habitat
[[rule]]
type = "exclude"
if_level = 2
if_id = "Captive-Breeding"
then_level = 1
then_ids = ["Urban-Green", "Agroforestry"]

# Marine corridors only with marine habitat
[[rule]]
type = "exclude"
if_level = 3
if_id = "Marine-Channel"
then_level = 1
then_ids = ["Urban-Green", "Agroforestry", "Core-Reserve"]

# eDNA works best with wetland/marine habitats
[[rule]]
type = "bonus"
if_level = 0
if_id = "eDNA-Metabarcoding"
then_level = 1
then_ids = ["Wetland-Complex", "Marine-PA"]
bonus = 0.10
