# ============================================================
# Compatibility Rules
# ============================================================

# Chemical laser and FEL only viable on large platforms
[[rule]]
type = "prefer"
if_level = 0
if_id = "Chemical"
then_level = 4
then_ids = "NavalDEW,Aircraft,Fixed"

[[rule]]
type = "prefer"
if_level = 0
if_id = "FEL"
then_level = 4
then_ids = "NavalDEW,Fixed"

# Particle beam requires fixed or space platform
[[rule]]
type = "exclude"
if_level = 0
if_id = "Particle"
then_level = 4
then_ids = "GroundTruck,Stryker"

# Cryogenic cooling pairs with space-based and FEL systems
[[rule]]
type = "prefer"
if_level = 3
if_id = "Cryogenic"
then_level = 0
then_ids = "FEL,Particle"

# Segmented mirror best for naval and fixed (vibration isolation)
[[rule]]
type = "prefer"
if_level = 1
if_id = "SegmentedMirror"
then_level = 4
then_ids = "NavalDEW,Fixed,SpaceDEW"
