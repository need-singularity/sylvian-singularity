# =============================================================
# Compatibility Rules
# =============================================================

# Quantum network requires TLS1.3 or Noise (QKD key exchange)
[[rule]]
type       = "require"
if_level   = 2
if_id      = "Quantum"
then_level = 1
then_ids   = "TLS13,Noise_N6"

# RDMA only with DC_Fabric (requires lossless fabric)
[[rule]]
type       = "require"
if_level   = 1
if_id      = "RDMA"
then_level = 4
then_ids   = "DC_Fabric"

# DTN incompatible with RDMA (latency vs delay-tolerant)
[[rule]]
type       = "exclude"
if_level   = 0
if_id      = "DTN"
then_level = 1
then_ids   = "RDMA"

# Satellite incompatible with Segment Routing (no SRv6 in LEO yet)
[[rule]]
type       = "exclude"
if_level   = 4
if_id      = "Satellite"
then_level = 2
then_ids   = "Segment"

# IoT_LPWAN incompatible with RDMA
[[rule]]
type       = "exclude"
if_level   = 4
if_id      = "IoT_LPWAN"
then_level = 1
then_ids   = "RDMA"
