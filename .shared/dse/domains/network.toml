# =============================================================
# HEXA-NETWORK DSE Domain Definition
# BT-47 (Interconnect gen counts) + BT-53 (Crypto) + BT-74 (95/5)
# Total raw combos: 6x5x6x5x5 = 4,500 (pre-filter)
# =============================================================

[meta]
name = "network"
desc = "Network Protocol Architecture DSE (BT-47/53/74)"
levels = ["Foundation", "Process", "Core", "Engine", "System"]
vision = "Zero-latency planet -- any device, any content, instant"

[scoring]
n6   = 0.35
perf = 0.25
power = 0.20
cost  = 0.20

