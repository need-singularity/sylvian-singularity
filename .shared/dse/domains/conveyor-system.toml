# ============================================================
# Compatibility Rules
# ============================================================

# Pneumatic conveyor requires VFD or servo drive
[[rule]]
type = "prefer"
if_level = 0
if_id = "Pneumatic"
then_level = 1
then_ids = "VFDrive,ServoMotor"

# Stainless steel belt required for food and pharma
[[rule]]
type = "prefer"
if_level = 2
if_id = "StainlessSteel"
then_level = 4
then_ids = "FoodProcess,Pharma"

# Vision tracking best for logistics and automotive
[[rule]]
type = "prefer"
if_level = 3
if_id = "TrackingVision"
then_level = 4
then_ids = "Logistics,Automotive"

# Mining application requires rubber or kevlar belt
[[rule]]
type = "prefer"
if_level = 4
if_id = "Mining"
then_level = 2
then_ids = "Rubber,Kevlar"

# Linear motor drive pairs with airport or logistics application
[[rule]]
type = "prefer"
if_level = 1
if_id = "LinearMotor"
then_level = 4
then_ids = "Airport,Logistics"
