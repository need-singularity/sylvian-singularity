# N6 Conveyor System DSE — Material handling conveyor
# 6 ConveyorType x 6 DriveSystem x 6 BeltMaterial x 6 Control x 6 Application = 7,776 combos
# n=6: 6 conveyor types (belt/roller/chain/screw/pneumatic/vibrating), sigma=12 m/s max speed
# tau=4 drive positions, phi=2 forward/reverse, J2=24 inch belt width

[meta]
name = "conveyor-system"
desc = "Conveyor System DSE (6 conveyor types=n, sigma=12 m/s speed, J2=24 inch belt width)"

[scoring]
n6 = 0.35
perf = 0.25
power = 0.20
cost = 0.20

