# =============================================================
# Compatibility Rules
# =============================================================

# DNA_DoubleHelix required for RNA_Structure (central dogma)
[[rule]]
type       = "require"
if_level   = 0
if_id      = "RNA_Structure"
then_level = 0
then_ids   = "DNA_DoubleHelix"

# WaterHexamer required for ProteinFolding (hydration is essential)
[[rule]]
type       = "require"
if_level   = 0
if_id      = "ProteinFolding"
then_level = 0
then_ids   = "WaterHexamer"

# CryoEM requires ProteinFolding or DNA_DoubleHelix (needs molecular target)
[[rule]]
type       = "require"
if_level   = 3
if_id      = "CryoEM"
then_level = 0
then_ids   = "ProteinFolding,DNA_DoubleHelix"

# OpticalTweezer incompatible with XRayCrystal (different scales)
[[rule]]
type       = "exclude"
if_level   = 2
if_id      = "OpticalTweezer"
then_level = 3
then_ids   = "XRayCrystal"

# Photosynthesis requires IonChannel_N6 or MembraneRaft (membrane-based process)
[[rule]]
type       = "require"
if_level   = 4
if_id      = "Photosynthesis"
then_level = 1
then_ids   = "IonChannel_N6,MembraneRaft"
