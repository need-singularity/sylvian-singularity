# =============================================================
# Compatibility Rules
# =============================================================

# HoxCluster requires PromoterN6 or EnhancerSilencer (Hox regulation)
[[rule]]
type       = "require"
if_level   = 2
if_id      = "HoxCluster"
then_level = 1
then_ids   = "PromoterN6,EnhancerSilencer"

# GermLayerN3 required for BodyPlanN6 (body plan needs germ layers)
# Expressed as: BodyPlanN6 requires GermLayerN3
# Since same-level require isn't standard, we skip this or model differently
# Instead: BodyPlanN6 requires PromoterN6 or EnhancerSilencer (developmental regulation)
[[rule]]
type       = "require"
if_level   = 2
if_id      = "BodyPlanN6"
then_level = 1
then_ids   = "PromoterN6,EnhancerSilencer,MicroRNA"

# MassExtinction6 requires KingdomN5 or DomainN3 (extinction requires classification)
[[rule]]
type       = "require"
if_level   = 4
if_id      = "MassExtinction6"
then_level = 3
then_ids   = "KingdomN5,DomainN3"

# WholeGenomeDup requires GeneDuplication (WGD is extreme gene duplication)
[[rule]]
type       = "require"
if_level   = 0
if_id      = "WholeGenomeDup"
then_level = 0
then_ids   = "GeneDuplication"

# CircadianReg incompatible with StressResponse at regulation level (different timescales)
[[rule]]
type       = "exclude"
if_level   = 1
if_id      = "CircadianReg"
then_level = 1
then_ids   = "StressResponse"

# SymmetryBreaking requires GermLayerN3 (laterality needs triploblastic development)
# Cross-level: Development level 2 SymmetryBreaking requires level 2 GermLayerN3
# Same-level rules may not work, so we use regulation requirement instead
[[rule]]
type       = "require"
if_level   = 2
if_id      = "SymmetryBreaking"
then_level = 1
then_ids   = "PromoterN6,EnhancerSilencer,SplicingN4"
