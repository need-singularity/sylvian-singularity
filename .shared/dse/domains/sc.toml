# ============================================================
# Compatibility Rules (물리적 제약)
# ============================================================

# --- Low-Tc materials require LHe-4K or Hybrid cooling ---

# NbTi (Tc=9.3K) cannot operate at 77K or room temp
[[rule]]
type = "require"
if_level = 0
if_id = "NbTi"
then_level = 4
then_ids = "LHe-4K,Hybrid-4K77K"

# Nb3Sn (Tc=18K) cannot operate at 77K or room temp
[[rule]]
type = "require"
if_level = 0
if_id = "Nb3Sn"
then_level = 4
then_ids = "LHe-4K,Hybrid-4K77K"

# --- MgB2 requires cryocooler or LHe (Tc=39K, operate ~20K) ---
[[rule]]
type = "require"
if_level = 0
if_id = "MgB2"
then_level = 4
then_ids = "CryoFree-20K,LHe-4K"

# --- Room-Temp system excludes all known materials except theoretical ---
[[rule]]
type = "exclude"
if_level = 4
if_id = "RoomTemp"
then_level = 0
then_ids = "NbTi,Nb3Sn,MgB2,BSCCO-2223"

# --- Qubit application requires ThinFilm form ---
[[rule]]
type = "require"
if_level = 3
if_id = "Qubit"
then_level = 2
then_ids = "ThinFilm"

# --- SMES requires high-current conductors (Tape-2G or Cable-CICC) ---
[[rule]]
type = "require"
if_level = 3
if_id = "SMES"
then_level = 2
then_ids = "Tape-2G,Cable-CICC"

# --- Bulk-Melt form excludes MRI and Fusion magnets (insufficient length) ---
[[rule]]
type = "exclude"
if_level = 2
if_id = "Bulk-Melt"
then_level = 3
then_ids = "MRI-Magnet,Fusion-Magnet"

# --- Fusion-Magnet strongly prefers Cable-CICC (ITER standard) ---
[[rule]]
type = "prefer"
if_level = 3
if_id = "Fusion-Magnet"
then_level = 2
then_ids = "Cable-CICC,Tape-2G"

# --- PIT process is specific to MgB2 and BSCCO ---
[[rule]]
type = "require"
if_level = 1
if_id = "PIT"
then_level = 0
then_ids = "MgB2,BSCCO-2223"

# --- Bronze route is specific to Nb3Sn ---
[[rule]]
type = "require"
if_level = 1
if_id = "Bronze"
then_level = 0
then_ids = "Nb3Sn"

# --- MOCVD and PLD are HTS deposition processes ---
[[rule]]
type = "require"
if_level = 1
if_id = "PLD"
then_level = 0
then_ids = "YBCO,REBCO-2G"

[[rule]]
type = "require"
if_level = 1
if_id = "MOCVD"
then_level = 0
then_ids = "YBCO,REBCO-2G"

# --- RCE-DR is REBCO scale-up process ---
[[rule]]
type = "require"
if_level = 1
if_id = "RCE-DR"
then_level = 0
then_ids = "YBCO,REBCO-2G"

# --- Electrodeposition works with buffer layers for REBCO ---
[[rule]]
type = "require"
if_level = 1
if_id = "Electrodep"
then_level = 0
then_ids = "YBCO,REBCO-2G,BSCCO-2223"

# --- NbTi uses Wire-Round or Cable-CICC forms ---
[[rule]]
type = "require"
if_level = 0
if_id = "NbTi"
then_level = 2
then_ids = "Wire-Round,Cable-CICC"

# --- Qubit requires LHe-4K (mK dilution fridge, base at 4K stage) ---
[[rule]]
type = "require"
if_level = 3
if_id = "Qubit"
then_level = 4
then_ids = "LHe-4K"
