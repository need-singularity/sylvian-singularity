# ============================================================
# Compatibility Rules
# ============================================================

# Arch dams require strong granite/rock foundations
[[rule]]
type = "prefer"
if_level = 0
if_id = "Arch"
then_level = 2
then_ids = "GraniteBase,CurtainGrout"

# Embankment dams not ideal for pumped storage (seepage risk)
[[rule]]
type = "exclude"
if_level = 0
if_id = "Embankment"
then_level = 4
then_ids = "PumpedStorage"

# Fiber optic monitoring pairs well with arch and gravity dams
[[rule]]
type = "prefer"
if_level = 3
if_id = "FiberOptic"
then_level = 0
then_ids = "Arch,Gravity,RCC"

# Karst foundation needs extra monitoring
[[rule]]
type = "prefer"
if_level = 2
if_id = "KarstGrout"
then_level = 3
then_ids = "Piezometer,SeepageMonitor"
