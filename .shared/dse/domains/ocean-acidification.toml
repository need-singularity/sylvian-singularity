# ============================================================
# Compatibility Rules
# ============================================================

# Research vessel survey pairs poorly with real-time organism programs
[[rule]]
type = "exclude"
if_level = 0
if_id = "Ship-Survey"
then_level = 3
then_ids = ["Coral-Assist", "Phyto-Enhance"]

# Deep mooring only for deep-sea analysis, not coastal organisms
[[rule]]
type = "exclude"
if_level = 0
if_id = "Deep-Mooring"
then_level = 3
then_ids = ["Shellfish-Rehab", "Seagrass-Meadow"]

# Electrochemical buffering requires digital twin for control
[[rule]]
type = "bonus"
if_level = 2
if_id = "Electrochemical"
then_level = 1
then_ids = ["Digital-Ocean"]
bonus = 0.10
