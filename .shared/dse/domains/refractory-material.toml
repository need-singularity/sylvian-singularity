# =============================================================
# Rules
# =============================================================

# Fused-cast required for glass furnace long campaign
[[rule]]
type      = "prefer"
if_level  = 4
if_id     = "Glass_Furnace"
then_level = 1
then_ids  = "Fused_Cast,Isostatic"

# Graphite only in reducing/inert atmosphere (not glass/cement)
[[rule]]
type      = "exclude"
if_level  = 0
if_id     = "Graphite_C"
then_level = 4
then_ids  = "Glass_Furnace,Cement_Kiln"

# Rocket nozzle requires high-T materials
[[rule]]
type      = "prefer"
if_level  = 4
if_id     = "Rocket_Nozzle"
then_level = 0
then_ids  = "Graphite_C,SiC,ZrO2"

# Composite 6-zone lining best for steel ladle
[[rule]]
type      = "prefer"
if_level  = 3
if_id     = "Composite_6zone"
then_level = 4
then_ids  = "Steel_Ladle,Cement_Kiln"
