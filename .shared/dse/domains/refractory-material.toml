[meta]
name = "refractory-material"
desc = "Refractory Material DSE (BT-43/80, CN=6 rocksalt/corundum)"
levels = ["Material", "Processing", "Form", "Lining", "Application"]
vision = "Ultra-high temperature materials — MgO CN=6 rocksalt, Al2O3 6-fold coordination in every refractory"

[scoring]
n6   = 0.35
perf = 0.25
power = 0.20
cost  = 0.20

