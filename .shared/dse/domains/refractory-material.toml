# =============================================================
# HEXA-REFRAC DSE Domain Definition
# N6 Refractory Material DSE — Ultra-high temperature materials
# n=6: MgO rocksalt CN=6=n EXACT, Al2O3 corundum 6-fold (n=6)
#       sigma=12 oxide systems, tau=4 refractory classes
#       (oxide/carbide/nitride/boride), phi=2 acid/basic
#       J2=24 industrial standard sizes
# BT-43 (CN=6 universality), BT-80 (Solid-state CN=6)
# Total raw combos: 6x6x6x6x6 = 7,776
