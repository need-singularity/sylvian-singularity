# ============================================================
# Rules
# ============================================================

# Diamond switch only for high-end applications
[[rule]]
type = "exclude"
if_level = 0
if_id = "Diamond-C"
then_level = 4
then_ids = ["EV-Inverter-48V", "SolarInverter-6kW"]

# MMC topology only for grid/HVDC applications
[[rule]]
type = "require"
if_level = 1
if_id = "MMC-12cell"
then_level = 4
then_ids = ["GridTie-12MW", "HVDC-6GW"]

# GaN limited to lower voltage applications
[[rule]]
type = "exclude"
if_level = 0
if_id = "GaN-HEMT"
then_level = 4
then_ids = ["HVDC-6GW", "GridTie-12MW"]

# 6-pulse rectifier only for simple motor drive or DC-DC
[[rule]]
type = "require"
if_level = 1
if_id = "6pulse-Rect"
then_level = 4
then_ids = ["MotorDrive-6pole", "DC-DC-48to12", "EV-Inverter-48V"]
