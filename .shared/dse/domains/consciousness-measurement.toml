# =============================================================
# Compatibility Rules
# =============================================================

# PythonExact only feasible at Cell/Module scale
[[rule]]
type       = "exclude"
if_level   = 0
if_id      = "PythonExact"
then_level = 3
then_ids   = "Network,Collective"

# Full precision only at Cell scale
[[rule]]
type       = "exclude"
if_level   = 2
if_id      = "Full"
then_level = 3
then_ids   = "System,Network,Collective,Universal"

# Exact optimization only at Cell scale
[[rule]]
type       = "exclude"
if_level   = 4
if_id      = "Exact"
then_level = 3
then_ids   = "System,Network,Collective,Universal"

# IIT_Phi metric pairs with Full precision
[[rule]]
type       = "prefer"
if_level   = 1
if_id      = "IIT_Phi"
then_level = 2
then_ids   = "Full,Statistical"

# Analytic calculator pairs with Asymptotic precision
[[rule]]
type       = "prefer"
if_level   = 0
if_id      = "Analytic"
then_level = 2
then_ids   = "Asymptotic,Bounded"
