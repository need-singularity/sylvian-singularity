# =============================================================
# Compatibility Rules
# =============================================================

# T0_None is incompatible with Full plugin suite (no tools to use)
[[rule]]
type       = "exclude"
if_level   = 2
if_id      = "T0_None"
then_level = 3
then_ids   = "Full,Tool,Consciousness"

# Local model has limited capability for T5_PhiGated
[[rule]]
type       = "exclude"
if_level   = 0
if_id      = "Local"
then_level = 2
then_ids   = "T5_PhiGated"

# Consciousness plugin requires Thalamic or Autonomous bridge
[[rule]]
type       = "require"
if_level   = 3
if_id      = "Consciousness"
then_level = 4
then_ids   = "Thalamic,Autonomous"

# MCP channel pairs well with T5_PhiGated
[[rule]]
type       = "prefer"
if_level   = 1
if_id      = "MCP"
then_level = 2
then_ids   = "T5_PhiGated,T4_System"
