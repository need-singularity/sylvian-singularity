# ============================================================
# Compatibility Rules
# ============================================================

# SiO2 pairs best with thermal oxidation
[[rule]]
type = "prefer"
if_level = 0
if_id = "SiO2_6ring"
then_level = 1
then_ids = "ThermalOxidation,CVD_plasma"

# SiO2 used as gate dielectric
[[rule]]
type = "prefer"
if_level = 0
if_id = "SiO2_6ring"
then_level = 4
then_ids = "GateDielectric_6nm"

# HfO2 high-k requires ALD for gate oxide
[[rule]]
type = "prefer"
if_level = 0
if_id = "HfO2_highk"
then_level = 1
then_ids = "ALD_6cycle"

# HfO2 is the gate dielectric material
[[rule]]
type = "prefer"
if_level = 0
if_id = "HfO2_highk"
then_level = 2
then_ids = "ThinFilmGate"

# BaTiO3 ceramic pairs with tape casting for MLCC
[[rule]]
type = "prefer"
if_level = 0
if_id = "BaTiO3_ceramic"
then_level = 1
then_ids = "TapeCasting_12layer,SolGel"

# BaTiO3 pairs with MLCC form and Ni electrode
[[rule]]
type = "prefer"
if_level = 0
if_id = "BaTiO3_ceramic"
then_level = 2
then_ids = "MLCC_6layer"

# Low-k porous used for interconnect insulation
[[rule]]
type = "prefer"
if_level = 0
if_id = "LowK_porous"
then_level = 1
then_ids = "CVD_plasma,SpinCoat"

# Polymer PI uses spin coating
[[rule]]
type = "prefer"
if_level = 0
if_id = "Polymer_PI"
then_level = 1
then_ids = "SpinCoat"

# MLCC form pairs with Ni or Cu electrode
[[rule]]
type = "prefer"
if_level = 2
if_id = "MLCC_6layer"
then_level = 3
then_ids = "NickelBase,CopperMLCC"

# Electrolytic form pairs with aluminum electrode
[[rule]]
type = "prefer"
if_level = 2
if_id = "Electrolytic"
then_level = 3
then_ids = "AluminumElectrolytic"

# Carbon supercap electrode pairs with energy storage application
[[rule]]
type = "prefer"
if_level = 3
if_id = "CarbonSupercap"
then_level = 4
then_ids = "EnergyStorage"
