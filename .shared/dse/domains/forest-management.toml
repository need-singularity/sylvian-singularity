# ============================================================
# Compatibility Rules
# ============================================================

# Helicopter logging incompatible with continuous cover forestry
[[rule]]
type = "exclude"
if_level = 3
if_id = "Helicopter"
then_level = 2
then_ids = ["Continuous-Cover", "Selection-Cut"]

# Horse extraction only with selection or continuous cover
[[rule]]
type = "exclude"
if_level = 3
if_id = "Horse-Extract"
then_level = 2
then_ids = ["Prescribed-Burn"]

# Miyawaki dense planting benefits from LiDAR precision inventory
[[rule]]
type = "bonus"
if_level = 4
if_id = "Miyawaki-Dense"
then_level = 0
then_ids = ["LiDAR-ALS", "Terrestrial-LS"]
bonus = 0.10
