vision = "n=6 cylinder fuel delivery -- sigma=12 injectors (V12), tau=4 strokes, phi=2 intake/exhaust valves, J2=24 bar boost"

[scoring]
n6    = 0.35
perf  = 0.25
power = 0.20
cost  = 0.20

