# =============================================================
# Compatibility Rules
# =============================================================

# H2 Direct Injection requires cryogenic rail or high-pressure
[[rule]]
type       = "require"
if_level   = 0
if_id      = "H2Direct"
then_level = 1
then_ids   = "CryoRail,HighPress"

# H2 Direct Injection requires H2 combustion strategy
[[rule]]
type       = "require"
if_level   = 0
if_id      = "H2Direct"
then_level = 3
then_ids   = "H2Combustion"

# HCCI requires advanced controller
[[rule]]
type       = "require"
if_level   = 3
if_id      = "HCCI"
then_level = 2
then_ids   = "NeuralECU,FPGA_ECU,CylinderIndiv"

# Port fuel injection limited to low/medium pressure
[[rule]]
type       = "require"
if_level   = 0
if_id      = "PortFI"
then_level = 1
then_ids   = "LowPress,ReturnlessRail"
