# =============================================================
# Compatibility Rules
# =============================================================

# BDD structure requires example-based or AI generation (natural language alignment)
[[rule]]
type       = "require"
if_level   = 0
if_id      = "BDD_Given"
then_level = 3
then_ids   = "AIGenerate,ExampleBased,ModelBased"

# MC/DC coverage requires compliance report (aviation/auto standards)
[[rule]]
type       = "require"
if_level   = 2
if_id      = "MCDCCoverage"
then_level = 4
then_ids   = "ComplianceRpt"

# Formal coverage requires symbolic execution or model-based gen
[[rule]]
type       = "require"
if_level   = 2
if_id      = "FormalCoverage"
then_level = 3
then_ids   = "SymbolicExec,ModelBased"

# Snapshot test incompatible with mutation testing (snapshot is shallow)
[[rule]]
type       = "exclude"
if_level   = 0
if_id      = "SnapshotTest"
then_level = 2
then_ids   = "MutationTest,PathCoverage,FormalCoverage"

# Distributed runner incompatible with watch mode (different paradigms)
[[rule]]
type       = "exclude"
if_level   = 1
if_id      = "WatchMode"
then_level = 2
then_ids   = "MCDCCoverage,FormalCoverage"

# Fuzz-driven structure requires AI or fault model generator
[[rule]]
type       = "require"
if_level   = 0
if_id      = "FuzzDriven"
then_level = 3
then_ids   = "AIGenerate,FaultModel,SymbolicExec"
