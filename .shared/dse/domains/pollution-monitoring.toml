# ============================================================
# Compatibility Rules
# ============================================================

# Mass spectrometer requires high-bandwidth network
[[rule]]
type = "exclude"
if_level = 0
if_id = "Mass-Spec"
then_level = 1
then_ids = ["LoRaWAN", "NB-IoT", "Mesh-Zigbee"]

# Satellite network only for remote remediation (not urban)
[[rule]]
type = "exclude"
if_level = 1
if_id = "Satellite"
then_level = 4
then_ids = ["EV-Zone", "Traffic-Signal"]

# Digital twin CFD requires high-bandwidth network
[[rule]]
type = "exclude"
if_level = 2
if_id = "Digital-Twin"
then_level = 1
then_ids = ["LoRaWAN", "NB-IoT"]
