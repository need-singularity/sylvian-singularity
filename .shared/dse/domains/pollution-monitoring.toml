# Air/water quality — sensor to remediation
# n=6: 6 criteria pollutants (EPA), σ=12 monitoring stations, AQI 6 categories
# Total raw combos: 6x6x6x6x6 = 7,776 (pre-filter)
# =============================================================

[meta]
name = "pollution-monitoring"
desc = "Pollution Monitoring Architecture DSE (sensor/network/analysis/alert/remediation)"

[scoring]
n6 = 0.35
perf = 0.25
power = 0.20
cost = 0.20

