# =============================================================
# Compatibility Rules
# =============================================================

# E6GUT requires StrongForce or ElectroWeak (GUT unifies them)
[[rule]]
type       = "require"
if_level   = 0
if_id      = "E6GUT"
then_level = 1
then_ids   = "StrongForce,ElectroWeak"

# SUSY_N6 incompatible with BBN_Eta (SUSY modifies BBN too much without fine-tuning)
[[rule]]
type       = "exclude"
if_level   = 0
if_id      = "SUSY_N6"
then_level = 1
then_ids   = "BBN_Eta"

# StringM requires BlackHole or NeutronStar (extreme gravity needed)
[[rule]]
type       = "require"
if_level   = 0
if_id      = "StringM"
then_level = 2
then_ids   = "BlackHole,NeutronStar"

# FusionDT requires StellarNucl or MainSeq (fusion context)
[[rule]]
type       = "require"
if_level   = 1
if_id      = "FusionDT"
then_level = 2
then_ids   = "StellarNucl,MainSeq,Supernova"

# Multiverse incompatible with LCDM_6Param (LCDM is single-universe model)
[[rule]]
type       = "exclude"
if_level   = 4
if_id      = "Multiverse"
then_level = 4
then_ids   = "LCDM_6Param"

# DarkMatter requires LCDM_6Param or CMB_Aniso (needs cosmological framework)
[[rule]]
type       = "require"
if_level   = 3
if_id      = "DarkMatter"
then_level = 4
then_ids   = "LCDM_6Param,CMB_Aniso,Inflation"
