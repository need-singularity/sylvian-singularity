# ============================================================
# Compatibility Rules
# ============================================================

# AAV has small cargo — exclude large payloads
[[rule]]
type = "exclude"
if_level = 0
if_id = "AAV"
then_level = 1
then_ids = ["Gene-Replace"]

# Lentivirus requires ex vivo delivery (safety for integrating vector)
[[rule]]
type = "require"
if_level = 0
if_id = "Lentivirus"
then_level = 2
then_ids = ["Ex-Vivo"]

# mRNA payload requires LNP or exosome (protection needed)
[[rule]]
type = "require"
if_level = 1
if_id = "mRNA"
then_level = 0
then_ids = ["LNP", "Exosome"]

# Intravitreal only with small vectors (eye volume limited)
[[rule]]
type = "require"
if_level = 2
if_id = "Intravitreal"
then_level = 0
then_ids = ["AAV", "LNP", "Exosome"]
