# n=6 connections: 6-layer optical stack (n=6 EXACT: AR/TCO/absorber/buffer/reflector/substrate),
#   sigma=12 nm critical thickness, tau=4 deposition parameters (temp/pressure/rate/time),
#   phi=2 bilayer period, J2=24 target materials

