# ============================================================
# Compatibility Rules
# ============================================================

# ALD pairs best with high-k and superlattice structures
[[rule]]
type = "prefer"
if_level = 0
if_id = "ALD_12cycle"
then_level = 1
then_ids = "HfO2_highk,AlN_piezo"

# PVD sputtering is ideal for hard coatings and multilayer stacks
[[rule]]
type = "prefer"
if_level = 0
if_id = "PVD_sputter_6target"
then_level = 2
then_ids = "Multilayer_6stack,Superlattice"

# Sol-gel pairs with monolayer and large-area applications
[[rule]]
type = "prefer"
if_level = 0
if_id = "SolGel"
then_level = 2
then_ids = "Monolayer,Gradient"

# TiN hard coating leads to wear-resistant applications
[[rule]]
type = "prefer"
if_level = 1
if_id = "TiN_hard"
then_level = 4
then_ids = "WearResistant,ThermalBarrier"

# HfO2 high-k pairs with ellipsometry and XPS characterization
[[rule]]
type = "prefer"
if_level = 1
if_id = "HfO2_highk"
then_level = 3
then_ids = "Ellipsometry,XPS_depth"

# ITO transparent conductor leads to photovoltaic and anti-reflection
[[rule]]
type = "prefer"
if_level = 1
if_id = "ITO_transparent"
then_level = 4
then_ids = "Photovoltaic,AntiReflection"

# Nanocomposite structure requires nanoindentation characterization
[[rule]]
type = "prefer"
if_level = 2
if_id = "Nanocomposite"
then_level = 3
then_ids = "Nanoindent,XRD_6peak"

# Superlattice pairs with XRD for satellite peak analysis
[[rule]]
type = "prefer"
if_level = 2
if_id = "Superlattice"
then_level = 3
then_ids = "XRD_6peak,Ellipsometry"

# Electroplating pairs with corrosion and biocompatible applications
[[rule]]
type = "prefer"
if_level = 0
if_id = "Electroplating"
then_level = 4
then_ids = "CorrosionProtect,Biocompatible"

# E-beam evaporation best for anti-reflection optical coatings
[[rule]]
type = "prefer"
if_level = 0
if_id = "Ebeam_evap"
then_level = 4
then_ids = "AntiReflection,Photovoltaic"
