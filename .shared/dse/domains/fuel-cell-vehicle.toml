# ============================================================
# Compatibility Rules
# ============================================================

# Ceramic proton conductor only for tubular SOFC
[[rule]]
type = "require"
if_level = 0
if_id = "Ceramic-Proton"
then_level = 1
then_ids = ["Tubular-SOFC"]

# Tubular SOFC not suitable for vehicles needing fast startup
[[rule]]
type = "require"
if_level = 1
if_id = "Tubular-SOFC"
then_level = 4
then_ids = ["Marine-Vessel", "Heavy-Truck"]

# In-wheel motors only for sedan/SUV (not heavy truck)
[[rule]]
type = "require"
if_level = 3
if_id = "In-Wheel"
then_level = 4
then_ids = ["Sedan", "SUV", "Light-Commercial"]

# Large format stack for heavy-duty applications
[[rule]]
type = "require"
if_level = 1
if_id = "Large-Format"
then_level = 4
then_ids = ["Heavy-Truck", "Bus-Transit", "Marine-Vessel"]
