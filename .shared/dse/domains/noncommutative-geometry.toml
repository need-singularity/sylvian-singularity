# =============================================================
# Compatibility Rules
# =============================================================

# AF_Standard requires SU3xSU2xU1 (SM algebra gives SM gauge group)
[[rule]]
type       = "require"
if_level   = 0
if_id      = "AF_Standard"
then_level = 2
then_ids   = "SU3xSU2xU1"

# KODim6 is mandatory for NCG_SM
[[rule]]
type       = "require"
if_level   = 4
if_id      = "NCG_SM"
then_level = 4
then_ids   = "KODim6"

# E6_rank6 requires SO10 (E6 contains SO(10))
[[rule]]
type       = "require"
if_level   = 2
if_id      = "E6_rank6"
then_level = 2
then_ids   = "SO10"

# FermionN12 requires Generation3 (12 fermions = 3 gen x 4)
[[rule]]
type       = "require"
if_level   = 3
if_id      = "FermionN12"
then_level = 3
then_ids   = "Generation3"

# VonNeumannAlg incompatible with KODim6 (wrong algebraic framework)
[[rule]]
type       = "exclude"
if_level   = 0
if_id      = "VonNeumannAlg"
then_level = 4
then_ids   = "KODim6"

# StringNCG requires CliffordAlg or TensorAlg (needs tensor structure)
[[rule]]
type       = "require"
if_level   = 4
if_id      = "StringNCG"
then_level = 0
then_ids   = "CliffordAlg,TensorAlg"

# LoopQuantGrav incompatible with SpectralAction (different quantization)
[[rule]]
type       = "exclude"
if_level   = 4
if_id      = "LoopQuantGrav"
then_level = 1
then_ids   = "SpectralAction"
