# =============================================================
# Compatibility Rules
# =============================================================

# ASIC_Platform requires advanced motor system
[[rule]]
type       = "require"
if_level   = 0
if_id      = "ASIC_Platform"
then_level = 2
then_ids   = "CPG_6phase,Hybrid_Motor,Planning"

# Simulation cannot use physical sensing directly
[[rule]]
type       = "exclude"
if_level   = 0
if_id      = "Simulation"
then_level = 1
then_ids   = "Touch_6axis"

# Embodied_Internet requires MultiModal or Mirror sensing
[[rule]]
type       = "require"
if_level   = 4
if_id      = "Embodied_Internet"
then_level = 1
then_ids   = "MultiModal_Sense,Mirror"

# Reflexive motor incompatible with pure Simulation
[[rule]]
type       = "exclude"
if_level   = 2
if_id      = "Reflexive"
then_level = 0
then_ids   = "Simulation"
