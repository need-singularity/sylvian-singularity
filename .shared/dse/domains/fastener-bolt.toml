# ============================================================
# Compatibility Rules
# ============================================================

# Titanium Grade 5 best for aerospace applications
[[rule]]
type = "prefer"
if_level = 1
if_id = "TitaniumGr5"
then_level = 4
then_ids = "AerospaceAirframe"

# Cadmium plate restricted to aerospace (environmental regulations)
[[rule]]
type = "prefer"
if_level = 2
if_id = "CadmiumPlate"
then_level = 4
then_ids = "AerospaceAirframe"

# Hydraulic tensioning best for pressure vessels and structural
[[rule]]
type = "prefer"
if_level = 3
if_id = "HydraulicTension"
then_level = 4
then_ids = "PressureVessel,StructuralSteel"

# Stainless A4 required for marine offshore
[[rule]]
type = "prefer"
if_level = 1
if_id = "StainlessA4"
then_level = 4
then_ids = "MarineOffshore"
