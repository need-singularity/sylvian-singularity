# =============================================================
# Compatibility Rules
# =============================================================

# HomomorphicEnc requires heavy compute: FPGA or GPU
[[rule]]
type       = "require"
if_level   = 0
if_id      = "HomomorphicEnc"
then_level = 3
then_ids   = "FPGA_Crypto,GPU_Crypto"

# QKD requires quantum-safe foundation
[[rule]]
type       = "require"
if_level   = 3
if_id      = "QKD"
then_level = 0
then_ids   = "PostQuantum,Symmetric"

# EdgeSec cannot use heavy schemes
[[rule]]
type       = "exclude"
if_level   = 4
if_id      = "EdgeSec"
then_level = 0
then_ids   = "HomomorphicEnc,MPC"
