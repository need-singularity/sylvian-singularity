# =============================================================
# HEXA-CRYPTO DSE Domain Definition
# BT-53 (BTC 6 confirms=n, ETH 12s=sigma)
# BT-58 (sigma-tau=8 universal AI constant)
# BT-50 (IEEE 754 -> key sizes)
# Total raw combos: 6x5x6x5x5 = 4,500 (pre-filter)
# =============================================================

[meta]
name = "cryptography"
desc = "Ultimate Cryptography DSE (BT-53/58/50)"
levels = ["Foundation", "KeyMgmt", "Primitive", "Engine", "System"]
vision = "Zero-trust world -- every bit encrypted, every proof verified"

[scoring]
n6   = 0.35
perf = 0.25
power = 0.20
cost  = 0.20

