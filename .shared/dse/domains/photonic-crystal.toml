# N6 Photonic Crystal DSE — Periodic dielectric nanostructure
# 6 Structures × 6 Materials × 6 Fabrications × 6 Defects × 6 Applications = 7,776 combos
# n=6 connections: Hexagonal lattice 6-fold symmetry (n=6 EXACT), sigma=12 photonic band gaps,
#   tau=4 structure types (1D/2D/3D/quasi), phi=2 bandgap edges (dielectric/air),
#   J2=24 lattice constants per design, 6 reciprocal lattice vectors (n=6)

[meta]
name = "photonic-crystal"
desc = "Photonic Crystal DSE — periodic dielectric nanostructure (n=6 universality)"

[scoring]
n6 = 0.35
perf = 0.25
power = 0.20
cost = 0.20

