# ============================================================
# Compatibility Rules
# ============================================================

# 2D hexagonal structure pairs best with Si or GaAs
[[rule]]
type = "prefer"
if_level = 0
if_id = "2D_Hexagonal"
then_level = 1
then_ids = "Silicon_High,GaAs_Active"

# 3D woodpile needs e-beam or two-photon
[[rule]]
type = "prefer"
if_level = 0
if_id = "3D_Woodpile"
then_level = 2
then_ids = "E_Beam_Litho,Two_Photon_Polymerization"

# 3D inverse opal pairs with colloidal self-assembly
[[rule]]
type = "prefer"
if_level = 0
if_id = "3D_Inverse_Opal"
then_level = 2
then_ids = "Self_Assembly_6sphere,Colloidal_Crystal"

# GaAs active material pairs with laser PCSEL
[[rule]]
type = "prefer"
if_level = 1
if_id = "GaAs_Active"
then_level = 4
then_ids = "Laser_PCSEL,LED_Extraction"

# Silicon pairs with waveguide and sensor applications
[[rule]]
type = "prefer"
if_level = 1
if_id = "Silicon_High"
then_level = 4
then_ids = "Waveguide_6port,Sensor_Resonant,Optical_Filter"

# Polymer SU8 pairs with two-photon polymerization
[[rule]]
type = "prefer"
if_level = 1
if_id = "Polymer_SU8"
then_level = 2
then_ids = "Two_Photon_Polymerization,Holographic_6beam"

# Point cavity pairs with laser and sensor
[[rule]]
type = "prefer"
if_level = 3
if_id = "Point_Cavity"
then_level = 4
then_ids = "Laser_PCSEL,Sensor_Resonant"

# Topological edge state pairs with waveguide routing
[[rule]]
type = "prefer"
if_level = 3
if_id = "Topological_Edge"
then_level = 4
then_ids = "Waveguide_6port,Optical_Filter"

# Quasi-crystal pairs with solar light trapping (isotropic)
[[rule]]
type = "prefer"
if_level = 0
if_id = "Quasi_Crystal_12fold"
then_level = 4
then_ids = "Solar_Light_Trap,LED_Extraction"

# Liquid crystal tunable pairs with optical filter tuning
[[rule]]
type = "prefer"
if_level = 1
if_id = "Liquid_Crystal_Tunable"
then_level = 4
then_ids = "Optical_Filter,Sensor_Resonant"
