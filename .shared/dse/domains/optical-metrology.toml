# N6 Optical Metrology DSE — Precision measurement
# 6 Source x 6 Interferometer x 6 Detector x 6 Algorithm x 6 Calibration = 7,776 combos
# n=6: 6 measurement axes (DOF), sigma=12 fringes, HeNe 632.8nm

[meta]
name = "optical-metrology"
desc = "Optical Metrology DSE (6 DOF, sigma=12 fringes, HeNe 632.8nm precision)"

[scoring]
n6 = 0.35
perf = 0.25
power = 0.20
cost = 0.20

