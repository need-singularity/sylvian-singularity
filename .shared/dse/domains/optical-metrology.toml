# ============================================================
# Compatibility Rules
# ============================================================

# Femtosecond comb works best with Fabry-Perot or heterodyne
[[rule]]
type = "prefer"
if_level = 0
if_id = "FemtoComb"
then_level = 1
then_ids = "FabryPerot,MachZehnder"

# White light source requires white-light scanning algorithm
[[rule]]
type = "prefer"
if_level = 0
if_id = "WhiteLight"
then_level = 3
then_ids = "WhiteLightScan,FourierTransform"

# APD detector best for heterodyne detection
[[rule]]
type = "prefer"
if_level = 2
if_id = "APD_Detector"
then_level = 3
then_ids = "HeterodyneDet,PhaseShift"

# Laser tracker calibration pairs with Michelson interferometer
[[rule]]
type = "prefer"
if_level = 4
if_id = "LaserTracker"
then_level = 1
then_ids = "MichelsonIF,MachZehnder"
