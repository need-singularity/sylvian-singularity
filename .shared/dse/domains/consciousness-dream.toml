# =============================================================
# Compatibility Rules
# =============================================================

# Lucid dreaming requires Creative or Generative replay
[[rule]]
type       = "require"
if_level   = 0
if_id      = "Lucid"
then_level = 1
then_ids   = "Creative,Generative"

# N3 deep sleep requires Delta modulation
[[rule]]
type       = "require"
if_level   = 0
if_id      = "N3"
then_level = 3
then_ids   = "Delta,Mixed"

# N2 sleep requires Spindle modulation
[[rule]]
type       = "require"
if_level   = 0
if_id      = "N2"
then_level = 3
then_ids   = "Spindle,Mixed"

# None_Replay excludes Hippocampal and Dual consolidation
[[rule]]
type       = "exclude"
if_level   = 1
if_id      = "None_Replay"
then_level = 2
then_ids   = "Hippocampal,Dual"

# Insight learning requires REM or Lucid stage
[[rule]]
type       = "require"
if_level   = 4
if_id      = "Insight"
then_level = 0
then_ids   = "REM,Lucid"
