name = "display-audio"
desc = "Display-Audio Architecture DSE (BT-48/71/72/66)"
levels = ["Foundation", "Process", "Core", "Engine", "System"]
vision = "Perfect audiovisual experience -- n=6 harmonic media convergence"

[scoring]
n6   = 0.35
perf = 0.25
power = 0.20
cost  = 0.20

