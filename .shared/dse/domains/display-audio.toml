# =============================================================
# Compatibility Rules
# =============================================================

# Holographic only with RayTrace or NeuralRender
[[rule]]
type       = "require"
if_level   = 0
if_id      = "Holographic"
then_level = 2
then_ids   = "RayTrace,NeuralRender"

# EInk excludes DolbyAtmos and SpatialAudio (no dynamic audio needed)
[[rule]]
type       = "exclude"
if_level   = 0
if_id      = "EInk"
then_level = 1
then_ids   = "DolbyAtmos,SpatialAudio"

# Cinema requires OLED, MicroLED, or LCoS projection
[[rule]]
type       = "require"
if_level   = 4
if_id      = "Cinema"
then_level = 0
then_ids   = "OLED,MicroLED,LCoS"
