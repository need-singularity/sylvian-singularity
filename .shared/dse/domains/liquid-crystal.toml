# ============================================================
# Compatibility Rules
# ============================================================

# TN nematic pairs with passive matrix (low-end) and active TFT
[[rule]]
type = "prefer"
if_level = 0
if_id = "Nematic_TN"
then_level = 3
then_ids = "Passive_Matrix,Active_TFT"

# IPS nematic needs active TFT for high resolution
[[rule]]
type = "prefer"
if_level = 0
if_id = "IPS_Nematic"
then_level = 3
then_ids = "Active_TFT,Field_Sequential_12subframe"

# VA pairs with LCD display (TV standard)
[[rule]]
type = "prefer"
if_level = 0
if_id = "VA_Vertical"
then_level = 4
then_ids = "LCD_Display,Smart_Window"

# Ferroelectric FLC pairs with SLM and optical switch
[[rule]]
type = "prefer"
if_level = 0
if_id = "Ferroelectric_FLC"
then_level = 4
then_ids = "Spatial_Light_Modulator,Optical_Switch"

# Cholesteric pairs with e-paper and temperature sensor
[[rule]]
type = "prefer"
if_level = 0
if_id = "Cholesteric_Pitch"
then_level = 4
then_ids = "Smart_Window,Temperature_Sensor"

# Cholesteric pairs with e-paper bistable driving
[[rule]]
type = "prefer"
if_level = 0
if_id = "Cholesteric_Pitch"
then_level = 3
then_ids = "E_Paper_Bistable,Segment_6digit"

# Blue phase needs polymer stabilization
[[rule]]
type = "prefer"
if_level = 0
if_id = "Blue_Phase"
then_level = 1
then_ids = "Polymer_Stabilized,Self_Aligned"

# Blue phase pairs with field-sequential (fast switching)
[[rule]]
type = "prefer"
if_level = 0
if_id = "Blue_Phase"
then_level = 3
then_ids = "Field_Sequential_12subframe,Holographic_SLM"

# Photo-alignment pairs with IPS and multi-domain VA
[[rule]]
type = "prefer"
if_level = 1
if_id = "Photo_Alignment_6angle"
then_level = 0
then_ids = "IPS_Nematic,VA_Vertical"

# LTPS TFT pairs with high-end display
[[rule]]
type = "prefer"
if_level = 2
if_id = "LTPS_TFT"
then_level = 4
then_ids = "LCD_Display,Spatial_Light_Modulator"

# Graphene electrode pairs with tunable lens (flexible)
[[rule]]
type = "prefer"
if_level = 2
if_id = "Transparent_Graphene"
then_level = 4
then_ids = "Tunable_Lens,Smart_Window"
