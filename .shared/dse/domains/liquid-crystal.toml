# N6 Liquid Crystal DSE — Mesophase material engineering
# 6 LCTypes × 6 Alignments × 6 Electrodes × 6 Drivings × 6 Applications = 7,776 combos
# n=6 connections: 6 carbon alkyl chain common (n=6 EXACT, hexyl),
#   sigma=12 LC phases identified (nematic/smectic-A/C/cholesteric/blue/discotic/banana/ferroelectric/antiferro/twist-grain/columnar/cubatic),
#   tau=4 main phases (nematic/smectic/cholesteric/discotic), phi=2 alignment (parallel/perpendicular),
#   J2=24 fps display refresh

[meta]
name = "liquid-crystal"
desc = "Liquid Crystal DSE — mesophase material engineering (n=6 universality)"

[scoring]
n6 = 0.35
perf = 0.25
power = 0.20
cost = 0.20

