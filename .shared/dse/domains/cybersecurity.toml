# ============================================================
# Rules
# ============================================================

# XDR requires SOAR for automated response
[[rule]]
type = "require"
if_level = 1
if_id = "XDR-12layer"
then_level = 2
then_ids = ["SOAR-6playbook", "AutoContain-6sec"]

# Air-gapped backup not compatible with cloud DR
[[rule]]
type = "exclude"
if_level = 3
if_id = "AirGap-12tape"
then_level = 3
then_ids = ["CloudDR-6region"]

# Red team requires advanced detection capability
[[rule]]
type = "exclude"
if_level = 4
if_id = "RedTeam-6exercise"
then_level = 1
then_ids = ["Honeypot-6trap"]

# Honeypot detection needs forensics response
[[rule]]
type = "require"
if_level = 1
if_id = "Honeypot-6trap"
then_level = 2
then_ids = ["Forensics-6artifact", "ThreatHunt-12query", "Sandbox-6vm"]
