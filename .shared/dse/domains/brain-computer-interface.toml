# N6 Brain-Computer Interface DSE — BCI hardware + software
# 6 Electrodes × 6 Amplifiers × 6 Decoders × 6 Stimulators × 6 Applications = 7,776 combos
# n=6 connections: n=6 frequency bands (delta/theta/alpha/beta/gamma/HFO),
#   sigma=12 channels per region, tau=4 processing stages, J2=24 bit resolution

[meta]
name = "brain-computer-interface"
desc = "Brain-Computer Interface DSE — from electrode to application (n=6 universality)"

[scoring]
n6 = 0.35
perf = 0.25
power = 0.20
cost = 0.20

