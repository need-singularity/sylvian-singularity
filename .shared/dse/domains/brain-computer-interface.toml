# ============================================================
# Compatibility Rules
# ============================================================

# Utah array is standard for motor prosthetic
[[rule]]
type = "prefer"
if_level = 0
if_id = "UtahArray"
then_level = 4
then_ids = "Motor_Prosthetic,Speech_BCI"

# Dry EEG headset pairs with neurogaming (consumer)
[[rule]]
type = "prefer"
if_level = 0
if_id = "DryEEG"
then_level = 4
then_ids = "Neuro_Gaming"

# DBS stimulator pairs with epilepsy RNS
[[rule]]
type = "prefer"
if_level = 3
if_id = "DBS_System"
then_level = 4
then_ids = "Epilepsy_RNS,Memory_Enhance"

# Optogenetic stimulator needs flexible mesh electrodes
[[rule]]
type = "prefer"
if_level = 3
if_id = "Optogenetic"
then_level = 0
then_ids = "Flexible_Mesh,Neuropixels"

# Transformer BCI decoder pairs with speech restoration
[[rule]]
type = "prefer"
if_level = 2
if_id = "Transformer_BCI"
then_level = 4
then_ids = "Speech_BCI,Motor_Prosthetic"

# ECoG grid pairs with cortical stimulator
[[rule]]
type = "prefer"
if_level = 0
if_id = "ECoG_Grid"
then_level = 3
then_ids = "Cortical_Stim"

# tDCS pairs with memory enhancement (non-invasive)
[[rule]]
type = "prefer"
if_level = 3
if_id = "tDCS"
then_level = 4
then_ids = "Memory_Enhance,Neuro_Gaming"

# SNN decoder pairs with neuromorphic efficiency
[[rule]]
type = "prefer"
if_level = 2
if_id = "SNN_Neuromorphic"
then_level = 1
then_ids = "Neural_ASIC,Wireless_Amp"
