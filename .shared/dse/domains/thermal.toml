# =============================================================
# Compatibility Rules
# =============================================================

# CryoCool only with HPC or DataCenter systems
[[rule]]
type       = "require"
if_level   = 0
if_id      = "CryoCool"
then_level = 4
then_ids   = "HPC,DataCenter"

# Immersion not for Mobile or Embedded
[[rule]]
type       = "exclude"
if_level   = 0
if_id      = "Immersion"
then_level = 4
then_ids   = "Mobile,Embedded"

# Passive cannot pair with active liquid/phase/immersion/cryo cooling
[[rule]]
type       = "exclude"
if_level   = 3
if_id      = "Passive"
then_level = 0
then_ids   = "LiquidCool,TwoPhase,Immersion,CryoCool"
