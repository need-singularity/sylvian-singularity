# Total raw combos: 6x5x5x5x5 = 3,750 (pre-filter)
# =============================================================

[meta]
name = "thermal"
desc = "Thermal Management DSE (BT-60/27)"
levels = ["Foundation", "Process", "Core", "Engine", "System"]
vision = "Zero thermal throttling -- every watt becomes useful work"

[scoring]
n6   = 0.35
perf = 0.25
power = 0.20
cost  = 0.20

