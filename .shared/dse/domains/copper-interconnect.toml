# N6 Copper Interconnect DSE — IC & power copper engineering
# 6 Materials × 6 Depositions × 6 Patternings × 6 Barriers × 6 Applications = 7,776 combos
# n=6 connections: Cu FCC CN=12=σ EXACT, 6 metal layers in advanced IC (n=6),
#   Z=29≈sopfr·n-1, τ=4 barrier layers (Ta/TaN/Ti/TiN), φ=2 dual-damascene,
#   J₂=24 via levels target, resistivity 1.68 µΩ·cm

