# ============================================================
# Compatibility Rules
# ============================================================

# Pure Cu ECD pairs with electroplating and dual-damascene
[[rule]]
type = "prefer"
if_level = 0
if_id = "Pure_Cu_ECD"
then_level = 1
then_ids = "Electroplating_6bath,PVD_Seed"

[[rule]]
type = "prefer"
if_level = 0
if_id = "Pure_Cu_ECD"
then_level = 2
then_ids = "Dual_Damascene,Single_Damascene"

# Cu-graphene hybrid pairs with graphene barrier
[[rule]]
type = "prefer"
if_level = 0
if_id = "Cu_Graphene"
then_level = 3
then_ids = "Graphene_Barrier,Co_Cap_12nm"

# Cobalt alternative uses subtractive etch and ALD
[[rule]]
type = "prefer"
if_level = 0
if_id = "Cobalt_Alt"
then_level = 2
then_ids = "Subtractive_Etch,Hybrid_Patterning"

[[rule]]
type = "prefer"
if_level = 0
if_id = "Cobalt_Alt"
then_level = 1
then_ids = "ALD_12cycle,CVD_Conformal"

# Ruthenium liner is itself the barrier layer
[[rule]]
type = "prefer"
if_level = 0
if_id = "Ruthenium_Liner"
then_level = 3
then_ids = "Ru_Liner,TiN_PEALD"

# Self-forming CuMn barrier pairs with CuMn alloy material
[[rule]]
type = "prefer"
if_level = 3
if_id = "SelfForming_CuMn"
then_level = 0
then_ids = "CuMn_Alloy,Pure_Cu_ECD"

# Airgap patterning best for advanced logic and interposer
[[rule]]
type = "prefer"
if_level = 2
if_id = "Airgap_6nm"
then_level = 4
then_ids = "Logic_6nm,Interposer_25D"

# Hybrid patterning for leading-edge logic nodes
[[rule]]
type = "prefer"
if_level = 2
if_id = "Hybrid_Patterning"
then_level = 4
then_ids = "Logic_6nm,Memory_BEOL"

# Power busbar uses electroplating and semi-additive
[[rule]]
type = "prefer"
if_level = 4
if_id = "Power_Busbar"
then_level = 2
then_ids = "Semi_Additive,Single_Damascene"

# Package substrate pairs with semi-additive patterning
[[rule]]
type = "prefer"
if_level = 4
if_id = "Package_Substrate"
then_level = 2
then_ids = "Semi_Additive,Dual_Damascene"
