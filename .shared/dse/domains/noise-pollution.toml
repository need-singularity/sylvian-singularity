# Total raw combos: 6x6x6x6x6 = 7,776 (pre-filter)
# =============================================================

[meta]
name = "noise-pollution"
desc = "Noise Pollution Architecture DSE (source/measurement/barrier/absorption/regulation)"

[scoring]
n6 = 0.35
perf = 0.25
power = 0.20
cost = 0.20

