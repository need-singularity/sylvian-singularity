# ============================================================
# Compatibility Rules
# ============================================================

# Active cancellation requires precision measurement
[[rule]]
type = "exclude"
if_level = 2
if_id = "Active-Cancel"
then_level = 1
then_ids = ["Smartphone-App"]

# Acoustic metamaterial barrier pairs with acoustic camera for tuning
[[rule]]
type = "bonus"
if_level = 2
if_id = "Meta-Barrier"
then_level = 1
then_ids = ["Acoustic-Camera"]
bonus = 0.10

# Porous asphalt specifically for road traffic source
[[rule]]
type = "bonus"
if_level = 3
if_id = "Porous-Asphalt"
then_level = 0
then_ids = ["Traffic-Road"]
bonus = 0.10
