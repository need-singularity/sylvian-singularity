# =============================================================
# Dark Matter Detector DSE Domain Definition
# 궁극의 암흑물질 직접 검출 칩 — n=6 기반 검출기 아키텍처
# σ=12 PMT channels, detector mass σ·τ=48 ton, threshold σ-τ=8 keV
# WIMP candidate σ·φ=24 GeV, n=6 shielding layers
# Total raw combos: 7x6x6x6x6 = 9,072
# =============================================================

[meta]
name = "dark-matter-detector"
desc = "Ultimate Dark Matter Direct Detection Chip DSE (WIMP/axion search)"
