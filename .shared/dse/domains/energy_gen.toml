# =============================================================
# Compatibility Rules
# =============================================================

# Solar PV must use Direct PV conversion
[[rule]]
type       = "require"
if_level   = 0
if_id      = "Solar_PV"
then_level = 1
then_ids   = "Direct_PV"

# Nuclear fission requires Steam Rankine or Combined Cycle
[[rule]]
type       = "require"
if_level   = 0
if_id      = "Nuclear_Fission"
then_level = 1
then_ids   = "Steam_Rankine,Combined_Cycle"

# Hydrogen fuel cell is direct conversion (no thermal cycle)
[[rule]]
type       = "exclude"
if_level   = 0
if_id      = "Hydrogen_Fuel"
then_level = 1
then_ids   = "Steam_Rankine,Gas_Turbine,Combined_Cycle"

# Geothermal uses Steam Rankine
[[rule]]
type       = "require"
if_level   = 0
if_id      = "Geothermal"
then_level = 1
then_ids   = "Steam_Rankine"

# MHD only feasible at utility scale or above
[[rule]]
type       = "require"
if_level   = 1
if_id      = "MHD"
then_level = 2
then_ids   = "Utility_1GW,Mega_10GW"

# Micro scale cannot connect to transmission HV or HVDC
[[rule]]
type       = "exclude"
if_level   = 2
if_id      = "Micro_10kW"
then_level = 4
then_ids   = "Transmission_HV,HVDC_Ultra"

# Mega scale needs transmission or HVDC (not microgrid/island)
[[rule]]
type       = "require"
if_level   = 2
if_id      = "Mega_10GW"
then_level = 4
then_ids   = "Transmission_HV,HVDC_Ultra"

# Flywheel too short-duration for utility/mega baseload
[[rule]]
type       = "exclude"
if_level   = 3
if_id      = "Flywheel"
then_level = 2
then_ids   = "Utility_1GW,Mega_10GW"

# Pumped hydro only at medium scale or above
[[rule]]
type       = "require"
if_level   = 3
if_id      = "Pumped_Hydro"
then_level = 2
then_ids   = "Medium_10MW,Utility_1GW,Mega_10GW"

# HVDC Ultra connection only for utility/mega scale
[[rule]]
type       = "require"
if_level   = 4
if_id      = "HVDC_Ultra"
then_level = 2
then_ids   = "Utility_1GW,Mega_10GW"
