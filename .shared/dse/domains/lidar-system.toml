# =============================================================
# HEXA-LIDAR DSE Domain Definition
# LiDAR Sensing Systems
# n=6: 6 scan patterns, sigma=12 return channels, 1550nm eye-safe
# BT-48 (Display-Audio bridge), BT-59 (8-layer AI stack)
# Total raw combos: 6x6x6x6x6 = 7,776
