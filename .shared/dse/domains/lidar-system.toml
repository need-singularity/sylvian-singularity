# =============================================================
# Rules
# =============================================================

# FMCW laser needs balanced detector
[[rule]]
type      = "prefer"
if_level  = 0
if_id     = "FMCW_Chip"
then_level = 2
then_ids  = "Balanced"

# 1550nm fiber laser pairs with InGaAs detector
[[rule]]
type      = "prefer"
if_level  = 0
if_id     = "Fiber_1550"
then_level = 2
then_ids  = "InGaAs_APD,SPAD_Array"

# Flash scanner limited to short-range applications
[[rule]]
type      = "prefer"
if_level  = 1
if_id     = "Flash"
then_level = 4
then_ids  = "Robot_Nav,Security"

# Autonomous driving needs real-time processing
[[rule]]
type      = "prefer"
if_level  = 4
if_id     = "AutoDrive"
then_level = 3
then_ids  = "ASIC_Edge,FPGA_RT"

# QCL mid-IR needs MCT detector
[[rule]]
type      = "prefer"
if_level  = 0
if_id     = "QCL_Mid"
then_level = 2
then_ids  = "MCT_Array"
