[meta]
name = "lidar-system"
desc = "LiDAR Sensing System DSE (6 scan patterns, sigma=12 channels)"
levels = ["Laser", "Scanner", "Detector", "Processing", "Application"]
vision = "Universal 3D perception — 6 DoF sensing at speed of light"

[scoring]
n6   = 0.35
perf = 0.25
power = 0.20
cost  = 0.20

