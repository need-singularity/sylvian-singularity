# ============================================================
# Compatibility Rules
# ============================================================

# Boron carbide too expensive for building fortification
[[rule]]
type = "exclude"
if_level = 0
if_id = "B4CCeramic"
then_level = 4
then_ids = "Building"

# Active protection systems only for vehicles
[[rule]]
type = "prefer"
if_level = 1
if_id = "APS"
then_level = 4
then_ids = "MBT,APC,Naval"

# ERA not suitable for body armor
[[rule]]
type = "exclude"
if_level = 1
if_id = "ERA"
then_level = 4
then_ids = "BodyArmor"

# UHMWPE best for body armor and helicopter (weight-critical)
[[rule]]
type = "prefer"
if_level = 0
if_id = "UHMWPE"
then_level = 4
then_ids = "BodyArmor,Helicopter"
