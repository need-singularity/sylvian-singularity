name = "endoscopy-system"
desc = "Endoscopy System DSE (6 optical channels=n, sigma=12 mm OD, tau=4 bending, phi=2 dual-lens, J2=24 fps)"

[scoring]
n6 = 0.35
perf = 0.25
power = 0.20
cost = 0.20

