# ============================================================
# Compatibility Rules
# ============================================================

# Confocal microendoscopy needs laser illumination
[[rule]]
type = "prefer"
if_level = 0
if_id = "Confocal_Micro"
then_level = 1
then_ids = "Laser_Multi,Fluorescence_ICG"

# OCT probe benefits from multi-laser source
[[rule]]
type = "prefer"
if_level = 0
if_id = "OCT_Integrated"
then_level = 1
then_ids = "Laser_Multi,NBI_Dual"

# Robotic navigation best paired with AI guidance
[[rule]]
type = "prefer"
if_level = 3
if_id = "Robotic_Assist"
then_level = 0
then_ids = "DualLens_Stereo,Hyperspectral"

# ESD knife needs electrosurgery-compatible optical system
[[rule]]
type = "prefer"
if_level = 2
if_id = "ESD_Knife"
then_level = 4
then_ids = "Upper_GI,Colonoscopy"

# Magnetic capsule steering for capsule endoscopy
[[rule]]
type = "prefer"
if_level = 3
if_id = "Magnetic_Steer"
then_level = 4
then_ids = "Capsule_Endo,Colonoscopy"

# ERCP needs specialized instrument channels
[[rule]]
type = "prefer"
if_level = 4
if_id = "ERCP"
then_level = 2
then_ids = "Electrosurgery,Stent_Deployer"
