services:
  chat:
    build:
      context: ..
      dockerfile: serve/Dockerfile
    container_name: consciouslm-chat
    ports:
      - "8000:8000"
    volumes:
      - ./models:/models:ro
    environment:
      - CHECKPOINT_PATH=/models/growing_700m_korean_sft.pt
      - PORT=8000
      - NVIDIA_VISIBLE_DEVICES=all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  think:
    build:
      context: ..
      dockerfile: serve/Dockerfile
    container_name: consciouslm-think
    ports:
      - "8001:8000"
    volumes:
      - ./models:/models:ro
    environment:
      - CHECKPOINT_PATH=/models/growing_700m_korean_sft.pt
      - PORT=8000
      - NVIDIA_VISIBLE_DEVICES=all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
