name: Sync projects.md to all repos

on:
  push:
    paths:
      - '.shared/projects.md'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.REPO_SYNC_TOKEN }}

      - name: Create sync script
        run: |
          cat > /tmp/sync.py << 'EOF'
          import re, os, sys

          repo_dir = sys.argv[1]
          shared_path = sys.argv[2]

          readme_path = os.path.join(repo_dir, "README.md")
          if not os.path.exists(readme_path):
              print("  No README.md")
              sys.exit(0)

          with open(readme_path) as f:
              content = f.read()

          if "SHARED:PROJECTS:START" not in content:
              print("  No markers")
              sys.exit(0)

          with open(shared_path) as f:
              shared = f.read()

          pattern = r"(<!-- SHARED:PROJECTS:START -->).*?(<!-- SHARED:PROJECTS:END -->)"
          repl = r"\1" + "\n" + shared + "\n" + r"\2"
          result = re.sub(pattern, repl, content, flags=re.DOTALL)

          with open(readme_path, "w") as f:
              f.write(result)
          print("  Replaced")
          EOF

      - name: Sync to target repos
        env:
          GH_TOKEN: ${{ secrets.REPO_SYNC_TOKEN }}
        run: |
          # Sync TECS-L itself first
          echo "=== TECS-L (self) ==="
          python3 /tmp/sync.py "$GITHUB_WORKSPACE" "$GITHUB_WORKSPACE/.shared/projects.md"
          if ! git diff --quiet README.md 2>/dev/null; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "Sync project list [skip ci]"
            git push
            echo "  Self-synced!"
          else
            echo "  No changes"
          fi

          # Sync other repos
          REPOS="sedi anima ph-training"
          for repo in $REPOS; do
            echo "=== $repo ==="
            rm -rf "/tmp/$repo"
            git clone "https://x-access-token:${GH_TOKEN}@github.com/need-singularity/${repo}.git" "/tmp/${repo}" 2>&1 || { echo "  SKIP"; continue; }

            python3 /tmp/sync.py "/tmp/$repo" "$GITHUB_WORKSPACE/.shared/projects.md"

            cd "/tmp/$repo"
            if git diff --quiet README.md 2>/dev/null; then
              echo "  No changes"
            else
              git config user.name "github-actions[bot]"
              git config user.email "github-actions[bot]@users.noreply.github.com"
              git add README.md
              git commit -m "Sync project list from TECS-L"
              git push
              echo "  Done!"
            fi
            cd "$GITHUB_WORKSPACE"
          done
